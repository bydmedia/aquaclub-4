function safeArr(val) { 
  if (!val) return [];
  return (Array.isArray(val) ? val : Object.values(val)).filter(item => item !== null && item !== undefined);
}

const DB={
  set:(k,v)=>{
    const cleanV = Array.isArray(v) ? v.filter(i => i !== null && i !== undefined) : v;
    db.collection("appData").doc("main").set({ [k]: cleanV }, { merge: true }).catch(err => console.error("Firebase kayıt hatası:", err));
  }
};

function fmtDate(d){if(!d)return"—";const[y,m,day]=d.split("-");return`${day}.${m}.${y}`}
function totalPaid(s){return safeArr(s?.payments).reduce((t,p)=>t+Number(p.amount||0),0);}
function equipmentTotal(s){return safeArr(s?.equipment).reduce((t,e)=>t+Number(e.price||0),0);}
function monthlyTotal(s){return Number(s?.monthlyFee||0)-Number(s?.discount||0)+equipmentTotal(s)+(s?.hasTransport?Number(s?.transportFee||0):0);}
function courseStatus(s){
  if(!s?.courseStart||!s?.courseEnd)return"unknown";
  const now=new Date(TODAY),st=new Date(s.courseStart),en=new Date(s.courseEnd);
  if(now<st)return"upcoming";if(now>en)return"ended";return"active";
}
function daysLeft(s){return Math.ceil((new Date(s?.courseEnd)-new Date(TODAY))/86400000)}
function attendanceCount(s){return Object.values(s?.attendance||{}).filter(Boolean).length}
function age(dob){if(!dob)return"—";return Math.floor((Date.now()-new Date(dob))/31557600000)+" yaş"}

function calcEndDate(start,total,days){
  if(!start||!total||!days||days.length===0)return"";
  let d=new Date(start),cnt=0,iter=0;
  const safeDays = safeArr(days).map(Number);
  while(cnt<total&&iter<total*30){if(safeDays.includes(d.getDay()))cnt++;if(cnt<total)d.setDate(d.getDate()+1);iter++;}
  return d.toISOString().split("T")[0];
}

function calcRemainingSessions(s) {
  if (!s || !s.courseStart || !s.totalSessions || !s.weekDays || s.weekDays.length === 0) return 0;
  const total = Number(s.totalSessions || 0);
  const start = new Date(s.courseStart);
  const end = s.courseEnd ? new Date(s.courseEnd) : new Date(TODAY);
  const current = new Date(TODAY);
  let targetEnd = current < end ? current : end;
  if (targetEnd < start) return total;
  
  let passedSessions = 0;
  let iter = new Date(start);
  const safeDays = safeArr(s.weekDays).map(Number);
  while (iter <= targetEnd) {
    if (safeDays.includes(iter.getDay())) passedSessions++;
    iter.setDate(iter.getDate() + 1);
  }
  return Math.max(0, total - passedSessions);
}

function LoginScreen({ onSuccess, appUsers, adminPin }) {
  const [user, setUser] = useState("");
  const [pass, setPass] = useState("");
  const [err, setErr] = useState(false);

  const handleLogin = (e) => {
    e.preventDefault();
    if (user.toLowerCase() === "admin" && (pass === "0309" || pass === adminPin)) {
      onSuccess({ id: 'admin', username: 'admin', role: 'admin', allowedTabs: NAV_ITEMS.map(n=>n.id) });
      return;
    }
    const foundUser = safeArr(appUsers).find(u => u.username.toLowerCase() === user.toLowerCase() && u.password === pass);
    if (foundUser) { onSuccess(foundUser); return; }
    setErr(true); setTimeout(() => setErr(false), 2000);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,padding:20}}>
      <div style={{fontSize:42, fontWeight:800, color:C.accent, marginBottom:30, letterSpacing:-1.5}}>AquaClub Pro</div>
      <form onSubmit={handleLogin} style={{background:C.card,padding:"40px 30px",borderRadius:16,border:`1px solid ${err?C.danger:C.borderLight}`,textAlign:"center",boxShadow:"0 12px 32px rgba(0,0,0,0.04)",width:"100%",maxWidth:340, transition:"all 0.3s"}}>
        <div style={{fontSize:16,fontWeight:800,marginBottom:24,color:C.text}}>Sisteme Giriş Yapın</div>
        <Inp value={user} onChange={setUser} placeholder="Kullanıcı Adı" autoFocus style={{textAlign:"center", fontSize:14}}/>
        <Inp value={pass} onChange={setPass} type="password" placeholder="Şifre" style={{textAlign:"center", fontSize:14, letterSpacing:4}}/>
        <Btn full type="submit" onClick={handleLogin} style={{marginTop:12}}>Giriş Yap</Btn>
        <div style={{height: 20, marginTop: 16}}>{err && <div style={{color:C.danger,fontSize:13,fontWeight:700}}>Hatalı Bilgi Girdiniz!</div>}</div>
      </form>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   ÖĞRENCİ FORMU (ZORUNLU BÜYÜK HARF)
═══════════════════════════════════════════════════════════════ */
function StudentForm({initial,onSave,onCancel,stockItems}){
  const [tab,setTab]=useState(0);
  const [f,setF]=useState({...EMPTY_S,...initial});

  const u=(k,v)=>{
    if(typeof v === "string" && !["dob","courseStart","courseEnd","guardianPhone1","guardianPhone2"].includes(k)){
      v = v.toLocaleUpperCase("tr-TR");
    }
    setF(p=>({...p,[k]:v}));
  };

  const currentEq = safeArr(f.equipment);
  const safeWeekDays = safeArr(f.weekDays);

  useEffect(()=>{
    if(f.courseStart&&f.totalSessions&&safeWeekDays.length>0){
      u("courseEnd",calcEndDate(f.courseStart,Number(f.totalSessions),safeWeekDays));
    }
  },[f.courseStart,f.totalSessions,JSON.stringify(safeWeekDays)]);

  return<div>
    <TabBar tabs={["Kişisel","Kurs","Servis","Ekipman"]} active={tab} onChange={setTab}/>
    {tab===0&&<div>
      <Inp label="Ad Soyad *" value={f.name} onChange={v=>u("name",v)}/>
      <Inp label="Doğum Tarihi" value={f.dob} onChange={v=>u("dob",v)} type="date"/>
      <div style={{height:1,background:C.borderLight,margin:"12px 0"}}/>
      <Inp label="Veli Adı Soyadı" value={f.guardianName} onChange={v=>u("guardianName",v)}/>
      <div style={{display:"flex",gap:10}}>
        <Inp label="Veli Tel 1" value={f.guardianPhone1} onChange={v=>u("guardianPhone1",v)} type="tel" half/>
        <Inp label="Veli Tel 2" value={f.guardianPhone2} onChange={v=>u("guardianPhone2",v)} type="tel" half/>
      </div>
      <Inp label="Özel Notlar" value={f.notes} onChange={v=>u("notes",v)} rows={2}/>
    </div>}
    {tab===1&&<div>
      <div style={{display:"flex",gap:10}}>
        <div style={{flex:1}}><Sel label="Seviye" value={f.swimLevel} onChange={v=>u("swimLevel",v)} options={[{value:"BAŞLANGIÇ",label:"Başlangıç"},{value:"ORTA",label:"Orta"},{value:"İLERİ",label:"İleri"},{value:"YARIŞMACI",label:"Yarışmacı"}]}/></div>
        <div style={{flex:1}}><Inp label="Kulvar" value={f.poolLane} onChange={v=>u("poolLane",v)}/></div>
      </div>
      <Inp label="Grup / Sınıf Adı" value={f.groupName} onChange={v=>u("groupName",v)}/>
      <div style={{height:1,background:C.borderLight,margin:"12px 0"}}/>
      <div style={{fontSize:11,color:C.textSub,marginBottom:6,fontWeight:700,textTransform:"uppercase"}}>Haftalık Antrenman Günleri *</div>
      <DayPicker value={safeWeekDays} onChange={v=>u("weekDays",v)}/>
      <div style={{display:"flex",gap:10}}>
        <div style={{flex:1}}><Inp label="Kayıt Başlangıç *" value={f.courseStart} onChange={v=>u("courseStart",v)} type="date"/></div>
        <div style={{flex:1}}><Inp label="Toplam Seans *" value={f.totalSessions} onChange={v=>u("totalSessions",v)} type="number"/></div>
      </div>
      <div style={{background:C.bg, padding:"10px 14px", borderRadius:8, marginBottom:12, border:`1px solid ${C.border}`}}>
        <div style={{fontSize:11,color:C.textSub,fontWeight:700,textTransform:"uppercase"}}>Sistemin Hesapladığı Bitiş Tarihi</div>
        <div style={{fontSize:16,fontWeight:800,color:C.text,marginTop:4}}>{fmtDate(f.courseEnd)||"—"}</div>
      </div>
      <div style={{display:"flex",gap:10}}>
        <div style={{flex:1}}><Inp label="Aylık Ücret (₺)" value={f.monthlyFee} onChange={v=>u("monthlyFee",v)} type="number"/></div>
        <div style={{flex:1}}><Inp label="İndirim (₺)" value={f.discount} onChange={v=>u("discount",v)} type="number"/></div>
      </div>
      <Inp label="Ödeme Notu" value={f.paymentNote} onChange={v=>u("paymentNote",v)}/>
    </div>}
    {tab===2&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:`1px solid ${C.borderLight}`,marginBottom:14}}>
        <div><div style={{fontWeight:700,fontSize:14,color:C.text}}>Servis Kullanıyor mu?</div></div>
        <Toggle checked={f.hasTransport} onChange={v=>u("hasTransport",v)}/>
      </div>
      {f.hasTransport?<div>
        <Inp label="Öğrenci Adresi" value={f.address} onChange={v=>u("address",v)} rows={2}/>
        <Inp label="Aylık Servis Ücreti (₺)" value={f.transportFee} onChange={v=>u("transportFee",v)} type="number"/>
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:1}}><Inp label="Şoför Adı" value={f.driverName} onChange={v=>u("driverName",v)}/></div>
          <div style={{flex:1}}><Inp label="Şoför Tel" value={f.driverPhone} onChange={v=>u("driverPhone",v)} type="tel"/></div>
        </div>
      </div>:<div style={{textAlign:"center",padding:"30px 0",color:C.textSub}}>Servis kullanılmıyor.</div>}
    </div>}
    {tab===3&&<div>
      <div style={{fontSize:12,color:C.textSub,marginBottom:12}}>Öğrencinin satın aldığı ekipmanlar aylık faturasına eklenir.</div>
      <EqPicker stockItems={stockItems} current={currentEq} onAdd={(item)=>setF(p=>({...p,equipment:[...currentEq,{id:Date.now(),...item,addedDate:TODAY}]}))} onRemove={(id)=>setF(p=>({...p,equipment:currentEq.filter(e=>e.id!==id)}))}/>
    </div>}
    <div style={{display:"flex",gap:10,marginTop:24}}>
      <Btn variant="secondary" onClick={onCancel} style={{flex:1}}>İptal</Btn>
      <Btn onClick={()=>onSave(f)} style={{flex:2}}>Öğrenciyi Kaydet</Btn>
    </div>
  </div>
}

function EqPicker({stockItems,current,onAdd,onRemove}){
  const [sel,setSel]=useState(""); const safeStock = safeArr(stockItems);
  return<div>
    <div style={{display:"flex",gap:8,marginBottom:10}}>
      <select style={{flex:1,padding:"10px 12px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,color:sel?C.text:C.textMuted,fontSize:13,outline:"none",fontFamily:"inherit"}} value={sel} onChange={e=>setSel(e.target.value)}>
        <option value="">Ekipman seç...</option>
        {safeStock.filter(s=>Number(s.stock)>0).map(s=><option key={s.id} value={s.id}>{s.name} — {Number(s.price).toLocaleString("tr-TR")} ₺</option>)}
      </select>
      <Btn sm onClick={()=>{if(!sel)return;const item=safeStock.find(s=>String(s.id)===String(sel));if(item)onAdd({name:item.name,price:item.price,stockId:item.id});setSel("");}}>Ekle</Btn>
    </div>
    {safeArr(current).map(e=><div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.borderLight}`}}>
      <div><div style={{fontSize:13,fontWeight:700,color:C.text}}>{e.name}</div><div style={{fontSize:11,color:C.textSub}}>{fmtDate(e.addedDate)}</div></div>
      <div style={{display:"flex",alignItems:"center",gap:12}}><span style={{color:C.warning,fontWeight:800,fontSize:14}}>{Number(e.price).toLocaleString("tr-TR")} ₺</span><button type="button" onClick={()=>onRemove(e.id)} style={{background:C.dangerBg,border:"none",color:C.danger,cursor:"pointer",fontSize:14,width:26,height:26,borderRadius:6,fontWeight:800}}>X</button></div>
    </div>)}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   ÖĞRENCİ LİSTESİ VE DETAY (DARALTILMIŞ YATAY KURUMSAL DÜZEN)
═══════════════════════════════════════════════════════════════ */
function StudentsPage({students,stockItems}){
  const [search,setSearch]=useState(""); const [showAdd,setShowAdd]=useState(false); const [detailId,setDetailId]=useState(null);
  const safeStudents = safeArr(students); const student=detailId?safeStudents.find(s=>s.id===detailId):null;
  const filtered=safeStudents.filter(s=>s && s.name && s.name.toLowerCase().includes(search.toLowerCase()));

  function save(f){
    let n; if(f.id){n=safeStudents.map(s=>s.id===f.id?{...f}:s);}
    else{n=[...safeStudents,{...f,id:Date.now(),payments:[],attendance:{},equipment:[]}];}
    DB.set("students",n);setShowAdd(false);
  }

  if(student)return<StudentDetail student={student} onBack={()=>setDetailId(null)} students={safeStudents} stockItems={stockItems}/>;

  return<div style={{padding:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:16,fontWeight:800,color:C.text}}>Öğrenci Rehberi ({filtered.length})</div>
      <Btn sm onClick={()=>setShowAdd(true)}>+ Yeni Kayıt Ekle</Btn>
    </div>
    <div style={{marginBottom:16}}><input style={{width:"100%",padding:"12px 16px",background:C.surface,border:`1px solid ${C.borderLight}`,borderRadius:10,color:C.text,outline:"none",boxShadow:"0 2px 6px rgba(0,0,0,0.02)",fontSize:14}} placeholder="Listeden isimle arama yapın..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
    
    {filtered.map(s=>{
      const expected = monthlyTotal(s); const paid = totalPaid(s); const debt = expected - paid;
      return <Card key={s.id} style={{padding:"14px", marginBottom:8}}>
        
        {/* ÜST SATIR: İsim ve İşlem Butonları */}
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:`1px solid ${C.borderLight}`, paddingBottom:10, marginBottom:10}}>
          <div style={{fontWeight:800,fontSize:15,color:C.text,letterSpacing:0.3}}>{s.name}</div>
          <div style={{display:"flex",gap:8}}>
            <Btn variant="secondary" sm onClick={()=>setDetailId(s.id)}>Detay</Btn>
            <Btn variant="danger" sm onClick={()=>{if(confirm(`${s.name} kaydını silmek istediğinize emin misiniz?`))DB.set("students",safeStudents.filter(x=>x.id!==s.id));}}>Sil</Btn>
          </div>
        </div>
        
        {/* ALT SATIR: Yatay Kurumsal Bilgiler */}
        <div style={{display:"flex", flexWrap:"wrap", gap:"12px", alignItems:"center", justifyContent:"space-between"}}>
          
          {/* Sol Kısım: Grup, Servis, Seans */}
          <div style={{display:"flex", flexWrap:"wrap", gap:"12px 24px", fontSize:12, color:C.textSub, fontWeight:600}}>
            <div style={{display:"flex", alignItems:"center", gap:6}}><span style={{color:C.accent}}>📌 Grup:</span> <span style={{color:C.text}}>{s.groupName||"Yok"}</span></div>
            <div style={{display:"flex", alignItems:"center", gap:6}}><span style={{color:C.accent}}>🚌 Servis:</span> {s.hasTransport ? <span style={{color:C.purple, background:C.purpleBg, padding:"2px 6px", borderRadius:4}}>Aktif</span> : "Yok"}</div>
            <div style={{display:"flex", alignItems:"center", gap:6}}><span style={{color:C.accent}}>🔄 Kalan Seans:</span> <span style={{color:C.success}}>{calcRemainingSessions(s)} / {s.totalSessions || 0}</span></div>
          </div>
          
          {/* Sağ Kısım: Tarih Kapsülü ve Borç */}
          <div style={{display:"flex", flexWrap:"wrap", gap:"12px", alignItems:"center"}}>
            <div style={{background:C.bg, border:`1px solid ${C.border}`, borderRadius:6, padding:"4px 10px", display:"flex", alignItems:"center", gap:10, fontSize:11, color:C.text, fontWeight:700}}>
              <div><span style={{color:C.textSub, marginRight:4}}>BŞL:</span>{fmtDate(s.courseStart)}</div>
              <div style={{width:1, height:12, background:C.border}}></div>
              <div><span style={{color:C.textSub, marginRight:4}}>BİT:</span>{fmtDate(s.courseEnd)}</div>
            </div>
            
            <div style={{fontSize:11}}>
              {debt > 0 ? <span style={{background:C.dangerBg, color:C.danger, border:`1px solid ${C.danger}40`, padding:"4px 10px", borderRadius:6, fontWeight:800, display:"inline-block", whiteSpace:"nowrap"}}>⚠️ {debt.toLocaleString("tr-TR")} ₺ BORÇ</span>
                       : <span style={{background:C.successBg, color:C.success, border:`1px solid ${C.success}40`, padding:"4px 10px", borderRadius:6, fontWeight:800, display:"inline-block", whiteSpace:"nowrap"}}>✓ ÖDENDİ</span>}
            </div>
          </div>
          
        </div>
      </Card>
    })}
  </div>
}

function StudentDetail({student,onBack,students,stockItems}){
  const [tab,setTab]=useState(0); const [editing,setEditing]=useState(false); const [payForm,setPayForm]=useState({amount:"",date:TODAY,note:""}); const [showPay,setShowPay]=useState(false);
  const safePays = safeArr(student.payments); const safeEqs = safeArr(student.equipment); const safeDays = safeArr(student.weekDays);
  
  function save(f){const n=safeArr(students).map(s=>s.id===student.id?{...s,...f,id:s.id}:s);DB.set("students",n);setEditing(false);}
  function addPay(){ if(!payForm.amount)return; const n=safeArr(students).map(s=>s.id===student.id?{...s,payments:[...safeArr(s.payments),{id:Date.now(),...payForm,amount:Number(payForm.amount)}]}:s); DB.set("students",n); setPayForm({amount:"",date:TODAY,note:""}); setShowPay(false); }
  function delPay(pid){const n=safeArr(students).map(s=>s.id===student.id?{...s,payments:safeArr(s.payments).filter(p=>p.id!==pid)}:s);DB.set("students",n);}

  if(editing)return<div style={{padding:16}}><div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}><button onClick={()=>setEditing(false)} style={{background:C.surface,border:`1px solid ${C.border}`,color:C.textSub,width:36,height:36,borderRadius:10,cursor:"pointer",fontWeight:800}}>←</button><span style={{fontWeight:800,fontSize:18,color:C.text}}>Düzenle: {student.name}</span></div><StudentForm initial={student} onSave={save} onCancel={()=>setEditing(false)} stockItems={stockItems}/></div>;
  
  const paid=totalPaid(student),monthly=monthlyTotal(student),balance=paid-monthly; const st=courseStatus(student);

  return<div style={{padding:16}}>
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
      <button onClick={onBack} style={{background:C.surface,border:`1px solid ${C.border}`,color:C.textSub,width:36,height:36,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontWeight:800}}>←</button>
      <div style={{flex:1}}><div style={{fontWeight:800,fontSize:18,color:C.text}}>{student.name}</div><div style={{fontSize:12,color:C.textSub,marginTop:2}}>{age(student.dob)} · {student.groupName||"Grup yok"}</div></div>
      <Badge label={st}/>
    </div>
    <TabBar tabs={["Genel Bakış","Kurs Eğitimi","Servis Durumu","Ekipmanlar","Ödeme Geçmişi"]} active={tab} onChange={setTab}/>
    
    {tab===0&&<div>
      <Card><Row label="Öğrenci Adı Soyadı" val={student.name}/><Row label="Doğum Tarihi" val={`${fmtDate(student.dob)} (${age(student.dob)})`}/><Row label="Veli Adı Soyadı" val={student.guardianName||"—"}/><Row label="Veli Telefonu" val={student.guardianPhone1||"—"} href={student.guardianPhone1?`tel:${student.guardianPhone1}`:undefined}/></Card>
      {student.guardianPhone1 && (
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12}}>
          <Btn sm style={{background:C.whatsapp, color:"#fff", border:"none"}} onClick={()=>openWA(student.guardianPhone1, `SAYIN VELİMİZ, ${student.name} İSİMLİ ÖĞRENCİMİZİN ÖDEMESİ HAKKINDA HATIRLATMA YAPMAK İSTERİZ. İYİ GÜNLER DİLERİZ.`)}>💬 Ödeme Hatırlat</Btn>
          <Btn sm style={{background:C.whatsapp, color:"#fff", border:"none"}} onClick={()=>openWA(student.guardianPhone1, `SAYIN VELİMİZ, ${student.name} İSİMLİ ÖĞRENCİMİZ BUGÜNKÜ ANTRENMANA KATILMAMIŞTIR. BİLGİNİZE SUNARIZ.`)}>💬 Devamsızlık Bildir</Btn>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}><StatCard label="Mevcut Katılım" value={attendanceCount(student)} col={C.success}/><StatCard label="Aylık Bakiye Durumu" value={`${balance>=0?"+":""}${balance.toLocaleString("tr-TR")} ₺`} col={balance>=0?C.success:C.danger}/></div>
      <Btn variant="secondary" full onClick={()=>setEditing(true)}>Tüm Bilgileri Düzenle</Btn>
    </div>}
    {tab===1&&<div><Card><Row label="Yüzme Seviyesi" val={swimLevelLabel(student.swimLevel)}/><Row label="Kayıtlı Olduğu Grup" val={student.groupName||"—"}/><Row label="Antrenman Günleri" val={safeDays.map(d=>DAYS_TR[d]).join(", ")||"—"}/><Row label="Kayıt Başlangıç Tarihi" val={fmtDate(student.courseStart)}/><Row label="Planlanan Bitiş Tarihi" val={fmtDate(student.courseEnd)}/><Row label="Tarih Bazlı Kalan Seans" val={`${calcRemainingSessions(student)} / ${student.totalSessions||0}`} col={C.success}/></Card></div>}
    {tab===2&&<div>{student.hasTransport?<Card><Row label="Öğrenci Adresi" val={student.address||"—"}/><Row label="Aylık Servis Ücreti" val={`${student.transportFee} ₺`}/><Row label="Şoför Adı Soyadı" val={student.driverName}/></Card>:<div style={{textAlign:"center",padding:"40px 0",color:C.textSub,fontWeight:600}}>Servis kullanılmıyor.</div>}</div>}
    {tab===3&&<div>{safeEqs.length===0?<div style={{textAlign:"center",padding:"40px 0",color:C.textSub,fontWeight:600}}>Alınan ekipman yok.</div>:<Card>{safeEqs.map(e=><Row key={e.id} label={e.name} val={`${e.price} ₺`}/>)}</Card>}</div>}
    {tab===4&&<div><SectionTitle action={<Btn sm onClick={()=>setShowPay(true)}>+ Yeni Tahsilat Ekle</Btn>}>Ödeme Geçmişi</SectionTitle><Card>{safePays.length===0?<div style={{textAlign:"center",padding:"20px 0",color:C.textSub}}>Ödeme kaydı bulunmuyor.</div>:safePays.map(p=><div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.borderLight}`}}><div><div style={{fontWeight:700,color:C.text}}>{fmtDate(p.date)}</div><div style={{fontSize:11,color:C.textSub}}>{p.note||"Not yok"}</div></div><div style={{display:"flex",alignItems:"center",gap:12}}><span style={{color:C.success,fontWeight:800}}>+{p.amount} ₺</span><button onClick={()=>delPay(p.id)} style={{background:C.dangerBg,color:C.danger,border:"none",borderRadius:6,width:26,height:26,cursor:"pointer",fontWeight:800}}>X</button></div></div>)}</Card>
      <Modal show={showPay} onClose={()=>setShowPay(false)} title="Ödeme Ekle"><Inp label="Alınan Tutar (₺) *" value={payForm.amount} onChange={v=>setPayForm(p=>({...p,amount:v}))} type="number"/><Inp label="İşlem Tarihi" value={payForm.date} onChange={v=>setPayForm(p=>({...p,date:v}))} type="date"/><Inp label="Açıklama / Not" value={payForm.note} onChange={v=>setPayForm(p=>({...p,note:v.toLocaleUpperCase("tr-TR")}))}/><div style={{display:"flex",gap:10,marginTop:20}}><Btn variant="secondary" onClick={()=>setShowPay(false)} style={{flex:1}}>İptal</Btn><Btn onClick={addPay} style={{flex:2}}>Ödemeyi Kaydet</Btn></div></Modal>
    </div>}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   GELİŞMİŞ WHATSAPP SAYFASI (ÖĞRENCİ ARAMALI & ÇOKLU LİNK)
═══════════════════════════════════════════════════════════════ */
function WhatsAppPage({students, waLinks}) {
  const safeLinks = safeArr(waLinks);
  const [title, setTitle] = useState("");
  const [url, setUrl] = useState("");
  const [search, setSearch] = useState("");
  const [selectedStudent, setSelectedStudent] = useState(null);
  const [showInviteModal, setShowInviteModal] = useState(false);

  function addLink() {
    if(!title.trim() || !url.trim()) return;
    const n = [...safeLinks, { id:Date.now(), name: title.toLocaleUpperCase("tr-TR"), url: url }];
    DB.set("waLinks", n); setTitle(""); setUrl("");
  }

  function triggerInvite(student) {
    if(safeLinks.length === 0) { alert("Lütfen önce yukarıdaki alandan en az bir grup davet bağlantısı ekleyin."); return; }
    setSelectedStudent(student);
    setShowInviteModal(true);
  }

  function completeInvite(linkUrl) {
    const msg = `SAYIN VELİMİZ,\n${selectedStudent.name} İSİMLİ ÖĞRENCİMİZİN ANTRENMAN VE DUYURU TAKİBİ İÇİN KULÜBÜMÜZÜN RESMİ WHATSAPP GRUBUNA AŞAĞIDAKİ LİNKTEN KATILABİLİRSİNİZ:\n\n${linkUrl}`;
    openWA(selectedStudent.guardianPhone1, msg);
    setShowInviteModal(false);
  }

  const activeStudents = safeArr(students).filter(s => courseStatus(s) === "active" && s.guardianPhone1);
  const filteredStudents = activeStudents.filter(s => s.name && s.name.toLowerCase().includes(search.toLowerCase()));

  return <div style={{padding:16}}>
    <SectionTitle>WhatsApp Web Merkezi</SectionTitle>
    <Card style={{marginBottom:16}}><Btn full style={{background:C.whatsapp, color:"#fff", border:"none", padding:"12px"}} onClick={()=>window.open("https://web.whatsapp.com", "_blank")}>WhatsApp Web Sekmesini Aç</Btn></Card>
    
    <SectionTitle>İsimli Grup Davet Bağlantıları</SectionTitle>
    <Card style={{marginBottom:16}}>
      <div style={{display:"flex", gap:8}}>
        <input style={{flex:1, padding:"10px 12px", background:C.bg, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, fontSize:13, outline:"none"}} value={title} onChange={e=>setTitle(e.target.value)} placeholder="Bağlantı Adı (Örn: PAZARTESİ)" />
        <input style={{flex:2, padding:"10px 12px", background:C.bg, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, fontSize:13, outline:"none"}} value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://chat.whatsapp.com/..." />
        <Btn onClick={addLink}>Ekle</Btn>
      </div>
      <div style={{marginTop:12}}>
        {safeLinks.length === 0 && <div style={{fontSize:12, color:C.textSub, textAlign:"center"}}>Sisteme kayıtlı davet bağlantısı yok.</div>}

function AttendancePage({students}){
  const [date,setDate]=useState(TODAY); const [y, m, d] = date.split('-'); const selectedDayIndex = new Date(y, m - 1, d).getDay();
  const active=safeArr(students).filter(s=>courseStatus(s)==="active" && safeArr(s.weekDays).map(Number).includes(selectedDayIndex));
  const present=active.filter(s=>(s.attendance||{})[date]).length;
  return<div style={{padding:16}}><SectionTitle>Günlük Yoklama Defteri</SectionTitle><Inp value={date} onChange={setDate} type="date"/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}><StatCard label="Beklenen" value={active.length}/><StatCard label="Mevcut" value={present} col={C.success}/></div>
    <Card>{active.length===0?<div style={{textAlign:"center",padding:"30px 0",color:C.textSub,fontWeight:600}}>Bu güne kayıtlı öğrenci yok.</div>:active.map(s=><div key={s.id} style={{display:"flex",justifyContent:"space-between",padding:"12px 0",borderBottom:`1px solid ${C.borderLight}`}}><div><div style={{fontSize:15,fontWeight:800,color:C.text}}>{s.name}</div></div><Toggle checked={!!(s.attendance||{})[date]} onChange={(v)=>{
      const n=safeArr(students).map(st=>{if(st.id!==s.id)return st; const att={...(st.attendance||{})}; if(v)att[date]=true; else delete att[date]; return{...st,attendance:att}}); DB.set("students",n);
    }}/></div>)}</Card>
  </div>
}

function PaymentsPage({students}){
  const all=safeArr(students).flatMap(s=>safeArr(s.payments).map(p=>({...p,studentName:s.name}))).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const total=all.reduce((t,p)=>t+Number(p.amount),0); const thisMonth=all.filter(p=>p.date&&p.date.startsWith(TODAY.slice(0,7))).reduce((t,p)=>t+Number(p.amount),0);
  const unpaid = safeArr(students).filter(s => courseStatus(s) === "active" && totalPaid(s) < monthlyTotal(s));

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}><StatCard label="Tüm Zamanlar Tahsilat" value={`${total.toLocaleString("tr-TR")} ₺`} col={C.success} span2/><StatCard label="Bu Ayki Ciro" value={`${thisMonth.toLocaleString("tr-TR")} ₺`}/><StatCard label="Eksik Ödeme" value={unpaid.length} col={C.danger}/></div>
    <Card>{all.length===0?<div style={{textAlign:"center",padding:"30px 0",color:C.textSub,fontWeight:600}}>Ödeme kaydı bulunamadı.</div>:all.map(p=><Row key={p.id} label={p.studentName} val={`+${Number(p.amount).toLocaleString("tr-TR")} ₺`} col={C.success}/>)}</Card>

}

/* ═══════════════════════════════════════════════════════════════
   PERSONEL YOKLAMA VE HAKEDİŞ SİSTEMİ
═══════════════════════════════════════════════════════════════ */
function StaffPage({staff}){
  const validStaff = safeArr(staff); const [tab, setTab] = useState(0); const [showAdd, setShowAdd] = useState(false); const [f, setF] = useState(EMPTY_STAFF);
  const [selectedMonth, setSelectedMonth] = useState(TODAY.slice(0,7)); const [activeStaffId, setActiveStaffId] = useState(null);
  const u=(k,v)=>setF(p=>({...p,[k]:v}));

  function save(){
    if(!f.name.trim()) return;
    const n = f.id ? validStaff.map(s=>s.id===f.id?{...s,...f}:s) : [...validStaff,{...f,id:Date.now(),attendance:{},dailyWage:Number(f.dailyWage||0)}];
    DB.set("staff",n); setShowAdd(false); setF(EMPTY_STAFF);
  }
  const daysInMonth = new Date(Number(selectedMonth.split("-")[0]), Number(selectedMonth.split("-")[1]), 0).getDate();
  const daysArray = Array.from({length: daysInMonth}, (_, i) => i + 1);

  return<div style={{padding:16}}>
    <TabBar tabs={["Personel Listesi","Yoklama & Maaş Hakediş"]} active={tab} onChange={setTab}/>
    {tab===0&&<div>
      <SectionTitle action={<Btn sm onClick={()=>{setF(EMPTY_STAFF);setShowAdd(true);}}>+ Personel Ekle</Btn>}>Kurum Çalışanları</SectionTitle>
      {validStaff.length===0?<Card style={{textAlign:"center",padding:"30px 0",color:C.textSub,fontWeight:600}}>Kayıtlı çalışan bulunmuyor.</Card>:validStaff.map(s=><Card key={s.id}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:800,fontSize:15,color:C.text}}>{s.name}</div><div style={{fontSize:12,color:C.textSub,fontWeight:600,marginTop:2}}>{Number(s.dailyWage||0).toLocaleString("tr-TR")} ₺ Günlük Yevmiye</div></div><Btn sm variant="danger" onClick={()=>{if(confirm('Personel kaydı silinsin mi?')) DB.set("staff", validStaff.filter(x=>x.id!==s.id))}}>Sil</Btn></div></Card>)}
    </div>}
    {tab===1&&<div>
      <Inp label="Takip Ayı Seçimi" type="month" value={selectedMonth} onChange={setSelectedMonth}/>
      {validStaff.map(s=>{
        const daysCount = Object.keys(s.attendance||{}).filter(k=>k.startsWith(selectedMonth)&&s.attendance[k]).length;
        const isExp = activeStaffId === s.id;
        return <Card key={s.id}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"} } onClick={()=>setActiveStaffId(isExp?null:s.id)}>
            <div><div style={{fontWeight:800,fontSize:15,color:C.text}}>{s.name}</div><div style={{fontSize:12,color:C.success,fontWeight:800,marginTop:4}}>{daysCount} Gün Mesai • Toplam Hakediş: {(daysCount*Number(s.dailyWage||0)).toLocaleString("tr-TR")} ₺</div></div>
            <Btn sm variant="secondary">{isExp?"Kapat ▲":"Puantaj Gir ▼"}</Btn>
          </div>
          {isExp && <div style={{marginTop:16, paddingTop:16, borderTop:`1px solid ${C.borderLight}`}}>
            <Inp label="Günlük Yevmiye (₺) (Anlık Güncelleme)" type="number" value={s.dailyWage} onChange={(v)=>DB.set("staff", validStaff.map(x=>x.id===s.id?{...x,dailyWage:Number(v)}:x))}/>
            <div style={{fontSize:11,fontWeight:700,color:C.textSub,marginBottom:10,textTransform:"uppercase",marginTop:12}}>Çalışılan Günleri İşaretleyin</div>
            <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(42px, 1fr))", gap:8}}>
              {daysArray.map(d=>{
                const key = `${selectedMonth}-${String(d).padStart(2,'0')}`; const isP = !!s.attendance?.[key];
                return <button key={d} type="button" onClick={()=>{
                  const att={...(s.attendance||{})}; if(isP) delete att[key]; else att[key]=true;
                  DB.set("staff", validStaff.map(x=>x.id===s.id?{...x,attendance:att}:x));
                }} style={{padding:"10px 0", borderRadius:8, border:`1px solid ${isP?C.success:C.border}`, background:isP?C.successBg:C.bg, color:isP?C.success:C.textSub, fontWeight:800, cursor:"pointer", transition:"all 0.2s"}}>{d}</button>
              })}
            </div>
          </div>}
        </Card>
      })}
    </div>}
    <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Personel Kaydı">
      <Inp label="Ad Soyad *" value={f.name} onChange={v=>u("name",v.toLocaleUpperCase("tr-TR"))}/>
      <Inp label="Sabit Günlük Yevmiyesi (₺) *" value={f.dailyWage} onChange={v=>u("dailyWage",v)} type="number"/>
      <Btn full onClick={save} style={{marginTop:16}}>Çalışanı Kaydet</Btn>
    </Modal>
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   GENEL BAKIŞ (KURUMSAL DASHBOARD GRAFİKLERİ)
═══════════════════════════════════════════════════════════════ */
function Dashboard({students,expenses}){
  const safeStudents = safeArr(students); const safeExpenses = safeArr(expenses); const active=safeStudents.filter(s=>courseStatus(s)==="active");
  const totalRev=safeStudents.reduce((t,s)=>t+totalPaid(s),0); const totalExp=safeExpenses.reduce((t,e)=>t+Number(e.amount||0),0); const netProfit = totalRev - totalExp;
  
  const total=totalRev+totalExp; const revPct=total===0?50:(totalRev/total)*100; const expPct=total===0?50:(totalExp/total)*100;

  const recentRegistrations = [...safeStudents].sort((a,b) => b.id - a.id).slice(0, 5);
  const recentPay = safeStudents.flatMap(s=>safeArr(s.payments).map(p=>({...p,studentName:s.name}))).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  const endingSoon = active.filter(s=>{const d=daysLeft(s);return d>=0&&d<=14;}).sort((a,b)=>daysLeft(a)-daysLeft(b)).slice(0,5);

  return<div style={{padding:16}}>
    
    <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16}}>
      <StatCard label="Aktif Kayıtlı Öğrenci" value={active.length} col={C.text} />
      <StatCard label="Kasadaki Net Kâr" value={`${netProfit.toLocaleString("tr-TR")} ₺`} col={netProfit>=0?C.success:C.danger} />
      <StatCard label="Tüm Zamanlar Ciro" value={`${totalRev.toLocaleString("tr-TR")} ₺`} col={C.success} />
      <StatCard label="Toplam Giderler" value={`${totalExp.toLocaleString("tr-TR")} ₺`} col={C.danger} />
    </div>

    <Card style={{marginBottom:20}}>
      <SectionTitle>Gelir / Gider Dağılımı</SectionTitle>
      <div style={{display:"flex", height:24, borderRadius:12, overflow:"hidden", marginBottom:10, background:C.bg, border:`1px solid ${C.borderLight}`}}>
        <div style={{width:`${revPct}%`, background:C.success, transition:"width 1s"}}></div>
        <div style={{width:`${expPct}%`, background:C.danger, transition:"width 1s"}}></div>
      </div>
      <div style={{display:"flex", justifyContent:"space-between", fontSize:13, fontWeight:800}}>
        <span style={{color:C.success}}>Gelir: %{Math.round(revPct)}</span>
        <span style={{color:C.danger}}>Gider: %{Math.round(expPct)}</span>
      </div>
    </Card>

    <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(300px, 1fr))", gap:16, alignItems:"start"}}>
      <Card>
        <div style={{fontSize:13, fontWeight:800, marginBottom:12, color:C.text, textTransform:"uppercase"}}>Son Kayıt Olanlar</div>
        <div className="data-row data-header"><div>Ad Soyad</div><div>Kayıt Trh.</div><div className="data-col-right">Grup</div></div>
        {recentRegistrations.length===0?<div style={{padding:"10px 0",fontSize:12,color:C.textSub,textAlign:"center"}}>Kayıt yok.</div>:recentRegistrations.map(s => <div className="data-row" key={s.id}><div className="data-col">{s.name}</div><div className="data-col data-col-sub">{fmtDate(s.courseStart)}</div><div className="data-col data-col-right" style={{color:C.accent}}>{s.groupName || "-"}</div></div>)}
      </Card>

      <Card>
        <div style={{fontSize:13, fontWeight:800, marginBottom:12, color:C.text, textTransform:"uppercase"}}>Son Ödemeler</div>
        <div className="data-row data-header"><div>Ad Soyad</div><div>Tarih</div><div className="data-col-right">Tutar</div></div>
        {recentPay.length===0?<div style={{padding:"10px 0",fontSize:12,color:C.textSub,textAlign:"center"}}>Tahsilat yok.</div>:recentPay.map((p, i) => <div className="data-row" key={i}><div className="data-col">{p.studentName}</div><div className="data-col data-col-sub">{fmtDate(p.date)}</div><div className="data-col data-col-right" style={{color:C.success}}>+{Number(p.amount).toLocaleString("tr-TR")} ₺</div></div>)}
      </Card>

      <Card style={{border:`1px solid ${C.warning}40`}}>
        <div style={{fontSize:13, fontWeight:800, marginBottom:12, color:C.warning, textTransform:"uppercase"}}>Kayıt Bitişi Yaklaşanlar</div>
        <div className="data-row data-header"><div>Ad Soyad</div><div>Bitiş Trh.</div><div className="data-col-right">Kalan</div></div>
        {endingSoon.length===0?<div style={{padding:"10px 0",fontSize:12,color:C.textSub,textAlign:"center"}}>Yaklaşan kayıt yok.</div>:endingSoon.map(s => <div className="data-row" key={s.id}><div className="data-col">{s.name}</div><div className="data-col data-col-sub">{fmtDate(s.courseEnd)}</div><div className="data-col data-col-right" style={{color:C.warning}}>{daysLeft(s)} Gün</div></div>)}
      </Card>
    </div>
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   AYARLAR (HESAP SİLME BUTONU EKLENDİ)
═══════════════════════════════════════════════════════════════ */
function SettingsPage({navItems, clubName, logoUrl, appUsers}){
  const [tab, setTab] = useState(0); const [nameVal, setNameVal] = useState(clubName); const [logoVal, setLogoVal] = useState(logoUrl);
  const [showUserModal, setShowUserModal] = useState(false); const [uForm, setUForm] = useState({ id:null, username:"", password:"", role:"staff", allowedTabs:[] });
  
  function toggleMenuAccess(menuId) {
    const tabs = uForm.allowedTabs || [];
    if(tabs.includes(menuId)) setUForm({...uForm, allowedTabs: tabs.filter(t=>t!==menuId)});
    else setUForm({...uForm, allowedTabs: [...tabs, menuId]});
  }
  
  function saveUser() { 
    if(!uForm.username||!uForm.password)return; 
    let n = safeArr(appUsers); 
    if(uForm.id) n = n.map(u => u.id === uForm.id ? {...uForm} : u); 
    else n = [...n, {...uForm, id:Date.now()}]; 
    DB.set("appUsers", n); setShowUserModal(false); 
  }

  function deleteUser(id) {
    if(id === "admin") { alert("Ana yönetici (admin) hesabı silinemez."); return; }
    if(confirm("Bu çalışan hesabını tamamen silmek ve sisteme erişimini kesmek istediğinize emin misiniz?")) {
      DB.set("appUsers", safeArr(appUsers).filter(x=>x.id!==id));
    }
  }

  return<div style={{padding:16}}>
    <TabBar tabs={["Genel Kurum Ayarları", "Personel Hesap Yetkileri"]} active={tab} onChange={setTab}/>
    {tab === 0 && (
      <div><Card><Inp label="Kulüp/Kurum Adı" value={nameVal} onChange={setNameVal}/><Inp label="Logo URL (İsteğe Bağlı)" value={logoVal} onChange={setLogoVal}/></Card><Btn full onClick={()=>{DB.set("clubName",nameVal); DB.set("logoUrl",logoVal); alert("Kurum bilgileri başarıyla kaydedildi.");}}>Sisteme Kaydet</Btn></div>
    )}
    {tab===1&&<div>
      <SectionTitle action={<Btn sm onClick={()=>{setUForm({id:null,username:"",password:"",role:"staff",allowedTabs:["dashboard","students","attendance"]});setShowUserModal(true);}}>+ Yeni Personel Hesabı Aç</Btn>}>Sisteme Giriş İzinleri</SectionTitle>
      
      {safeArr(appUsers).map(u=><Card key={u.id} style={{padding:"12px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:800,fontSize:15,color:C.text}}>{u.username}</div>
            <div style={{fontSize:11,color:u.role==='admin'?C.success:C.textSub,fontWeight:700,textTransform:"uppercase",marginTop:4}}>{u.role==='admin'?'Tam Yetkili Yönetici (Silinemez)':'Kısıtlı Çalışan'}</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn variant="secondary" sm onClick={()=>{setUForm(u);setShowUserModal(true);}}>Yetkileri Düzenle</Btn>
            {u.role !== 'admin' && <Btn variant="danger" sm onClick={()=>deleteUser(u.id)}>Hesabı Kaldır</Btn>}
          </div>
        </div>
      </Card>)}

      <Modal show={showUserModal} onClose={()=>setShowUserModal(false)} title="Personel Hesabı Tanımla">
        <Inp label="Sisteme Giriş Kullanıcı Adı" value={uForm.username} onChange={v=>setUForm({...uForm,username:v})}/>
        <Inp label="Giriş Şifresi" value={uForm.password} onChange={v=>setUForm({...uForm,password:v})}/>
        
        {uForm.id !== "admin" && (
          <div style={{marginTop: 16}}>
            <div style={{fontSize:12, fontWeight:800, marginBottom:10, color:C.text, textTransform:"uppercase"}}>Çalışanın Görebileceği Menüler</div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
              {navItems.map(nav => nav.id !== "settings" && (
                <label key={nav.id} style={{display:"flex", alignItems:"center", gap:8, padding:"10px", background:C.bg, borderRadius:10, cursor:"pointer", border:`1px solid ${(uForm.allowedTabs||[]).includes(nav.id)?C.accent:C.border}`}}>
                  <input type="checkbox" checked={(uForm.allowedTabs||[]).includes(nav.id)} onChange={() => toggleMenuAccess(nav.id)} />
                  <span style={{fontSize:13, fontWeight:600}}>{nav.label}</span>
                </label>
              ))}
            </div>
          </div>
        )}
        <Btn full onClick={saveUser} style={{marginTop:24}}>Hesabı Kaydet</Btn>
      </Modal>
    </div>}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════════════════ */
function App(){
  const [currentUser, setCurrentUser] = useState(() => { try { return JSON.parse(sessionStorage.getItem("aqua_user")); } catch { return null; } });
  const [isDbLoaded, setIsDbLoaded] = useState(false);
  const [students,setStudents]=useState([]); const [staff,setStaff]=useState([]); const [stockItems,setStockItems]=useState([]); const [movements,setMovements]=useState([]); const [expenses,setExpenses]=useState([]);
  const [clubName,setClubName]=useState("AquaClub Pro"); const [navItems,setNavItems]=useState(NAV_ITEMS); const [appUsers, setAppUsers]=useState([]); const [oldPinCode, setOldPinCode]=useState("0309"); const [waLinks,setWaLinks]=useState([]);
  const [logoUrl,setLogoUrl]=useState(""); const [activeTab,setActiveTab]=useState("dashboard"); const [sidebarOpen,setSidebarOpen]=useState(false);

  useEffect(() => {
    const unsub = db.collection("appData").doc("main").onSnapshot((doc) => {
      if (doc.exists) {
        const d = doc.data();
        if (d.students) setStudents(safeArr(d.students));
        if (d.staff) setStaff(safeArr(d.staff));
        if (d.stock) setStockItems(safeArr(d.stock));
        if (d.movements) setMovements(safeArr(d.movements));
        if (d.expenses) setExpenses(safeArr(d.expenses));
        if (d.waLinks) setWaLinks(safeArr(d.waLinks));
        if (d.clubName) setClubName(d.clubName);
        if (d.pinCode) setOldPinCode(d.pinCode); 
        let loadedUsers = safeArr(d.appUsers);
        if (loadedUsers.length === 0) { loadedUsers = [{ id:"admin", username:"admin", password: d.pinCode || "0309", role:"admin", allowedTabs: NAV_ITEMS.map(n=>n.id) }]; }
        setAppUsers(loadedUsers);
        if (d.logoUrl) setLogoUrl(d.logoUrl);
      }
      setIsDbLoaded(true);
    });
    return () => unsub();
  }, []);

  if (!isDbLoaded) return <div style={{display:"flex",flexDirection:"column",height:"100vh",alignItems:"center",justifyContent:"center",background:"var(--bg-color)"}}><div className="spinner"></div><div style={{color:"var(--text-main)",fontWeight:700,marginTop:10}}>Kurumsal Sistem Yükleniyor...</div></div>;
  if (!currentUser) return <LoginScreen onSuccess={(user) => { sessionStorage.setItem("aqua_user", JSON.stringify(user)); setCurrentUser(user); }} appUsers={appUsers} adminPin={oldPinCode} />;

  const visibleNav = NAV_ITEMS.filter(n => currentUser.role === "admin" || (currentUser.allowedTabs || []).includes(n.id));

  return<div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg-color)"}}>
    <div className="sidebar-desktop" style={{width:250, background:"var(--sidebar-bg)", borderRight:"1px solid #E2E8F0", display:"flex", flexDirection:"column", boxShadow:"2px 0 10px rgba(0,0,0,0.02)", zIndex:100}}>
      <div style={{padding:"24px 20px 20px", borderBottom:"1px solid #E2E8F0", display:"flex", alignItems:"center", gap:12}}>
        <div style={{width:40,height:40,borderRadius:12,background:`linear-gradient(135deg,${C.accent},${C.accentDark})`,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
          {logoUrl ? <img src={logoUrl} alt="Logo" style={{width:"100%",height:"100%",objectFit:"cover"}}/> : <span style={{color:"white", fontWeight:800}}>AC</span>}
        </div>
        <div><div style={{fontSize:16,fontWeight:800,color:"var(--text-main)",letterSpacing:-0.5}}>{clubName}</div><div style={{fontSize:11,color:"#64748B",fontWeight:700,textTransform:"uppercase",marginTop:2}}>{currentUser.username}</div></div>
      </div>
      <div style={{flex:1, overflowY:"auto", padding:"16px 12px"}}>
        {visibleNav.map(item=><button key={item.id} type="button" onClick={()=>setActiveTab(item.id)} style={{display:"flex",alignItems:"center",gap:12,width:"100%", padding:"12px 14px", marginBottom:6, background:activeTab===item.id?C.accentGlow:"transparent", border:"none", borderRadius:10, color:activeTab===item.id?C.accentDark:C.textSub, cursor:"pointer", textAlign:"left", fontSize:14, fontWeight:activeTab===item.id?700:500, transition:"all 0.2s"}}><Icon d={item.icon} size={18}/> {item.label}</button>)}
      </div>
      <div style={{padding:"16px"}}><button type="button" onClick={()=>{sessionStorage.removeItem("aqua_user"); window.location.reload();}} style={{width:"100%", padding:"14px", background:C.dangerBg, borderRadius:10, border:"none", color:C.danger, fontWeight:800, cursor:"pointer", transition:"opacity 0.2s"}}>Güvenli Çıkış Yap</button></div>
    </div>
    
    <div style={{flex:1, display:"flex", flexDirection:"column", overflow:"hidden"}}>
      <div style={{padding:"20px 24px", background:"var(--sidebar-bg)", borderBottom:"1px solid #E2E8F0", fontWeight:800, fontSize:18, display:"flex", alignItems:"center", gap:16, color:"var(--text-main)"}}>
        <button type="button" onClick={()=>setSidebarOpen(!sidebarOpen)} className="menu-btn" style={{background:"transparent", border:`1px solid #E2E8F0`, color:"var(--text-main)", width:36, height:36, borderRadius:10, cursor:"pointer"}}>☰</button>
        {(visibleNav.find(n=>n.id===activeTab)||{}).label}
      </div>
      <div style={{flex:1, overflowY:"auto"}}>
        {activeTab==="dashboard"&&<Dashboard students={students} expenses={expenses}/>}
        {activeTab==="students"&&<StudentsPage students={students} stockItems={stockItems}/>}
        {activeTab==="attendance"&&<AttendancePage students={students}/>}
        {activeTab==="payments"&&<PaymentsPage students={students}/>}
        {activeTab==="expenses"&&<ExpensesPage expenses={expenses}/>}
        {activeTab==="whatsapp"&&<WhatsAppPage students={students} waLinks={waLinks} />}
        {activeTab==="staff"&&<StaffPage staff={staff}/>}
        {activeTab==="inventory"&&<InventoryPage items={stockItems}/>}
        {activeTab==="settings"&&currentUser.role==='admin'&&<SettingsPage navItems={NAV_ITEMS} clubName={clubName} logoUrl={logoUrl} appUsers={appUsers}/>}
      </div>
    </div>
    <style>{`@media(max-width:768px){.sidebar-desktop{display:none!important}} @media(min-width:769px){.menu-btn{display:none!important}}`}</style>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
