/* ═══════════════════════════════════════════════════════════════
   2. YARDIMCI SÜZGEÇLER & HESAPLAMA MOTORLARI
═══════════════════════════════════════════════════════════════ */
function safeArr(val) { 
  if (!val) return [];
  return (Array.isArray(val) ? val : Object.values(val)).filter(item => item !== null && item !== undefined);
}

const DB={
  set:(k,v)=>{
    const cleanV = Array.isArray(v) ? v.filter(i => i !== null && i !== undefined) : v;
    db.collection("appData").doc("main").set({ [k]: cleanV }, { merge: true }).catch(console.error);
  }
};

function fmtDate(d){if(!d)return"—";const[y,m,day]=d.split("-");return`${day}.${m}.${y}`}
function totalPaid(s){return safeArr(s?.payments).reduce((t,p)=>t+Number(p.amount||0),0);}
function equipmentTotal(s){return safeArr(s?.equipment).reduce((t,e)=>t+Number(e.price||0),0);}
function monthlyTotal(s){return Number(s?.monthlyFee||0)-Number(s?.discount||0)+equipmentTotal(s)+(s?.hasTransport?Number(s?.transportFee||0):0);}
function courseStatus(s){
  if(!s?.courseStart||!s?.courseEnd)return"unknown";
  const now=new Date(TODAY),st=new Date(s.courseStart),en=new Date(s.courseEnd);
  if(now<st)return"upcoming";if(now>en)return"ended";return"active";
}
function daysLeft(s){return Math.ceil((new Date(s?.courseEnd)-new Date(TODAY))/86400000)}
function attendanceCount(s){return Object.values(s?.attendance||{}).filter(Boolean).length}
function age(dob){if(!dob)return"—";return Math.floor((Date.now()-new Date(dob))/31557600000)+" yaş"}

function calcEndDate(start,total,days){
  if(!start||!total||!days||days.length===0)return"";
  let d=new Date(start),cnt=0,iter=0;
  const safeDays = safeArr(days).map(Number);
  while(cnt<total&&iter<total*30){if(safeDays.includes(d.getDay()))cnt++;if(cnt<total)d.setDate(d.getDate()+1);iter++;}
  return d.toISOString().split("T")[0];
}

function calcRemainingSessions(s) {
  if (!s || !s.courseStart || !s.totalSessions || !s.weekDays || s.weekDays.length === 0) return 0;
  const total = Number(s.totalSessions || 0);
  const start = new Date(s.courseStart);
  const end = s.courseEnd ? new Date(s.courseEnd) : new Date(TODAY);
  const current = new Date(TODAY);
  let targetEnd = current < end ? current : end;
  if (targetEnd < start) return total;
  
  let passedSessions = 0;
  let iter = new Date(start);
  const safeDays = safeArr(s.weekDays).map(Number);
  while (iter <= targetEnd) {
    if (safeDays.includes(iter.getDay())) passedSessions++;
    iter.setDate(iter.getDate() + 1);
  }
  return Math.max(0, total - passedSessions);
}

function swimLevelLabel(v){return{BAŞLANGIÇ:"Başlangıç",ORTA:"Orta",İLERİ:"İleri",YARIŞMACI:"Yarışmacı"}[v]||v||"—"}
function roleLabel(r){return{trainer:"Antrenör",admin:"İdari Personel",driver:"Şoför",other:"Diğer"}[r]||r||"—"}

/* ═══════════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════════ */
function Icon({d,size=18,color="currentColor",style={}}){
  return<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" style={style}>
    {d.split("M").filter(Boolean).map((seg,i)=><path key={i} d={"M"+seg}/>)}
  </svg>
}

function Toggle({checked,onChange}){
  return<button type="button" onClick={()=>onChange(!checked)} style={{width:40,height:22,borderRadius:11,background:checked?C.accent:C.border,border:"none",cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}>
    <span style={{position:"absolute",top:2,left:checked?19:2,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left .2s"}}/>
  </button>
}

function Inp({label,value,onChange,type="text",placeholder,rows,half,autoFocus,style}){
  return<div style={{marginBottom:10,flex:half?"1":"unset"}}>
    {label&&<div style={{fontSize:11,color:C.textSub,marginBottom:4,fontWeight:700,textTransform:"uppercase",letterSpacing:0.3}}>{label}</div>}
    {rows?<textarea style={{width:"100%",padding:"10px 12px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:13,outline:"none",fontFamily:"inherit",resize:"vertical",minHeight:60,...style}} rows={rows} value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>
         :<input style={{width:"100%",padding:"10px 12px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:13,outline:"none",fontFamily:"inherit",...style}} type={type} value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder} autoFocus={autoFocus}/>}
  </div>
}

function Sel({label,value,onChange,options}){
  return<div style={{marginBottom:10}}>
    {label&&<div style={{fontSize:11,color:C.textSub,marginBottom:4,fontWeight:700,textTransform:"uppercase",letterSpacing:0.3}}>{label}</div>}
    <select style={{width:"100%",padding:"10px 12px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:13,outline:"none",fontFamily:"inherit",cursor:"pointer"}} value={value||""} onChange={e=>onChange(e.target.value)}>

function Btn({children,onClick,type="button",variant="primary",sm,full,style={}}){
  const base={padding:sm?"8px 14px":"10px 20px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:700,fontSize:sm?12:13,fontFamily:"inherit",letterSpacing:0.2,transition:"opacity .15s",...style};

    secondary:{background:C.bg,color:C.textMain,border:`1px solid ${C.border}`},
    danger:{background:C.dangerBg,color:C.danger,border:`1px solid ${C.danger}30`},
    success:{background:C.successBg,color:C.success,border:`1px solid ${C.success}30`},
    ghost:{background:"transparent",color:C.textSub,border:`1px solid ${C.border}`},
  };
  return<button type={type} onClick={onClick} style={{...base,...v[variant],width:full?"100%":"auto"}}>{children}</button>
}

function Card({children,style={},accent}){

function TabBar({tabs,active,onChange}){

  const safeVal = safeArr(value).map(Number);
  return<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>

/* ═══════════════════════════════════════════════════════════════
   4. ALT BİLEŞENLER (EKİPMAN SEÇİCİ - BURAYA YENİDEN EKLENDİ)
═══════════════════════════════════════════════════════════════ */
function EqPicker({stockItems,current,onAdd,onRemove}){
  const [sel,setSel]=useState(""); const safeStock = safeArr(stockItems);
  return<div>
    <div style={{display:"flex",gap:8,marginBottom:10}}>
      <select style={{flex:1,padding:"10px 12px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,color:sel?C.text:C.textMuted,fontSize:13,outline:"none",fontFamily:"inherit"}} value={sel} onChange={e=>setSel(e.target.value)}>
        <option value="">Ekipman seç...</option>
        {safeStock.filter(s=>Number(s.stock)>0).map(s=><option key={s.id} value={s.id}>{s.name} — {Number(s.price).toLocaleString("tr-TR")} ₺</option>)}
      </select>
      <Btn sm onClick={()=>{if(!sel)return;const item=safeStock.find(s=>String(s.id)===String(sel));if(item)onAdd({name:item.name,price:item.price,stockId:item.id});setSel("");}}>Ekle</Btn>
    </div>
    {safeArr(current).map(e=><div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.borderLight}`}}>
      <div><div style={{fontSize:13,fontWeight:700,color:C.text}}>{e.name}</div><div style={{fontSize:11,color:C.textSub}}>{fmtDate(e.addedDate)}</div></div>
      <div style={{display:"flex",alignItems:"center",gap:12}}><span style={{color:C.warning,fontWeight:800,fontSize:14}}>{Number(e.price).toLocaleString("tr-TR")} ₺</span><button type="button" onClick={()=>onRemove(e.id)} style={{background:C.dangerBg,border:"none",color:C.danger,cursor:"pointer",fontSize:14,width:26,height:26,borderRadius:6,fontWeight:800}}>X</button></div>
    </div>)}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   4b. ÖĞRENCİ FORMU VE DETAY SAYFASI (EKSİK OLDUĞU İÇİN EKLENDİ)
═══════════════════════════════════════════════════════════════ */
function StudentForm({initial,onSave,onCancel,stockItems}){
  const [tab,setTab]=useState(0);
  const [f,setF]=useState({...EMPTY_S,...initial});
  const u=(k,v)=>setF(p=>({...p,[k]:v}));

  useEffect(()=>{
    const end=calcEndDate(f.courseStart,f.totalSessions,f.weekDays);
    if(end && end!==f.courseEnd) u("courseEnd",end);
  },[f.courseStart,f.totalSessions,f.weekDays]);

  function handleSave(){
    if(!f.name || !f.name.trim()){ alert("Lütfen öğrenci adını giriniz."); return; }
    onSave(f);
  }

  return<div>
    <TabBar tabs={["Kişisel","Kurs","Servis","Ekipman"]} active={tab} onChange={setTab}/>

function StudentDetail({student,onBack,students,stockItems}){
  const [showEdit,setShowEdit]=useState(false);
  const [showPay,setShowPay]=useState(false);
  const [payAmount,setPayAmount]=useState("");

  function updateStudent(newData){
    const n=safeArr(students).map(s=>s.id===student.id?{...newData,id:student.id,payments:s.payments,attendance:s.attendance}:s);
    DB.set("students",n);
    setShowEdit(false);
  }

  function addPayment(){
    if(!payAmount) return;
    const n=safeArr(students).map(s=>s.id===student.id?{...s,payments:[...safeArr(s.payments),{id:Date.now(),amount:Number(payAmount),date:TODAY}]}:s);
    DB.set("students",n);
    setPayAmount("");
    setShowPay(false);
  }

  const expected=monthlyTotal(student);
  const paid=totalPaid(student);
  const debt=expected-paid;

  return<div style={{padding:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <Btn variant="ghost" sm onClick={onBack}>← Geri</Btn>
      <div style={{display:"flex",gap:8}}>
        <Btn sm variant="secondary" onClick={()=>setShowEdit(true)}>Düzenle</Btn>
        <Btn sm onClick={()=>setShowPay(true)}>+ Ödeme Ekle</Btn>
      </div>
    </div>
    <Card>
      <div style={{fontSize:18,fontWeight:800,marginBottom:6}}>{student.name}</div>
      <Badge label={courseStatus(student)}/>
      <div style={{marginTop:12}}>
        <Row label="Doğum Tarihi" val={fmtDate(student.dob)}/>
        <Row label="Yaş" val={age(student.dob)}/>
        <Row label="Veli" val={student.guardianName||"—"}/>
        <Row label="Telefon" val={student.guardianPhone1||"—"}/>
        <Row label="Grup" val={student.groupName||"—"}/>
        <Row label="Seviye" val={swimLevelLabel(student.swimLevel)}/>
        <Row label="Kurs Başlangıç" val={fmtDate(student.courseStart)}/>
        <Row label="Kurs Bitiş" val={fmtDate(student.courseEnd)}/>
        <Row label="Kalan Seans" val={`${calcRemainingSessions(student)} / ${student.totalSessions||0}`}/>
      </div>
    </Card>
    <Card>
      <SectionTitle>Ödeme Durumu</SectionTitle>
      <Row label="Aylık Toplam" val={`${expected.toLocaleString("tr-TR")} ₺`}/>
      <Row label="Ödenen" val={`${paid.toLocaleString("tr-TR")} ₺`} col={C.success}/>
      <Row label="Kalan" val={`${debt.toLocaleString("tr-TR")} ₺`} col={debt>0?C.danger:C.success}/>
    </Card>
    {student.hasTransport&&<Card>
      <SectionTitle>Servis Bilgisi</SectionTitle>
      <Row label="Adres" val={student.address||"—"}/>
      <Row label="Ücret" val={`${student.transportFee||0} ₺`}/>
      <Row label="Şoför" val={student.driverName||"—"}/>
    </Card>}
    <Card>
      <SectionTitle>Ekipmanlar</SectionTitle>
      {safeArr(student.equipment).map(e=><Row key={e.id} label={e.name} val={`${e.price} ₺`}/>)}
      {safeArr(student.equipment).length===0&&<div style={{fontSize:12,color:C.textSub}}>Kayıtlı ekipman yok.</div>}
    </Card>
    <Card>
      <SectionTitle>Ödeme Geçmişi</SectionTitle>
      {safeArr(student.payments).sort((a,b)=>new Date(b.date)-new Date(a.date)).map(p=><Row key={p.id} label={fmtDate(p.date)} val={`+${p.amount} ₺`} col={C.success}/>)}
      {safeArr(student.payments).length===0&&<div style={{fontSize:12,color:C.textSub}}>Ödeme kaydı yok.</div>}
    </Card>

    <Modal show={showEdit} onClose={()=>setShowEdit(false)} title="Öğrenci Bilgilerini Düzenle">
      <StudentForm initial={student} onSave={updateStudent} onCancel={()=>setShowEdit(false)} stockItems={stockItems}/>
    </Modal>
    <Modal show={showPay} onClose={()=>setShowPay(false)} title="Ödeme Ekle">
      <Inp label="Tutar" type="number" value={payAmount} onChange={setPayAmount}/>
      <Btn full onClick={addPayment} style={{marginTop:12}}>Kaydet</Btn>
    </Modal>
  </div>
}

function Dashboard({students,expenses}){
  const safeStudents = safeArr(students); const safeExpenses = safeArr(expenses); const active=safeStudents.filter(s=>courseStatus(s)==="active");
  const totalRev=safeStudents.reduce((t,s)=>t+totalPaid(s),0); const totalExp=safeExpenses.reduce((t,e)=>t+Number(e.amount||0),0); const netProfit = totalRev - totalExp;
  const total=totalRev+totalExp; const revPct=total===0?50:(totalRev/total)*100; const expPct=total===0?50:(totalExp/total)*100;
  return<div style={{padding:16}}><div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16}}><StatCard label="Aktif Öğrenci" value={active.length}/><StatCard label="Net Kasa Durumu" value={`${netProfit.toLocaleString("tr-TR")} ₺`} col={netProfit>=0?C.success:C.danger}/><StatCard label="Toplam Gelir" value={`${totalRev.toLocaleString("tr-TR")} ₺`} col={C.success}/><StatCard label="Toplam Gider" value={`${totalExp.toLocaleString("tr-TR")} ₺`} col={C.danger}/></div>
    <Card><SectionTitle>Gelir / Gider Dağılımı</SectionTitle><div style={{display:"flex", height:20, borderRadius:10, overflow:"hidden", marginBottom:10, background:C.bg}}><div style={{width:`${revPct}%`, background:C.success}}></div><div style={{width:`${expPct}%`, background:C.danger}}></div></div></Card>
  </div>
}
function SettingsPage({navItems, clubName, logoUrl, appUsers}){
  const [tab, setTab] = useState(0); const [nameVal, setNameVal] = useState(clubName); const [logoVal, setLogoVal] = useState(logoUrl); const [showUserModal, setShowUserModal] = useState(false); const [uForm, setUForm] = useState({ id:null, username:"", password:"", role:"staff", allowedTabs:[] });
  return<div style={{padding:16}}><TabBar tabs={["Genel Kurum", "Personel Hesapları"]} active={tab} onChange={setTab}/>
    {tab === 0 && (<div><Card><Inp label="Kulüp Adı" value={nameVal} onChange={setNameVal}/></Card><Btn full onClick={()=>{DB.set("clubName",nameVal); alert("Kaydedildi");}}>Kaydet</Btn></div>)}
    {tab===1&&<div>{safeArr(appUsers).map(u=><Card key={u.id}><Row label={u.username} val={u.role}/><Btn sm variant="danger" onClick={()=>{ if(u.role!=='admin'&&confirm('Silinsin mi?')) DB.set("appUsers", safeArr(appUsers).filter(x=>x.id!==u.id)); }}>Sil</Btn></Card>)}</div>}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   9. APP ROOT
═══════════════════════════════════════════════════════════════ */
function App(){
  const [currentUser, setCurrentUser] = useState(() => { try { return JSON.parse(sessionStorage.getItem("aqua_user")); } catch { return null; } });
  const [isDbLoaded, setIsDbLoaded] = useState(false);
  const [students,setStudents]=useState([]); const [staff,setStaff]=useState([]); const [stockItems,setStockItems]=useState([]); const [movements,setMovements]=useState([]); const [expenses,setExpenses]=useState([]);
  const [clubName,setClubName]=useState("AquaClub Pro"); const [navItems,setNavItems]=useState(NAV_ITEMS); const [appUsers, setAppUsers]=useState([]); const [oldPinCode, setOldPinCode]=useState("0309"); const [waLinks,setWaLinks]=useState([]);
  const [logoUrl,setLogoUrl]=useState(""); const [activeTab,setActiveTab]=useState("dashboard"); const [sidebarOpen,setSidebarOpen]=useState(false);

  useEffect(() => {
    const unsub = db.collection("appData").doc("main").onSnapshot((doc) => {
      if (doc.exists) {
        const d = doc.data();
        if (d.students) setStudents(safeArr(d.students));
        if (d.staff) setStaff(safeArr(d.staff));
        if (d.stock) setStockItems(safeArr(d.stock));
        if (d.movements) setMovements(safeArr(d.movements));
        if (d.expenses) setExpenses(safeArr(d.expenses));
        if (d.waLinks) setWaLinks(safeArr(d.waLinks));
        if (d.clubName) setClubName(d.clubName);
        setAppUsers(safeArr(d.appUsers).length ? safeArr(d.appUsers) : [{ id:"admin", username:"admin", password:"0309", role:"admin", allowedTabs: NAV_ITEMS.map(n=>n.id) }]);
        if (d.logoUrl) setLogoUrl(d.logoUrl);
      }
      setIsDbLoaded(true);
    });
    return () => unsub();
  }, []);

  if (!isDbLoaded) return <div style={{display:"flex",flexDirection:"column",height:"100vh",alignItems:"center",justifyContent:"center",background:"var(--bg-color)"}}><div className="spinner"></div><div style={{color:"var(--text-main)",fontWeight:700,marginTop:10}}>Sistem Yükleniyor...</div></div>;
  if (!currentUser) return <LoginScreen onSuccess={(user) => { sessionStorage.setItem("aqua_user", JSON.stringify(user)); setCurrentUser(user); }} appUsers={appUsers} adminPin={oldPinCode} />;

  const visibleNav = NAV_ITEMS.filter(n => currentUser.role === "admin" || (currentUser.allowedTabs || []).includes(n.id));

  return<div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg-color)"}}>
    <div className="sidebar-desktop" style={{width:250, background:"var(--sidebar-bg)", borderRight:"1px solid #E2E8F0", display:"flex", flexDirection:"column", zIndex:100}}>
      <div style={{padding:"24px 20px 20px", borderBottom:"1px solid #E2E8F0", display:"flex", alignItems:"center", gap:12}}>
        <div style={{width:38,height:38,borderRadius:10,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}><span style={{color:"white", fontWeight:800}}>AC</span></div>
        <div><div style={{fontSize:15,fontWeight:800,color:"var(--text-main)"}}>{clubName}</div><div style={{fontSize:11,color:"#64748B",fontWeight:600}}>{currentUser.username}</div></div>
      </div>
      <div style={{flex:1, overflowY:"auto", padding:"16px 12px"}}>
        {visibleNav.map(item=><button key={item.id} type="button" onClick={()=>setActiveTab(item.id)} style={{display:"flex",alignItems:"center",gap:12,width:"100%", padding:"12px 14px", marginBottom:6, background:activeTab===item.id?"#E2E8F0":"transparent", border:"none", borderRadius:12, color:C.text, cursor:"pointer", textAlign:"left", fontSize:14, fontWeight:600}}><Icon d={item.icon} size={18}/> {item.label}</button>)}
      </div>
      <div style={{padding:"16px"}}><button type="button" onClick={()=>{sessionStorage.removeItem("aqua_user"); window.location.reload();}} style={{width:"100%", padding:"12px", background:"#EF444415", border:"none", borderRadius:12, color:"#EF4444", fontWeight:700, cursor:"pointer"}}>Çıkış Yap</button></div>
    </div>
    <div style={{flex:1, display:"flex", flexDirection:"column", overflow:"hidden"}}>
      <div style={{padding:"16px 20px", background:"var(--sidebar-bg)", borderBottom:"1px solid #E2E8F0", fontWeight:800, fontSize:16, color:"var(--text-main)"}}>{(visibleNav.find(n=>n.id===activeTab)||{}).label}</div>
      <div style={{flex:1, overflowY:"auto"}}>
        {activeTab==="dashboard"&&<Dashboard students={students} expenses={expenses}/>}
        {activeTab==="students"&&<StudentsPage students={students} stockItems={stockItems}/>}
        {activeTab==="attendance"&&<AttendancePage students={students}/>}
        {activeTab==="payments"&&<PaymentsPage students={students}/>}
        {activeTab==="expenses"&&<ExpensesPage expenses={expenses}/>}
        {activeTab==="whatsapp"&&<WhatsAppPage students={students} waLinks={waLinks} />}
        {activeTab==="staff"&&<StaffPage staff={staff}/>}
        {activeTab==="inventory"&&<InventoryPage items={stockItems}/>}
        {activeTab==="settings"&&currentUser.role==='admin'&&<SettingsPage navItems={NAV_ITEMS} clubName={clubName} logoUrl={logoUrl} appUsers={appUsers}/>}
      </div>
    </div>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
