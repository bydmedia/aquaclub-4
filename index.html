/* ═══════════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════════ */
function fmtDate(d){if(!d)return"—";const[y,m,day]=d.split("-");return`${day}.${m}.${y}`}
function totalPaid(s){return safeArr(s.payments).reduce((t,p)=>t+Number(p.amount||0),0);}
function equipmentTotal(s){return safeArr(s.equipment).reduce((t,e)=>t+Number(e.price||0),0);}
function monthlyTotal(s){return Number(s.monthlyFee||0)-Number(s.discount||0)+equipmentTotal(s)+(s.hasTransport?Number(s.transportFee||0):0);}
function courseStatus(s){
  if(!s.courseStart||!s.courseEnd)return"unknown";
  const now=new Date(TODAY),st=new Date(s.courseStart),en=new Date(s.courseEnd);
  if(now<st)return"upcoming";if(now>en)return"ended";return"active";
}
function daysLeft(s){return Math.ceil((new Date(s.courseEnd)-new Date(TODAY))/86400000)}
function attendanceCount(s){return Object.values(s.attendance||{}).filter(Boolean).length}
function age(dob){if(!dob)return"—";return Math.floor((Date.now()-new Date(dob))/31557600000)+" yaş"}
function calcEndDate(start,total,days){
  if(!start||!total||!days||days.length===0)return"";
  let d=new Date(start),cnt=0,iter=0;
  const safeDays = safeArr(days);
  while(cnt<total&&iter<total*30){if(safeDays.includes(d.getDay()))cnt++;if(cnt<total)d.setDate(d.getDate()+1);iter++;}
  return d.toISOString().split("T")[0];
}
function swimLevelLabel(v){return{beginner:"Başlangıç",intermediate:"Orta",advanced:"İleri",competitive:"Yarışmacı"}[v]||v||"—"}
function roleLabel(r){return{trainer:"Antrenör",admin:"İdari Personel",driver:"Şoför",other:"Diğer"}[r]||r||"—"}

function openWA(phone, text) {
  if (!phone) { alert("Sisteme kayıtlı veli telefonu bulunamadı."); return; }
  let p = phone.replace(/\D/g, "");
  if (p.startsWith("0")) p = "90" + p.slice(1);
  else if (p.length === 10) p = "90" + p;
  window.open(`https://wa.me/${p}?text=${encodeURIComponent(text)}`, "_blank");
}

function exportCSV(filename, headers, rows) {
  const bom = "\uFEFF"; 
  const csv = [headers.join(","), ...rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(","))].join("\n");
  const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename + ".csv";
  link.click();
}

}

function Inp({label,value,onChange,type="text",placeholder,rows,half,autoFocus,style}){

function Btn({children,onClick,variant="primary",sm,full,style={}}){

    ghost:{background:"transparent",color:C.textSub,border:`1px solid ${C.border}`},
  };
  return<button onClick={onClick} style={{...base,...v[variant],width:full?"100%":"auto"}}>{children}</button>

function LoginScreen({ onSuccess, appUsers, adminPin }) {
  const [user, setUser] = useState("");
  const [pass, setPass] = useState("");
  const [err, setErr] = useState(false);

  const handleLogin = (e) => {
    e.preventDefault();
    if (user.toLowerCase() === "admin" && (pass === "0309" || pass === adminPin)) {
      onSuccess({ id: 'admin', username: 'admin', role: 'admin', allowedTabs: NAV_ITEMS.map(n=>n.id) });
      return;
    }
    const foundUser = safeArr(appUsers).find(u => u.username.toLowerCase() === user.toLowerCase() && u.password === pass);
    if (foundUser) { onSuccess(foundUser); return; }
    
    setErr(true); setTimeout(() => setErr(false), 2000);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,padding:20}}>
      <div style={{fontSize:48, fontWeight:800, color:C.accent, marginBottom:30, letterSpacing:-1.5}}>AquaClub Pro</div>
      <form onSubmit={handleLogin} style={{background:C.card,padding:"40px 30px",borderRadius:24,border:`1px solid ${err?C.danger:C.borderLight}`,textAlign:"center",boxShadow:"0 12px 32px rgba(0,0,0,0.06)",width:"100%",maxWidth:360, transition:"all 0.3s"}}>
        <div style={{fontSize:18,fontWeight:700,marginBottom:24,color:C.text}}>Sisteme Giriş Yapın</div>
        <Inp value={user} onChange={setUser} placeholder="Kullanıcı Adı" autoFocus style={{textAlign:"center", fontSize:14, padding:"14px", borderRadius:12}}/>
        <Inp value={pass} onChange={setPass} type="password" placeholder="Şifre" style={{textAlign:"center", fontSize:14, padding:"14px", borderRadius:12, letterSpacing:4}}/>
        <Btn full style={{marginTop:12, padding:"14px", borderRadius:12, fontSize:14}}>Giriş Yap</Btn>
        <div style={{height: 20, marginTop: 16}}>{err && <div style={{color:C.danger,fontSize:13,fontWeight:600}}>Hatalı Bilgi Girdiniz!</div>}</div>
      </form>
    </div>
  );
}

  useEffect(()=>{
    if(f.courseStart&&f.totalSessions&&safeWeekDays.length>0){
      u("courseEnd",calcEndDate(f.courseStart,Number(f.totalSessions),safeWeekDays));
    }
  },[f.courseStart,f.totalSessions,JSON.stringify(safeWeekDays)]);

  function addEq(item){setF(p=>({...p,equipment:[...safeArr(p.equipment),{id:Date.now(),...item,addedDate:TODAY}]}))}
  function rmEq(id){setF(p=>({...p,equipment:safeArr(p.equipment).filter(e=>e.id!==id)}))}
  const netMonthly=Number(f.monthlyFee||0)-Number(f.discount||0);

  return<div>
    <TabBar tabs={["Kişisel","Kurs","Servis","Ekipman"]} active={tab} onChange={setTab}/>
    {tab===0&&<div>
      <Inp label="Ad Soyad *" value={f.name} onChange={v=>u("name",v)} placeholder="Öğrenci adı soyadı"/>
      <Inp label="Doğum Tarihi" value={f.dob} onChange={v=>u("dob",v)} type="date"/>
      <div style={{height:1,background:C.border,margin:"12px 0"}}/>
      <Inp label="Veli Adı Soyadı" value={f.guardianName} onChange={v=>u("guardianName",v)} placeholder="Veli adı soyadı"/>
      <div style={{display:"flex",gap:8}}>
        <Inp label="Veli Telefonu 1" value={f.guardianPhone1} onChange={v=>u("guardianPhone1",v)} placeholder="0500 000 0000" type="tel" half/>
        <Inp label="Veli Telefonu 2" value={f.guardianPhone2} onChange={v=>u("guardianPhone2",v)} placeholder="0500 000 0000" type="tel" half/>
      </div>
      <div style={{height:1,background:C.border,margin:"12px 0"}}/>
      <Inp label="Özel Not" value={f.notes} onChange={v=>u("notes",v)} rows={3} placeholder="Öğrenciye ait notlar..."/>
    </div>}
    {tab===1&&<div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><Sel label="Yüzme Seviyesi" value={f.swimLevel} onChange={v=>u("swimLevel",v)} options={[{value:"beginner",label:"Başlangıç"},{value:"intermediate",label:"Orta"},{value:"advanced",label:"İleri"},{value:"competitive",label:"Yarışmacı"}]}/></div>
        <div style={{flex:1}}><Inp label="Havuz Kulvarı" value={f.poolLane} onChange={v=>u("poolLane",v)} placeholder="örn. 3"/></div>
      </div>
      <Inp label="Grup / Sınıf Adı" value={f.groupName} onChange={v=>u("groupName",v)} placeholder="örn. Pazartesi-Çarşamba Grubu A"/>
      <div style={{height:1,background:C.border,margin:"12px 0"}}/>
      <div style={{fontSize:11,color:C.textSub,marginBottom:6,fontWeight:600}}>Haftalık Günler *</div>
      <DayPicker value={safeWeekDays} onChange={v=>u("weekDays",v)}/>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><Inp label="Başlangıç *" value={f.courseStart} onChange={v=>u("courseStart",v)} type="date"/></div>
        <div style={{flex:1}}><Inp label="Seans Sayısı *" value={f.totalSessions} onChange={v=>u("totalSessions",v)} type="number" placeholder="48"/></div>
      </div>
      <Card style={{marginBottom:12}} accent={C.accent}>
        <div style={{fontSize:11,color:C.textSub,marginBottom:4,fontWeight:600}}>Hesaplanan Bitiş Tarihi</div>
        <div style={{fontSize:18,fontWeight:700,color:C.accent}}>{fmtDate(f.courseEnd)||"—"}</div>
      </Card>
      <div style={{height:1,background:C.border,margin:"12px 0"}}/>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><Inp label="Aylık Ücret (₺)" value={f.monthlyFee} onChange={v=>u("monthlyFee",v)} type="number" placeholder="1500"/></div>
        <div style={{flex:1}}><Inp label="İndirim (₺)" value={f.discount} onChange={v=>u("discount",v)} type="number" placeholder="0"/></div>
      </div>
      <Inp label="Ödeme Notu" value={f.paymentNote} onChange={v=>u("paymentNote",v)} placeholder="örn. Her ayın 1'i"/>
      <Card style={{marginBottom:4}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:600}}><span style={{color:C.textSub}}>Aylık Net Ücret</span><span style={{color:C.success}}>{netMonthly.toLocaleString("tr-TR")} ₺</span></div></Card>
    </div>}
    {tab===2&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:`1px solid ${C.border}`,marginBottom:14}}>
        <div><div style={{fontWeight:600,fontSize:14,color:C.text}}>Servis Kullanıyor mu?</div></div>
        <Toggle checked={f.hasTransport} onChange={v=>u("hasTransport",v)}/>
      </div>
      {f.hasTransport?<div>
        <Inp label="Öğrenci Adresi" value={f.address} onChange={v=>u("address",v)} rows={2}/>
        <Inp label="Servis Ücreti (₺)" value={f.transportFee} onChange={v=>u("transportFee",v)} type="number"/>
        <div style={{height:1,background:C.border,margin:"12px 0"}}/>
        <div style={{display:"flex",gap:8}}>
          <div style={{flex:1}}><Inp label="Şoför Adı" value={f.driverName} onChange={v=>u("driverName",v)}/></div>
          <div style={{flex:1}}><Inp label="Şoför Tel" value={f.driverPhone} onChange={v=>u("driverPhone",v)} type="tel"/></div>
        </div>
      </div>:<div style={{textAlign:"center",padding:"30px 0",color:C.textMuted}}>Servis kullanmıyor.</div>}
    </div>}
    {tab===3&&<div>
      <div style={{fontSize:12,color:C.textSub,marginBottom:12}}>Alınan ekipmanlar aylık ücrete yansır.</div>
      <EqPicker stockItems={stockItems} current={currentEq} onAdd={addEq} onRemove={rmEq}/>
      {currentEq.length>0&&<Card accent={C.warning} style={{marginTop:8}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6,fontWeight:600}}><span style={{color:C.textSub}}>Ekipman Toplamı</span><span style={{color:C.warning}}>+{equipmentTotal(f).toLocaleString("tr-TR")} ₺</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:700}}><span style={{color:C.text}}>Aylık Toplam</span><span style={{color:C.success}}>{monthlyTotal(f).toLocaleString("tr-TR")} ₺</span></div>
      </Card>}
    </div>}
    <div style={{display:"flex",gap:10,marginTop:20}}>
      <Btn variant="secondary" onClick={onCancel} style={{flex:1}}>İptal</Btn>
      <Btn onClick={()=>onSave(f)} style={{flex:2}}>Öğrenciyi Kaydet</Btn>
    </div>
  </div>
}

function EqPicker({stockItems,current,onAdd,onRemove}){
  const [sel,setSel]=useState("");
  const safeStock = safeArr(stockItems);
  return<div>
    <div style={{display:"flex",gap:8,marginBottom:10}}>
      <select style={{flex:1,padding:"9px 11px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,color:sel?C.text:C.textMuted,fontSize:13,outline:"none",fontFamily:"inherit"}} value={sel} onChange={e=>setSel(e.target.value)}>
        <option value="">Ekipman seç...</option>
        {safeStock.filter(s=>Number(s.stock)>0).map(s=><option key={s.id} value={s.id}>{s.name} — {Number(s.price).toLocaleString("tr-TR")} ₺</option>)}
      </select>
      <Btn sm onClick={()=>{if(!sel)return;const item=safeStock.find(s=>String(s.id)===String(sel));if(item)onAdd({name:item.name,price:item.price,stockId:item.id});setSel("");}}>Ekle</Btn>
    </div>
    {safeArr(current).map(e=><div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
      <div><div style={{fontSize:13,fontWeight:600}}>{e.name}</div><div style={{fontSize:11,color:C.textSub}}>{fmtDate(e.addedDate)}</div></div>
      <div style={{display:"flex",alignItems:"center",gap:12}}><span style={{color:C.warning,fontWeight:700,fontSize:14}}>{Number(e.price).toLocaleString("tr-TR")} ₺</span><button onClick={()=>onRemove(e.id)} style={{background:"none",border:"none",color:C.danger,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button></div>
    </div>)}
  </div>
}

function StudentDetail({student,onBack,students,stockItems}){
  const [tab,setTab]=useState(0);
  const [editing,setEditing]=useState(false);
  const [payForm,setPayForm]=useState({amount:"",date:TODAY,note:""});
  const [showPay,setShowPay]=useState(false);

  const safePays = safeArr(student.payments);
  const safeEqs = safeArr(student.equipment);
  const safeDays = safeArr(student.weekDays);

  function save(f){const n=safeArr(students).map(s=>s.id===student.id?{...s,...f,id:s.id}:s);DB.set("students",n);setEditing(false);}
  function addPay(){
    if(!payForm.amount)return;
    const n=safeArr(students).map(s=>s.id===student.id?{...s,payments:[...safeArr(s.payments),{id:Date.now(),...payForm,amount:Number(payForm.amount)}]}:s);
    DB.set("students",n); setPayForm({amount:"",date:TODAY,note:""}); setShowPay(false);
  }
  function delPay(pid){const n=safeArr(students).map(s=>s.id===student.id?{...s,payments:safeArr(s.payments).filter(p=>p.id!==pid)}:s);DB.set("students",n);}

  if(editing)return<div style={{padding:14}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
      <button onClick={()=>setEditing(false)} style={{background:"none",border:`1px solid ${C.border}`,color:C.textSub,width:32,height:32,borderRadius:8,cursor:"pointer",fontSize:16}}>←</button>
      <span style={{fontWeight:800,fontSize:16,color:C.text}}>Düzenle: {student.name}</span>
    </div>
    <StudentForm initial={student} onSave={save} onCancel={()=>setEditing(false)} stockItems={stockItems}/>
  </div>;

  const paid=totalPaid(student),monthly=monthlyTotal(student),balance=paid-monthly;
  const st=courseStatus(student);

  return<div style={{padding:14}}>
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
      <button onClick={onBack} style={{background:"none",border:`1px solid ${C.border}`,color:C.textSub,width:36,height:36,borderRadius:10,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
      <div style={{flex:1}}><div style={{fontWeight:800,fontSize:18,color:C.text}}>{student.name}</div><div style={{fontSize:12,color:C.textSub,marginTop:2}}>{age(student.dob)} · {student.groupName||"Grup yok"}</div></div>
      <Badge label={st}/>
    </div>

    <TabBar tabs={["Genel","Kurs","Servis","Ekipman","Ödemeler"]} active={tab} onChange={setTab}/>

    {tab===0&&<div>
      <Card>
        <Row label="Ad Soyad" val={student.name}/>
        <Row label="Doğum Tarihi" val={`${fmtDate(student.dob)} (${age(student.dob)})`}/>
        <Row label="Veli" val={student.guardianName||"—"}/>
        <Row label="Veli Tel 1" val={student.guardianPhone1||"—"} href={student.guardianPhone1?`tel:${student.guardianPhone1}`:undefined}/>
        {student.notes&&<div style={{marginTop:12,padding:12,background:C.bg,borderRadius:10,fontSize:13,color:C.textSub,lineHeight:1.6,border:`1px solid ${C.border}`}}>{student.notes}</div>}
      </Card>
      
      {student.guardianPhone1 && (
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12}}>
          <Btn sm style={{background:C.whatsapp, color:"#fff", border:"none", boxShadow:"0 2px 8px rgba(37,211,102,0.3)"}} onClick={()=>openWA(student.guardianPhone1, `Sayın velimiz, ${student.name} isimli öğrencimizin ödemesi hakkında hatırlatma yapmak isteriz. İyi günler.`)}>💬 Ödeme Hatırlat</Btn>
          <Btn sm style={{background:C.whatsapp, color:"#fff", border:"none", boxShadow:"0 2px 8px rgba(37,211,102,0.3)"}} onClick={()=>openWA(student.guardianPhone1, `Sayın velimiz, ${student.name} isimli öğrencimiz bugünkü antrenmana katılmamıştır. Bilginize sunarız.`)}>💬 Devamsızlık Bildir</Btn>
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        <StatCard label="Katılım (gün)" value={attendanceCount(student)}/>
        <StatCard label="Aylık Bakiye" value={`${balance>=0?"+":""}${balance.toLocaleString("tr-TR")} ₺`} col={balance>=0?C.success:C.danger}/>
      </div>
      <Btn variant="secondary" full onClick={()=>setEditing(true)}>Bilgileri Düzenle</Btn>
    </div>}

    {tab===1&&<div>
      <Card>
        <Row label="Seviye" val={swimLevelLabel(student.swimLevel)}/>
        <Row label="Grup" val={student.groupName||"—"}/>
        <Row label="Kulvar" val={student.poolLane||"—"}/>
        <Row label="Günler" val={safeDays.map(d=>DAYS_TR[d]).join(", ")||"—"}/>
        <Row label="Başlangıç" val={fmtDate(student.courseStart)}/>
        <Row label="Bitiş" val={fmtDate(student.courseEnd)}/>
        {st==="active"&&<Row label="Kalan Gün" val={daysLeft(student)+" gün"} col={daysLeft(student)<=14?C.warning:C.success}/>}
      </Card>
      <Card>
        <Row label="Aylık Ücret" val={`${Number(student.monthlyFee||0).toLocaleString("tr-TR")} ₺`}/>
        {Number(student.discount)>0&&<Row label="İndirim" val={`-${Number(student.discount).toLocaleString("tr-TR")} ₺`} col={C.success}/>}
        {student.hasTransport&&<Row label="Servis Ücreti" val={`${Number(student.transportFee||0).toLocaleString("tr-TR")} ₺`}/>}
        <div style={{display:"flex",justifyContent:"space-between",paddingTop:12,marginTop:8,borderTop:`1px solid ${C.border}`,fontWeight:700}}>
          <span style={{color:C.textSub,fontSize:13}}>Aylık Toplam</span>
          <span style={{color:C.success,fontSize:16}}>{monthly.toLocaleString("tr-TR")} ₺</span>
        </div>
      </Card>
    </div>}

    {tab===2&&<div>
      {student.hasTransport?<Card>
        <Row label="Servis" val="Kullanıyor" col={C.success}/>
        <Row label="Adres" val={student.address||"—"}/>
        <Row label="Servis Ücreti" val={`${Number(student.transportFee||0).toLocaleString("tr-TR")} ₺/ay`}/>
        <Row label="Şoför" val={student.driverName||"—"}/>
        <Row label="Şoför Tel" val={student.driverPhone||"—"} href={student.driverPhone?`tel:${student.driverPhone}`:undefined}/>
      </Card>:<div style={{textAlign:"center",padding:"40px 0",color:C.textMuted}}>Servis kullanmıyor</div>}
    </div>}

    {tab===3&&<div>
      {safeEqs.length===0?<div style={{textAlign:"center",padding:"40px 0",color:C.textMuted}}>Kayıtlı ekipman yok</div>:
      <Card>
        {safeEqs.map(e=><div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
          <div><div style={{fontSize:13,fontWeight:600}}>{e.name}</div><div style={{fontSize:11,color:C.textSub}}>{fmtDate(e.addedDate)}</div></div>
          <span style={{color:C.warning,fontWeight:700}}>{Number(e.price).toLocaleString("tr-TR")} ₺</span>
        </div>)}
        <div style={{display:"flex",justifyContent:"space-between",paddingTop:12,marginTop:8,borderTop:`1px solid ${C.border}`}}>
          <span style={{color:C.textSub,fontSize:13,fontWeight:600}}>Ekipman Toplamı</span>
          <span style={{fontWeight:800,color:C.success,fontSize:15}}>{equipmentTotal(student).toLocaleString("tr-TR")} ₺</span>
        </div>
      </Card>}
    </div>}

    {tab===4&&<div>
      <SectionTitle action={<Btn sm onClick={()=>setShowPay(true)}>+ Ödeme Ekle</Btn>}>Ödeme Geçmişi</SectionTitle>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        <StatCard label="Toplam Ödenen" value={`${paid.toLocaleString("tr-TR")} ₺`} col={C.success}/>
        <StatCard label="Aylık Beklenen" value={`${monthly.toLocaleString("tr-TR")} ₺`}/>
      </div>
      {safePays.length===0?<div style={{textAlign:"center",padding:"40px 0",color:C.textMuted}}>Ödeme kaydı yok</div>:
      <Card>
        {[...safePays].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(p=><div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
          <div><div style={{fontSize:14,fontWeight:700,color:C.text}}>{Number(p.amount).toLocaleString("tr-TR")} ₺</div><div style={{fontSize:11,color:C.textSub}}>{fmtDate(p.date)} {p.note&&`• ${p.note}`}</div></div>
          <button onClick={()=>delPay(p.id)} style={{background:C.dangerBg,border:"none",color:C.danger,width:32,height:32,borderRadius:8,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>)}
      </Card>}
      <Modal show={showPay} onClose={()=>setShowPay(false)} title="Ödeme Ekle">
        <Inp label="Tutar (₺) *" value={payForm.amount} onChange={v=>setPayForm(p=>({...p,amount:v}))} type="number"/>
        <Inp label="Tarih" value={payForm.date} onChange={v=>setPayForm(p=>({...p,date:v}))} type="date"/>
        <Inp label="Not" value={payForm.note} onChange={v=>setPayForm(p=>({...p,note:v}))} placeholder="örn. Temmuz ödemesi"/>
        <div style={{display:"flex",gap:10,marginTop:20}}>
          <Btn variant="secondary" onClick={()=>setShowPay(false)} style={{flex:1}}>İptal</Btn>
          <Btn onClick={addPay} style={{flex:2}}>Kaydet</Btn>
        </div>
      </Modal>
    </div>}
  </div>
}

function StudentsPage({students,stockItems}){
  const [search,setSearch]=useState("");
  const [showAdd,setShowAdd]=useState(false);
  const [detailId,setDetailId]=useState(null);
  const [statusFilter,setStatusFilter]=useState("all");
  const [groupFilter,setGroupFilter]=useState("all");

  const safeStudents = safeArr(students);
  const student=detailId?safeStudents.find(s=>s.id===detailId):null;

  function save(f){
    let n;
    if(f.id){n=safeStudents.map(s=>s.id===f.id?{...f}:s);}
    else{n=[...safeStudents,{...f,id:Date.now(),payments:[],attendance:{},equipment:safeArr(f.equipment)}];}
    DB.set("students",n);setShowAdd(false);
  }
  function del(id){const n=safeStudents.filter(s=>s.id!==id);DB.set("students",n);setDetailId(null);}

  function downloadExcel() {
    const headers = ["Ad Soyad", "Grup", "Veli", "Veli Tel", "Bitis Tarihi", "Aylik Ucret (TL)", "Odenen (TL)", "Kalan Borc (TL)"];
    const rows = filtered.map(s => { const exp = monthlyTotal(s); const paid = totalPaid(s); return [s.name, s.groupName||"-", s.guardianName||"-", s.guardianPhone1||"-", fmtDate(s.courseEnd), exp, paid, exp-paid]; });
    exportCSV("Ogrenciler", headers, rows);
  }

  const groups=["all",...new Set(safeStudents.map(s=>s.groupName).filter(Boolean))];
  const filtered=safeStudents.filter(s=>{
    if(!s.name.toLowerCase().includes(search.toLowerCase()))return false;
    if(statusFilter==="active"&&courseStatus(s)!=="active")return false;
    if(statusFilter==="ended"&&courseStatus(s)!=="ended")return false;
    if(statusFilter==="upcoming"&&courseStatus(s)!=="upcoming")return false;
    if(statusFilter==="unpaid"&&totalPaid(s)>=monthlyTotal(s))return false; 
    if(groupFilter!=="all"&&s.groupName!==groupFilter)return false;
    return true;
  });

  if(student)return<StudentDetail student={student} onBack={()=>setDetailId(null)} students={safeStudents} stockItems={stockItems}/>;

  return<div style={{padding:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:14,fontWeight:800,color:C.text,letterSpacing:0.5}}>Öğrenciler ({filtered.length})</div>
      <div style={{display:"flex", gap:8}}><Btn sm variant="ghost" onClick={downloadExcel}>⬇️ Excel</Btn><Btn sm onClick={()=>setShowAdd(true)}>+ Yeni Kayıt</Btn></div>
    </div>
    
    <div style={{position:"relative",marginBottom:12}}>
      <Icon d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0" size={16} color={C.textMuted} style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}/>
      <input style={{width:"100%",padding:"12px 14px 12px 40px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,color:C.text,fontSize:14,outline:"none",fontFamily:"inherit",boxShadow:"0 2px 4px rgba(0,0,0,0.02)"}} placeholder="İsimle öğrenci ara..." value={search} onChange={e=>setSearch(e.target.value)}/>
    </div>
    
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
      <Sel value={statusFilter} onChange={setStatusFilter} options={[{value:"all",label:"Tüm Durumlar"},{value:"active",label:"Aktifler"},{value:"upcoming",label:"Başlamayanlar"},{value:"ended",label:"Bitenler"},{value:"unpaid",label:"Eksik Ödemeler"}]}/>
      <Sel value={groupFilter} onChange={setGroupFilter} options={[{value:"all",label:"Tüm Gruplar"},...groups.filter(g=>g!=="all").map(g=>({value:g,label:g}))]}/>
    </div>

    {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:C.textMuted,fontWeight:500}}>Kayıt bulunamadı.</div>}
    
    {filtered.map(s=><Card key={s.id} style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
        <div><div style={{fontWeight:700,fontSize:16,color:C.text,letterSpacing:-0.3}}>{s.name}</div><div style={{fontSize:12,color:C.textSub,marginTop:2}}>{s.groupName||"Grup yok"}</div></div>
        <Badge label={courseStatus(s)}/>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
        <span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:C.bg,color:C.textSub,fontWeight:600,border:`1px solid ${C.border}`}}>Bitiş: {fmtDate(s.courseEnd)}</span>
        <span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:C.successBg,color:C.success,fontWeight:700}}>{totalPaid(s).toLocaleString("tr-TR")} ₺ ödendi</span>
        {s.hasTransport&&<span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:C.purpleBg,color:C.purple,fontWeight:600}}>Servis</span>}
      </div>
      <div style={{display:"flex",gap:10}}><Btn variant="secondary" sm onClick={()=>setDetailId(s.id)} style={{flex:1}}>Detay</Btn><Btn variant="danger" sm onClick={()=>{if(confirm(`${s.name} silinsin mi?`))del(s.id);}} style={{flex:0,padding:"6px 12px"}}>Sil</Btn></div>
    </Card>)}

    <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Yeni Öğrenci Kaydı"><StudentForm initial={{}} onSave={save} onCancel={()=>setShowAdd(false)} stockItems={stockItems}/></Modal>
  </div>
}

function AttendancePage({students}){
  const safeStudents = safeArr(students);
  const [date,setDate]=useState(TODAY);
  const [y, m, d] = date.split('-');
  const selectedDayIndex = new Date(y, m - 1, d).getDay();
  const active=safeStudents.filter(s=>courseStatus(s)==="active" && safeArr(s.weekDays).includes(selectedDayIndex));
  const present=active.filter(s=>(s.attendance||{})[date]).length;

  function toggle(id,val){
    const n=safeStudents.map(s=>{if(s.id!==id)return s;const att={...s.attendance};if(val)att[date]=true;else delete att[date];return{...s,attendance:att}});
    DB.set("students",n);
  }

  return<div style={{padding:16}}>
    <SectionTitle action={<Btn sm variant="ghost" onClick={()=>exportCSV(`Yoklama_${date}`, ["Ad Soyad", "Grup", "Durum"], active.map(s => [s.name, s.groupName||"-", (s.attendance||{})[date] ? "Katildi" : "Katilmadi"]))}>⬇️ Excel</Btn>}>Günlük Yoklama</SectionTitle>
    <Inp value={date} onChange={setDate} type="date"/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
      <StatCard label="Beklenen Öğrenci" value={active.length}/>
      <StatCard label="Mevcut Katılım" value={`${present}`} col={C.success}/>
    </div>
    {active.length===0?<div style={{textAlign:"center",padding:"40px 0",color:C.textMuted}}>Bu gün için planlı öğrenci yok.</div>:
    <Card>
      {active.map((s,i)=><div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:i===active.length-1?"none":`1px solid ${C.borderLight}`}}>
        <div><div style={{fontSize:15,fontWeight:700,color:C.text}}>{s.name}</div><div style={{fontSize:12,color:C.textSub}}>{attendanceCount(s)} gün katılım</div></div>
        <Toggle checked={!!(s.attendance||{})[date]} onChange={v=>toggle(s.id,v)}/>
      </div>)}
    </Card>}
  </div>
}

function PaymentsPage({students}){
  const safeStudents = safeArr(students);
  const all=safeStudents.flatMap(s=>safeArr(s.payments).map(p=>({...p,studentName:s.name}))).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const total=all.reduce((t,p)=>t+Number(p.amount),0);
  const thisMonth=all.filter(p=>p.date&&p.date.startsWith(TODAY.slice(0,7))).reduce((t,p)=>t+Number(p.amount),0);
  const unpaid = safeStudents.filter(s => courseStatus(s) === "active" && totalPaid(s) < monthlyTotal(s)).sort((a, b) => new Date(a.courseStart) - new Date(b.courseStart));

  return<div style={{padding:16}}>
    <SectionTitle action={<Btn sm variant="ghost" onClick={()=>exportCSV("Odemeler", ["Ogrenci", "Tutar", "Tarih", "Not"], all.map(p => [p.studentName, p.amount, fmtDate(p.date), p.note||"-"]))}>⬇️ Excel</Btn>}>Ödeme Merkezi</SectionTitle>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
      <StatCard label="Toplam Tahsilat" value={`${total.toLocaleString("tr-TR")} ₺`} col={C.success} span2/>
      <StatCard label="Bu Ayki Gelir" value={`${thisMonth.toLocaleString("tr-TR")} ₺`} col={C.accent}/>
      <StatCard label="Eksik Ödeme" value={unpaid.length} col={unpaid.length>0?C.danger:C.textMuted}/>
    </div>
    
    {unpaid.length>0&&<>
      <SectionTitle>Eksik Ödemeler</SectionTitle>
      {unpaid.map(s=>{
        const expected = monthlyTotal(s); const paid = totalPaid(s); const debt = expected - paid;
        return (
          <Card key={s.id} accent={C.danger}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontWeight:700,fontSize:15,color:C.text}}>{s.name}</div><div style={{fontSize:12,color:C.textSub,marginTop:2}}>Aylık: {expected.toLocaleString("tr-TR")} ₺</div></div>
              <div style={{textAlign:"right"}}><span style={{color:C.danger,fontWeight:800,fontSize:16}}>{debt.toLocaleString("tr-TR")} ₺</span><div style={{fontSize:10,color:C.textSub,fontWeight:600}}>kalan borç</div></div>
            </div>
          </Card>
        )
      })}
    </>}

    <SectionTitle>İşlem Geçmişi</SectionTitle>
    {all.length===0?<div style={{textAlign:"center",padding:"40px 0",color:C.textMuted}}>Kayıt yok.</div>:
    <Card>
      {all.map((p,i)=><div key={p.id+p.studentName+i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:i===all.length-1?"none":`1px solid ${C.borderLight}`}}>
        <div><div style={{fontSize:14,fontWeight:700,color:C.text}}>{p.studentName}</div><div style={{fontSize:11,color:C.textSub}}>{fmtDate(p.date)}{p.note?` • ${p.note}`:""}</div></div>
        <span style={{color:C.success,fontWeight:800,fontSize:15}}>+{Number(p.amount).toLocaleString("tr-TR")} ₺</span>
      </div>)}
    </Card>}
  </div>
}

function ExpensesPage({expenses}){

      <StatCard label="Aylık Çıkan (Gider)" value={`${totalExp.toLocaleString("tr-TR")} ₺`} col={C.danger} span2/>
    </div>

    {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:C.textMuted}}>Gider kaydı yok.</div>}

      <div style={{display:"flex",gap:10,marginTop:10}}><Btn variant="secondary" sm onClick={()=>{setF(e);setShow(true);}} style={{flex:1}}>Düzenle</Btn><Btn variant="danger" sm onClick={()=>{if(confirm(`${e.title} silinsin mi?`))del(e.id);}} style={{flex:0}}>Sil</Btn></div>

function InventoryPage({items}){
  const validItems = safeArr(items);

    if(!f.name.trim()) return;
    const n = f.id ? validItems.map(i=>i.id===f.id?{...f}:i) : [...validItems,{...f,id:Date.now()}];
    DB.set("stock",n); setShow(false); setF({id:null,name:"",category:"",price:"",stock:"",minStock:"",supplier:"",notes:""});

  function del(id){ DB.set("stock", validItems.filter(i=>i.id!==id)); }

            <div style={{fontSize:20,fontWeight:800,color:Number(item.stock)===0?C.danger:C.text}}>{item.stock}</div>

        </div>
        <div style={{display:"flex",gap:10}}><Btn variant="secondary" sm onClick={()=>{setF(item);setShow(true);}} style={{flex:1}}>Düzenle</Btn><Btn variant="danger" sm onClick={()=>{if(confirm(`${item.name} silinsin mi?`))del(item.id);}} style={{flex:0}}>Sil</Btn></div>

    <Modal show={show} onClose={()=>setShow(false)} title={f.id?"Ürün Düzenle":"Yeni Ürün"}>

      <div style={{display:"flex",gap:8}}><div style={{flex:1}}><Inp label="Satış Fiyatı (₺)" value={f.price} onChange={v=>u("price",v)} type="number"/></div><div style={{flex:1}}><Inp label="Stok Adedi" value={f.stock} onChange={v=>u("stock",v)} type="number"/></div></div>
      <Inp label="Min. Stok Uyarısı" value={f.minStock} onChange={v=>u("minStock",v)} type="number"/>
      <div style={{display:"flex",gap:10,marginTop:20}}><Btn variant="secondary" onClick={()=>setShow(false)} style={{flex:1}}>İptal</Btn><Btn onClick={save} style={{flex:2}}>Kaydet</Btn></div>

}

/* ═══════════════════════════════════════════════════════════════
   GELİŞMİŞ KURUMSAL DASHBOARD (Izgara Düzeni)
═══════════════════════════════════════════════════════════════ */
function Dashboard({students,expenses}){
  const safeStudents = safeArr(students);
  const safeExpenses = safeArr(expenses);
  const active=safeStudents.filter(s=>courseStatus(s)==="active");
  const presentToday=safeStudents.filter(s=>(s.attendance||{})[TODAY]).length;
  
  const totalRev=safeStudents.reduce((t,s)=>t+totalPaid(s),0);
  const totalExp=safeExpenses.reduce((t,e)=>t+Number(e.amount||0),0);
  const netProfit = totalRev - totalExp;

  const recentRegistrations = [...safeStudents].sort((a,b) => b.id - a.id).slice(0, 5);
  const recentPay = safeStudents.flatMap(s=>safeArr(s.payments).map(p=>({...p,studentName:s.name}))).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  const endingSoon = active.filter(s=>{const d=daysLeft(s);return d>=0&&d<=14;}).sort((a,b)=>daysLeft(a)-daysLeft(b)).slice(0,5);
  
  const foodWarnings = safeExpenses.filter(e => {
    if(!e.isFood || !e.expiryDate) return false;
    const days = Math.ceil((new Date(e.expiryDate) - new Date(TODAY))/86400000);
    return days <= 7;
  }).sort((a,b)=>new Date(a.expiryDate)-new Date(b.expiryDate));

  return<div style={{padding:16}}>
    {/* NET KAR ÖZETİ (TEPE) */}
    <Card accent={netProfit >= 0 ? C.success : C.danger} style={{marginBottom:16, background:netProfit >= 0 ? C.successBg : C.dangerBg, border:"none"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:14, color:netProfit >= 0 ? C.success : C.danger, fontWeight:800, textTransform:"uppercase"}}>Net Kasa (Kâr/Zarar)</div>
        <div style={{fontSize:28, fontWeight:800, color:netProfit >= 0 ? C.success : C.danger}}>{netProfit >= 0 ? "+" : ""}{netProfit.toLocaleString("tr-TR")} ₺</div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:C.textMain, fontWeight:600}}>
        <span>Toplam Tahsilat: {totalRev.toLocaleString("tr-TR")} ₺</span>
        <span>Toplam Gider: {totalExp.toLocaleString("tr-TR")} ₺</span>
      </div>
    </Card>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
      <StatCard label="Aktif Öğrenci" value={active.length}/>
      <StatCard label="Bugün Mevcut" value={`${presentToday} / ${active.length}`} col={C.success}/>
    </div>

    {foodWarnings.length>0&&<div style={{marginBottom:16}}>
      {foodWarnings.map(f=>{
         const d = Math.ceil((new Date(f.expiryDate)-new Date(TODAY))/86400000);
         return <Card key={f.id} style={{borderLeft:`4px solid ${d<0?C.danger:C.warning}`, marginBottom:8, padding:"12px 16px"}}>
           <div style={{fontSize:14,fontWeight:700,color:d<0?C.danger:C.warning}}>⚠️ SKT Uyarısı: {f.title} ({d<0 ? "Tarihi Geçti!" : `${d} Gün Kaldı`})</div>
         </Card>
      })}
    </div>}

    {/* KURUMSAL YAN YANA TABLOLAR (GRID SİSTEMİ) */}
    <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(320px, 1fr))", gap:16, alignItems:"start"}}>
      
      {/* 1. SON KAYITLAR */}
      <Card style={{padding:"16px", borderRadius:16, boxShadow:"0 4px 20px rgba(0,0,0,0.03)"}}>
        <div style={{fontSize:13, fontWeight:800, color:C.text, marginBottom:16, textTransform:"uppercase", letterSpacing:0.5}}>Son Kayıtlar</div>
        <div className="data-row data-header"><div>Ad Soyad</div><div>Tarih</div><div className="data-col-right">Grup</div></div>
        {recentRegistrations.length === 0 ? <div style={{padding:"16px 0", fontSize:13, color:C.textMuted, textAlign:"center"}}>Kayıt yok.</div> :
          recentRegistrations.map(s => (
            <div className="data-row" key={`reg-${s.id}`}>
              <div className="data-col" style={{color:C.text}}>{s.name}</div>
              <div className="data-col data-col-sub">{fmtDate(s.courseStart)}</div>
              <div className="data-col data-col-right" style={{color:C.accent}}>{s.groupName || "-"}</div>
            </div>
          ))
        }
      </Card>

      {/* 2. SON ÖDEMELER */}
      <Card style={{padding:"16px", borderRadius:16, boxShadow:"0 4px 20px rgba(0,0,0,0.03)"}}>
        <div style={{fontSize:13, fontWeight:800, color:C.text, marginBottom:16, textTransform:"uppercase", letterSpacing:0.5}}>Son Ödemeler</div>
        <div className="data-row data-header"><div>Ad Soyad</div><div>Tarih</div><div className="data-col-right">Tutar</div></div>
        {recentPay.length === 0 ? <div style={{padding:"16px 0", fontSize:13, color:C.textMuted, textAlign:"center"}}>Ödeme yok.</div> :
          recentPay.map((p, i) => (
            <div className="data-row" key={`pay-${i}`}>
              <div className="data-col" style={{color:C.text}}>{p.studentName}</div>
              <div className="data-col data-col-sub">{fmtDate(p.date)}</div>
              <div className="data-col data-col-right" style={{color:C.success}}>+{Number(p.amount).toLocaleString("tr-TR")} ₺</div>
            </div>
          ))
        }
      </Card>

      {/* 3. BİTİŞİ YAKLAŞANLAR */}
      <Card style={{padding:"16px", borderRadius:16, boxShadow:"0 4px 20px rgba(0,0,0,0.03)", border:`1px solid ${C.warning}40`}}>
        <div style={{fontSize:13, fontWeight:800, color:C.text, marginBottom:16, textTransform:"uppercase", letterSpacing:0.5}}>Kayıt Bitişi Yaklaşanlar</div>
        <div className="data-row data-header"><div>Ad Soyad</div><div>Bitiş Trh.</div><div className="data-col-right">Kalan</div></div>
        {endingSoon.length === 0 ? <div style={{padding:"16px 0", fontSize:13, color:C.textMuted, textAlign:"center"}}>Yaklaşan bitiş yok.</div> : 
          endingSoon.map(s => (
          <div className="data-row" key={`end-${s.id}`}>
            <div className="data-col" style={{color:C.text}}>{s.name}</div>
            <div className="data-col data-col-sub">{fmtDate(s.courseEnd)}</div>
            <div className="data-col data-col-right" style={{color:C.warning}}>{daysLeft(s)} Gün</div>
          </div>
        ))}
      </Card>

    </div>
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   AYARLAR & YETKİLENDİRME (RBAC)
═══════════════════════════════════════════════════════════════ */
function SettingsPage({navItems, clubName, logoUrl, themeColor, sidebarColor, cardColor, textColor, appUsers}){
  const [tab, setTab] = useState(0);

  const [nameVal, setNameVal] = useState(clubName);
  const [logoVal, setLogoVal] = useState(logoUrl);
  const [colorVal, setColorVal] = useState(themeColor);
  const [sidebarColorVal, setSidebarColorVal] = useState(sidebarColor);
  const [cardColorVal, setCardColorVal] = useState(cardColor);
  const [textColorVal, setTextColorVal] = useState(textColor);
  const [saveMsg, setSaveMsg] = useState("");

  const [showUserModal, setShowUserModal] = useState(false);
  const [uForm, setUForm] = useState({ id:null, username:"", password:"", role:"staff", allowedTabs:[] });

  useEffect(() => {
    setNameVal(clubName); setLogoVal(logoUrl); setColorVal(themeColor);
    setSidebarColorVal(sidebarColor); setCardColorVal(cardColor); setTextColorVal(textColor);
  }, [clubName, logoUrl, themeColor, sidebarColor, cardColor, textColor]);

  function saveGeneral(){
    DB.set("clubName", nameVal); DB.set("logoUrl", logoVal); 
    DB.set("themeColor", colorVal); DB.set("sidebarColor", sidebarColorVal); 
    DB.set("cardColor", cardColorVal); DB.set("textColor", textColorVal);
    setSaveMsg("Ayarlar başarıyla kaydedildi."); setTimeout(()=>setSaveMsg(""), 3000);
  }

  function resetColors(){
    setColorVal("#F4F7F6"); setSidebarColorVal("#FFFFFF"); setCardColorVal("#FFFFFF"); setTextColorVal("#1E293B");
  }

  function toggleMenuAccess(menuId) {
    const tabs = uForm.allowedTabs || [];
    if(tabs.includes(menuId)) setUForm({...uForm, allowedTabs: tabs.filter(t=>t!==menuId)});
    else setUForm({...uForm, allowedTabs: [...tabs, menuId]});
  }

  function saveUser() {
    if(!uForm.username || !uForm.password) { alert("Kullanıcı adı ve şifre zorunludur!"); return; }
    if(uForm.username.toLowerCase() === "admin" && uForm.id !== "admin") { alert("'admin' kullanıcı adı rezerve edilmiştir."); return; }
    
    let n = safeArr(appUsers);
    if(uForm.id) n = n.map(u => u.id === uForm.id ? {...uForm} : u);
    else n = [...n, {...uForm, id:Date.now()}];
    DB.set("appUsers", n); setShowUserModal(false);
  }
  function deleteUser(id) {
    if(id === "admin") { alert("Ana yönetici hesabı silinemez!"); return; }
    DB.set("appUsers", safeArr(appUsers).filter(u => u.id !== id));
  }

  return<div style={{padding:16}}>
    <TabBar tabs={["Genel & Renk", "Kullanıcılar & Yetkiler"]} active={tab} onChange={setTab}/>
    
    {tab === 0 && (
      <div>
        <SectionTitle>Genel Kurum Ayarları</SectionTitle>
        <Card>
          <Inp label="Kulüp Adı" value={nameVal} onChange={setNameVal} placeholder="Örn: AquaClub Pro"/>
          <Inp label="Logo URL (İsteğe Bağlı)" value={logoVal} onChange={setLogoVal} placeholder="Örn: https://site.com/logo.png"/>
        </Card>

        <SectionTitle action={<Btn sm variant="ghost" onClick={resetColors}>Açık Temaya Dön</Btn>}>Renk Teması</SectionTitle>
        <Card>
          <div style={{display:"grid", gridTemplateColumns:"1fr", gap:16}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:`1px solid ${C.borderLight}`, paddingBottom:12}}>
              <div><div style={{fontSize:14, fontWeight:700, color:C.text}}>Ana Arkaplan</div><div style={{fontSize:12, color:C.textSub}}>Sayfanın geneli</div></div>
              <input type="color" value={colorVal} onChange={e=>setColorVal(e.target.value)} style={{width:44, height:44, padding:0, border:`1px solid ${C.border}`, borderRadius:8, cursor:"pointer", background:"none"}}/>
            </div>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:`1px solid ${C.borderLight}`, paddingBottom:12}}>
              <div><div style={{fontSize:14, fontWeight:700, color:C.text}}>Yan Menü & Üst Bar</div><div style={{fontSize:12, color:C.textSub}}>Menü alanları</div></div>
              <input type="color" value={sidebarColorVal} onChange={e=>setSidebarColorVal(e.target.value)} style={{width:44, height:44, padding:0, border:`1px solid ${C.border}`, borderRadius:8, cursor:"pointer", background:"none"}}/>
            </div>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:`1px solid ${C.borderLight}`, paddingBottom:12}}>
              <div><div style={{fontSize:14, fontWeight:700, color:C.text}}>Kart & Kutu Rengi</div><div style={{fontSize:12, color:C.textSub}}>Veri kutucukları</div></div>
              <input type="color" value={cardColorVal} onChange={e=>setCardColorVal(e.target.value)} style={{width:44, height:44, padding:0, border:`1px solid ${C.border}`, borderRadius:8, cursor:"pointer", background:"none"}}/>
            </div>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
              <div><div style={{fontSize:14, fontWeight:700, color:C.text}}>Yazı Rengi</div><div style={{fontSize:12, color:C.textSub}}>Genel metinlerin rengi</div></div>
              <input type="color" value={textColorVal} onChange={e=>setTextColorVal(e.target.value)} style={{width:44, height:44, padding:0, border:`1px solid ${C.border}`, borderRadius:8, cursor:"pointer", background:"none"}}/>
            </div>
          </div>
        </Card>
        <Btn full onClick={saveGeneral} style={{marginTop:12, padding:"12px"}}>Değişiklikleri Kaydet</Btn>
        {saveMsg && <div style={{marginTop:12, fontSize:13, color:C.success, textAlign:"center", fontWeight:700}}>{saveMsg}</div>}
      </div>
    )}

    {tab === 1 && (
      <div>
        <SectionTitle action={<Btn sm onClick={()=>{setUForm({ id:null, username:"", password:"", role:"staff", allowedTabs:["dashboard", "attendance"] }); setShowUserModal(true);}}>+ Personel Ekle</Btn>}>Yetkili Kullanıcılar</SectionTitle>
        <div style={{fontSize:13,color:C.textSub,marginBottom:16,lineHeight:1.6}}>Çalışanlarınızın panele girerken kullanacağı şifreleri ve görebilecekleri sayfaları buradan yönetebilirsiniz.</div>
        
        {safeArr(appUsers).map(u => (
          <Card key={u.id} accent={u.role === "admin" ? C.accent : undefined}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
              <div>
                <div style={{fontWeight:800, fontSize:16, color:C.text}}>{u.username} <span style={{fontSize:10, padding:"2px 8px", background:u.role==="admin"?C.accentGlow:C.successBg, color:u.role==="admin"?C.accent:C.success, borderRadius:12, marginLeft:8, verticalAlign:"middle"}}>{u.role==="admin"?"Yönetici":"Çalışan"}</span></div>
                <div style={{fontSize:12, color:C.textSub, marginTop:4, fontWeight:500}}>Şifre: {u.password}</div>
              </div>
              <div style={{display:"flex", gap:8}}>
                <Btn sm variant="secondary" onClick={()=>{setUForm(u); setShowUserModal(true);}}>Düzenle</Btn>
                {u.id !== "admin" && <Btn sm variant="danger" onClick={()=>deleteUser(u.id)}>Sil</Btn>}
              </div>
            </div>
          </Card>
        ))}

        <Modal show={showUserModal} onClose={()=>setShowUserModal(false)} title={uForm.id ? "Kullanıcı Düzenle" : "Yeni Kullanıcı Ekle"}>
          <Inp label="Kullanıcı Adı *" value={uForm.username} onChange={v=>setUForm({...uForm, username:v})} disabled={uForm.id==="admin"} placeholder="Örn: ahmet123"/>
          <Inp label="Giriş Şifresi *" value={uForm.password} onChange={v=>setUForm({...uForm, password:v})} placeholder="••••"/>
          
          {uForm.id !== "admin" && (
            <>
              <div style={{height:1, background:C.border, margin:"20px 0"}}/>
              <div style={{fontSize:14, fontWeight:800, marginBottom:8, color:C.text}}>Görüntüleme Yetkileri</div>
              <div style={{fontSize:12, color:C.textSub, marginBottom:16}}>Bu çalışanın sol menüde görebileceği sayfaları işaretleyin.</div>
              
              <div style={{display:"flex", flexDirection:"column", gap:10}}>
                {NAV_ITEMS.filter(n=>n.id!=="settings").map(nav => (
                  <label key={nav.id} style={{display:"flex", alignItems:"center", gap:12, padding:"12px 16px", background:C.bg, borderRadius:12, border:`1px solid ${(uForm.allowedTabs||[]).includes(nav.id)?C.accent:C.border}`, cursor:"pointer", transition:"border 0.2s"}}>
                    <input type="checkbox" checked={(uForm.allowedTabs||[]).includes(nav.id)} onChange={()=>toggleMenuAccess(nav.id)} style={{width:18, height:18, accentColor:C.accent}} />
                    <span style={{fontSize:14, fontWeight:600, color:C.text}}>{nav.label}</span>
                  </label>
                ))}
              </div>
            </>
          )}
          <div style={{display:"flex", gap:12, marginTop:24}}>
            <Btn variant="secondary" onClick={()=>setShowUserModal(false)} style={{flex:1, padding:"12px"}}>İptal</Btn>
            <Btn onClick={saveUser} style={{flex:2, padding:"12px"}}>Kaydet</Btn>
          </div>
        </Modal>
      </div>
    )}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════════════════ */
function App(){
  const [currentUser, setCurrentUser] = useState(() => {
    try { return JSON.parse(sessionStorage.getItem("aqua_user")); } catch { return null; }
  });
  
  const [isDbLoaded, setIsDbLoaded] = useState(false);
  const [students,setStudents]=useState([]);
  const [staff,setStaff]=useState([]);
  const [stockItems,setStockItems]=useState([]);
  const [expenses,setExpenses]=useState([]);
  
  const [clubName,setClubName]=useState("AquaClub");
  const [appUsers, setAppUsers]=useState([]);
  const [oldPinCode, setOldPinCode]=useState("0309");
  const [waGroupLink,setWaGroupLink]=useState("");
  
  // Varsayılan Açık Tema Renkleri
  const [themeColor,setThemeColor]=useState("#F4F7F6");
  const [sidebarColor,setSidebarColor]=useState("#FFFFFF");
  const [cardColor,setCardColor]=useState("#FFFFFF");
  const [textColor,setTextColor]=useState("#1E293B");
  const [logoUrl,setLogoUrl]=useState("");
  
  const [activeTab,setActiveTab]=useState("dashboard");
  const [sidebarOpen,setSidebarOpen]=useState(false);

  useEffect(() => {
    document.documentElement.style.setProperty('--bg-color', themeColor);
    document.documentElement.style.setProperty('--sidebar-bg', sidebarColor);
    document.documentElement.style.setProperty('--card-bg', cardColor);
    document.documentElement.style.setProperty('--text-main', textColor);
    const metaTheme = document.querySelector('meta[name="theme-color"]');
    if(metaTheme) metaTheme.setAttribute("content", themeColor);
  }, [themeColor, sidebarColor, cardColor, textColor]);

  useEffect(() => {
    const unsub = db.collection("appData").doc("main").onSnapshot((doc) => {
      if (doc.exists) {
        const d = doc.data();
        if (d.students) setStudents(safeArr(d.students));
        if (d.staff) setStaff(safeArr(d.staff));
        if (d.stock) setStockItems(safeArr(d.stock));
        if (d.expenses) setExpenses(safeArr(d.expenses));
        if (d.waGroupLink) setWaGroupLink(d.waGroupLink);
        if (d.clubName) setClubName(d.clubName);
        if (d.pinCode) setOldPinCode(d.pinCode); 
        
        let loadedUsers = safeArr(d.appUsers);
        if (loadedUsers.length === 0) {
           loadedUsers = [{ id:"admin", username:"admin", password: d.pinCode || "0309", role:"admin", allowedTabs: NAV_ITEMS.map(n=>n.id) }];
        }
        setAppUsers(loadedUsers);

        if (d.themeColor) setThemeColor(d.themeColor);
        if (d.sidebarColor) setSidebarColor(d.sidebarColor);
        if (d.cardColor) setCardColor(d.cardColor);
        if (d.textColor) setTextColor(d.textColor);
        if (d.logoUrl) setLogoUrl(d.logoUrl);
      }
      setIsDbLoaded(true);
    });
    return () => unsub();
  }, []);

  if (!isDbLoaded) return <div style={{display:"flex",flexDirection:"column",height:"100vh",alignItems:"center",justifyContent:"center",background:"var(--bg-color)"}}><div className="spinner"></div><div style={{color:"var(--text-main)",fontWeight:700,marginTop:10}}>Sistem Yükleniyor...</div></div>;
  
  if (!currentUser) return <LoginScreen onSuccess={(user) => { sessionStorage.setItem("aqua_user", JSON.stringify(user)); setCurrentUser(user); }} appUsers={appUsers} adminPin={oldPinCode} />;

  const visibleNav = NAV_ITEMS.filter(n => {
    if (currentUser.role === "admin") return true;
    return (currentUser.allowedTabs || []).includes(n.id);
  });

  return<div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg-color)"}}>
    <div className="sidebar-desktop" style={{width:240, background:"var(--sidebar-bg)", borderRight:"1px solid var(--border-color)", display:"flex", flexDirection:"column", boxShadow:"2px 0 10px rgba(0,0,0,0.02)", zIndex:100}}>
      <div style={{padding:"24px 20px 20px", borderBottom:"1px solid var(--border-color)", display:"flex", alignItems:"center", gap:12}}>
        <div style={{width:38,height:38,borderRadius:10,background:`linear-gradient(135deg,${C.accent},${C.accentDark})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,overflow:"hidden",boxShadow:"0 2px 8px "+C.accentGlow}}>
          {logoUrl ? <img src={logoUrl} alt="Logo" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={(e)=>{e.target.style.display='none'}}/> : <span style={{color:"white", fontWeight:800, fontSize:15}}>AC</span>}
        </div>
        <div>
          <div style={{fontSize:15,fontWeight:800,letterSpacing:-0.3,color:"var(--text-main)"}}>{clubName}</div>
          <div style={{fontSize:11,color:C.textSub,fontWeight:600,marginTop:2}}>{currentUser.role==="admin"?"Yönetici":currentUser.username}</div>
        </div>
      </div>
      
      <div style={{flex:1, overflowY:"auto", padding:"16px 12px"}}>
        {visibleNav.map(item=><button key={item.id} onClick={()=>{setActiveTab(item.id);setSidebarOpen(false);}} style={{display:"flex",alignItems:"center",gap:12,width:"100%", padding:"12px 14px", marginBottom:6, background:activeTab===item.id?C.accentGlow:"transparent", border:"none", borderRadius:12, color:activeTab===item.id?C.accentDark:C.textSub, cursor:"pointer", textAlign:"left", fontSize:14, fontWeight:activeTab===item.id?700:500, transition:"all 0.2s"}}><Icon d={item.icon} size={18}/> {item.label}</button>)}
      </div>
      <div style={{padding:"16px", borderTop:"1px solid var(--border-color)"}}>
        <button onClick={()=>{sessionStorage.removeItem("aqua_user"); window.location.reload();}} style={{width:"100%", padding:"12px", background:C.dangerBg, borderRadius:12, border:"none", color:C.danger, fontWeight:700, cursor:"pointer", fontSize:13, transition:"background 0.2s"}}>Güvenli Çıkış Yap</button>
      </div>
    </div>
    
    <div style={{flex:1, display:"flex", flexDirection:"column", overflow:"hidden", position:"relative"}}>
      {sidebarOpen && <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.4)",zIndex:300,backdropFilter:"blur(2px)"}} onClick={()=>setSidebarOpen(false)}/>}
      {sidebarOpen && <div style={{position:"absolute",top:0,bottom:0,left:0,zIndex:400,width:260,background:"var(--sidebar-bg)",boxShadow:"4px 0 24px rgba(0,0,0,0.1)"}}>
        <div style={{padding:"24px", borderBottom:"1px solid var(--border-color)", fontWeight:800, fontSize:18, color:"var(--text-main)"}}>{clubName}</div>
        <div style={{padding:"16px 12px"}}>
          {visibleNav.map(item=><button key={item.id} onClick={()=>{setActiveTab(item.id);setSidebarOpen(false);}} style={{display:"flex",alignItems:"center",gap:12,width:"100%", padding:"14px", marginBottom:8, background:activeTab===item.id?C.accentGlow:"transparent", border:"none", borderRadius:12, color:activeTab===item.id?C.accentDark:C.textSub, cursor:"pointer", textAlign:"left", fontSize:15, fontWeight:activeTab===item.id?700:500}}><Icon d={item.icon} size={20}/> {item.label}</button>)}
        </div>
      </div>}

      <div style={{padding:"16px 20px", background:"var(--sidebar-bg)", borderBottom:"1px solid var(--border-color)", fontWeight:800, fontSize:16, display:"flex", alignItems:"center", gap:16, color:"var(--text-main)", zIndex:50}}>
        <button onClick={()=>setSidebarOpen(true)} className="menu-btn" style={{background:"transparent", border:`1px solid var(--border-color)`, color:"var(--text-main)", width:36, height:36, borderRadius:10, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center"}}>☰</button>
        {(visibleNav.find(n=>n.id===activeTab)||{}).label||"Genel Bakış"}
      </div>
      
      <div style={{flex:1, overflowY:"auto", paddingBottom:40}}>
        {activeTab==="dashboard"&&<Dashboard students={students} stockItems={stockItems} expenses={expenses}/>}
        {activeTab==="students"&&<StudentsPage students={students} stockItems={stockItems}/>}
        {activeTab==="attendance"&&<AttendancePage students={students}/>}
        {activeTab==="payments"&&<PaymentsPage students={students}/>}
        {activeTab==="expenses"&&<ExpensesPage expenses={expenses}/>}
        {activeTab==="whatsapp"&&<WhatsAppPage students={students} waGroupLink={waGroupLink} />}
        {activeTab==="staff"&&<StaffPage staff={staff}/>}
        {activeTab==="inventory"&&<InventoryPage items={stockItems}/>}
        
        {activeTab==="settings" && currentUser.role === "admin" && (
          <SettingsPage navItems={NAV_ITEMS} clubName={clubName} logoUrl={logoUrl} themeColor={themeColor} sidebarColor={sidebarColor} cardColor={cardColor} textColor={textColor} appUsers={appUsers} />
        )}
      </div>
    </div>
    <style>{`@media(max-width:768px){.sidebar-desktop{display:none!important}} @media(min-width:769px){.menu-btn{display:none!important}}`}</style>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));}</script>
</body>
</html>
