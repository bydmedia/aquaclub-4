/* 🌟 PREMIUM DARK MODE (KARANLIK TEMA) SAAS MİMARİSİ 🌟 */
:root {
  --bg-color: #0B1120;         /* En arka plan - Koyu gece mavisi/siyah */
  --sidebar-bg: #111827;       /* Yan menü - Koyu arduvaz */
  --card-bg: #1F2937;          /* Kartlar - Bir tık açık arduvaz */
  
  --text-main: #F9FAFB;        /* Ana yazılar - Kar beyazı */
  --text-sub: #9CA3AF;         /* Alt yazılar - Açık gri */
  
  --accent: #3B82F6;           /* Ana Vurgu Rengi - Parlak Mavi */
  --accent-hover: #60A5FA;     
  --accent-light: rgba(59, 130, 246, 0.15); 
  
  --border: #374151;           /* Çizgiler - Koyu gri */
  
  --success: #10B981;          /* Başarılı - Zümrüt Yeşili */
  --success-bg: rgba(16, 185, 129, 0.15);
  
  --danger: #EF4444;           /* Hata/Sil - Kırmızı */
  --danger-bg: rgba(239, 68, 68, 0.15);

  --warning: #F59E0B;          /* Uyarı - Turuncu */
  --warning-bg: rgba(245, 158, 11, 0.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg-color);transition:background 0.3s ease;}
body{
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  overscroll-behavior:none;color:var(--text-main);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;
}
#root{height:100%}

/* Karanlık temada takvimin daha iyi görünmesi için invert */
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.8)}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#4B5563;border-radius:10px}

/* KURUMSAL FORM ELEMANLARI (DARK MODE) */
.corp-inp {
  width: 100%; padding: 10px 14px; background-color: var(--bg-color); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-main); font-size: 13px; font-weight: 500;
  transition: all 0.2s; outline: none; font-family: inherit;
}
.corp-inp:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
.corp-inp::placeholder { color: #6B7280; }
.corp-inp:disabled { background-color: #111827; cursor: not-allowed; opacity: 0.7; }

/* Karanlık Mod Select Seçenekleri */
select.corp-inp option { background-color: var(--card-bg); color: var(--text-main); }

.corp-btn {
  padding: 10px 16px; border-radius: 6px; border: 1px solid transparent; cursor: pointer; font-weight: 600;
  font-size: 13px; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; outline: none;
}
.corp-btn:active { transform: scale(0.98); }
.corp-btn-primary { background: var(--accent); color: #fff; }
.corp-btn-primary:hover { background: var(--accent-hover); }
.corp-btn-secondary { background: var(--bg-color); border-color: var(--border); color: var(--text-main); }
.corp-btn-secondary:hover { background: #111827; }
.corp-btn-danger { background: var(--danger-bg); border-color: rgba(239, 68, 68, 0.3); color: var(--danger); }
.corp-btn-danger:hover { background: rgba(239, 68, 68, 0.25); }
.corp-btn-success { background: var(--success-bg); border-color: rgba(16, 185, 129, 0.3); color: var(--success); }
.corp-btn-success:hover { background: rgba(16, 185, 129, 0.25); }

.corp-card {
  background: var(--card-bg); border-radius: 8px; padding: 20px; margin-bottom: 16px;
  border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
}

.spinner {border: 4px solid rgba(255,255,255,0.05); border-left-color: var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 16px;}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

.list-row {
  display: grid; grid-template-columns: 2.5fr 1.5fr 1.5fr 1.5fr 1fr; gap: 16px; align-items: center; 
  padding: 16px 20px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; 
  margin-bottom: 8px; transition: all 0.2s;
}
.list-row:hover { border-color: var(--text-sub); background: #111827; }
.list-header {
  display: grid; grid-template-columns: 2.5fr 1.5fr 1.5fr 1.5fr 1fr; gap: 16px; align-items: center; 
  padding: 12px 20px; background: var(--sidebar-bg); border: 1px solid var(--border); border-radius: 8px; 
  font-weight: 700; color: var(--text-sub); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;
}
@media (max-width: 900px) {
  .list-row, .list-header { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
  .list-header { display: none; }
}

function safeArr(val) { 
  if (!val) return [];
  return (Array.isArray(val) ? val : Object.values(val)).filter(item => item !== null && item !== undefined);
}

const DB={
  set:(k,v)=>{

    db.collection("appData").doc("main").set({ [k]: cleanV }, { merge: true }).catch(console.error);
  }
};

function fmtDate(d){
  if(!d || typeof d !== 'string') return "—";
  try {
    const parts = d.split("-");
    if(parts.length !== 3) return d;
    return `${parts[2]}.${parts[1]}.${parts[0]}`;
  } catch(e) { return d; }
}

function sortDateDesc(a, b) {
  const da = new Date(a.date || 0).getTime();
  const db = new Date(b.date || 0).getTime();
  return (isNaN(db) ? 0 : db) - (isNaN(da) ? 0 : da);
}

function totalPaid(s){return safeArr(s?.payments).reduce((t,p)=>t+Number(p.amount||0),0);}
function equipmentTotal(s){return safeArr(s?.equipment).reduce((t,e)=>t+Number(e.price||0),0);}
function monthlyTotal(s){return Number(s?.monthlyFee||0)-Number(s?.discount||0)+equipmentTotal(s)+(s?.hasTransport?Number(s?.transportFee||0):0);}
function courseStatus(s){
  if(!s?.courseStart||!s?.courseEnd)return"unknown";
  const now=new Date(TODAY),st=new Date(s.courseStart),en=new Date(s.courseEnd);
  if(now<st)return"upcoming";if(now>en)return"ended";return"active";
}
function daysLeft(s){
  try { return Math.ceil((new Date(s?.courseEnd)-new Date(TODAY))/86400000); } catch(e){ return 0; }
}
function attendanceCount(s){return Object.values(s?.attendance||{}).filter(Boolean).length}
function age(dob){
  if(!dob)return"—";
  try { return Math.floor((Date.now()-new Date(dob))/31557600000)+" Yaş"; } catch(e){ return "—"; }
}

function calcEndDate(start,total,days){
  try {
    if(!start||!total||!days||days.length===0)return"";
    let d=new Date(start);
    if(isNaN(d.getTime())) return ""; 
    let cnt=0,iter=0;
    const safeDays = safeArr(days).map(Number);
    while(cnt<total && iter<total*30){
      if(safeDays.includes(d.getDay())) cnt++;
      if(cnt<total) d.setDate(d.getDate()+1);
      iter++;
    }
    return d.toISOString().split("T")[0];
  } catch(e) { return ""; }
}

function calcRemainingSessions(s) {
  try {
    if (!s || !s.courseStart || !s.totalSessions || !s.weekDays || s.weekDays.length === 0) return 0;
    const total = Number(s.totalSessions || 0);
    const start = new Date(s.courseStart);
    if(isNaN(start.getTime())) return 0; 
    
    const end = s.courseEnd ? new Date(s.courseEnd) : new Date(TODAY);
    const current = new Date(TODAY);
    let targetEnd = current < end ? current : end;
    if (targetEnd < start) return total;
    
    let passedSessions = 0;
    let iter = new Date(start);
    const safeDays = safeArr(s.weekDays).map(Number);
    
    while (iter <= targetEnd && passedSessions < total) {
      if (safeDays.includes(iter.getDay())) passedSessions++;
      iter.setDate(iter.getDate() + 1);
    }
    return Math.max(0, total - passedSessions);
  } catch(e) { return 0; }
}

function openWA(phone, text) {
  if (!phone) { alert("Sisteme kayıtlı telefon bulunamadı."); return; }
  try {
    let p = phone.toString().replace(/\D/g, "");
    if (p.startsWith("0")) p = "90" + p.slice(1);
    else if (p.length === 10) p = "90" + p;
    window.open(`https://wa.me/${p}?text=${encodeURIComponent(text)}`, "_blank");
  } catch(e) { alert("Telefon numarası hatalı."); }
}

function exportCSV(filename, headers, rows) {
  const bom = "\uFEFF"; 
  const csv = [headers.join(","), ...rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(","))].join("\n");
  const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename + ".csv";
  link.click();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  render() {
    if (this.state.hasError) {
      return <div style={{padding:"40px", textAlign:"center"}}>
        <div style={{display:"inline-block", background:"var(--danger-bg)", color:"var(--danger)", padding:"20px 30px", border:"1px solid var(--danger)", borderRadius:"8px"}}>
          <h3 style={{margin:"0 0 10px 0"}}>Modül Yüklenirken Bir Hata Oluştu</h3>
          <p style={{margin:0, fontSize:"13px"}}>{this.state.error?.toString()}</p>
          <button onClick={()=>this.setState({hasError:false})} style={{marginTop:"15px", padding:"8px 16px", background:"var(--danger)", color:"#fff", border:"none", borderRadius:"4px", cursor:"pointer", fontWeight:"bold"}}>Tekrar Dene</button>
        </div>
      </div>;
    }
    return this.props.children;
  }
}

function StatCard({label,value,col,span2}){

function TabBar({tabs,active,onChange}){

    {tabs.map((t,i)=><button key={i} type="button" onClick={()=>onChange(i)} style={{padding:"10px 16px",background:active===i?"var(--bg-color)":"transparent",border:"1px solid", borderColor:active===i?"var(--border)":"transparent", borderBottom:"none", borderRadius:"6px 6px 0 0",color:active===i?"var(--accent)":"var(--text-sub)",cursor:"pointer",fontWeight:600,fontSize:13,fontFamily:"inherit",whiteSpace:"nowrap",transition:"all 0.2s"}}>{t}</button>)}

function DayPicker({value=[],onChange}){
  const safeVal = safeArr(value).map(Number);
  return<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
    {DAYS_TR.map((d,i)=>{const on=safeVal.includes(i);return<button key={i} type="button" onClick={()=>onChange(on?safeVal.filter(x=>x!==i):[...safeVal,i].sort())}

}

function Modal({show,onClose,title,children}){

  return<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,backgroundColor:"rgba(17, 24, 39, 0.8)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:16}}>
    <div style={{background:"var(--card-bg)",border:"1px solid var(--border)",borderRadius:8,padding:"24px",width:"100%",maxWidth:600,height:"650px",minHeight:"650px",display:"flex",flexDirection:"column",boxShadow:"0 20px 25px -5px rgba(0,0,0,0.3)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexShrink:0,borderBottom:`1px solid var(--border)`,paddingBottom:12}}>
        <div style={{fontSize:16,fontWeight:700,color:"var(--text-main)",letterSpacing:-0.3}}>{title}</div>
        <button type="button" onClick={onClose} style={{background:"var(--bg-color)",border:`1px solid var(--border)`,color:"var(--text-sub)",width:32,height:32,borderRadius:6,cursor:"pointer",fontSize:18,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      </div>
      <div style={{flex:1,overflowY:"auto",paddingRight:8,minHeight:0}}>{children}</div>

  </div>
}

function LoginScreen({ onSuccess, appUsers, adminPin }) {
  const [user, setUser] = useState("");
  const [pass, setPass] = useState("");
  const [err, setErr] = useState(false);

  const handleLogin = (e) => {
    e.preventDefault();
    if (user.toLowerCase() === "admin" && (pass === "0309" || pass === adminPin)) {
      onSuccess({ id: 'admin', username: 'admin', role: 'admin', allowedTabs: NAV_ITEMS.map(n=>n.id) });
      return;
    }
    const foundUser = safeArr(appUsers).find(u => u.username.toLowerCase() === user.toLowerCase() && u.password === pass);
    if (foundUser) { onSuccess(foundUser); return; }
    setErr(true); setTimeout(() => setErr(false), 2000);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"var(--bg-color)",padding:20}}>
      <div style={{fontSize:36, fontWeight:700, color:"var(--accent)", marginBottom:30, letterSpacing:-1}}>AquaClub Pro</div>
      <form onSubmit={handleLogin} style={{background:"var(--card-bg)",padding:"40px 30px",borderRadius:8,border:`1px solid ${err?"var(--danger)":"var(--border)"}`,textAlign:"center",boxShadow:"0 4px 6px -1px rgba(0,0,0,0.1)",width:"100%",maxWidth:340, transition:"all 0.3s"}}>
        <div style={{fontSize:16,fontWeight:600,marginBottom:24,color:"var(--text-main)"}}>Kurumsal Giriş</div>
        <Inp value={user} onChange={setUser} placeholder="Kullanıcı Adı" autoFocus style={{textAlign:"center", fontSize:14}}/>
        <Inp value={pass} onChange={setPass} type="password" placeholder="Şifre" style={{textAlign:"center", fontSize:14, letterSpacing:4}}/>
        <Btn full type="submit" onClick={handleLogin} style={{marginTop:12}}>Giriş Yap</Btn>
        <div style={{height: 20, marginTop: 16}}>{err && <div style={{color:"var(--danger)",fontSize:13,fontWeight:600}}>Hatalı Bilgi Girdiniz!</div>}</div>
      </form>
    </div>
  );
}

function EqPicker({stockItems,current,onAdd,onRemove}){
  const [sel,setSel]=useState(""); const safeStock = safeArr(stockItems);
  return<div>
    <div style={{display:"flex",gap:10,marginBottom:12}}>
      <select className="corp-inp" style={{flex:1}} value={sel} onChange={e=>setSel(e.target.value)}>
        <option value="">Ekipman seçin...</option>
        {safeStock.filter(s=>Number(s.stock)>0).map(s=><option key={s.id} value={s.id}>{s.name} — {Number(s.price).toLocaleString("tr-TR")} ₺</option>)}
      </select>
      <Btn onClick={()=>{if(!sel)return;const item=safeStock.find(s=>String(s.id)===String(sel));if(item)onAdd({name:item.name,price:item.price,stockId:item.id});setSel("");}}>Ekle</Btn>
    </div>
    {safeArr(current).map(e=><div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"var(--bg-color)",borderRadius:6,border:"1px solid var(--border)",marginBottom:8}}>
      <div><div style={{fontSize:13,fontWeight:600,color:"var(--text-main)"}}>{e.name}</div><div style={{fontSize:11,color:"var(--text-sub)"}}>{fmtDate(e.addedDate)}</div></div>
      <div style={{display:"flex",alignItems:"center",gap:16}}><span style={{color:"var(--warning)",fontWeight:700,fontSize:14}}>{Number(e.price).toLocaleString("tr-TR")} ₺</span><button type="button" onClick={()=>onRemove(e.id)} style={{background:"var(--danger-bg)",border:"1px solid rgba(239,68,68,0.3)",color:"var(--danger)",cursor:"pointer",fontSize:12,width:26,height:26,borderRadius:4,fontWeight:700}}>X</button></div>
    </div>)}
  </div>
}

function RoutesManager({routes, setRoutes, onClose}) {
  const [f, setF] = useState({id:null, routeName:"", driverName:"", driverPhone:"", neighborhoods:""});
  const safeRoutes = safeArr(routes);

  function save() {
    if(!f.routeName || !f.driverName) return;
    const n = f.id ? safeRoutes.map(r=>r.id===f.id?{...f}:r) : [...safeRoutes,{...f, id:Date.now()}];
    DB.set("routes", n);
    setRoutes(n);
    setF({id:null, routeName:"", driverName:"", driverPhone:"", neighborhoods:""});
  }

  return <div>
    <div style={{display:"flex", gap:12, marginBottom:16}}>
      <div style={{flex:1}}>
        <Inp label="Rota Adı *" value={f.routeName} onChange={v=>setF({...f,routeName:v.toLocaleUpperCase("tr-TR")})} placeholder="Örn: 1. BÖLGE"/>
        <Inp label="Şoför Adı Soyadı *" value={f.driverName} onChange={v=>setF({...f,driverName:v.toLocaleUpperCase("tr-TR")})}/>
      </div>
      <div style={{flex:1}}>
        <Inp label="Şoför Telefonu" value={f.driverPhone} onChange={v=>setF({...f,driverPhone:v})}/>
        <Inp label="Gittiği Mahalleler (Virgülle Ayırın)" value={f.neighborhoods} onChange={v=>setF({...f,neighborhoods:v.toLocaleUpperCase("tr-TR")})} placeholder="ÇAYDAÇIRA, SÜRSÜRÜ..."/>
      </div>
    </div>
    <Btn full onClick={save} style={{marginBottom:24}}>{f.id ? "Rotayı Güncelle" : "Yeni Rota Kaydet"}</Btn>
    
    <div style={{fontSize:11, fontWeight:700, color:"var(--text-sub)", marginBottom:10, textTransform:"uppercase"}}>Mevcut Rotalar</div>
    {safeRoutes.length === 0 ? <div style={{textAlign:"center", padding:"20px 0", color:"var(--text-sub)", fontWeight:500}}>Kayıtlı rota bulunmuyor.</div> : 
      safeRoutes.map(r=><Card key={r.id} style={{padding:"12px 16px", marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontWeight:700,fontSize:14,color:"var(--text-main)",display:"flex",alignItems:"center",gap:6}}><Icon name="mapPin" size={14} color="var(--accent)"/> {r.routeName}</div>
            <div style={{fontSize:12,color:"var(--text-sub)",fontWeight:500,marginTop:4}}>Şoför: {r.driverName} ({r.driverPhone})</div>
            <div style={{fontSize:11,color:"var(--text-main)",fontWeight:600,marginTop:4, background:"var(--bg-color)", padding:"4px 8px", borderRadius:4, display:"inline-block", border:"1px solid var(--border)"}}>Mahalleler: {r.neighborhoods}</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <Btn sm variant="secondary" onClick={()=>{setF(r);}}>Düzenle</Btn>
            <Btn sm variant="danger" onClick={()=>{if(confirm('Rota silinsin mi?')) { const n = safeRoutes.filter(x=>x.id!==r.id); DB.set("routes",n); setRoutes(n); }}}>Sil</Btn>
          </div>
        </div>
      </Card>)
    }
  </div>
}

function StudentForm({initial,onSave,onCancel,stockItems,students,routes}){
  const [tab,setTab]=useState(0);
  const [f,setF]=useState({...EMPTY_S,...initial});
  const [isNewGroup, setIsNewGroup]=useState(false); 

  const existingGroups = Array.from(new Set(safeArr(students).map(s=>s.groupName).filter(Boolean)));
  const safeRoutes = safeArr(routes);

  const u=(k,v)=>{
    if(typeof v === "string" && !["dob","courseStart","courseEnd","guardianPhone1","guardianPhone2"].includes(k)){
      v = v.toLocaleUpperCase("tr-TR");
    }
    setF(p=>({...p,[k]:v}));
  };

  const currentEq = safeArr(f.equipment);
  const safeWeekDays = safeArr(f.weekDays);

  useEffect(()=>{
    try {
      if(f.courseStart && f.totalSessions && safeWeekDays.length > 0){
        const endDate = calcEndDate(f.courseStart, Number(f.totalSessions), safeWeekDays);
        if(endDate && endDate !== f.courseEnd) u("courseEnd", endDate);
      }
    } catch(err) {}
  },[f.courseStart,f.totalSessions,JSON.stringify(safeWeekDays)]);

  const handleAddressChange = (val) => {
    u("address", val);
    if(val.length > 3) {
       const vLower = val.toLowerCase();
       const match = safeRoutes.find(r => {
          const mahalleler = (r.neighborhoods||"").toLowerCase().split(",").map(x=>x.trim()).filter(Boolean);
          return mahalleler.some(m => vLower.includes(m));
       });
       if(match) {
          u("driverName", match.driverName);
          u("driverPhone", match.driverPhone);
       }
    }
  };

  function handleSave(){
    if(!f.name){alert("Öğrenci adı girmeden kayıt yapılamaz.");return;}
    let finalF = {...f};
    if(Number(finalF.initialPaymentAmount) > 0) {
       const newPayment = { id: Date.now(), amount: Number(finalF.initialPaymentAmount), date: finalF.initialPaymentDate || TODAY, note: "Kayıt Esnası İlk Ödeme" };
       finalF.payments = [...safeArr(finalF.payments), newPayment];
       finalF.initialPaymentAmount = ""; 
    }
    onSave(finalF);
  }

  return<div>
    <TabBar tabs={["Kişisel","Kurs Bilgisi","Servis","Ekipman", "Ödeme"]} active={tab} onChange={setTab}/>
    
    {tab===0&&<div>
      <Inp label="Ad Soyad *" value={f.name} onChange={v=>u("name",v)} autoFocus/>
      <Inp label="Doğum Tarihi" value={f.dob} onChange={v=>u("dob",v)} type="date"/>
      <div style={{height:1,background:"var(--bg-color)",margin:"16px 0"}}/>
      <Inp label="Veli Adı Soyadı" value={f.guardianName} onChange={v=>u("guardianName",v)}/>
      <div style={{display:"flex",gap:12}}>
        <Inp label="Veli Tel 1" value={f.guardianPhone1} onChange={v=>u("guardianPhone1",v)} type="tel" half/>
        <Inp label="Veli Tel 2" value={f.guardianPhone2} onChange={v=>u("guardianPhone2",v)} type="tel" half/>
      </div>
      <Inp label="Özel Notlar" value={f.notes} onChange={v=>u("notes",v)} rows={2}/>
    </div>}

    {tab===1&&<div>
      <div style={{display:"flex",gap:12}}>
        <div style={{flex:1}}><Sel label="Yüzme Seviyesi" value={f.swimLevel} onChange={v=>u("swimLevel",v)} options={[{value:"BAŞLANGIÇ",label:"Başlangıç"},{value:"ORTA",label:"Orta"},{value:"İLERİ",label:"İleri"},{value:"YARIŞMACI",label:"Yarışmacı"}]}/></div>
        <div style={{flex:1}}><Inp label="Havuz Kulvarı" value={f.poolLane} onChange={v=>u("poolLane",v)}/></div>
      </div>
      
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,color:"var(--text-sub)",marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>Grup / Sınıf Adı</div>
        {!isNewGroup ? (
          <select className="corp-inp" value={f.groupName} onChange={e => {
            if(e.target.value === "___NEW___") { setIsNewGroup(true); u("groupName", ""); }
            else { u("groupName", e.target.value); }
          }}>
            <option value="">Grup Seçiniz...</option>
            {existingGroups.map(g=><option key={g} value={g}>{g}</option>)}
            <option value="___NEW___" style={{fontWeight:700, color:"var(--accent)"}}>+ YENİ GRUP EKLE...</option>
          </select>
        ) : (
          <div style={{display:"flex", gap:10}}>
            <input className="corp-inp" style={{flex:1}} placeholder="Yeni grubun adını yazın..." value={f.groupName} onChange={e=>u("groupName", e.target.value.toLocaleUpperCase("tr-TR"))} autoFocus/>
            <Btn variant="secondary" onClick={()=>{setIsNewGroup(false); u("groupName","");}}>İptal</Btn>
          </div>
        )}
      </div>

      <div style={{height:1,background:"var(--bg-color)",margin:"16px 0"}}/>
      <div style={{fontSize:11,color:"var(--text-sub)",marginBottom:8,fontWeight:700,textTransform:"uppercase"}}>Haftalık Antrenman Günleri *</div>
      <DayPicker value={safeWeekDays} onChange={v=>u("weekDays",v)}/>
      
      <div style={{display:"flex",gap:12}}>
        <div style={{flex:1}}><Inp label="Kayıt Başlangıç *" value={f.courseStart} onChange={v=>u("courseStart",v)} type="date"/></div>
        <div style={{flex:1}}><Inp label="Toplam Seans *" value={f.totalSessions} onChange={v=>u("totalSessions",v)} type="number"/></div>
      </div>
      
      <div style={{background:"var(--accent-light)", padding:"12px 16px", borderRadius:6, marginBottom:16, border:`1px solid var(--accent)`}}>
        <div style={{fontSize:11,color:"var(--accent)",fontWeight:700,textTransform:"uppercase"}}>Sistemin Hesapladığı Bitiş Tarihi</div>
        <div style={{fontSize:16,fontWeight:700,color:"var(--text-main)",marginTop:4}}>{fmtDate(f.courseEnd)||"—"}</div>
      </div>
      
      <div style={{display:"flex",gap:12}}>
        <div style={{flex:1}}><Inp label="Aylık Ücret (₺)" value={f.monthlyFee} onChange={v=>u("monthlyFee",v)} type="number"/></div>
        <div style={{flex:1}}><Inp label="İndirim (₺)" value={f.discount} onChange={v=>u("discount",v)} type="number"/></div>
      </div>
      <Inp label="Ödeme Özel Notu" value={f.paymentNote} onChange={v=>u("paymentNote",v)}/>
    </div>}
    
    {tab===2&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 0",borderBottom:`1px solid var(--bg-color)`,marginBottom:16}}>
        <div><div style={{fontWeight:600,fontSize:14,color:"var(--text-main)"}}>Servis Kullanıyor mu?</div></div>
        <Toggle checked={f.hasTransport} onChange={v=>u("hasTransport",v)}/>
      </div>
      {f.hasTransport?
        <div style={{display:"flex", gap:20}}>
          <div style={{flex:1}}>
            <Inp label="Öğrenci Adresi (Mahalle vb.)" value={f.address} onChange={handleAddressChange} rows={2} placeholder="Adres yazarken şoför otomatik eşleşir..."/>
            <Inp label="Aylık Servis Ücreti (₺)" value={f.transportFee} onChange={v=>u("transportFee",v)} type="number"/>
            <div style={{height:1,background:"var(--bg-color)",margin:"16px 0"}}/>
            <Inp label="Şoför Adı" value={f.driverName} onChange={v=>u("driverName",v)}/>
            <Inp label="Şoför Tel" value={f.driverPhone} onChange={v=>u("driverPhone",v)} type="tel"/>
          </div>
          <div style={{width: 240, background:"var(--bg-color)", padding:"16px", borderRadius:6, border:"1px solid var(--border)", overflowY:"auto", maxHeight:300}}>
            <div style={{fontSize:11, fontWeight:700, color:"var(--text-sub)", textTransform:"uppercase", marginBottom:12}}>Manuel Rota Seç</div>
            {safeRoutes.length === 0 ? <div style={{fontSize:12, color:"var(--text-sub)"}}>Rota bulunmuyor.</div> : 
              <div style={{display:"flex", flexDirection:"column", gap:8}}>
                {safeRoutes.map(r=>{
                  const isSelected = f.driverName === r.driverName && f.driverPhone === r.driverPhone;
                  return <button key={r.id} type="button" onClick={()=>{u("driverName", r.driverName); u("driverPhone", r.driverPhone);}} 
                    style={{padding:"12px", background:isSelected ? "var(--accent-light)" : "var(--card-bg)", border:isSelected ? "1px solid var(--accent)" : "1px solid var(--border)", borderRadius:6, cursor:"pointer", textAlign:"left", transition:"all 0.2s", position:"relative", display:"flex", flexDirection:"column"}}>
                    {isSelected && <div style={{position:"absolute", top:10, right:10, color:"var(--accent)"}}><Icon name="check" size={16}/></div>}
                    <div style={{fontSize:12, fontWeight:700, color:isSelected?"var(--accent)":"var(--text-main)", paddingRight:20}}>{r.routeName}</div>
                    <div style={{fontSize:11, color:"var(--text-sub)", marginTop:4, lineHeight:1.4, wordBreak:"break-word", whiteSpace:"normal"}}>{r.neighborhoods || "Mahalle girilmedi."}</div>
                    <div style={{fontSize:11, color:isSelected?"var(--accent)":"var(--text-main)", marginTop:6, fontWeight:600, background:isSelected?"var(--bg-color)":"var(--bg-color)", padding:"4px 6px", borderRadius:4, alignSelf:"flex-start"}}>{r.driverName}</div>
                  </button>
                })}
              </div>
            }
          </div>
        </div>
      :<div style={{textAlign:"center",padding:"40px 0",color:"var(--text-sub)",fontWeight:500}}>Öğrenci servis kullanmıyor.</div>}
    </div>}
    
    {tab===3&&<div>
      <div style={{fontSize:12,color:"var(--text-sub)",marginBottom:16,fontWeight:500}}>Öğrencinin kurumdan satın aldığı ekstra ekipmanlar faturasına yansıtılır.</div>
      <EqPicker stockItems={stockItems} current={currentEq} onAdd={(item)=>u("equipment",[...currentEq,{id:Date.now(),...item,addedDate:TODAY}])} onRemove={(id)=>u("equipment",currentEq.filter(e=>e.id!==id))}/>
    </div>}

    {tab===4&&<div>
      <div style={{fontSize:12,color:"var(--text-sub)",marginBottom:16,fontWeight:500}}>Kayıt anında nakit veya kart ile alınan ilk ödemeyi buraya girebilirsiniz.</div>
      <div style={{display:"flex",gap:12}}>
        <div style={{flex:1}}><Inp label="Şu An Yapılan Ödeme (₺)" value={f.initialPaymentAmount} onChange={v=>u("initialPaymentAmount",v)} type="number"/></div>
        <div style={{flex:1}}><Inp label="Ödeme Tarihi" value={f.initialPaymentDate} onChange={v=>u("initialPaymentDate",v)} type="date"/></div>
      </div>
      <div style={{background:"var(--bg-color)", border:`1px solid var(--border)`, borderRadius:6, padding:"16px", marginTop:20}}>
         <div style={{fontSize:11, fontWeight:700, color:"var(--text-main)", marginBottom:12, textTransform:"uppercase"}}>Maliyet Özeti</div>
         <Row label="Aylık Kurs Ücreti" val={`${Number(f.monthlyFee||0)} ₺`}/>
         {Number(f.discount)>0 && <Row label="İndirim" val={`-${Number(f.discount)} ₺`} col="var(--danger)"/>}
         {f.hasTransport && <Row label="Servis Ücreti" val={`${Number(f.transportFee||0)} ₺`}/>}
         {safeArr(f.equipment).length>0 && <Row label="Ekipmanlar Toplamı" val={`${safeArr(f.equipment).reduce((t,e)=>t+Number(e.price||0),0)} ₺`}/>}
         <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:12, paddingTop:12, borderTop:"1px solid var(--border)"}}>
           <span style={{fontSize:13, fontWeight:700, color:"var(--text-main)"}}>TOPLAM ÖDENMESİ GEREKEN</span>
           <span style={{fontSize:18, fontWeight:700, color:"var(--accent)"}}>{(Number(f.monthlyFee||0) - Number(f.discount||0) + (f.hasTransport?Number(f.transportFee||0):0) + safeArr(f.equipment).reduce((t,e)=>t+Number(e.price||0),0)).toLocaleString("tr-TR")} ₺</span>
         </div>
      </div>
    </div>}
    
    <div style={{display:"flex",gap:12,marginTop:24}}>
      <Btn variant="secondary" onClick={onCancel} style={{flex:1}}>İptal Et</Btn>
      <Btn onClick={handleSave} style={{flex:2}}>Kaydı Tamamla</Btn>
    </div>
  </div>
}

/* ═══════════════════════════════════════════════════════════════

function StudentsPage({students, stockItems, routes, setRoutes}){
  const [search,setSearch]=useState(""); 
  const [groupFilter,setGroupFilter]=useState("ALL");
  const [payFilter,setPayFilter]=useState("ALL");
  
  const [showAdd,setShowAdd]=useState(false); 
  const [showRoutes,setShowRoutes]=useState(false); 
  const [showExport,setShowExport]=useState(false); 

  const [expType, setExpType]=useState("STUDENT"); 
  const [expFilter, setExpFilter]=useState("ALL");

  const [detailId,setDetailId]=useState(null);
  
  const safeStudents = safeArr(students); 
  const student=detailId?safeStudents.find(s=>s.id===detailId):null;
  const allGroups = Array.from(new Set(safeStudents.map(s=>s.groupName).filter(Boolean)));

  const filtered = safeStudents.filter(s => {
    const expected = monthlyTotal(s); const paid = totalPaid(s); const debt = expected - paid;
    const matchName = s && s.name && s.name.toLowerCase().includes(search.toLowerCase());
    const matchGroup = groupFilter === "ALL" || s.groupName === groupFilter;
    let matchPay = true;
    if(payFilter === "PAID") matchPay = debt <= 0;
    if(payFilter === "UNPAID") matchPay = debt > 0;
    
    return matchName && matchGroup && matchPay;
  });

  function save(f){
    let n; if(f.id){n=safeStudents.map(s=>s.id===f.id?{...f}:s);}
    else{n=[...safeStudents,{...f,id:Date.now()}];} 
    DB.set("students",n);setShowAdd(false);
  }

  function handleExport() {
    let rows = []; let headers = []; let filename = "";
    if (expType === "STUDENT") {
        filename = "Ogrenci_Listesi";
        headers = ["Ad Soyad", "Grup", "Seviye", "Veli Adi", "Veli Telefon", "Baslangic", "Bitis"];
        const exFilt = safeStudents.filter(s => expFilter === "ALL" || s.groupName === expFilter);
        rows = exFilt.map(s => [s.name, s.groupName||"-", s.swimLevel||"-", s.guardianName||"-", s.guardianPhone1||"-", fmtDate(s.courseStart), fmtDate(s.courseEnd)]);
    } else if (expType === "TRANSPORT") {
        filename = "Servis_Listesi";
        headers = ["Ogrenci Ad Soyad", "Adres", "Veli Telefon", "Sofor Adi", "Sofor Tel"];
        const exFilt = safeStudents.filter(s => s.hasTransport && (expFilter === "ALL" || s.driverName === expFilter));
        rows = exFilt.map(s => [s.name, s.address||"-", s.guardianPhone1||"-", s.driverName||"-", s.driverPhone||"-"]);
    } else if (expType === "PAYMENT") {
        filename = "Odeme_Listesi";
        headers = ["Ad Soyad", "Grup", "Aylik Ucret", "Toplam Odenen", "Kalan Borc"];
        const exFilt = safeStudents.filter(s => expFilter === "ALL" || s.groupName === expFilter);
        rows = exFilt.map(s => {
            const expected = monthlyTotal(s); const p = totalPaid(s);
            return [s.name, s.groupName||"-", expected, p, expected - p];
        });
    }
    exportCSV(filename, headers, rows);
    setShowExport(false);
  }

  if(student)return<StudentDetail student={student} onBack={()=>setDetailId(null)} students={safeStudents} stockItems={stockItems} routes={routes}/>;

  return<div style={{padding:20, maxWidth:1300, margin:"0 auto"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
      <div style={{fontSize:20,fontWeight:700,color:"var(--text-main)",letterSpacing:-0.5}}>Öğrenci Rehberi ({filtered.length})</div>
      <div style={{display:"flex", gap:10, flexWrap:"wrap"}}>
        <button onClick={()=>{setExpType("STUDENT"); setExpFilter("ALL"); setShowExport(true);}} style={{display:"flex",alignItems:"center",gap:6,background:"var(--success-bg)",border:"1px solid var(--success)",color:"var(--success)",padding:"8px 14px",borderRadius:6,fontWeight:600,fontSize:13,cursor:"pointer",transition:"all 0.2s"}}><Icon name="chart" size={16}/> Excel Çıktısı</button>
        <button onClick={()=>setShowRoutes(true)} style={{display:"flex",alignItems:"center",gap:6,background:"var(--card-bg)",border:"1px solid var(--border)",color:"var(--text-main)",padding:"8px 14px",borderRadius:6,fontWeight:600,fontSize:13,cursor:"pointer",transition:"all 0.2s"}}><Icon name="mapPin" size={16}/> Rotalama Yap</button>
        <button onClick={()=>setShowAdd(true)} style={{display:"flex",alignItems:"center",gap:6,background:"var(--accent)",border:"none",color:"#fff",padding:"8px 14px",borderRadius:6,fontWeight:600,fontSize:13,cursor:"pointer",transition:"all 0.2s"}}>+ Yeni Kayıt Ekle</button>
      </div>
    </div>
    
    <div style={{display:"flex", gap:12, marginBottom:20, flexWrap:"wrap"}}>
      <input className="corp-inp" style={{flex:2, minWidth:200}} placeholder="Öğrenci adı ile arama yapın..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <select className="corp-inp" style={{flex:1, minWidth:150, cursor:"pointer"}} value={groupFilter} onChange={e=>setGroupFilter(e.target.value)}>
        <option value="ALL">Tüm Gruplar</option>
        {allGroups.map(g=><option key={g} value={g}>{g}</option>)}
      </select>
      <select className="corp-inp" style={{flex:1, minWidth:150, cursor:"pointer"}} value={payFilter} onChange={e=>setPayFilter(e.target.value)}>
        <option value="ALL">Tüm Ödeme Durumları</option>
        <option value="PAID">Ödemesi Tamamlananlar</option>
        <option value="UNPAID">Borcu Olanlar</option>
      </select>
    </div>
    
    {filtered.length===0 && <div style={{textAlign:"center", padding:"40px 0", color:"var(--text-sub)", fontWeight:600, fontSize:14}}>Aradığınız kriterlere uygun öğrenci bulunamadı.</div>}

    {filtered.length > 0 && <div className="list-header">
      <div>Öğrenci Bilgisi</div>
      <div>Durum / Seans</div>
      <div>Servis & Şoför</div>
      <div>Bakiye</div>
      <div style={{textAlign:"right"}}>İşlemler</div>
    </div>}

    <div style={{display:"flex", flexDirection:"column", gap:8}}>
      {filtered.map(s=>{
        const expected = monthlyTotal(s); const paid = totalPaid(s); const debt = expected - paid;
        return <div key={s.id} className="list-row">
          <div>
            <div style={{fontWeight:700,fontSize:14,color:"var(--text-main)"}}>{s.name}</div>
            <div style={{fontSize:12,color:"var(--text-sub)",fontWeight:500,marginTop:4}}>{s.groupName||"Grup Yok"} • {s.guardianPhone1||"Tel Yok"}</div>
          </div>
          <div>
            <div style={{fontSize:12,color:"var(--accent)",fontWeight:700}}>{calcRemainingSessions(s)} / {s.totalSessions || 0} Seans Kaldı</div>
            <div style={{fontSize:11,color:"var(--text-sub)",fontWeight:500,marginTop:4}}>{fmtDate(s.courseStart)} - {fmtDate(s.courseEnd)}</div>
          </div>
          <div>
            {s.hasTransport ? <div>
              <div style={{fontSize:12,color:"var(--accent)",fontWeight:700, display:"flex", alignItems:"center", gap:4}}><Icon name="bus" size={14}/> Servis Aktif</div>
              <div style={{fontSize:11,color:"var(--text-sub)",fontWeight:500,marginTop:4}}>{s.driverName||"Şoför Yok"}</div>
            </div> : <div style={{fontSize:12,color:"var(--text-sub)",fontWeight:500}}>Servis Yok</div>}
          </div>
          <div>
            {debt > 0 ? <span style={{border:`1px solid var(--danger)`, color:"var(--danger)", padding:"4px 8px", borderRadius:4, fontWeight:600, fontSize:11, display:"inline-block"}}>⚠️ {debt.toLocaleString("tr-TR")} ₺ BORÇ</span>
                     : <span style={{border:`1px solid var(--success)`, color:"var(--success)", padding:"4px 8px", borderRadius:4, fontWeight:600, fontSize:11, display:"inline-block"}}><Icon name="check" size={10} style={{marginRight:2, verticalAlign:"middle"}}/> ÖDENDİ</span>}
          </div>
          <div style={{display:"flex", gap:8, justifyContent:"flex-end"}}>
            <Btn variant="secondary" sm onClick={()=>setDetailId(s.id)}>Detay</Btn>
            <Btn variant="danger" sm onClick={()=>{if(confirm(`${s.name} kaydını silmek istediğinize emin misiniz?`))DB.set("students",safeStudents.filter(x=>x.id!==s.id));}}>Sil</Btn>
          </div>
        </div>
      })}
    </div>

    <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Öğrenci Kaydı Oluştur"><StudentForm initial={{}} onSave={save} onCancel={()=>setShowAdd(false)} stockItems={stockItems} students={safeStudents} routes={routes}/></Modal>
    <Modal show={showRoutes} onClose={()=>setShowRoutes(false)} title="Servis Rotalarını Yönet"><RoutesManager routes={routes} setRoutes={setRoutes} onClose={()=>setShowRoutes(false)}/></Modal>
    
    <Modal show={showExport} onClose={()=>setShowExport(false)} title="Excel Çıktısı Al">
      <div style={{marginBottom:16}}>
        <Sel label="Çıktı Türü" value={expType} onChange={v=>{setExpType(v); setExpFilter("ALL");}} options={[
           {label: "Öğrenci Listesi", value: "STUDENT"},
           {label: "Servis / Rota Listesi", value: "TRANSPORT"},
           {label: "Ödeme / Borç Listesi", value: "PAYMENT"}
        ]}/>
      </div>
      <div style={{marginBottom:24}}>
        {expType === "STUDENT" || expType === "PAYMENT" ? (
           <Sel label="Grup Filtresi" value={expFilter} onChange={setExpFilter} options={[
             {label: "Tüm Gruplar", value: "ALL"},
             ...allGroups.map(g=>({label: g, value: g}))
           ]}/>
        ) : (
           <Sel label="Rota / Şoför Filtresi" value={expFilter} onChange={setExpFilter} options={[
             {label: "Tüm Rotalar", value: "ALL"},
             ...safeArr(routes).map(r=>({label: r.routeName, value: r.driverName}))
           ]}/>
        )}
      </div>
      <Btn full onClick={handleExport} variant="success">Excel Olarak İndir</Btn>
    </Modal>
  </div>
}

function StudentDetail({student,onBack,students,stockItems,routes}){
  const [tab,setTab]=useState(0); const [editing,setEditing]=useState(false); const [payForm,setPayForm]=useState({amount:"",date:TODAY,note:""}); const [showPay,setShowPay]=useState(false);
  const safePays = safeArr(student.payments); const safeEqs = safeArr(student.equipment); const safeDays = safeArr(student.weekDays);
  
  function save(f){const n=safeArr(students).map(s=>s.id===student.id?{...s,...f,id:s.id}:s);DB.set("students",n);setEditing(false);}
  function addPay(){ if(!payForm.amount)return; const n=safeArr(students).map(s=>s.id===student.id?{...s,payments:[...safeArr(s.payments),{id:Date.now(),...payForm,amount:Number(payForm.amount)}]}:s); DB.set("students",n); setPayForm({amount:"",date:TODAY,note:""}); setShowPay(false); }
  function delPay(pid){const n=safeArr(students).map(s=>s.id===student.id?{...s,payments:safeArr(s.payments).filter(p=>p.id!==pid)}:s);DB.set("students",n);}

  if(editing)return<div style={{padding:20,maxWidth:600,margin:"0 auto"}}><div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}><button onClick={()=>setEditing(false)} style={{background:"var(--card-bg)",border:`1px solid var(--border)`,color:"var(--text-sub)",width:36,height:36,borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:16}}>←</button><span style={{fontWeight:700,fontSize:18,color:"var(--text-main)",letterSpacing:-0.5}}>Düzenle: {student.name}</span></div><Card><StudentForm initial={student} onSave={save} onCancel={()=>setEditing(false)} stockItems={stockItems} students={students} routes={routes}/></Card></div>;
  
  const paid=totalPaid(student),monthly=monthlyTotal(student),balance=paid-monthly; const st=courseStatus(student);

  return<div style={{padding:20, maxWidth:800, margin:"0 auto"}}>
    <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:24}}>
      <button onClick={onBack} style={{background:"var(--card-bg)",border:`1px solid var(--border)`,color:"var(--text-main)",width:40,height:40,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontWeight:700,fontSize:16}}>←</button>
      <div style={{flex:1}}><div style={{fontWeight:700,fontSize:20,color:"var(--text-main)",letterSpacing:-0.5}}>{student.name}</div><div style={{fontSize:12,color:"var(--text-sub)",fontWeight:500,marginTop:4}}>{age(student.dob)} · Grup: <strong style={{color:"var(--text-main)"}}>{student.groupName||"Yok"}</strong></div></div>
      <Badge label={st}/>
    </div>
    <TabBar tabs={["Genel Bakış","Kurs Eğitimi","Servis Durumu","Ekipmanlar","Ödeme Geçmişi"]} active={tab} onChange={setTab}/>
    
    {tab===0&&<div>
      <Card><Row label="Öğrenci Adı Soyadı" val={student.name}/><Row label="Doğum Tarihi" val={`${fmtDate(student.dob)} (${age(student.dob)})`}/><Row label="Veli Adı Soyadı" val={student.guardianName||"—"}/><Row label="Veli Telefonu" val={student.guardianPhone1||"—"} href={student.guardianPhone1?`tel:${student.guardianPhone1}`:undefined}/><Row label="Özel Notlar" val={student.notes||"—"}/></Card>
      
      {student.guardianPhone1 && (
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:16}}>
          <Btn sm style={{background:"var(--success)", color:"#fff", border:"none"}} onClick={()=>openWA(student.guardianPhone1, `SAYIN VELİMİZ, ${student.name} İSİMLİ ÖĞRENCİMİZİN ÖDEMESİ HAKKINDA HATIRLATMA YAPMAK İSTERİZ. İYİ GÜNLER DİLERİZ.`)}><Icon name="chat" size={14}/> Ödeme Bildir</Btn>
          <Btn sm style={{background:"var(--success)", color:"#fff", border:"none"}} onClick={()=>openWA(student.guardianPhone1, `SAYIN VELİMİZ, ${student.name} İSİMLİ ÖĞRENCİMİZ BUGÜNKÜ ANTRENMANA KATILMAMIŞTIR. BİLGİNİZE SUNARIZ.`)}><Icon name="chat" size={14}/> Devamsızlık Bildir</Btn>
          {student.driverName && <Btn sm style={{background:"var(--success)", color:"#fff", border:"none"}} onClick={()=>openWA(student.guardianPhone1, `SAYIN VELİMİZ, ${student.name} İSİMLİ ÖĞRENCİMİZİN SERVİS ŞOFÖRÜ BİLGİLERİ AŞAĞIDADIR:\nŞOFÖR ADI: ${student.driverName}\nTELEFON: ${student.driverPhone}\nİYİ GÜNLER DİLERİZ.`)}><Icon name="bus" size={14}/> Şoför Bilgisi İlet</Btn>}
        </div>
      )}
      
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}><StatCard label="Mevcut Katılım" value={`${attendanceCount(student)} Gün`} col="var(--success)"/><StatCard label="Aylık Bakiye Durumu" value={`${balance>=0?"+":""}${balance.toLocaleString("tr-TR")} ₺`} col={balance>=0?"var(--success)":"var(--danger)"}/></div>
      <Btn variant="secondary" full onClick={()=>setEditing(true)}>Tüm Bilgileri Düzenle</Btn>
    </div>}
    {tab===1&&<div><Card><Row label="Yüzme Seviyesi" val={swimLevelLabel(student.swimLevel)}/><Row label="Kayıtlı Olduğu Grup" val={student.groupName||"—"}/><Row label="Antrenman Günleri" val={safeDays.map(d=>DAYS_TR[d]).join(", ")||"—"}/><Row label="Kayıt Başlangıç Tarihi" val={fmtDate(student.courseStart)}/><Row label="Planlanan Bitiş Tarihi" val={fmtDate(student.courseEnd)}/><Row label="Tarih Bazlı Kalan Seans" val={`${calcRemainingSessions(student)} / ${student.totalSessions||0}`} col="var(--accent)"/></Card></div>}
    {tab===2&&<div>{student.hasTransport?<Card><Row label="Öğrenci Adresi" val={student.address||"—"}/><Row label="Aylık Servis Ücreti" val={`${student.transportFee} ₺`}/><Row label="Şoför Adı Soyadı" val={student.driverName}/><Row label="Şoför Telefonu" val={student.driverPhone}/></Card>:<div style={{textAlign:"center",padding:"40px 0",color:"var(--text-sub)",fontWeight:500,fontSize:14}}>Servis Kullanmıyor</div>}</div>}
    {tab===3&&<div>{safeEqs.length===0?<div style={{textAlign:"center",padding:"40px 0",color:"var(--text-sub)",fontWeight:500,fontSize:14}}>Ekipman Yok</div>:<Card>{safeEqs.map(e=><Row key={e.id} label={e.name} val={`${e.price} ₺`}/>)}</Card>}</div>}
    {tab===4&&<div><SectionTitle action={<Btn sm onClick={()=>setShowPay(true)}>+ Yeni Tahsilat Ekle</Btn>}>Ödeme Geçmişi</SectionTitle><Card>{safePays.length===0?<div style={{textAlign:"center",padding:"30px 0",color:"var(--text-sub)",fontWeight:500}}>Ödeme kaydı bulunmuyor.</div>:safePays.sort(sortDateDesc).map(p=><div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 0",borderBottom:`1px solid var(--bg-color)`}}><div><div style={{fontWeight:700,color:"var(--text-main)",fontSize:13}}>{fmtDate(p.date)}</div><div style={{fontSize:11,color:"var(--text-sub)",marginTop:4,fontWeight:500}}>{p.note||"Not yok"}</div></div><div style={{display:"flex",alignItems:"center",gap:16}}><span style={{color:"var(--success)",fontWeight:700,fontSize:14}}>+{Number(p.amount).toLocaleString("tr-TR")} ₺</span><button type="button" onClick={()=>delPay(p.id)} style={{background:"var(--danger-bg)",color:"var(--danger)",border:"none",borderRadius:6,width:26,height:26,cursor:"pointer",fontWeight:700}}>X</button></div></div>)}</Card>
      <Modal show={showPay} onClose={()=>setShowPay(false)} title="Tahsilat Ekle"><Inp label="Alınan Tutar (₺) *" value={payForm.amount} onChange={v=>setPayForm(p=>({...p,amount:v}))} type="number"/><Inp label="İşlem Tarihi" value={payForm.date} onChange={v=>setPayForm(p=>({...p,date:v}))} type="date"/><Inp label="Açıklama / Not" value={payForm.note} onChange={v=>setPayForm(p=>({...p,note:v.toLocaleUpperCase("tr-TR")}))}/><div style={{display:"flex",gap:12,marginTop:24}}><Btn variant="secondary" onClick={()=>setShowPay(false)} style={{flex:1}}>İptal</Btn><Btn onClick={addPay} style={{flex:2}}>Ödemeyi Kaydet</Btn></div></Modal>
    </div>}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   GRUP BAZLI YOKLAMA (EKSİKSİZ)
═══════════════════════════════════════════════════════════════ */
function AttendancePage({students}){
  const [tab, setTab] = useState(0);
  const [date, setDate] = useState(TODAY);
  const [selectedGroup, setSelectedGroup] = useState("");
  const [logDate, setLogDate] = useState(TODAY);
  const [logGroup, setLogGroup] = useState("ALL");

  const safeStudents = safeArr(students);
  const allGroups = Array.from(new Set(safeStudents.map(s=>s.groupName).filter(Boolean)));

  const activeInGroup = safeStudents.filter(s => courseStatus(s) === "active" && s.groupName === selectedGroup);
  const presentCount = activeInGroup.filter(s => (s.attendance||{})[date]).length;
  
  const presentOnLogDate = safeStudents.filter(s => {
    const isPresent = (s.attendance||{})[logDate];
    const matchGroup = logGroup === "ALL" || s.groupName === logGroup;
    return isPresent && matchGroup;
  });

  return <div style={{padding:20, maxWidth:800, margin:"0 auto"}}>
    <TabBar tabs={["Grup Bazlı Yoklama", "Geçmiş Kayıtlar (Log)"]} active={tab} onChange={setTab}/>
    
    {tab === 0 && <div>
      <SectionTitle>Grup Bazlı Yoklama Al</SectionTitle>
      <Card>
         <div style={{display:"flex", gap:12, marginBottom:16}}>
            <Inp label="Yoklama Tarihi" type="date" value={date} onChange={setDate} half/>
            <div style={{flex:1}}>
              <Sel label="Öğrenci Grubu Seçin" value={selectedGroup} onChange={setSelectedGroup} options={allGroups.map(g=>({value:g, label:g}))}/>
            </div>
         </div>
         
         {!selectedGroup ? <div style={{textAlign:"center", padding:"30px", color:"var(--text-sub)", fontWeight:500}}>Lütfen yoklama almak için bir grup seçiniz.</div> : 
           <div>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, background:"var(--bg-color)", padding:"12px 16px", borderRadius:6, border:"1px solid var(--border)"}}>
                <span style={{fontWeight:600, color:"var(--text-main)", fontSize:13}}>Toplam Öğrenci: {activeInGroup.length}</span>
                <span style={{fontWeight:600, color:"var(--success)", fontSize:13}}>Katılanlar: {presentCount}</span>
              </div>
              {activeInGroup.length === 0 ? <div style={{textAlign:"center", padding:"20px", color:"var(--text-sub)", fontWeight:500}}>Bu grupta aktif öğrenci bulunmuyor.</div> : 
                activeInGroup.map(s => <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:`1px solid var(--bg-color)`}}>
                  <div style={{fontWeight:600,fontSize:14,color:"var(--text-main)"}}>{s.name}</div>
                  <Toggle checked={!!(s.attendance||{})[date]} onChange={(v)=>{
                    const n=safeStudents.map(st=>{
                      if(st.id!==s.id)return st; 
                      const att={...(st.attendance||{})}; 
                      if(v)att[date]=true; else delete att[date]; 
                      return{...st,attendance:att};
                    }); 
                    DB.set("students",n);
                  }}/>
                </div>)
              }
           </div>
         }
      </Card>
    </div>}

    {tab === 1 && <div>
      <SectionTitle>Geçmiş Yoklama Logları</SectionTitle>
      <Card>
        <div style={{display:"flex", gap:12, marginBottom:16}}>
          <Inp label="İncelenecek Tarih" type="date" value={logDate} onChange={setLogDate} half/>
          <div style={{flex:1}}>
            <Sel label="Grup Filtresi" value={logGroup} onChange={setLogGroup} options={[{value:"ALL", label:"Tüm Gruplar"}, ...allGroups.map(g=>({value:g, label:g}))]}/>
          </div>
        </div>
        <div style={{marginTop:20}}>
          <div style={{fontSize:13, fontWeight:700, color:"var(--text-main)", marginBottom:12, borderBottom:"1px solid var(--border)", paddingBottom:8}}>Bu Tarihte Derse Katılan Öğrenciler ({presentOnLogDate.length})</div>
          {presentOnLogDate.length === 0 ? <div style={{textAlign:"center", padding:"30px", color:"var(--text-sub)", fontWeight:500}}>Bu tarihte derse katılan öğrenci kaydı bulunamadı.</div> : 
            presentOnLogDate.map(s => <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:`1px solid var(--bg-color)`}}>
              <div>
                <div style={{fontWeight:600, fontSize:14, color:"var(--text-main)"}}>{s.name}</div>
                <div style={{fontSize:11, fontWeight:500, color:"var(--text-sub)", marginTop:2}}>{s.groupName || "Grup Yok"}</div>
              </div>
              <Badge label="KATILDI" color="var(--success)"/>
            </div>)
          }
        </div>
      </Card>
    </div>}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   WHATSAPP DAVET PANELİ 
═══════════════════════════════════════════════════════════════ */
function WhatsAppPage({students, waLinks}) {
  const safeLinks = safeArr(waLinks);
  const [title, setTitle] = useState("");
  const [url, setUrl] = useState("");
  const [search, setSearch] = useState("");
  const [groupFilter, setGroupFilter] = useState("ALL");
  const [selectedStudent, setSelectedStudent] = useState(null);
  const [showInviteModal, setShowInviteModal] = useState(false);

  function addLink() {
    if(!title.trim() || !url.trim()) return;
    const n = [...safeLinks, { id:Date.now(), name: title.toLocaleUpperCase("tr-TR"), url: url }];
    DB.set("waLinks", n); setTitle(""); setUrl("");
  }

  function triggerInvite(student) {
    if(safeLinks.length === 0) { alert("Lütfen önce yukarıdaki alandan en az bir grup davet bağlantısı ekleyin."); return; }
    setSelectedStudent(student);
    setShowInviteModal(true);
  }

  function completeInvite(linkUrl) {
    if(!selectedStudent.guardianPhone1) return;
    const phone = selectedStudent.guardianPhone1.replace(/\D/g,"");
    const msg = `SAYIN VELİMİZ,\n${selectedStudent.name} İSİMLİ ÖĞRENCİMİZİN ANTRENMAN VE DUYURU TAKİBİ İÇİN KULÜBÜMÜZÜN RESMİ WHATSAPP GRUBUNA AŞAĞIDAKİ LİNKTEN KATILABİLİRSİNİZ:\n\n${linkUrl}`;
    window.open(`https://wa.me/${phone.startsWith('0')?'90'+phone.slice(1):'90'+phone}?text=${encodeURIComponent(msg)}`, "_blank");
    setShowInviteModal(false);
  }

  const activeStudents = safeArr(students).filter(s => courseStatus(s) === "active" && s.guardianPhone1);
  const allGroups = Array.from(new Set(activeStudents.map(s=>s.groupName).filter(Boolean)));
  
  const filteredStudents = activeStudents.filter(s => {
    const matchName = s.name && s.name.toLowerCase().includes(search.toLowerCase());
    const matchGroup = groupFilter === "ALL" || s.groupName === groupFilter;
    return matchName && matchGroup;
  }).sort((a, b) => (b.id||0) - (a.id||0));

  return <div style={{padding:20, maxWidth:800, margin:"0 auto"}}>
    <SectionTitle>WhatsApp Web Merkezi</SectionTitle>
    <Card style={{marginBottom:24}}><Btn full style={{background:"var(--success)", color:"#fff", border:"none", padding:"14px", fontSize:15}} onClick={()=>window.open("https://web.whatsapp.com", "_blank")}><Icon name="chat" size={16}/> WhatsApp Web Sekmesini Aç</Btn></Card>
    
    <SectionTitle>İsimli Grup Davet Bağlantıları</SectionTitle>
    <Card style={{marginBottom:24}}>
      <div style={{display:"flex", gap:10}}>
        <input className="corp-inp" style={{flex:1}} value={title} onChange={e=>setTitle(e.target.value)} placeholder="Grup Adı (Örn: CUMARTESİ)" />
        <input className="corp-inp" style={{flex:2}} value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://chat.whatsapp.com/..." />
        <Btn onClick={addLink}>Ekle</Btn>
      </div>
      <div style={{marginTop:16}}>
        {safeLinks.length === 0 && <div style={{fontSize:12, color:"var(--text-sub)", textAlign:"center", fontWeight:500}}>Sisteme kayıtlı davet bağlantısı yok.</div>}
        {safeLinks.map(l=><div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"var(--bg-color)",borderRadius:6,border:"1px solid var(--border)",marginBottom:8}}><span style={{fontSize:13,fontWeight:700,color:"var(--text-main)",display:"flex",alignItems:"center",gap:6}}><Icon name="link" size={14}/> {l.name}</span><button type="button" onClick={()=>DB.set("waLinks", safeLinks.filter(x=>x.id!==l.id))} style={{background:"var(--danger-bg)",border:"none",color:"var(--danger)",cursor:"pointer",fontWeight:600,padding:"4px 10px",borderRadius:4}}>Sil</button></div>)}
      </div>
    </Card>

    <SectionTitle>Öğrenci Davet Takip Paneli</SectionTitle>
    <div style={{display:"flex", gap:12, marginBottom:16}}>
      <input className="corp-inp" style={{flex:2}} placeholder="Listeden öğrenci arayın..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <select className="corp-inp" style={{flex:1, cursor:"pointer"}} value={groupFilter} onChange={e=>setGroupFilter(e.target.value)}>
        <option value="ALL">Tüm Gruplar</option>
        {allGroups.map(g=><option key={g} value={g}>{g}</option>)}
      </select>
    </div>
    
    <Card>
      {filteredStudents.length === 0 ? <div style={{textAlign:"center",padding:"20px 0",color:"var(--text-sub)",fontSize:13,fontWeight:500}}>Kayıtlı aktif öğrenci bulunamadı.</div> :
        filteredStudents.map(s=><div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:`1px solid var(--bg-color)`}}>
          <div><div style={{fontWeight:600,fontSize:14,color:"var(--text-main)"}}>{s.name}</div><div style={{fontSize:11,color:"var(--text-sub)",marginTop:4,fontWeight:500}}>GRUP: {s.groupName||"Belirtilmemiş"}</div></div>
          <Btn sm style={{background:"var(--success-bg)",color:"var(--success)",border:"1px solid var(--success-bg)"}} onClick={()=>triggerInvite(s)}>Davet Gönder</Btn>
        </div>)
      }
    </Card>

    <Modal show={showInviteModal} onClose={()=>setShowInviteModal(false)} title="Hangi Grubu Gönderelim?">
      <div style={{fontSize:13,color:"var(--text-main)",marginBottom:20,lineHeight:1.5,fontWeight:500}}><strong>{selectedStudent?.name}</strong> isimli öğrencinin velisine aşağıdaki davet bağlantılarından hangisini göndermek istersiniz?</div>
      <div style={{display:"flex", flexDirection:"column", gap:10}}>
        {safeLinks.map(l=><button key={l.id} type="button" onClick={()=>completeInvite(l.url)} style={{width:"100%",padding:14,borderRadius:8,background:"var(--bg-color)",border:`1px solid var(--border)`,color:"var(--accent)",fontWeight:700,fontSize:14,textAlign:"left",cursor:"pointer",transition:"all 0.2s"}}>{l.name}</button>)}
      </div>
    </Modal>
  </div>
}

function StaffPage({staff}){
  const validStaff = safeArr(staff); const [tab, setTab] = useState(0); const [showAdd, setShowAdd] = useState(false); const [f, setF] = useState(EMPTY_STAFF);
  const [selectedMonth, setSelectedMonth] = useState(TODAY.slice(0,7)); const [activeStaffId, setActiveStaffId] = useState(null);
  const u=(k,v)=>setF(p=>({...p,[k]:v}));

  function save(){
    if(!f.name.trim()) return;
    const n = f.id ? validStaff.map(s=>s.id===f.id?{...s,...f}:s) : [...validStaff,{...f,id:Date.now(),attendance:{},dailyWage:Number(f.dailyWage||0)}];
    DB.set("staff",n); setShowAdd(false); setF(EMPTY_STAFF);
  }
  const daysInMonth = new Date(Number(selectedMonth.split("-")[0]), Number(selectedMonth.split("-")[1]), 0).getDate();
  const daysArray = Array.from({length: daysInMonth}, (_, i) => i + 1);

  return<div style={{padding:20, maxWidth:800, margin:"0 auto"}}>
    <TabBar tabs={["Personel Listesi","Yoklama & Maaş Hakediş"]} active={tab} onChange={setTab}/>
    {tab===0&&<div>
      <SectionTitle action={<Btn sm onClick={()=>{setF(EMPTY_STAFF);setShowAdd(true);}}>+ Personel Ekle</Btn>}>Kurum Çalışanları</SectionTitle>
      {validStaff.length===0?<Card style={{textAlign:"center",padding:"40px 0",color:"var(--text-sub)",fontWeight:500,fontSize:14}}>Kayıtlı çalışan bulunmuyor.</Card>:
      <div style={{display:"grid", gap:12}}>
        {validStaff.map(s=><Card key={s.id} style={{margin:0, padding:"16px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:700,fontSize:15,color:"var(--text-main)"}}>{s.name}</div><div style={{fontSize:12,color:"var(--text-sub)",fontWeight:600,marginTop:4}}>{Number(s.dailyWage||0).toLocaleString("tr-TR")} ₺ Günlük Yevmiye</div></div><Btn sm variant="danger" onClick={()=>{if(confirm('Personel kaydı silinsin mi?')) DB.set("staff", validStaff.filter(x=>x.id!==s.id))}}>Sil</Btn></div></Card>)}
      </div>}
    </div>}
    {tab===1&&<div>
      <Inp label="Takip Ayı Seçimi" type="month" value={selectedMonth} onChange={setSelectedMonth}/>
      <div style={{display:"grid", gap:12}}>
      {validStaff.map(s=>{
        const daysCount = Object.keys(s.attendance||{}).filter(k=>k.startsWith(selectedMonth)&&s.attendance[k]).length;
        const isExp = activeStaffId === s.id;
        return <Card key={s.id} style={{margin:0, padding:isExp?"20px":"16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"} } onClick={()=>setActiveStaffId(isExp?null:s.id)}>
            <div><div style={{fontWeight:700,fontSize:15,color:"var(--text-main)"}}>{s.name}</div><div style={{fontSize:12,color:"var(--success)",fontWeight:700,marginTop:4}}>{daysCount} Gün Mesai • Toplam Hakediş: {(daysCount*Number(s.dailyWage||0)).toLocaleString("tr-TR")} ₺</div></div>
            <Btn sm variant="secondary">{isExp?"Kapat ▲":"Puantaj Gir ▼"}</Btn>
          </div>
          {isExp && <div style={{marginTop:20, paddingTop:20, borderTop:`1px solid var(--border)`}}>
            <Inp label="Günlük Yevmiye (₺) (Anlık Güncelleme)" type="number" value={s.dailyWage} onChange={(v)=>DB.set("staff", validStaff.map(x=>x.id===s.id?{...x,dailyWage:Number(v)}:x))}/>
            <div style={{fontSize:11,fontWeight:700,color:"var(--text-sub)",marginBottom:12,textTransform:"uppercase",marginTop:16}}>Çalışılan Günleri İşaretleyin</div>
            <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(40px, 1fr))", gap:8}}>
              {daysArray.map(d=>{
                const key = `${selectedMonth}-${String(d).padStart(2,'0')}`; const isP = !!s.attendance?.[key];
                return <button key={d} type="button" onClick={()=>{
                  const att={...(s.attendance||{})}; if(isP) delete att[key]; else att[key]=true;
                  DB.set("staff", validStaff.map(x=>x.id===s.id?{...x,attendance:att}:x));
                }} style={{padding:"10px 0", borderRadius:6, border:`1px solid ${isP?"var(--success)":"var(--border)"}`, background:isP?"var(--success-bg)":"var(--bg-color)", color:isP?"var(--success)":"var(--text-main)", fontWeight:700, cursor:"pointer", transition:"all 0.2s"}}>{d}</button>
              })}
            </div>
          </div>}
        </Card>
      })}
      </div>
    </div>}
    <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Personel Kaydı">
      <Inp label="Ad Soyad *" value={f.name} onChange={v=>u("name",v.toLocaleUpperCase("tr-TR"))} autoFocus/>
      <Inp label="Sabit Günlük Yevmiyesi (₺) *" value={f.dailyWage} onChange={v=>u("dailyWage",v)} type="number"/>
      <Btn full onClick={save} style={{marginTop:16}}>Çalışanı Kaydet</Btn>
    </Modal>
  </div>
}

function Dashboard({students,expenses}){
  const safeStudents = safeArr(students); const safeExpenses = safeArr(expenses); const active=safeStudents.filter(s=>courseStatus(s)==="active");
  const totalRev=safeStudents.reduce((t,s)=>t+totalPaid(s),0); const totalExp=safeExpenses.reduce((t,e)=>t+Number(e.amount||0),0); const netProfit = totalRev - totalExp;
  
  const total=totalRev+totalExp; const revPct=total===0?50:(totalRev/total)*100; const expPct=total===0?50:(totalExp/total)*100;

  const recentRegistrations = [...safeStudents].sort((a,b) => (b.id||0) - (a.id||0)).slice(0, 5);
  const recentPay = safeStudents.flatMap(s=>safeArr(s.payments).map(p=>({...p,studentName:s.name}))).sort(sortDateDesc).slice(0,5);
  const endingSoon = active.filter(s=>{const d=daysLeft(s);return d>=0&&d<=14;}).sort((a,b)=>daysLeft(a)-daysLeft(b)).slice(0,5);

        <div style={{width:`${revPct}%`, background:"var(--success)", transition:"width 1s cubic-bezier(0.4, 0, 0.2, 1)"}}></div>
        <div style={{width:`${expPct}%`, background:"var(--danger)", transition:"width 1s cubic-bezier(0.4, 0, 0.2, 1)"}}></div>
      </div>
      <div style={{display:"flex", justifyContent:"space-between", fontSize:13, fontWeight:700}}>

        <span style={{color:"var(--danger)"}}>Toplam Gider: %{Math.round(expPct)}</span>

    <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(320px, 1fr))", gap:20, alignItems:"start"}}>

            <div key={s.id} style={{display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 14px", background:"var(--bg-color)", borderRadius:6, border:"1px solid var(--border)"}}>

        <div style={{fontSize:13, fontWeight:700, marginBottom:16, color:"var(--text-main)", textTransform:"uppercase", letterSpacing:0.5}}>Son Ödemeler</div>
        <div style={{display:"flex", flexDirection:"column", gap:8}}>
          {recentPay.length===0?<div style={{textAlign:"center", color:"var(--text-sub)", fontSize:12, padding:"10px 0"}}>Tahsilat yok.</div>:recentPay.map((p, i) => (
            <div key={i} style={{display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 14px", background:"var(--bg-color)", borderRadius:6, border:"1px solid var(--border)"}}>
              <div>
                <div style={{fontWeight:700, fontSize:13, color:"var(--text-main)"}}>{p.studentName}</div>
                <div style={{fontSize:11, color:"var(--text-sub)", marginTop:4, fontWeight:500}}>{fmtDate(p.date)}</div>
              </div>
              <div style={{fontSize:13, fontWeight:700, color:"var(--success)"}}>+{Number(p.amount).toLocaleString("tr-TR")} ₺</div>
            </div>
          ))}
        </div>
      </Card>

      <Card style={{padding:"20px", margin:0, borderLeft:`4px solid var(--warning)`}}>
        <div style={{fontSize:13, fontWeight:700, marginBottom:16, color:"var(--warning)", textTransform:"uppercase", letterSpacing:0.5}}>Kayıt Bitişi Yaklaşanlar</div>
        <div style={{display:"flex", flexDirection:"column", gap:8}}>
          {endingSoon.length===0?<div style={{textAlign:"center", color:"var(--text-sub)", fontSize:12, padding:"10px 0"}}>Yaklaşan kayıt yok.</div>:endingSoon.map(s => (
            <div key={s.id} style={{display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 14px", background:"var(--warning-bg)", borderRadius:6, border:"1px solid rgba(245,158,11,0.3)"}}>
              <div>
                <div style={{fontWeight:700, fontSize:13, color:"var(--text-main)"}}>{s.name}</div>
                <div style={{fontSize:11, color:"var(--warning)", marginTop:4, fontWeight:500}}>Bitiş: {fmtDate(s.courseEnd)}</div>
              </div>
              <div style={{fontSize:12, fontWeight:800, color:"var(--warning)", display:"flex", alignItems:"center", gap:4}}><Icon name="warning" size={14}/> {daysLeft(s)} Gün</div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  </div>
}

function SettingsPage({navItems, clubName, appUsers}){
  const [tab, setTab] = useState(0); const [nameVal, setNameVal] = useState(clubName); 
  const [showUserModal, setShowUserModal] = useState(false); const [uForm, setUForm] = useState({ id:null, username:"", password:"", role:"staff", allowedTabs:[] });
  
  function toggleMenuAccess(menuId) {
    const tabs = uForm.allowedTabs || [];
    if(tabs.includes(menuId)) setUForm({...uForm, allowedTabs: tabs.filter(t=>t!==menuId)});
    else setUForm({...uForm, allowedTabs: [...tabs, menuId]});
  }
  
  function saveUser() { 
    if(!uForm.username||!uForm.password)return; 
    let n = safeArr(appUsers); 
    if(uForm.id) n = n.map(u => u.id === uForm.id ? {...uForm} : u); 
    else n = [...n, {...uForm, id:Date.now()}]; 
    DB.set("appUsers", n); setShowUserModal(false); 
  }

  function deleteUser(id) {
    if(id === "admin") { alert("Ana yönetici (admin) hesabı silinemez."); return; }
    if(confirm("Bu çalışan hesabını tamamen silmek ve sisteme erişimini kesmek istediğinize emin misiniz?")) {
      DB.set("appUsers", safeArr(appUsers).filter(x=>x.id!==id));
    }
  }

  return<div style={{padding:20, maxWidth:800, margin:"0 auto"}}>
    <TabBar tabs={["Genel Kurum Ayarları", "Personel Hesap Yetkileri"]} active={tab} onChange={setTab}/>
    {tab === 0 && (
      <div><Card style={{padding:"24px"}}><Inp label="Kulüp/Kurum Adı" value={nameVal} onChange={setNameVal}/></Card><Btn full onClick={()=>{DB.set("clubName",nameVal); alert("Kurum bilgileri başarıyla kaydedildi.");}}>Sisteme Kaydet</Btn></div>
    )}
    {tab===1&&<div>
      <SectionTitle action={<Btn sm onClick={()=>{setUForm({id:null,username:"",password:"",role:"staff",allowedTabs:["dashboard","students","attendance"]});setShowUserModal(true);}}>+ Yeni Personel Hesabı Aç</Btn>}>Sisteme Giriş İzinleri</SectionTitle>
      
      {safeArr(appUsers).map(u=><Card key={u.id} style={{padding:"16px 20px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:700,fontSize:15,color:"var(--text-main)"}}>{u.username}</div>
            <div style={{fontSize:11,color:u.role==='admin'?"var(--success)":"var(--text-sub)",fontWeight:700,textTransform:"uppercase",marginTop:4}}>{u.role==='admin'?'Tam Yetkili Yönetici (Silinemez)':'Kısıtlı Çalışan'}</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn variant="secondary" sm onClick={()=>{setUForm(u);setShowUserModal(true);}}>Yetkileri Düzenle</Btn>
            {u.role !== 'admin' && <Btn variant="danger" sm onClick={()=>deleteUser(u.id)}>Hesabı Kaldır</Btn>}
          </div>
        </div>
      </Card>)}

      <Modal show={showUserModal} onClose={()=>setShowUserModal(false)} title="Personel Hesabı Tanımla">
        <Inp label="Sisteme Giriş Kullanıcı Adı" value={uForm.username} onChange={v=>setUForm({...uForm,username:v})} autoFocus/>
        <Inp label="Giriş Şifresi" value={uForm.password} onChange={v=>setUForm({...uForm,password:v})}/>
        
        {uForm.id !== "admin" && (
          <div style={{marginTop: 20}}>
            <div style={{fontSize:11, fontWeight:700, marginBottom:12, color:"var(--text-main)", textTransform:"uppercase"}}>Çalışanın Görebileceği Menüler</div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
              {navItems.map(nav => nav.id !== "settings" && (
                <label key={nav.id} style={{display:"flex", alignItems:"center", gap:8, padding:"12px", background:"var(--bg-color)", borderRadius:6, cursor:"pointer", border:`1px solid ${(uForm.allowedTabs||[]).includes(nav.id)?"var(--accent)":"var(--border)"}`, transition:"all 0.2s"}}>
                  <input type="checkbox" checked={(uForm.allowedTabs||[]).includes(nav.id)} onChange={() => toggleMenuAccess(nav.id)} style={{width:16,height:16,accentColor:"var(--accent)"}}/>
                  <span style={{fontSize:13, fontWeight:600, color:"var(--text-main)"}}>{nav.label}</span>
                </label>
              ))}
            </div>
          </div>
        )}
        <Btn full onClick={saveUser} style={{marginTop:24}}>Hesabı Kaydet</Btn>
      </Modal>
    </div>}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   APP ROOT (TAM GÜVENLİ)
═══════════════════════════════════════════════════════════════ */
function App(){
  const [currentUser, setCurrentUser] = useState(() => { try { return JSON.parse(sessionStorage.getItem("aqua_user")); } catch { return null; } });
  const [isDbLoaded, setIsDbLoaded] = useState(false);
  const [students,setStudents]=useState([]); const [staff,setStaff]=useState([]); const [stockItems,setStockItems]=useState([]); const [movements,setMovements]=useState([]); const [expenses,setExpenses]=useState([]);
  const [clubName,setClubName]=useState("AquaClub Pro"); const [navItems,setNavItems]=useState(NAV_ITEMS); const [appUsers, setAppUsers]=useState([]); const [oldPinCode, setOldPinCode]=useState("0309"); const [waLinks,setWaLinks]=useState([]);
  const [activeTab,setActiveTab]=useState("dashboard"); const [sidebarOpen,setSidebarOpen]=useState(false);
  const [routes, setRoutes] = useState([]);

  useEffect(() => {
    if(!db) { setIsDbLoaded(true); return; }
    try {
      const unsub = db.collection("appData").doc("main").onSnapshot((doc) => {
        if (doc.exists) {
          const d = doc.data();
          if (d.students) setStudents(safeArr(d.students));
          if (d.staff) setStaff(safeArr(d.staff));
          if (d.stock) setStockItems(safeArr(d.stock));
          if (d.movements) setMovements(safeArr(d.movements));
          if (d.expenses) setExpenses(safeArr(d.expenses));
          if (d.waLinks) setWaLinks(safeArr(d.waLinks));
          if (d.routes) setRoutes(safeArr(d.routes));
          if (d.clubName) setClubName(d.clubName);
          if (d.pinCode) setOldPinCode(d.pinCode); 
          let loadedUsers = safeArr(d.appUsers);
          if (loadedUsers.length === 0) { loadedUsers = [{ id:"admin", username:"admin", password: d.pinCode || "0309", role:"admin", allowedTabs: NAV_ITEMS.map(n=>n.id) }]; }
          setAppUsers(loadedUsers);
        }
        setIsDbLoaded(true);
      });
      return () => unsub();
    } catch(e) { console.error(e); setIsDbLoaded(true); }
  }, []);

  if (!isDbLoaded) return <div style={{display:"flex",flexDirection:"column",height:"100vh",alignItems:"center",justifyContent:"center",background:"var(--bg-color)"}}><div className="spinner"></div><div style={{color:"var(--text-main)",fontWeight:700,marginTop:16,letterSpacing:0.5}}>Kurumsal Sistem Yükleniyor...</div></div>;
  if (!currentUser) return <LoginScreen onSuccess={(user) => { sessionStorage.setItem("aqua_user", JSON.stringify(user)); setCurrentUser(user); }} appUsers={appUsers} adminPin={oldPinCode} />;

  const visibleNav = NAV_ITEMS.filter(n => currentUser.role === "admin" || (currentUser.allowedTabs || []).includes(n.id));

  return<div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg-color)"}}>
    <div className="sidebar-desktop" style={{width:240, background:"var(--sidebar-bg)", borderRight:`1px solid var(--border)`, display:"flex", flexDirection:"column", boxShadow:"1px 0 3px rgba(0,0,0,0.05)", zIndex:100}}>
      <div style={{padding:"24px 20px 20px", borderBottom:`1px solid var(--border)`, display:"flex", alignItems:"center", gap:12}}>
        <div style={{width:36,height:36,borderRadius:8,background:`var(--accent)`,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
          <span style={{color:"white", fontWeight:800, fontSize:15}}>AC</span>
        </div>
        <div><div style={{fontSize:15,fontWeight:800,color:"var(--text-main)",letterSpacing:-0.3}}>{clubName}</div><div style={{fontSize:11,color:"var(--text-sub)",fontWeight:700,textTransform:"uppercase",marginTop:2}}>{currentUser.username}</div></div>
      </div>
      <div style={{flex:1, overflowY:"auto", padding:"16px 12px"}}>
        {visibleNav.map(item=><button key={item.id} type="button" onClick={()=>setActiveTab(item.id)} style={{display:"flex",alignItems:"center",gap:12,width:"100%", padding:"12px 14px", marginBottom:4, background:activeTab===item.id?"var(--accent-light)":"transparent", border:"none", borderRadius:6, color:activeTab===item.id?"var(--accent)":"var(--text-sub)", cursor:"pointer", textAlign:"left", fontSize:13, fontWeight:activeTab===item.id?700:500, transition:"all 0.2s"}}><Icon name={item.icon} size={16}/> {item.label}</button>)}
      </div>
      <div style={{padding:"16px"}}><button type="button" onClick={()=>{sessionStorage.removeItem("aqua_user"); window.location.reload();}} style={{width:"100%", padding:"12px", background:"var(--danger-bg)", border:"1px solid var(--border)", borderColor:"rgba(239, 68, 68, 0.3)", borderRadius:6, color:"var(--danger)", fontWeight:700, cursor:"pointer", transition:"all 0.2s", fontSize:13}}>Güvenli Çıkış Yap</button></div>
    </div>
    
    <div style={{flex:1, display:"flex", flexDirection:"column", overflow:"hidden", position:"relative"}}>
      <div style={{padding:"16px 24px", background:"var(--sidebar-bg)", borderBottom:`1px solid var(--border)`, fontWeight:700, fontSize:16, display:"flex", alignItems:"center", gap:16, color:"var(--text-main)", zIndex:50}}>
        <button type="button" onClick={()=>setSidebarOpen(!sidebarOpen)} className="menu-btn" style={{background:"var(--bg-color)", border:`1px solid var(--border)`, color:"var(--text-main)", width:36, height:36, borderRadius:6, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center"}}>☰</button>
        {(visibleNav.find(n=>n.id===activeTab)||{}).label}
      </div>
      <div style={{flex:1, overflowY:"auto"}}>
        <ErrorBoundary>
          {activeTab==="dashboard"&&<Dashboard students={students} expenses={expenses}/>}
          {activeTab==="students"&&<StudentsPage students={students} stockItems={stockItems} routes={routes} setRoutes={setRoutes}/>}
          {activeTab==="attendance"&&<AttendancePage students={students}/>}
          {activeTab==="payments"&&<PaymentsPage students={students}/>}
          {activeTab==="expenses"&&<ExpensesPage expenses={expenses}/>}
          {activeTab==="whatsapp"&&<WhatsAppPage students={students} waLinks={waLinks} />}
          {activeTab==="staff"&&<StaffPage staff={staff}/>}
          {activeTab==="inventory"&&<InventoryPage items={stockItems}/>}
          {activeTab==="settings"&&currentUser.role==='admin'&&<SettingsPage navItems={NAV_ITEMS} clubName={clubName} appUsers={appUsers}/>}
        </ErrorBoundary>
      </div>
    </div>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
