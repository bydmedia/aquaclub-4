function safeArr(val) { 
  if (!val) return [];
  const arr = Array.isArray(val) ? val : Object.values(val);
  return arr.filter(item => item !== null && item !== undefined && typeof item === 'object');
}

const DB={
  set:(k,v)=>{
    const cleanV = Array.isArray(v) ? v.filter(i => i !== null && i !== undefined) : v;
    db.collection("appData").doc("main").set({ [k]: cleanV }, { merge: true })
      .catch(err => console.error("Firebase kayıt hatası:", err));
  }
};

const TODAY=new Date().toISOString().split("T")[0];

function totalPaid(s){return safeArr(s?.payments).reduce((t,p)=>t+Number(p?.amount||0),0);}
function equipmentTotal(s){return safeArr(s?.equipment).reduce((t,e)=>t+Number(e?.price||0),0);}
function monthlyTotal(s){return Number(s?.monthlyFee||0)-Number(s?.discount||0)+equipmentTotal(s)+(s?.hasTransport?Number(s?.transportFee||0):0);}
function courseStatus(s){
  if(!s?.courseStart||!s?.courseEnd)return"unknown";
  const now=new Date(TODAY),st=new Date(s.courseStart),en=new Date(s.courseEnd);
  if(now<st)return"upcoming";if(now>en)return"ended";return"active";
}
function daysLeft(s){return Math.ceil((new Date(s?.courseEnd)-new Date(TODAY))/86400000)}
function attendanceCount(s){return Object.values(s?.attendance||{}).filter(Boolean).length}
function age(dob){if(!dob)return"—";return Math.floor((Date.now()-new Date(dob))/31557600000)+" yaş"}
function calcEndDate(start,total,days){
  if(!start||!total||!days||days.length===0)return"";
  let d=new Date(start),cnt=0,iter=0;
  const safeDays = safeArr(days);
  while(cnt<total&&iter<total*30){if(safeDays.includes(d.getDay()))cnt++;if(cnt<total)d.setDate(d.getDate()+1);iter++;}
  return d.toISOString().split("T")[0];
}
function swimLevelLabel(v){return{beginner:"Başlangıç",intermediate:"Orta",advanced:"İleri",competitive:"Yarışmacı"}[v]||v||"—"}
function roleLabel(r){return{trainer:"Antrenör",admin:"İdari Personel",driver:"Şoför",other:"Diğer"}[r]||r||"—"}

function StudentsPage({students,stockItems}){
  const [search,setSearch]=useState("");
  const [showAdd,setShowAdd]=useState(false);
  const [detailId,setDetailId]=useState(null);
  const [statusFilter,setStatusFilter]=useState("all");
  const [groupFilter,setGroupFilter]=useState("all");
  const safeStudents = safeArr(students);
  const student=detailId?safeStudents.find(s=>s.id===detailId):null;
  function save(f){
    let n;
    if(f.id){n=safeStudents.map(s=>s.id===f.id?{...f}:s);}
    else{n=[...safeStudents,{...f,id:Date.now(),payments:[],attendance:{},equipment:safeArr(f.equipment)}];}
    DB.set("students",n);setShowAdd(false);
  }
  function del(id){const n=safeStudents.filter(s=>s.id!==id);DB.set("students",n);setDetailId(null);}
  function downloadExcel() {
    const headers = ["Ad Soyad", "Grup", "Veli", "Veli Tel", "Bitis Tarihi", "Aylik Ucret (TL)", "Odenen (TL)", "Kalan Borc (TL)"];
    const rows = filtered.map(s => { const exp = monthlyTotal(s); const paid = totalPaid(s); return [s.name, s.groupName||"-", s.guardianName||"-", s.guardianPhone1||"-", fmtDate(s.courseEnd), exp, paid, exp-paid]; });
    exportCSV("Ogrenciler_Listesi", headers, rows);
  }
  const groups=["all",...new Set(safeStudents.map(s=>s.groupName).filter(Boolean))];
  const filtered=safeStudents.filter(s=>{
    if(!s?.name?.toLowerCase().includes(search.toLowerCase()))return false;
    if(statusFilter==="active"&&courseStatus(s)!=="active")return false;
    if(statusFilter==="ended"&&courseStatus(s)!=="ended")return false;
    if(statusFilter==="upcoming"&&courseStatus(s)!=="upcoming")return false;
    if(statusFilter==="unpaid"&&totalPaid(s)>=monthlyTotal(s))return false; 
    if(groupFilter!=="all"&&s.groupName!==groupFilter)return false;
    return true;
  });
  if(student)return<StudentDetail student={student} onBack={()=>setDetailId(null)} students={safeStudents} stockItems={stockItems}/>;
  return<div style={{padding:14}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,color:C.accent,textTransform:"uppercase",letterSpacing:1}}>Öğrenciler ({filtered.length})</div>
      <div style={{display:"flex", gap:6}}><Btn sm variant="secondary" onClick={downloadExcel}>⬇️ Excel</Btn><Btn sm onClick={()=>setShowAdd(true)}>+ Yeni</Btn></div>
    </div>
    <div style={{position:"relative",marginBottom:10}}>
      <Icon d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0" size={15} color={C.textMuted} style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}/>
      <input style={{width:"100%",padding:"9px 12px 9px 32px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:9,color:C.text,fontSize:13,outline:"none",fontFamily:"inherit"}} placeholder="Öğrenci ara..." value={search} onChange={e=>setSearch(e.target.value)}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
      <Sel label="Durum Filtresi" value={statusFilter} onChange={setStatusFilter} options={[{value:"all",label:"Tümü"},{value:"active",label:"Aktif"},{value:"upcoming",label:"Başlamadı"},{value:"ended",label:"Bitti"},{value:"unpaid",label:"Eksik Ödeme"}]}/>
      <Sel label="Grup Filtresi" value={groupFilter} onChange={setGroupFilter} options={[{value:"all",label:"Tüm Gruplar"},...groups.filter(g=>g!=="all").map(g=>({value:g,label:g}))]}/>
    </div>
    {filtered.map(s=><Card key={s.id}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div><div style={{fontWeight:700,fontSize:15}}>{s.name}</div><div style={{fontSize:11,color:C.textSub,marginTop:2}}>{age(s.dob)} · {s.groupName||"Grup belirtilmemiş"}</div></div>
        <Badge label={courseStatus(s)}/>
      </div>
      <div style={{display:"flex",gap:8}}><Btn variant="secondary" sm onClick={()=>setDetailId(s.id)} style={{flex:1}}>Detay</Btn><Btn variant="danger" sm onClick={()=>{if(confirm(`${s.name} silinsin mi?`))del(s.id);}}>Sil</Btn></div>
    </Card>)}
    <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Yeni Öğrenci Kaydı"><StudentForm initial={{}} onSave={save} onCancel={()=>setShowAdd(false)} stockItems={stockItems}/></Modal>
  </div>
}

function InventoryPage({items,movements}){
  const safeItems = safeArr(items);
  const safeMovements = safeArr(movements);
  const [show,setShow]=useState(false);
  const [f,setF]=useState({id:null,name:"",category:"",price:"",stock:"",minStock:"",supplier:"",notes:""});
  const [editing,setEditing]=useState(null);
  const [catFilter,setCatFilter]=useState("all");
  const [tab,setTab]=useState(0);
  const [movForm,setMovForm]=useState({itemId:"",type:"in",qty:1,note:"",date:TODAY});
  const [showMov,setShowMov]=useState(false);
  const u=(k,v)=>setF(p=>({...p,[k]:v}));

  function save(){
    if(!f.name.trim())return;
    const n=f.id?safeItems.map(i=>i?.id===f.id?{...f}:i):[...safeItems,{...f,id:Date.now()}];
    DB.set("stock",n);setShow(false);setEditing(null);
  }
  function del(id){const n=safeItems.filter(i=>i?.id!==id);DB.set("stock",n);}
  function adj(id,delta){
    const n=safeItems.map(i=>i?.id===id?{...i,stock:Math.max(0,Number(i?.stock||0)+delta)}:i);
    DB.set("stock",n);
  }
  function addMovement(){
    if(!movForm.itemId||!movForm.qty)return;
    const item=safeItems.find(i=>String(i?.id)===String(movForm.itemId));
    if(!item)return;
    const delta=movForm.type==="in"?Number(movForm.qty):-Number(movForm.qty);
    adj(item.id,delta);
    const mov={id:Date.now(),...movForm,itemName:item.name,qty:Number(movForm.qty)};
    DB.set("movements",[mov,...safeMovements]);setShowMov(false);
  }
  const cats=["all",...new Set(safeItems.map(i=>i?.category).filter(Boolean))];
  const filtered=catFilter==="all"?safeItems:safeItems.filter(i=>i?.category===catFilter);
  const lowStock=safeItems.filter(i=>Number(i?.stock)<=Number(i?.minStock||0)&&Number(i?.stock)>0);
  const outStock=safeItems.filter(i=>Number(i?.stock)===0);
  const totalVal=safeItems.reduce((t,i)=>t+Number(i?.price||0)*Number(i?.stock||0),0);

  return<div style={{padding:14}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,color:C.accent,textTransform:"uppercase",letterSpacing:1}}>Envanter & Stok</div>
      <div style={{display:"flex",gap:6}}><Btn sm variant="secondary" onClick={()=>{exportCSV("Envanter", ["Urun", "Stok"], filtered.map(i=>[i?.name, i?.stock]));}}>⬇️ Excel</Btn><Btn sm onClick={()=>setShowMov(true)}>Hareket Ekle</Btn><Btn sm onClick={()=>{setF({id:null,name:"",category:"",price:"",stock:"",minStock:"",supplier:"",notes:""});setEditing(null);setShow(true);}}>+ Ürün</Btn></div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
      <StatCard label="Toplam Ürün" value={safeItems.length}/><StatCard label="Stok Değeri" value={`${totalVal.toLocaleString("tr-TR")} ₺`} col={C.success}/>
    </div>
    <TabBar tabs={["Ürün Listesi","Stok Hareketleri"]} active={tab} onChange={setTab}/>
    {tab===0 && (
      <div>
        {filtered.map(item=>(item && item.id) && <Card key={item.id} accent={Number(item.stock)===0?C.danger:undefined}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div><div style={{fontWeight:700,fontSize:15}}>{item.name}</div><div style={{fontSize:11,color:C.textSub}}>{item.category} • Adet: {item.stock}</div></div>
            <div style={{fontWeight:700,color:C.success}}>{Number(item.price).toLocaleString("tr-TR")} ₺</div>
          </div>
          <div style={{display:"flex",gap:6,marginTop:10}}><Btn sm variant="secondary" onClick={()=>adj(item.id, 1)}>+</Btn><Btn sm variant="secondary" onClick={()=>adj(item.id, -1)}>-</Btn><Btn sm variant="danger" onClick={()=>del(item.id)}>Sil</Btn></div>
        </Card>)}
      </div>
    )}
    {tab===1 && (
      <div>{safeMovements.map(m=>m && <Card key={m.id}><Row label={m.itemName} val={`${m.type==="in"?"+":"-"}${m.qty}`} col={m.type==="in"?C.success:C.danger}/></Card>)}</div>
    )}
    <Modal show={show} onClose={()=>setShow(false)} title="Ürün İşlemi">
      <Inp label="Ürün Adı *" value={f.name} onChange={v=>u("name",v)}/>
      <Inp label="Kategori" value={f.category} onChange={v=>u("category",v)}/>
      <Inp label="Fiyat" value={f.price} onChange={v=>u("price",v)} type="number"/>
      <Inp label="Stok" value={f.stock} onChange={v=>u("stock",v)} type="number"/>
      <Btn full onClick={save}>Kaydet</Btn>
    </Modal>
    <Modal show={showMov} onClose={()=>setShowMov(false)} title="Hareket">
      <Sel label="Ürün" value={movForm.itemId} onChange={v=>setMovForm(p=>({...p,itemId:v}))} options={safeItems.map(i=>({value:String(i?.id),label:i?.name}))}/>
      <Sel label="Tür" value={movForm.type} onChange={v=>setMovForm(p=>({...p,type:v}))} options={[{value:"in",label:"Giris"},{value:"out",label:"Cikis"}]}/>
      <Inp label="Adet" value={movForm.qty} onChange={v=>setMovForm(p=>({...p,qty:v}))} type="number"/>
      <Btn full onClick={addMovement}>Ekle</Btn>
    </Modal>
  </div>
}

function App(){
  const [isAuthenticated, setIsAuthenticated] = useState(() => sessionStorage.getItem("aqua_auth") === "1");
  const [isDbLoaded, setIsDbLoaded] = useState(false);
  const [students,setStudents]=useState([]);
  const [staff,setStaff]=useState([]);
  const [stockItems,setStockItems]=useState([]);
  const [movements,setMovements]=useState([]);
  const [expenses,setExpenses]=useState([]);
  const [clubName,setClubName]=useState("AquaClub");
  const [navItems,setNavItems]=useState(NAV_ITEMS);
  const [pinCode,setPinCode]=useState("0309");
  const [themeColor,setThemeColor]=useState("#070D1A");
  const [sidebarColor,setSidebarColor]=useState("#090F1E");
  const [cardColor,setCardColor]=useState("#101E35");
  const [logoUrl,setLogoUrl]=useState("");
  const [activeTab,setActiveTab]=useState("dashboard");
  const [sidebarOpen,setSidebarOpen]=useState(false);

  useEffect(() => {
    document.documentElement.style.setProperty('--bg-color', themeColor);
    document.documentElement.style.setProperty('--sidebar-bg', sidebarColor);
    document.documentElement.style.setProperty('--card-bg', cardColor);
  }, [themeColor, sidebarColor, cardColor]);

  useEffect(() => {
    const unsub = db.collection("appData").doc("main").onSnapshot((doc) => {
      if (doc.exists) {
        const d = doc.data();
        
        // 🚨 KESİN SÜZGEÇ: Veri ham haliyle Firebase'den indiği saniyede null'lar temizlenir.
        if (d.students) setStudents(safeArr(d.students));
        if (d.staff) setStaff(safeArr(d.staff));
        if (d.stock) setStockItems(safeArr(d.stock));
        if (d.movements) setMovements(safeArr(d.movements));
        if (d.expenses) setExpenses(safeArr(d.expenses));
        
        if (d.clubName) setClubName(d.clubName);
        if (d.pinCode) setPinCode(d.pinCode);
        if (d.themeColor) setThemeColor(d.themeColor);
        if (d.sidebarColor) setSidebarColor(d.sidebarColor);
        if (d.cardColor) setCardColor(d.cardColor);
        if (d.logoUrl) setLogoUrl(d.logoUrl);
        if (d.navItems) setNavItems(safeArr(d.navItems));
      }
      setIsDbLoaded(true);
    }, (error) => {
       console.error("Firebase Hatası:", error);
       setIsDbLoaded(true);
    });
    return () => unsub();
  }, []);

  if (!isDbLoaded) return <div style={{display:"flex",height:"100vh",alignItems:"center",justifyContent:"center",background:"#070D1A",color:"#0EA5E9",fontWeight:600}}><div className="spinner"></div>Sistem Yükleniyor...</div>;
  if (!isAuthenticated) return <PinScreen onSuccess={() => { setIsAuthenticated(true); sessionStorage.setItem("aqua_auth", "1"); }} correctPin={pinCode} />;

  const visibleNav=navItems.filter(n=>n.visible);

  return<div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg-color)"}}>
    <div className="sidebar-desktop" style={{width:220, background:"var(--sidebar-bg)", borderRight:"1px solid #1A2D45", display:"flex", flexDirection:"column"}}>
      <div style={{padding:16, fontWeight:800, borderBottom:"1px solid #1A2D45"}}>{clubName}</div>
      <div style={{flex:1, overflowY:"auto", paddingTop:10}}>
        {visibleNav.map(item=><button key={item.id} onClick={()=>setActiveTab(item.id)} style={{width:"100%", padding:12, background:activeTab===item.id?"rgba(14,165,233,0.1)":"transparent", border:"none", color:activeTab===item.id?"#0EA5E9":"#94A3B8", textAlgin:"left", cursor:"pointer", textAlign:"left", paddingLeft:20, fontSize:13, fontWeight:600}}>{item.label}</button>)}
      </div>
    </div>
    <div style={{flex:1, display:"flex", flexDirection:"column", overflow:"hidden"}}>
      <div style={{padding:14, background:C.card, borderBottom:"1px solid #1A2D45", fontWeight:700}}>{navItems.find(n=>n.id===activeTab)?.label}</div>
      <div style={{flex:1, overflowY:"auto"}}>
        {activeTab==="dashboard"&&<Dashboard students={students} stockItems={stockItems} expenses={expenses}/>}
        {activeTab==="students"&&<StudentsPage students={students} stockItems={stockItems}/>}
        {activeTab==="attendance"&&<AttendancePage students={students}/>}
        {activeTab==="payments"&&<PaymentsPage students={students}/>}
        {activeTab==="expenses"&&<ExpensesPage expenses={expenses}/>}
        {activeTab==="staff"&&<StaffPage staff={staff}/>}
        {activeTab==="inventory"&&<InventoryPage items={stockItems} movements={movements}/>}
        {activeTab==="settings"&&<SettingsPage navItems={navItems} clubName={clubName} logoUrl={logoUrl} themeColor={themeColor} sidebarColor={sidebarColor} cardColor={cardColor} pinCode={pinCode}/>}
      </div>
    </div>
    <style>{`@media(max-width:640px){.sidebar-desktop{display:none!important}}`}</style>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
