<html lang="tr">
<head>

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#F0F4F8"/>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin"/>

<title>AquaClub Pro</title>
<style>
:root {
  --bg-color: #F0F4F8;
  --sidebar-bg: #FFFFFF;
  --card-bg: #FFFFFF;
  --text-main: #1E293B;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg-color);transition:background 0.3s ease;}
body{font-family:'Inter',-apple-system,'Segoe UI',sans-serif;overscroll-behavior:none;color:var(--text-main);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#root{height:100%}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.3)}
input,select,textarea{-webkit-appearance:none;font-family:'Inter',-apple-system,sans-serif}
button{font-family:'Inter',-apple-system,sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}

/* Loading Spinner */
.spinner {border: 4px solid rgba(0,0,0,0.05); border-left-color: #0EA5E9; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 16px;}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* Kurumsal Tablo Tasarımları */
.data-row { display: grid; grid-template-columns: 2fr 1.2fr 1fr; gap: 10px; align-items: center; padding: 12px 4px; border-bottom: 1px solid #E2E8F0; }
.data-row:last-child { border-bottom: none; }
.data-col { font-size: 13px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
.data-col-sub { font-size: 11px; color: #64748B; font-weight: 400; }
.data-col-right { text-align: right; font-weight: 700; }
.data-header { font-size: 11px; font-weight: 700; color: #64748B; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #E2E8F0; padding-bottom: 8px; margin-bottom: 4px; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* ═══════════════════════════════════════════════════════════════
   GLOBAL AYAR SABİTLERİ (ÇÖKMEYİ ENGELLEYEN TANIMLAR)
═══════════════════════════════════════════════════════════════ */
const EMPTY_ITEM={id:null,name:"",category:"",price:"",stock:"",minStock:"",supplier:"",notes:""};
const STOCK_CATS=["Gözlük","Bone","Palet","Şamandıra","Aksesuar","Kıyafet","Temizlik","Diğer"];
const EMPTY_EXPENSE={id:null, title:"", amount:"", date:TODAY, category:"", isFood:false, expiryDate:"", note:"", qty:""};
const EXP_CATS=["Fatura", "Maaş", "Kira", "Gıda", "Ekipman/Malzeme", "Temizlik", "Ulaşım", "Diğer"];
const EMPTY_STAFF={id:null,name:"",role:"trainer",age:"",phone:"",email:"",dailyWage:0,attendance:{}};

/* ═══════════════════════════════════════════════════════════════
   FIREBASE YAPILANDIRMASI
═══════════════════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyA6d55XjKFlj4-eZPCYrfTl1451f-IKdq0",
  authDomain: "aquaclub44.firebaseapp.com",
  projectId: "aquaclub44",
  storageBucket: "aquaclub44.firebasestorage.app",
  messagingSenderId: "984045542069",
  appId: "1:984045542069:web:f04273e9644ad03ed9fcfc",
  measurementId: "G-2YQYQ8PHMG"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.firestore();

/* ═══════════════════════════════════════════════════════════════
   TEMEL RENK YAPILANDIRMASI
═══════════════════════════════════════════════════════════════ */
const C={
  bg:"var(--bg-color)", surface:"var(--card-bg)", card:"var(--card-bg)", sidebar:"var(--sidebar-bg)",
  border:"#E2E8F0", borderLight:"#F1F5F9",
  accent:"#0EA5E9", accentDark:"#0284C7", accentGlow:"#0EA5E915",
  text:"var(--text-main)", textSub:"#475569", textMuted:"#94A3B8",
  success:"#10B981", successBg:"#10B98115",
  warning:"#F59E0B", warningBg:"#F59E0B15",
  danger:"#EF4444",  dangerBg:"#EF444415",
  purple:"#8B5CF6",  purpleBg:"#8B5CF615",
  whatsapp:"#25D366", whatsappBg:"#25D36615",
  sidebarW:220
};

/* ═══════════════════════════════════════════════════════════════
   VERİTABANI KORUMALI FİLTRE
═══════════════════════════════════════════════════════════════ */
function safeArr(val) { 
  if (!val) return [];
  const arr = Array.isArray(val) ? val : Object.values(val);
  return arr.filter(item => item !== null && item !== undefined && typeof item === 'object');
}

const DB={
  set:(k,v)=>{
    const cleanV = Array.isArray(v) ? v.filter(i => i && typeof i === 'object') : v;
    db.collection("appData").doc("main").set({ [k]: cleanV }, { merge: true })
      .catch(err => console.error("Firebase kayıt hatası:", err));
  }
};

/* ═══════════════════════════════════════════════════════════════
   YARDIMCI FONKSİYONLAR
═══════════════════════════════════════════════════════════════ */
function fmtDate(d){if(!d)return"—";const[y,m,day]=d.split("-");return`${day}.${m}.${y}`}
function totalPaid(s){return safeArr(s.payments).reduce((t,p)=>t+Number(p.amount||0),0);}
function equipmentTotal(s){return safeArr(s.equipment).reduce((t,e)=>t+Number(e.price||0),0);}
function monthlyTotal(s){return Number(s.monthlyFee||0)-Number(s.discount||0)+equipmentTotal(s)+(s.hasTransport?Number(s.transportFee||0):0);}
function courseStatus(s){
  if(!s.courseStart||!s.courseEnd)return"unknown";
  const now=new Date(TODAY),st=new Date(s.courseStart),en=new Date(s.courseEnd);
  if(now<st)return"upcoming";if(now>en)return"ended";return"active";
}
/* ═══════════════════════════════════════════════════════════════
   SABİT BOYUTLU MODAL BİLEŞENİ
═══════════════════════════════════════════════════════════════ */
function Modal({show,onClose,title,children}){
  if(!show)return null;
  return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:C.surface,borderRadius:20,padding:"24px",width:"100%",maxWidth:540,height:"580px",display:"flex",flexDirection:"column",boxShadow:"0 20px 40px rgba(0,0,0,0.08)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexShrink:0}}>
        <div style={{fontSize:17,fontWeight:800,color:C.text}}>{title}</div>
        <button onClick={onClose} style={{background:C.bg,border:"none",color:C.textSub,width:32,height:32,borderRadius:16,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      </div>
      <div style={{flex:1,overflowY:"auto",paddingRight:4}}>{children}</div>
    </div>
  </div>
}

function daysLeft(s){return Math.ceil((new Date(s.courseEnd)-new Date(TODAY))/86400000)}
function attendanceCount(s){return Object.values(s.attendance||{}).filter(Boolean).length}
function age(dob){if(!dob)return"—";return Math.floor((Date.now()-new Date(dob))/31557600000)+" yaş"}
function calcEndDate(start,total,days){
  if(!start||!total||!days||days.length===0)return"";
  let d=new Date(start),cnt=0,iter=0;
  const safeDays = safeArr(days);
  while(cnt<total&&iter<total*30){if(safeDays.includes(d.getDay()))cnt++;if(cnt<total)d.setDate(d.getDate()+1);iter++;}
  return d.toISOString().split("T")[0];
}
function swimLevelLabel(v){return{beginner:"Başlangıç",intermediate:"Orta",advanced:"İleri",competitive:"Yarışmacı"}[v]||v||"—"}
function roleLabel(r){return{trainer:"Antrenör",admin:"İdari Personel",driver:"Şoför",other:"Diğer"}[r]||r||"—"}

/* ═══════════════════════════════════════════════════════════════
   GİRİŞ EKRANI
═══════════════════════════════════════════════════════════════ */
function LoginScreen({ onSuccess, appUsers, adminPin }) {
  const [user, setUser] = useState("");
  const [pass, setPass] = useState("");
  const [err, setErr] = useState(false);

  const handleLogin = (e) => {
    e.preventDefault();
    if (user.toLowerCase() === "admin" && (pass === "0309" || pass === adminPin)) {
      onSuccess({ id: 'admin', username: 'admin', role: 'admin', allowedTabs: NAV_ITEMS.map(n=>n.id) });
      return;
    }
    const foundUser = safeArr(appUsers).find(u => u.username.toLowerCase() === user.toLowerCase() && u.password === pass);
    if (foundUser) { onSuccess(foundUser); return; }
    setErr(true); setTimeout(() => setErr(false), 2000);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,padding:20}}>
      <div style={{fontSize:48, fontWeight:800, color:C.accent, marginBottom:30, letterSpacing:-1.5}}>AquaClub Pro</div>
      <form onSubmit={handleLogin} style={{background:C.card,padding:"40px 30px",borderRadius:24,border:`1px solid ${err?C.danger:C.borderLight}`,textAlign:"center",boxShadow:"0 12px 32px rgba(0,0,0,0.06)",width:"100%",maxWidth:360, transition:"all 0.3s"}}>
        <div style={{fontSize:18,fontWeight:700,marginBottom:24,color:C.text}}>Sisteme Giriş Yapın</div>
        <Inp value={user} onChange={setUser} placeholder="Kullanıcı Adı" autoFocus style={{textAlign:"center", fontSize:14, padding:"14px", borderRadius:12}}/>
        <Inp value={pass} onChange={setPass} type="password" placeholder="Şifre" style={{textAlign:"center", fontSize:14, padding:"14px", borderRadius:12, letterSpacing:4}}/>
        <Btn full style={{marginTop:12, padding:"14px", borderRadius:12, fontSize:14}}>Giriş Yap</Btn>
        <div style={{height: 20, marginTop: 16}}>{err && <div style={{color:C.danger,fontSize:13,fontWeight:600}}>Hatalı Bilgi Girdiniz!</div>}</div>
      </form>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   STUDENT FORM (ZORUNLU BÜYÜK HARF ENTEGRASYONU)
═══════════════════════════════════════════════════════════════ */
function StudentForm({initial,onSave,onCancel,stockItems}){
  const [tab,setTab]=useState(0);
  const [f,setF]=useState({...EMPTY_S,...initial});

  // Girişleri otomatik Türkçe destekli Büyük Harf yapar
  const u=(k,v)=>{
    if(typeof v === "string" && !["dob","courseStart","courseEnd","guardianPhone1","guardianPhone2"].includes(k)){
      v = v.toLocaleUpperCase("tr-TR");
    }
    setF(p=>({...p,[k]:v}));
  };

  const currentEq = safeArr(f.equipment);
  const safeWeekDays = safeArr(f.weekDays);

  useEffect(()=>{
    if(f.courseStart&&f.totalSessions&&safeWeekDays.length>0){
      u("courseEnd",calcEndDate(f.courseStart,Number(f.totalSessions),safeWeekDays));
    }
  },[f.courseStart,f.totalSessions,JSON.stringify(safeWeekDays)]);

  return<div>
    <TabBar tabs={["Kişisel","Kurs","Servis","Ekipman"]} active={tab} onChange={setTab}/>
    {tab===0&&<div>
      <Inp label="Ad Soyad *" value={f.name} onChange={v=>u("name",v)} style={{textTransform:"uppercase"}}/>
      <Inp label="Doğum Tarihi" value={f.dob} onChange={v=>u("dob",v)} type="date"/>
      <div style={{height:1,background:C.border,margin:"12px 0"}}/>
      <Inp label="Veli Adı Soyadı" value={f.guardianName} onChange={v=>u("guardianName",v)} style={{textTransform:"uppercase"}}/>
      <div style={{display:"flex",gap:8}}>
        <Inp label="Veli Telefonu 1" value={f.guardianPhone1} onChange={v=>u("guardianPhone1",v)} type="tel" half/>
        <Inp label="Veli Telefonu 2" value={f.guardianPhone2} onChange={v=>u("guardianPhone2",v)} type="tel" half/>
      </div>
      <div style={{height:1,background:C.border,margin:"12px 0"}}/>
      <Inp label="Özel Not" value={f.notes} onChange={v=>u("notes",v)} rows={3} style={{textTransform:"uppercase"}}/>
    </div>}
    {tab===1&&<div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><Sel label="Yüzme Seviyesi" value={f.swimLevel} onChange={v=>u("swimLevel",v)} options={[{value:"beginner",label:"Başlangıç"},{value:"intermediate",label:"Orta"},{value:"advanced",label:"İleri"},{value:"competitive",label:"Yarışmacı"}]}/></div>
        <div style={{flex:1}}><Inp label="Havuz Kulvarı" value={f.poolLane} onChange={v=>u("poolLane",v)}/></div>
      </div>
      <Inp label="Grup / Sınıf Adı" value={f.groupName} onChange={v=>u("groupName",v)} style={{textTransform:"uppercase"}}/>
      <div style={{height:1,background:C.border,margin:"12px 0"}}/>
      <div style={{fontSize:11,color:C.textSub,marginBottom:6,fontWeight:600}}>Haftalık Günler *</div>
      <DayPicker value={safeWeekDays} onChange={v=>u("weekDays",v)}/>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><Inp label="Başlangıç *" value={f.courseStart} onChange={v=>u("courseStart",v)} type="date"/></div>
        <div style={{flex:1}}><Inp label="Seans Sayısı *" value={f.totalSessions} onChange={v=>u("totalSessions",v)} type="number"/></div>
      </div>
      <Card style={{marginBottom:12}} accent={C.accent}>
        <div style={{fontSize:11,color:C.textSub,marginBottom:4,fontWeight:600}}>Hesaplanan Bitiş Tarihi</div>
        <div style={{fontSize:18,fontWeight:700,color:C.accent}}>{fmtDate(f.courseEnd)||"—"}</div>
      </Card>
      <div style={{height:1,background:C.border,margin:"12px 0"}}/>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><Inp label="Aylık Ücret (₺)" value={f.monthlyFee} onChange={v=>u("monthlyFee",v)} type="number"/></div>
        <div style={{flex:1}}><Inp label="İndirim (₺)" value={f.discount} onChange={v=>u("discount",v)} type="number"/></div>
      </div>
      <Inp label="Ödeme Notu" value={f.paymentNote} onChange={v=>u("paymentNote",v)} style={{textTransform:"uppercase"}}/>
    </div>}
    {tab===2&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:`1px solid ${C.border}`,marginBottom:14}}>
        <div><div style={{fontWeight:600,fontSize:14,color:C.text}}>Servis Kullanıyor mu?</div></div>
        <Toggle checked={f.hasTransport} onChange={v=>u("hasTransport",v)}/>
      </div>
      {f.hasTransport?<div>
        <Inp label="Öğrenci Adresi" value={f.address} onChange={v=>u("address",v)} rows={2} style={{textTransform:"uppercase"}}/>
        <Inp label="Servis Ücreti (₺)" value={f.transportFee} onChange={v=>u("transportFee",v)} type="number"/>
        <div style={{height:1,background:C.border,margin:"12px 0"}}/>
        <div style={{display:"flex",gap:8}}>
          <div style={{flex:1}}><Inp label="Şoför Adı" value={f.driverName} onChange={v=>u("driverName",v)} style={{textTransform:"uppercase"}}/></div>
          <div style={{flex:1}}><Inp label="Şoför Tel" value={f.driverPhone} onChange={v=>u("driverPhone",v)} type="tel"/></div>
        </div>
      </div>:<div style={{textAlign:"center",padding:"30px 0",color:C.textMuted}}>Servis kullanmıyor.</div>}
    </div>}
    {tab===3&&<div>
      <div style={{fontSize:12,color:C.textSub,marginBottom:12}}>Alınan ekipmanlar aylık ücrete yansır.</div>
      <EqPicker stockItems={stockItems} current={currentEq} onAdd={(item)=>setF(p=>({...p,equipment:[...currentEq,{id:Date.now(),...item,addedDate:TODAY}]}))} onRemove={(id)=>setF(p=>({...p,equipment:currentEq.filter(e=>e.id!==id)}))}/>
    </div>}
    <div style={{display:"flex",gap:10,marginTop:20}}>
      <Btn variant="secondary" onClick={onCancel} style={{flex:1}}>İptal</Btn>
      <Btn onClick={()=>onSave(f)} style={{flex:2}}>Kaydet</Btn>
    </div>
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   STUDENTS PAGE (SIKILAŞTIRILMIŞ BOŞLUKLAR)
═══════════════════════════════════════════════════════════════ */
function StudentsPage({students,stockItems}){
  const [search,setSearch]=useState("");
  const [showAdd,setShowAdd]=useState(false);
  const [detailId,setDetailId]=useState(null);
  const [statusFilter,setStatusFilter]=useState("all");
  const [groupFilter,setGroupFilter]=useState("all");

  const safeStudents = safeArr(students);
  const student=detailId?safeStudents.find(s=>s.id===detailId):null;

  function save(f){
    let n;
    if(f.id){n=safeStudents.map(s=>s.id===f.id?{...f}:s);}
    else{n=[...safeStudents,{...f,id:Date.now(),payments:[],attendance:{},equipment:safeArr(f.equipment)}];}
    DB.set("students",n);setShowAdd(false);
  }
  function del(id){const n=safeStudents.filter(s=>s.id!==id);DB.set("students",n);setDetailId(null);}

  const groups=["all",...new Set(safeStudents.map(s=>s.groupName).filter(Boolean))];
  const filtered=safeStudents.filter(s=>s && s.name && s.name.toLowerCase().includes(search.toLowerCase()));

  if(student)return<StudentDetail student={student} onBack={()=>setDetailId(null)} students={safeStudents} stockItems={stockItems}/>;

  return<div style={{padding:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:14,fontWeight:800,color:C.text}}>Öğrenciler ({filtered.length})</div>
      <Btn sm onClick={()=>setShowAdd(true)}>+ Yeni Kayıt</Btn>
    </div>
    <div style={{position:"relative",marginBottom:12}}>
      <input style={{width:"100%",padding:"12px 14px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,color:C.text,fontSize:14,outline:"none"}} placeholder="Öğrenci ara..." value={search} onChange={e=>setSearch(e.target.value)}/>
    </div>
    {/* Sıkılaştırılmış kart marjinleri (marginBottom: 6, padding: 10px 14px) */}
    {filtered.map(s=><Card key={s.id} style={{marginBottom:6, padding:"10px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontWeight:700,fontSize:15,color:C.text}}>{s.name}</div><div style={{fontSize:12,color:C.textSub,marginTop:2}}>{s.groupName||"Grup belirtilmemiş"}</div></div>
        <div style={{display:"flex",gap:6}}><Btn variant="secondary" sm onClick={()=>setDetailId(s.id)}>Detay</Btn><Btn variant="danger" sm onClick={()=>{if(confirm(`${s.name} silinsin mi?`))del(s.id);}}>Sil</Btn></div>
      </div>
    </Card>)}
    <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Yeni Öğrenci"><StudentForm initial={{}} onSave={save} onCancel={()=>setShowAdd(false)} stockItems={stockItems}/></Modal>
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   YENİ PERSONEL YÖNETİMİ, YOKLAMA VE HAKEDİŞ SİSTEMİ
═══════════════════════════════════════════════════════════════ */
function StaffPage({staff}){
  const validStaff = safeArr(staff);
  const [tab, setTab] = useState(0);
  const [showAdd, setShowAdd] = useState(false);
  const [f, setF] = useState(EMPTY_STAFF);
  const [selectedMonth, setSelectedMonth] = useState(TODAY.slice(0,7)); 
  const [activeStaffId, setActiveStaffId] = useState(null);
  
  const u=(k,v)=>setF(p=>({...p,[k]:v}));

  function save(){
    if(!f.name.trim()) return;
    const n = f.id ? validStaff.map(s=>s.id===f.id?{...s,...f}:s) : [...validStaff,{...f,id:Date.now(),attendance:{},dailyWage:Number(f.dailyWage||0)}];
    DB.set("staff",n); setShowAdd(false); setF(EMPTY_STAFF);
  }
  function del(id){if(confirm("Personel silinsin mi?")) DB.set("staff", validStaff.filter(s=>s.id!==id));}

  const year = Number(selectedMonth.split("-")[0] || 2026);
  const month = Number(selectedMonth.split("-")[1] || 6);
  const daysInMonth = new Date(year, month, 0).getDate();
  const daysArray = Array.from({length: daysInMonth}, (_, i) => i + 1);

  function toggleAttendance(staffId, dayKey) {
    const n = validStaff.map(s => {
      if(s.id !== staffId) return s;
      const att = { ...(s.attendance || {}) };
      if(att[dayKey]) delete att[dayKey]; else att[dayKey] = true;
      return { ...s, attendance: att };
    });
    DB.set("staff", n);
  }

  return<div style={{padding:16}}>
    <TabBar tabs={["Personel Listesi","Yoklama & Maaş Hakediş"]} active={tab} onChange={setTab}/>
    
    {tab===0&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontSize:14,fontWeight:800}}>Personel Kadrosu ({validStaff.length})</div>
        <Btn sm onClick={()=>{setF(EMPTY_STAFF);setShowAdd(true);}}>+ Yeni Personel</Btn>
      </div>
      {validStaff.length===0?<div style={{textAlign:"center",padding:"40px 0",color:C.textMuted}}>Kayıtlı personel bulunmuyor.</div>:
        validStaff.map(s=><Card key={s.id}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontWeight:700,fontSize:15,color:C.text}}>{s.name}</div><div style={{fontSize:12,color:C.textSub,marginTop:2}}>{roleLabel(s.role)} • Sabit Yevmiye: {Number(s.dailyWage||0)} ₺</div></div>
            <div style={{display:"flex",gap:6}}><Btn variant="secondary" sm onClick={()=>{setF(s);setShowAdd(true);}}>Düzenle</Btn><Btn variant="danger" sm onClick={()=>del(s.id)}>Sil</Btn></div>
          </div>
        </Card>)
      }
    </div>}

    {tab===1&&<div>
      <SectionTitle>Aylık Puantaj & Hakediş Raporu</SectionTitle>
      <Card style={{marginBottom:16}}><Inp label="Çalışma ve Takip Ayı" type="month" value={selectedMonth} onChange={setSelectedMonth}/></Card>
      
      {validStaff.map(s=>{
        const monthlyAtt = Object.keys(s.attendance || {}).filter(k => k.startsWith(selectedMonth) && s.attendance[k]);
        const daysCount = monthlyAtt.length;
        const totalOwed = daysCount * Number(s.dailyWage || 0);
        const isExpanded = activeStaffId === s.id;

        return <Card key={`track-${s.id}`} style={{borderLeft: isExpanded ? `4px solid ${C.accent}` : "none", marginBottom:10}}>
          <div style={{display:"flex", justifyTemplateColumns:"space-between", justifyContent:"space-between", alignItems:"center", cursor:"pointer"}} onClick={()=>setActiveStaffId(isExpanded ? null : s.id)}>
            <div>
              <div style={{fontWeight:700, fontSize:15, color:C.text}}>{s.name}</div>
              <div style={{fontSize:12, color:C.textSub, marginTop:2}}>{daysCount} Gün Mesai • Toplam Hakediş: <strong style={{color:C.success}}>{totalOwed.toLocaleString("tr-TR")} ₺</strong></div>
            </div>
            <Btn sm variant="secondary">{isExpanded ? "Kapat ▲" : "Yoklama Gir ▼"}</Btn>
          </div>

          {isExpanded && <div style={{marginTop:16, paddingTop:16, borderTop:`1px solid ${C.border}`}}>
            <div style={{marginBottom:14}}><Inp label="Günlük Yevmiye Ücreti Güncelle (₺)" type="number" value={s.dailyWage || 0} onChange={(v)=>{
              const n = validStaff.map(st => st.id === s.id ? { ...st, dailyWage: Number(v) } : st); DB.set("staff", n);
            }}/></div>
            <div style={{fontSize:11, fontWeight:700, color:C.textSub, marginBottom:10, textTransform:"uppercase"}}>{selectedMonth} Dönemi Takvimi (İşaretlemek için günlere tıklayın)</div>
            <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(42px, 1fr))", gap:6}}>
              {daysArray.map(day => {
                const dayStr = String(day).padStart(2, '0'); const dayKey = `${selectedMonth}-${dayStr}`; const isPresent = !!s.attendance?.[dayKey];
                return <button key={day} onClick={()=>toggleAttendance(s.id, dayKey)} style={{padding:"8px 0", borderRadius:8, border:`1px solid ${isPresent ? C.success : C.border}`, background: isPresent ? C.successBg : C.bg, color: isPresent ? C.success : C.textSub, fontWeight:700, fontSize:12, cursor:"pointer"}}>{day}</button>
              })}
            </div>
          </div>}
        </Card>
      })}
    </div>}

    <Modal show={showAdd} onClose={()=>setShowAdd(false)} title={f.id?"Personel Düzenle":"Yeni Personel Ekle"}>
      <Inp label="Personel Ad Soyad *" value={f.name} onChange={v=>u("name",v)}/>
      <Sel label="Görev" value={f.role} onChange={v=>u("role",v)} options={[{value:"trainer",label:"Antrenör"},{value:"admin",label:"İdari Personel"},{value:"driver",label:"Şoför"},{value:"other",label:"Diğer"}]}/>
      <div style={{display:"flex",gap:8}}><div style={{flex:1}}><Inp label="Yaş" value={f.age} onChange={v=>u("age",v)} type="number"/></div><div style={{flex:1}}><Inp label="Telefon" value={f.phone} onChange={v=>u("phone",v)} type="tel"/></div></div>
      <Inp label="Günlük Hakediş/Yevmiye Ücreti (₺) *" value={f.dailyWage} onChange={v=>u("dailyWage",v)} type="number"/>
      <div style={{display:"flex",gap:10,marginTop:20}}><Btn variant="secondary" onClick={()=>setShowAdd(false)} style={{flex:1}}>İptal</Btn><Btn onClick={save} style={{flex:2}}>Kaydet</Btn></div>
    </Modal>
  </div>
}

/* ═══════════════════════════════════════════════════════════════

// (Değişmeyen kurumsal alt modüller aynen korunmuştur)
function AttendancePage({students}){
  const [date,setDate]=useState(TODAY); const [y, m, d] = date.split('-'); const selectedDayIndex = new Date(y, m - 1, d).getDay();
  const active=safeArr(students).filter(s=>courseStatus(s)==="active" && (s.weekDays||[]).includes(selectedDayIndex));
  const present=active.filter(s=>(s.attendance||{})[date]).length;
  function toggle(id,val){ const n=safeArr(students).map(s=>{if(s.id!==id)return s; const att={...s.attendance}; if(val)att[date]=true; else delete att[date]; return{...s,attendance:att}}); DB.set("students",n); }
  return<div style={{padding:16}}>
    <SectionTitle action={<Btn sm variant="ghost" onClick={()=>exportCSV(`Yoklama_${date}`, ["Ad", "Durum"], active.map(s => [s.name, (s.attendance||{})[date] ? "Var" : "Yok"]))}>⬇️ Excel</Btn>}>Yoklama</SectionTitle>
    <Inp value={date} onChange={setDate} type="date"/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}><StatCard label="Beklenen" value={active.length}/><StatCard label="Mevcut" value={present} col={C.success}/></div>
    <Card>{active.map((s,i)=><div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:i===active.length-1?"none":`1px solid ${C.borderLight}`}}><div><div style={{fontSize:15,fontWeight:700}}>{s.name}</div></div><Toggle checked={!!(s.attendance||{})[date]} onChange={v=>toggle(s.id,v)}/></div>)}</Card>
  </div>
}
function PaymentsPage({students}){
  const all=safeArr(students).flatMap(s=>safeArr(s.payments).map(p=>({...p,studentName:s.name}))).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const total=all.reduce((t,p)=>t+Number(p.amount),0); const thisMonth=all.filter(p=>p.date&&p.date.startsWith(TODAY.slice(0,7))).reduce((t,p)=>t+Number(p.amount),0);
  const unpaid = safeArr(students).filter(s => courseStatus(s) === "active" && totalPaid(s) < monthlyTotal(s));
  return<div style={{padding:16}}>
    <SectionTitle action={<Btn sm variant="ghost" onClick={()=>exportCSV("Odemeler", ["Ogrenci", "Tutar"], all.map(p => [p.studentName, p.amount]))}>⬇️ Excel</Btn>}>Ödemeler</SectionTitle>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}><StatCard label="Toplam" value={`${total} ₺`} col={C.success} span2/><StatCard label="Bu Ay" value={`${thisMonth} ₺`}/><StatCard label="Eksik" value={unpaid.length} col={C.danger}/></div>
    <Card>{all.map(p=><Row key={p.id} label={p.studentName} val={`+${p.amount} ₺`} col={C.success}/>)}</Card>
  </div>
}
function ExpensesPage({expenses}){
  const [show,setShow]=useState(false); const [f,setF]=useState(EMPTY_EXPENSE); const [filterMonth,setFilterMonth]=useState(TODAY.slice(0,7)); const u=(k,v)=>setF(p=>({...p,[k]:v}));
  function save(){ if(!f.title.trim()||!f.amount)return; const n=f.id?safeArr(expenses).map(e=>e.id===f.id?{...f}:e):[...safeArr(expenses),{...f,id:Date.now()}]; DB.set("expenses",n); setShow(false); setF(EMPTY_EXPENSE); }
  const filtered=safeArr(expenses).filter(e=>e.date&&e.date.startsWith(filterMonth)); const totalExp=filtered.reduce((t,e)=>t+Number(e.amount),0);
  return<div style={{padding:16}}>
    <SectionTitle action={<Btn sm onClick={()=>setShow(true)}>+ Gider Ekle</Btn>}>Giderler</SectionTitle>
    <div style={{display:"flex",gap:10,marginBottom:16}}><input type="month" value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} style={{flex:1,padding:12,background:C.surface,border:`1px solid ${C.border}`,borderRadius:12}}/><StatCard label="Toplam Gider" value={`${totalExp} ₺`} col={C.danger}/></div>
    {filtered.map(e=><Card key={e.id}><Row label={e.title} val={`-${e.amount} ₺`} col={C.danger}/></Card>)}
    <Modal show={show} onClose={()=>setShow(false)} title="Yeni Gider"><Inp label="Açıklama *" value={f.title} onChange={v=>u("title",v)}/><Inp label="Tutar *" value={f.amount} onChange={v=>u("amount",v)} type="number"/><Btn full onClick={save}>Kaydet</Btn></Modal>
  </div>
}
function WhatsAppPage({students, waGroupLink}){
  const activeStudents = safeArr(students).filter(s => courseStatus(s) === "active" && s.guardianPhone1);
  return <div style={{padding:16}}>
    <SectionTitle>WhatsApp Entegrasyonu</SectionTitle>
    <Card style={{marginBottom:16}}><Btn full style={{background:C.whatsapp, color:"#fff", border:"none"}} onClick={()=>window.open("https://web.whatsapp.com", "_blank")}>WhatsApp Web Sekmesini Aç</Btn></Card>
    <Card>{activeStudents.map(s=><div key={s.id} style={{display:"flex",justifyContent:"space-between",padding:"10px 0"}}><span style={{color:C.text, fontWeight:600}}>{s.name}</span><Btn sm style={{background:C.whatsappBg,color:C.whatsapp}} onClick={()=>openWA(s.guardianPhone1,`Merhaba, duyuru grubumuz: ${waGroupLink || ''}`)}>Grup Daveti Gönder</Btn></div>)}</Card>
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   GELİŞMİŞ KURUMSAL DASHBOARD (YAN YANA GRID DÜZENİ)
═══════════════════════════════════════════════════════════════ */
function Dashboard({students,expenses}){
  const safeStudents = safeArr(students); const safeExpenses = safeArr(expenses); const active=safeStudents.filter(s=>courseStatus(s)==="active");
  const totalRev=safeStudents.reduce((t,s)=>t+totalPaid(s),0); const totalExp=safeExpenses.reduce((t,e)=>t+Number(e.amount||0),0); const netProfit = totalRev - totalExp;
  const recentRegistrations = [...safeStudents].sort((a,b) => b.id - a.id).slice(0, 5);
  const recentPay = safeStudents.flatMap(s=>safeArr(s.payments).map(p=>({...p,studentName:s.name}))).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0, 5);
  const endingSoon = active.filter(s=>{const d=daysLeft(s);return d>=0&&d<=14;}).sort((a,b)=>daysLeft(a)-daysLeft(b)).slice(0, 5);

  return<div style={{padding:16}}>
    <Card accent={netProfit >= 0 ? C.success : C.danger} style={{marginBottom:16, background:netProfit >= 0 ? C.successBg : C.dangerBg, border:"none"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:13, color:netProfit >= 0 ? C.success : C.danger, fontWeight:800}}>NET KASA DURUMU</div>
        <div style={{fontSize:26, fontWeight:800, color:netProfit >= 0 ? C.success : C.danger}}>{netProfit >= 0 ? "+" : ""}{netProfit.toLocaleString("tr-TR")} ₺</div>
      </div>
    </Card>

    {/* YAN YANA SIRALANAN KURUMSAL 3'LÜ GRID SİSTEMİ */}
    <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(300px, 1fr))", gap:16, alignItems:"start", marginTop:12}}>
      
      {/* 1. SON KAYITLAR */}
      <Card style={{borderRadius:16, padding:16}}>
        <div style={{fontSize:12, fontWeight:800, marginBottom:12, textTransform:"uppercase", color:C.text}}>Son Kayıt Olanlar</div>
        <div className="data-row data-header"><div>Ad Soyad</div><div>Kayıt Trh.</div><div className="data-col-right">Grup</div></div>
        {recentRegistrations.map(s => <div className="data-row" key={s.id}><div className="data-col">{s.name}</div><div className="data-col data-col-sub">{fmtDate(s.courseStart)}</div><div className="data-col data-col-right" style={{color:C.accent}}>{s.groupName || "-"}</div></div>)}
      </Card>

      {/* 2. SON ÖDEMELER */}
      <Card style={{borderRadius:16, padding:16}}>
        <div style={{fontSize:12, fontWeight:800, marginBottom:12, textTransform:"uppercase", color:C.text}}>Son Ödemeler</div>
        <div className="data-row data-header"><div>Ad Soyad</div><div>Tarih</div><div className="data-col-right">Tutar</div></div>
        {recentPay.map((p, i) => <div className="data-row" key={i}><div className="data-col">{p.studentName}</div><div className="data-col data-col-sub">{fmtDate(p.date)}</div><div className="data-col data-col-right" style={{color:C.success}}>+{p.amount} ₺</div></div>)}
      </Card>

      {/* 3. BİTİŞİ YAKLAŞANLAR */}
      <Card style={{borderRadius:16, padding:16, border:`1px solid ${C.warning}40`}}>
        <div style={{fontSize:12, fontWeight:800, marginBottom:12, textTransform:"uppercase", color:C.text}}>Kayıt Bitişi Yaklaşanlar</div>
        <div className="data-row data-header"><div>Ad Soyad</div><div>Bitiş Trh.</div><div className="data-col-right">Kalan</div></div>
        {endingSoon.map(s => <div className="data-row" key={s.id}><div className="data-col">{s.name}</div><div className="data-col data-col-sub">{fmtDate(s.courseEnd)}</div><div className="data-col data-col-right" style={{color:C.warning}}>{daysLeft(s)} Gün</div></div>)}
      </Card>

    </div>
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   AYARLAR PANELİ
═══════════════════════════════════════════════════════════════ */
function SettingsPage({navItems, clubName, logoUrl, themeColor, sidebarColor, cardColor, textColor, appUsers}){
  const [tab, setTab] = useState(0); const [nameVal, setNameVal] = useState(clubName); const [logoVal, setLogoVal] = useState(logoUrl);
  const [colorVal, setColorVal] = useState(themeColor); const [sidebarColorVal, setSidebarColorVal] = useState(sidebarColor);
  const [cardColorVal, setCardColorVal] = useState(cardColor); const [textColorVal, setTextColorVal] = useState(textColor); const [saveMsg, setSaveMsg] = useState("");
  const [showUserModal, setShowUserModal] = useState(false); const [uForm, setUForm] = useState({ id:null, username:"", password:"", role:"staff", allowedTabs:[] });

  useEffect(() => { setNameVal(clubName); setLogoVal(logoUrl); setColorVal(themeColor); setSidebarColorVal(sidebarColor); setCardColorVal(cardColor); setTextColorVal(textColor); }, [clubName, logoUrl, themeColor, sidebarColor, cardColor, textColor]);
  function saveGeneral(){ DB.set("clubName", nameVal); DB.set("logoUrl", logoVal); DB.set("themeColor", colorVal); DB.set("sidebarColor", sidebarColorVal); DB.set("cardColor", cardColorVal); DB.set("textColor", textColorVal); setSaveMsg("Ayarlar başarıyla kaydedildi."); setTimeout(()=>setSaveMsg(""), 3000); }
  function saveUser() { if(!uForm.username||!uForm.password)return; let n = safeArr(appUsers); if(uForm.id) n = n.map(u => u.id === uForm.id ? {...uForm} : u); else n = [...n, {...uForm, id:Date.now()}]; DB.set("appUsers", n); setShowUserModal(false); }

  return<div style={{padding:16}}>
    <TabBar tabs={["Genel & Renk", "Kullanıcı Yetkileri"]} active={tab} onChange={setTab}/>
    {tab === 0 && (
      <div>
        <Card><Inp label="Kulüp Adı" value={nameVal} onChange={setNameVal}/><Inp label="Logo URL" value={logoVal} onChange={setLogoVal}/></Card>
        <Card>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:10}}><span>Arkaplan Gri</span><input type="color" value={colorVal} onChange={e=>setColorVal(e.target.value)}/></div>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:10}}><span>Menü Beyaz</span><input type="color" value={sidebarColorVal} onChange={e=>setSidebarColorVal(e.target.value)}/></div>
          <div style={{display:"flex", justifyContent:"space-between"}}><span>Yazı Koyu Füme</span><input type="color" value={textColorVal} onChange={e=>setTextColorVal(e.target.value)}/></div>
        </Card>
        <Btn full onClick={saveGeneral}>Kaydet</Btn>
        {saveMsg && <div style={{textAlign:"center",color:C.success,marginTop:10}}>{saveMsg}</div>}
      </div>
    )}
    {tab===1&&<div>
      <SectionTitle action={<Btn sm onClick={()=>{setUForm({id:null,username:"",password:"",role:"staff",allowedTabs:["dashboard","attendance"]});setShowUserModal(true);}}>+ Yeni Personel Ekle</Btn>}>Kullanıcı Hesapları</SectionTitle>
      {safeArr(appUsers).map(u=><Card key={u.id}><Row label={u.username} val={u.role==='admin'?'Yönetici':'Çalışan'}/></Card>)}
      <Modal show={showUserModal} onClose={()=>setShowUserModal(false)} title="Hesap Yetkilendir"><Inp label="Kullanıcı Adı" value={uForm.username} onChange={v=>setUForm({...uForm,username:v})}/><Inp label="Şifre" value={uForm.password} onChange={v=>setUForm({...uForm,password:v})}/><Btn full onClick={saveUser}>Kaydet</Btn></Modal>
    </div>}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════════════════ */
function App(){
  const [currentUser, setCurrentUser] = useState(() => { try { return JSON.parse(sessionStorage.getItem("aqua_user")); } catch { return null; } });
  const [isDbLoaded, setIsDbLoaded] = useState(false);
  const [students,setStudents]=useState([]); const [staff,setStaff]=useState([]); const [stockItems,setStockItems]=useState([]); const [movements,setMovements]=useState([]); const [expenses,setExpenses]=useState([]);
  const [clubName,setClubName]=useState("AquaClub"); const [navItems,setNavItems]=useState(NAV_ITEMS); const [appUsers, setAppUsers]=useState([]); const [oldPinCode, setOldPinCode]=useState("0309"); const [waGroupLink,setWaGroupLink]=useState("");
  const [themeColor,setThemeColor]=useState("#F0F4F8"); const [sidebarColor,setSidebarColor]=useState("#FFFFFF"); const [cardColor,setCardColor]=useState("#FFFFFF"); const [textColor,setTextColor]=useState("#1E293B"); const [logoUrl,setLogoUrl]=useState(""); const [activeTab,setActiveTab]=useState("dashboard"); const [sidebarOpen,setSidebarOpen]=useState(false);

  useEffect(() => { document.documentElement.style.setProperty('--bg-color', themeColor); document.documentElement.style.setProperty('--sidebar-bg', sidebarColor); document.documentElement.style.setProperty('--card-bg', cardColor); document.documentElement.style.setProperty('--text-main', textColor); }, [themeColor, sidebarColor, cardColor, textColor]);

  useEffect(() => {
    const unsub = db.collection("appData").doc("main").onSnapshot((doc) => {
      if (doc.exists) {
        const d = doc.data();
        if (d.students) setStudents(safeArr(d.students));
        if (d.staff) setStaff(safeArr(d.staff));
        if (d.stock) setStockItems(safeArr(d.stock));
        if (d.movements) setMovements(safeArr(d.movements));
        if (d.expenses) setExpenses(safeArr(d.expenses));
        if (d.waGroupLink) setWaGroupLink(d.waGroupLink);
        if (d.clubName) setClubName(d.clubName);
        if (d.pinCode) setOldPinCode(d.pinCode); 
        let loadedUsers = safeArr(d.appUsers);
        if (loadedUsers.length === 0) { loadedUsers = [{ id:"admin", username:"admin", password: d.pinCode || "0309", role:"admin", allowedTabs: NAV_ITEMS.map(n=>n.id) }]; }
        setAppUsers(loadedUsers);
        if (d.themeColor) setThemeColor(d.themeColor);
        if (d.sidebarColor) setSidebarColor(d.sidebarColor);
        if (d.cardColor) setCardColor(d.cardColor);
        if (d.textColor) setTextColor(d.textColor);
        if (d.logoUrl) setLogoUrl(d.logoUrl);
        if (d.navItems) setNavItems(d.navItems);
      }
      setIsDbLoaded(true);
    });
    return () => unsub();
  }, []);

  if (!isDbLoaded) return <div style={{display:"flex",flexDirection:"column",height:"100vh",alignItems:"center",justifyContent:"center",background:"var(--bg-color)"}}><div className="spinner"></div><div style={{color:"var(--text-main)",fontWeight:700,marginTop:10}}>Sistem Yükleniyor...</div></div>;
  if (!currentUser) return <LoginScreen onSuccess={(user) => { sessionStorage.setItem("aqua_user", JSON.stringify(user)); setCurrentUser(user); }} appUsers={appUsers} adminPin={oldPinCode} />;

  const visibleNav = NAV_ITEMS.filter(n => currentUser.role === "admin" || (currentUser.allowedTabs || []).includes(n.id));

  return<div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg-color)"}}>
    <div className="sidebar-desktop" style={{width:240, background:"var(--sidebar-bg)", borderRight:"1px solid #E2E8F0", display:"flex", flexDirection:"column", boxShadow:"2px 0 10px rgba(0,0,0,0.02)", zIndex:100}}>
      <div style={{padding:"24px 20px 20px", borderBottom:"1px solid #E2E8F0", display:"flex", alignItems:"center", gap:12}}>
        <div style={{width:38,height:38,borderRadius:10,background:`linear-gradient(135deg,${C.accent},${C.accentDark})`,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
          {logoUrl ? <img src={logoUrl} alt="Logo" style={{width:"100%",height:"100%",objectFit:"cover"}}/> : <span style={{color:"white", fontWeight:800}}>AC</span>}
        </div>
        <div><div style={{fontSize:15,fontWeight:800,color:"var(--text-main)"}}>{clubName}</div><div style={{fontSize:11,color:C.textSub,fontWeight:600}}>{currentUser.username}</div></div>
      </div>
      <div style={{flex:1, overflowY:"auto", padding:"16px 12px"}}>
        {visibleNav.map(item=><button key={item.id} onClick={()=>setActiveTab(item.id)} style={{display:"flex",alignItems:"center",gap:12,width:"100%", padding:"12px 14px", marginBottom:6, background:activeTab===item.id?C.accentGlow:"transparent", border:"none", borderRadius:12, color:activeTab===item.id?C.accentDark:C.textSub, cursor:"pointer", textAlign:"left", fontSize:14, fontWeight:activeTab===item.id?700:500}}><Icon d={item.icon} size={18}/> {item.label}</button>)}
      </div>
      <div style={{padding:"16px"}}><button onClick={()=>{sessionStorage.removeItem("aqua_user"); window.location.reload();}} style={{width:"100%", padding:"12px", background:C.dangerBg, borderRadius:12, border:"none", color:C.danger, fontWeight:700, cursor:"pointer"}}>Çıkış Yap</button></div>
    </div>
    
    <div style={{flex:1, display:"flex", flexDirection:"column", overflow:"hidden"}}>
      <div style={{padding:"16px 20px", background:"var(--sidebar-bg)", borderBottom:"1px solid #E2E8F0", fontWeight:800, fontSize:16, display:"flex", alignItems:"center", gap:16, color:"var(--text-main)"}}>
        <button onClick={()=>setSidebarOpen(true)} className="menu-btn" style={{background:"transparent", border:`1px solid #E2E8F0`, color:"var(--text-main)", width:36, height:36, borderRadius:10}}>☰</button>
        {(visibleNav.find(n=>n.id===activeTab)||{}).label}
      </div>
      
      <div style={{flex:1, overflowY:"auto"}}>
        {activeTab==="dashboard"&&<Dashboard students={students} stockItems={stockItems} expenses={expenses}/>}
        {activeTab==="students"&&<StudentsPage students={students} stockItems={stockItems}/>}
        {activeTab==="attendance"&&<AttendancePage students={students}/>}
        {activeTab==="payments"&&<PaymentsPage students={students}/>}
        {activeTab==="expenses"&&<ExpensesPage expenses={expenses}/>}
        {activeTab==="whatsapp"&&<WhatsAppPage students={students} waGroupLink={waGroupLink} />}
        {activeTab==="staff"&&<StaffPage staff={staff}/>}
        {activeTab==="inventory"&&<InventoryPage items={stockItems}/>}
        {activeTab==="settings"&&currentUser.role==='admin'&&<SettingsPage navItems={NAV_ITEMS} clubName={clubName} logoUrl={logoUrl} themeColor={themeColor} sidebarColor={sidebarColor} cardColor={cardColor} textColor={textColor} appUsers={appUsers}/>}
      </div>
    </div>
    <style>{`@media(max-width:768px){.sidebar-desktop{display:none!important}} @media(min-width:769px){.menu-btn{display:none!important}}`}</style>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
