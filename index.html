function safeArr(val) { 
  if (!val) return [];
  return (Array.isArray(val) ? val : Object.values(val)).filter(item => item !== null && item !== undefined && typeof item === 'object');
}

const DB={
  set:(k,v)=>{
    const cleanV = Array.isArray(v) ? v.filter(i => i && typeof i === 'object') : v;
    db.collection("appData").doc("main").set({ [k]: cleanV }, { merge: true })
      .catch(err => console.error("Firebase kayıt hatası:", err));
  }
};

function fmtDate(d){if(!d)return"—";const[y,m,day]=d.split("-");return`${day}.${m}.${y}`}
function totalPaid(s){return safeArr(s?.payments).reduce((t,p)=>t+Number(p.amount||0),0);}
function equipmentTotal(s){return safeArr(s?.equipment).reduce((t,e)=>t+Number(e.price||0),0);}
function monthlyTotal(s){return Number(s?.monthlyFee||0)-Number(s?.discount||0)+equipmentTotal(s)+(s?.hasTransport?Number(s?.transportFee||0):0);}
function courseStatus(s){
  if(!s?.courseStart||!s?.courseEnd)return"unknown";
  const now=new Date(TODAY),st=new Date(s.courseStart),en=new Date(s.courseEnd);
  if(now<st)return"upcoming";if(now>en)return"ended";return"active";
}
function daysLeft(s){return Math.ceil((new Date(s?.courseEnd)-new Date(TODAY))/86400000)}
function attendanceCount(s){return Object.values(s?.attendance||{}).filter(Boolean).length}
function age(dob){if(!dob)return"—";return Math.floor((Date.now()-new Date(dob))/31557600000)+" yaş"}
function calcEndDate(start,total,days){
  if(!start||!total||!days||days.length===0)return"";
  let d=new Date(start),cnt=0,iter=0;
  const safeDays = safeArr(days);
  while(cnt<total&&iter<total*30){if(safeDays.includes(d.getDay()))cnt++;if(cnt<total)d.setDate(d.getDate()+1);iter++;}
  return d.toISOString().split("T")[0];
}
function swimLevelLabel(v){return{beginner:"Başlangıç",intermediate:"Orta",advanced:"İleri",competitive:"Yarışmacı"}[v]||v||"—"}
function roleLabel(r){return{trainer:"Antrenör",admin:"İdari Personel",driver:"Şoför",other:"Diğer"}[r]||r||"—"}

function openWA(phone, text) {
  if (!phone) { alert("Sisteme kayıtlı veli telefonu bulunamadı."); return; }
  let p = phone.replace(/\D/g, "");
  if (p.startsWith("0")) p = "90" + p.slice(1);
  else if (p.length === 10) p = "90" + p;
  window.open(`https://wa.me/${p}?text=${encodeURIComponent(text)}`, "_blank");
}

function exportCSV(filename, headers, rows) {
  const bom = "\uFEFF"; 
  const csv = [headers.join(","), ...rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(","))].join("\n");
  const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename + ".csv";
  link.click();
}

function LoginScreen({ onSuccess, appUsers, adminPin }) {
  const [user, setUser] = useState("");
  const [pass, setPass] = useState("");
  const [err, setErr] = useState(false);

  const handleLogin = (e) => {
    e.preventDefault();
    if (user.toLowerCase() === "admin" && (pass === "0309" || pass === adminPin)) {
      onSuccess({ id: 'admin', username: 'admin', role: 'admin', allowedTabs: NAV_ITEMS.map(n=>n.id) });
      return;
    }
    const foundUser = safeArr(appUsers).find(u => u.username.toLowerCase() === user.toLowerCase() && u.password === pass);
    if (foundUser) { onSuccess(foundUser); return; }
    setErr(true); setTimeout(() => setErr(false), 2000);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"var(--bg-color)",padding:20}}>
      <div style={{fontSize:48, fontWeight:800, color:"#0EA5E9", marginBottom:30, letterSpacing:-1.5}}>AquaClub Pro</div>
      <form onSubmit={handleLogin} style={{background:"var(--card-bg)",padding:"40px 30px",borderRadius:24,border:`1px solid ${err?"#EF4444":"#E2E8F0"}`,textAlign:"center",boxShadow:"0 12px 32px rgba(0,0,0,0.06)",width:"100%",maxWidth:360, transition:"all 0.3s"}}>
        <div style={{fontSize:18,fontWeight:700,marginBottom:24,color:"var(--text-main)"}}>Sisteme Giriş Yapın</div>
        <Inp value={user} onChange={setUser} placeholder="Kullanıcı Adı" autoFocus style={{textAlign:"center", fontSize:14, padding:"14px", borderRadius:12}}/>
        <Inp value={pass} onChange={setPass} type="password" placeholder="Şifre" style={{textAlign:"center", fontSize:14, padding:"14px", borderRadius:12}}/>
        <Btn full style={{marginTop:12, padding:"14px", borderRadius:12, fontSize:14}}>Giriş Yap</Btn>
        <div style={{height: 20, marginTop: 16}}>{err && <div style={{color:"#EF4444",fontSize:13,fontWeight:600}}>Hatalı Bilgi Girdiniz!</div>}</div>
      </form>
    </div>
  );
}

/* ZORUNLU BÜYÜK HARF İLE ÖĞRENCİ FORMU */
function StudentForm({initial,onSave,onCancel,stockItems}){
  const [tab,setTab]=useState(0);
  const [f,setF]=useState({...EMPTY_S,...initial});

  const u=(k,v)=>{
    if(typeof v === "string" && !["dob","courseStart","courseEnd","guardianPhone1","guardianPhone2"].includes(k)){
      v = v.toLocaleUpperCase("tr-TR");
    }
    setF(p=>({...p,[k]:v}));
  };

  const currentEq = safeArr(f.equipment);
  const safeWeekDays = safeArr(f.weekDays);

  useEffect(()=>{
    if(f.courseStart&&f.totalSessions&&safeWeekDays.length>0){
      u("courseEnd",calcEndDate(f.courseStart,Number(f.totalSessions),safeWeekDays));
    }
  },[f.courseStart,f.totalSessions,JSON.stringify(safeWeekDays)]);

  return<div>
    <TabBar tabs={["Kişisel","Kurs","Servis","Ekipman"]} active={tab} onChange={setTab}/>
    {tab===0&&<div>
      <Inp label="Ad Soyad *" value={f.name} onChange={v=>u("name",v)}/>

        <Inp label="Veli Telefonu 1" value={f.guardianPhone1} onChange={v=>u("guardianPhone1",v)} type="tel" half/>
        <Inp label="Veli Telefonu 2" value={f.guardianPhone2} onChange={v=>u("guardianPhone2",v)} type="tel" half/>
      </div>
      <div style={{height:1,background:"#E2E8F0",margin:"12px 0"}}/>
      <Inp label="Özel Not" value={f.notes} onChange={v=>u("notes",v)} rows={3}/>
    </div>}
    {tab===1&&<div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><Sel label="Yüzme Seviyesi" value={f.swimLevel} onChange={v=>u("swimLevel",v)} options={[{value:"BAŞLANGIÇ",label:"Başlangıç"},{value:"ORTA",label:"Orta"},{value:"İLERİ",label:"İleri"},{value:"YARIŞMACI",label:"Yarışmacı"}]}/></div>
        <div style={{flex:1}}><Inp label="Havuz Kulvarı" value={f.poolLane} onChange={v=>u("poolLane",v)}/></div>
      </div>
      <Inp label="Grup / Sınıf Adı" value={f.groupName} onChange={v=>u("groupName",v)}/>
      <div style={{height:1,background:"#E2E8F0",margin:"12px 0"}}/>
      <div style={{fontSize:11,color:"#475569",marginBottom:6,fontWeight:600}}>Haftalık Günler *</div>
      <DayPicker value={safeWeekDays} onChange={v=>u("weekDays",v)}/>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><Inp label="Başlangıç *" value={f.courseStart} onChange={v=>u("courseStart",v)} type="date"/></div>
        <div style={{flex:1}}><Inp label="Seans Sayısı *" value={f.totalSessions} onChange={v=>u("totalSessions",v)} type="number"/></div>
      </div>
      <Card style={{marginBottom:12}} accent="#0EA5E9">
        <div style={{fontSize:11,color:"#475569",marginBottom:4,fontWeight:600}}>Hesaplanan Bitiş Tarihi</div>
        <div style={{fontSize:18,fontWeight:700,color:"#0EA5E9"}}>{fmtDate(f.courseEnd)||"—"}</div>
      </Card>
      <div style={{height:1,background:"#E2E8F0",margin:"12px 0"}}/>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><Inp label="Aylık Kurs Ücreti (₺)" value={f.monthlyFee} onChange={v=>u("monthlyFee",v)} type="number"/></div>
        <div style={{flex:1}}><Inp label="İndirim (₺)" value={f.discount} onChange={v=>u("discount",v)} type="number"/></div>
      </div>
      <Inp label="Ödeme Notu" value={f.paymentNote} onChange={v=>u("paymentNote",v)}/>
    </div>}
    {tab===2&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:`1px solid #E2E8F0`,marginBottom:14}}>
        <div><div style={{fontWeight:600,fontSize:14,color:"var(--text-main)"}}>Servis Kullanıyor mu?</div></div>
        <Toggle checked={f.hasTransport} onChange={v=>u("hasTransport",v)}/>
      </div>
      {f.hasTransport?<div>
        <Inp label="Öğrenci Adresi" value={f.address} onChange={v=>u("address",v)} rows={2}/>
        <Inp label="Servis Ücreti (₺)" value={f.transportFee} onChange={v=>u("transportFee",v)} type="number"/>
        <div style={{height:1,background:"#E2E8F0",margin:"12px 0"}}/>
        <div style={{display:"flex",gap:8}}>
          <div style={{flex:1}}><Inp label="Şoför Adı" value={f.driverName} onChange={v=>u("driverName",v)}/></div>
          <div style={{flex:1}}><Inp label="Şoför Tel" value={f.driverPhone} onChange={v=>u("driverPhone",v)} type="tel"/></div>
        </div>
      </div>:<div style={{textAlign:"center",padding:"30px 0",color:"#64748B"}}>Servis kullanmıyor.</div>}
    </div>}
    {tab===3&&<div>
      <div style={{fontSize:12,color:"#64748B",marginBottom:12}}>Alınan ekipmanlar aylık ücrete yansır.</div>
      <EqPicker stockItems={stockItems} current={currentEq} onAdd={(item)=>setF(p=>({...p,equipment:[...currentEq,{id:Date.now(),...item,addedDate:TODAY}]}))} onRemove={(id)=>setF(p=>({...p,equipment:currentEq.filter(e=>e.id!==id)}))}/>
    </div>}
    <div style={{display:"flex",gap:10,marginTop:20}}>
      <Btn variant="secondary" onClick={onCancel} style={{flex:1}}>İptal</Btn>
      <Btn onClick={()=>onSave(f)} style={{flex:2}}>Kaydet</Btn>
    </div>
  </div>
}

function EqPicker({stockItems,current,onAdd,onRemove}){
  const [sel,setSel]=useState("");
  const safeStock = safeArr(stockItems);
  return<div>
    <div style={{display:"flex",gap:8,marginBottom:10}}>
      <select style={{flex:1,padding:"9px 11px",background:"var(--bg-color)",border:`1px solid #E2E8F0`,borderRadius:8,color:sel?"var(--text-main)":"#94A3B8",fontSize:13,outline:"none",fontFamily:"inherit"}} value={sel} onChange={e=>setSel(e.target.value)}>
        <option value="">Ekipman seç...</option>
        {safeStock.filter(s=>Number(s.stock)>0).map(s=><option key={s.id} value={s.id}>{s.name} — {Number(s.price).toLocaleString("tr-TR")} ₺</option>)}
      </select>
      <Btn sm onClick={()=>{if(!sel)return;const item=safeStock.find(s=>String(s.id)===String(sel));if(item)onAdd({name:item.name,price:item.price,stockId:item.id});setSel("");}}>Ekle</Btn>
    </div>
    {safeArr(current).map(e=><div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid #E2E8F0`}}>
      <div><div style={{fontSize:13,fontWeight:600}}>{e.name}</div><div style={{fontSize:11,color:"#64748B"}}>{fmtDate(e.addedDate)}</div></div>
      <div style={{display:"flex",alignItems:"center",gap:12}}><span style={{color:"#F59E0B",fontWeight:700,fontSize:14}}>{Number(e.price).toLocaleString("tr-TR")} ₺</span><button onClick={()=>onRemove(e.id)} style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button></div>
    </div>)}
  </div>
}

function StudentDetail({student,onBack,students,stockItems}){
  const [tab,setTab]=useState(0); const [editing,setEditing]=useState(false); const [payForm,setPayForm]=useState({amount:"",date:TODAY,note:""}); const [showPay,setShowPay]=useState(false);
  const safePays = safeArr(student.payments); const safeEqs = safeArr(student.equipment); const safeDays = safeArr(student.weekDays);
  
  function save(f){const n=safeArr(students).map(s=>s.id===student.id?{...s,...f,id:s.id}:s);DB.set("students",n);setEditing(false);}
  function addPay(){ if(!payForm.amount)return; const n=safeArr(students).map(s=>s.id===student.id?{...s,payments:[...safeArr(s.payments),{id:Date.now(),...payForm,amount:Number(payForm.amount)}]}:s); DB.set("students",n); setPayForm({amount:"",date:TODAY,note:""}); setShowPay(false); }
  function delPay(pid){const n=safeArr(students).map(s=>s.id===student.id?{...s,payments:safeArr(s.payments).filter(p=>p.id!==pid)}:s);DB.set("students",n);}

  if(editing)return<div style={{padding:14}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}><button onClick={()=>setEditing(false)} style={{background:"var(--card-bg)",border:`1px solid #E2E8F0`,color:"#475569",width:32,height:32,borderRadius:8}}>←</button><span style={{fontWeight:800,fontSize:16,color:"var(--text-main)"}}>Düzenle: {student.name}</span></div><StudentForm initial={student} onSave={save} onCancel={()=>setEditing(false)} stockItems={stockItems}/></div>;
  
  const paid=totalPaid(student),monthly=monthlyTotal(student),balance=paid-monthly; const st=courseStatus(student);

  return<div style={{padding:14}}>
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
      <button onClick={onBack} style={{background:"var(--card-bg)",border:`1px solid #E2E8F0`,color:"#475569",width:36,height:36,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>←</button>
      <div style={{flex:1}}><div style={{fontWeight:800,fontSize:18,color:"var(--text-main)"}}>{student.name}</div><div style={{fontSize:12,color:"#64748B",marginTop:2}}>{age(student.dob)} · {student.groupName||"Grup yok"}</div></div>
      <Badge label={st}/>
    </div>
    <TabBar tabs={["Genel","Kurs","Servis","Ekipman","Ödemeler"]} active={tab} onChange={setTab}/>
    
    {tab===0&&<div>
      <Card><Row label="Ad Soyad" val={student.name}/><Row label="Doğum Tarihi" val={`${fmtDate(student.dob)} (${age(student.dob)})`}/><Row label="Veli" val={student.guardianName||"—"}/><Row label="Veli Tel 1" val={student.guardianPhone1||"—"} href={student.guardianPhone1?`tel:${student.guardianPhone1}`:undefined}/></Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}><StatCard label="Katılım (gün)" value={attendanceCount(student)}/><StatCard label="Aylık Bakiye" value={`${balance>=0?"+":""}${balance.toLocaleString("tr-TR")} ₺`} col={balance>=0?"#10B981":"#EF4444"}/></div>
      <Btn variant="secondary" full onClick={()=>setEditing(true)}>Bilgileri Düzenle</Btn>
    </div>}
    {tab===1&&<div><Card><Row label="Seviye" val={swimLevelLabel(student.swimLevel)}/><Row label="Grup" val={student.groupName||"—"}/><Row label="Günler" val={safeDays.map(d=>DAYS_TR[d]).join(", ")||"—"}/><Row label="Başlangıç" val={fmtDate(student.courseStart)}/><Row label="Bitiş" val={fmtDate(student.courseEnd)}/></Card></div>}
    {tab===2&&<div>{student.hasTransport?<Card><Row label="Adres" val={student.address||"—"}/><Row label="Servis Ücreti" val={`${student.transportFee} ₺`}/><Row label="Şoför" val={student.driverName}/></Card>:<div style={{textAlign:"center",padding:"40px 0",color:"#94A3B8"}}>Servis kullanmıyor</div>}</div>}
    {tab===3&&<div>{safeEqs.length===0?<div style={{textAlign:"center",padding:"40px 0",color:"#94A3B8"}}>Ekipman yok</div>:<Card>{safeEqs.map(e=><Row key={e.id} label={e.name} val={`${e.price} ₺`}/>)}</Card>}</div>}
    {tab===4&&<div><SectionTitle action={<Btn sm onClick={()=>setShowPay(true)}>+ Ödeme Ekle</Btn>}>Ödemeler</SectionTitle><Card>{safePays.map(p=><Row key={p.id} label={fmtDate(p.date)} val={`+${p.amount} ₺`} col={"#10B981"}/>)}</Card>
      <Modal show={showPay} onClose={()=>setShowPay(false)} title="Ödeme Ekle"><Inp label="Tutar (₺) *" value={payForm.amount} onChange={v=>setPayForm(p=>({...p,amount:v}))} type="number"/><Inp label="Tarih" value={payForm.date} onChange={v=>setPayForm(p=>({...p,date:v}))} type="date"/><Inp label="Not" value={payForm.note} onChange={v=>setPayForm(p=>({...p,note:v}))}/><div style={{display:"flex",gap:10,marginTop:20}}><Btn variant="secondary" onClick={()=>setShowPay(false)} style={{flex:1}}>İptal</Btn><Btn onClick={addPay} style={{flex:2}}>Kaydet</Btn></div></Modal>
    </div>}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   GELİŞTİRİLMİŞ ÖĞRENCİLER LİSTESİ
═══════════════════════════════════════════════════════════════ */
function StudentsPage({students,stockItems}){
  const [search,setSearch]=useState(""); const [showAdd,setShowAdd]=useState(false); const [detailId,setDetailId]=useState(null);
  const safeStudents = safeArr(students); const student=detailId?safeStudents.find(s=>s.id===detailId):null;
  const filtered=safeStudents.filter(s=>s && s.name && s.name.toLowerCase().includes(search.toLowerCase()));

  function save(f){
    let n; if(f.id){n=safeStudents.map(s=>s.id===f.id?{...f}:s);}
    else{n=[...safeStudents,{...f,id:Date.now(),payments:[],attendance:{},equipment:[]}];}
    DB.set("students",n);setShowAdd(false);
  }

  if(student)return<StudentDetail student={student} onBack={()=>setDetailId(null)} students={safeStudents} stockItems={stockItems}/>;

  return<div style={{padding:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:14,fontWeight:800}}>Öğrenciler ({filtered.length})</div>
      <Btn sm onClick={()=>setShowAdd(true)}>+ Yeni Kayıt</Btn>
    </div>
    <div style={{position:"relative",marginBottom:12}}><input style={{width:"100%",padding:"12px 14px",background:"var(--sidebar-bg)",border:`1px solid #E2E8F0`,borderRadius:12,color:"var(--text-main)",outline:"none"}} placeholder="Öğrenci adı yazarak arayın..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
    
    {filtered.map(s=>{
      const expected = monthlyTotal(s); const paid = totalPaid(s); const debt = expected - paid;
      return <Card key={s.id} style={{marginBottom:6, padding:"12px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:15,color:"var(--text-main)"}}>{s.name}</div>
            <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(150px, 1fr))", gap:"4px 16px", marginTop:6, fontSize:12, color:"#64748B"}}>
              <div>📌 Grup: <strong>{s.groupName||"Yok"}</strong></div>
              <div>🚌 Servis: {s.hasTransport ? <span style={{color:"#8B5CF6", fontWeight:600}}>AKTİF</span> : "Yok"}</div>
              <div>📅 Başlangıç: {fmtDate(s.courseStart)}</div>
              <div>📅 Bitiş: {fmtDate(s.courseEnd)}</div>
            </div>
            <div style={{marginTop:8, fontSize:12}}>
              {debt > 0 ? <span style={{background:"#EF444415", color:"#EF4444", padding:"4px 8px", borderRadius:6, fontWeight:700}}>⚠️ {debt.toLocaleString("tr-TR")} ₺ Kalan Borç</span>
                       : <span style={{background:"#10B98115", color:"#10B981", padding:"4px 8px", borderRadius:6, fontWeight:700}}>✓ Ödeme Tamamlandı</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center",marginLeft:10}}>
            <Btn variant="secondary" sm onClick={()=>setDetailId(s.id)}>Detay</Btn>
            <Btn variant="danger" sm onClick={()=>{if(confirm(`${s.name} kaydı silinsin mi?`))DB.set("students",safeStudents.filter(x=>x.id!==s.id));}}>Sil</Btn>
          </div>
        </div>
      </Card>
    })}
    <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Yeni Öğrenci Kaydı"><StudentForm initial={{}} onSave={save} onCancel={()=>setShowAdd(false)} stockItems={stockItems}/></Modal>
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   YENİ: WHATSAPP SAYFASI (ÇOKLU GRUP VE İSİMLİ LİNKLER)
═══════════════════════════════════════════════════════════════ */
function WhatsAppPage({students, waLinks}) {
  const safeLinks = safeArr(waLinks);
  const [title, setTitle] = useState("");
  const [url, setUrl] = useState("");
  const [selectedStudent, setSelectedStudent] = useState(null);
  const [showInviteModal, setShowInviteModal] = useState(false);

  function addLink() {
    if(!title.trim() || !url.trim()) return;
    const n = [...safeLinks, { id:Date.now(), name: title.toLocaleUpperCase("tr-TR"), url: url }];
    DB.set("waLinks", n); setTitle(""); setUrl("");
  }

  function triggerInvite(student) {
    if(safeLinks.length === 0) { alert("Lütfen önce yukarıya bir davet bağlantısı ekleyin."); return; }
    setSelectedStudent(student);
    setShowInviteModal(true);
  }

  function completeInvite(linkUrl) {
    const msg = `SAYIN VELİMİZ,\n${selectedStudent.name} İSİMLİ ÖĞRENCİMİZİN ANTRENMAN VE DUYURU TAKİBİ İÇİN KULÜBÜMÜZÜN RESMİ WHATSAPP GRUBUNA AŞAĞIDAKİ LİNKTEN KATILABİLİRSİNİZ:\n\n${linkUrl}`;
    openWA(selectedStudent.guardianPhone1, msg);
    setShowInviteModal(false);
  }

  return <div style={{padding:16}}>
    <SectionTitle>WhatsApp Web Girişi</SectionTitle>
    <Card style={{marginBottom:16}}><Btn full style={{background:"#25D366", color:"#fff", border:"none", padding:"12px"}} onClick={()=>window.open("https://web.whatsapp.com", "_blank")}>WhatsApp Web Sekmesini Aç</Btn></Card>
    
    <SectionTitle>İsimli Grup Davet Bağlantıları</SectionTitle>
    <Card style={{marginBottom:16}}>
      <div style={{display:"flex", gap:8}}>
        <input style={{flex:1, padding:"9px 11px", background:"var(--bg-color)", border:`1px solid #E2E8F0`, borderRadius:8, color:"var(--text-main)", fontSize:13, outline:"none"}} value={title} onChange={e=>setTitle(e.target.value)} placeholder="Bağlantı Adı (Örn: PAZARTESİ GRUBU)" />
        <input style={{flex:2, padding:"9px 11px", background:"var(--bg-color)", border:`1px solid #E2E8F0`, borderRadius:8, color:"var(--text-main)", fontSize:13, outline:"none"}} value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://chat.whatsapp.com/..." />
        <Btn onClick={addLink}>Ekle</Btn>
      </div>
      <div style={{marginTop:12}}>
        {safeLinks.map(l=><div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #F1F5F9"}}><span style={{fontSize:13,fontWeight:700}}>📌 {l.name}</span><button onClick={()=>DB.set("waLinks", safeLinks.filter(x=>x.id!==l.id))} style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontWeight:600}}>Sil</button></div>)}
      </div>
    </Card>

    <SectionTitle>Öğrenci Davet Takip Paneli</SectionTitle>
    <Card>
      {safeArr(students).filter(s=>courseStatus(s)==="active"&&s.guardianPhone1).map(s=><div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #F1F5F9"}}>
        <div><div style={{fontWeight:700,fontSize:14,color:"var(--text-main)"}}>{s.name}</div><div style={{fontSize:12,color:"#64748B"}}>Grup: {s.groupName||"Belirtilmemiş"}</div></div>
        <Btn sm style={{background:"#25D36615",color:"#25D366",border:"none"}} onClick={()=>triggerInvite(s)}>Davet Gönder</Btn>
      </div>)}
    </Card>

    <Modal show={showInviteModal} onClose={()=>setShowInviteModal(false)} title="Davet Bağlantısı Seçin">
      <div style={{fontSize:13,color:"#64748B",marginBottom:16}}><strong>{selectedStudent?.name}</strong> isimli öğrencinin velisine hangi grubu göndermek istersiniz?</div>
      <div style={{display:"flex", flexDirection:"column", gap:8}}>
        {safeLinks.map(l=><button key={l.id} onClick={()=>completeInvite(l.url)} style={{width:"100%",padding:12,borderRadius:12,background:"var(--bg-color)",border:"1px solid #E2E8F0",color:"var(--text-main)",fontWeight:700,textAlign:"left",cursor:"pointer"}}>{l.name}</button>)}
      </div>
    </Modal>
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   DİĞER SAYFALAR
═══════════════════════════════════════════════════════════════ */
function AttendancePage({students}){
  const [date,setDate]=useState(TODAY); const [y, m, d] = date.split('-'); const selectedDayIndex = new Date(y, m - 1, d).getDay();
  const active=safeArr(students).filter(s=>courseStatus(s)==="active" && safeArr(s.weekDays).includes(selectedDayIndex));
  const present=active.filter(s=>(s.attendance||{})[date]).length;
  return<div style={{padding:16}}><SectionTitle>Yoklama Defteri</SectionTitle><Inp value={date} onChange={setDate} type="date"/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}><StatCard label="Beklenen" value={active.length}/><StatCard label="Mevcut" value={present} col="#10B981"/></div>
    <Card>{active.map(s=><div key={s.id} style={{display:"flex",justifyContent:"space-between",padding:"10px 0"}}><span style={{fontSize:15,fontWeight:700}}>{s.name}</span><Toggle checked={!!(s.attendance||{})[date]} onChange={(v)=>{
      const n=safeArr(students).map(st=>{if(st.id!==s.id)return st; const att={...(st.attendance||{})}; if(v)att[date]=true; else delete att[date]; return{...st,attendance:att}}); DB.set("students",n);
    }}/></div>)}</Card>
  </div>
}

function PaymentsPage({students}){
  const all=safeArr(students).flatMap(s=>safeArr(s.payments).map(p=>({...p,studentName:s.name}))).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const total=all.reduce((t,p)=>t+Number(p.amount),0); const thisMonth=all.filter(p=>p.date&&p.date.startsWith(TODAY.slice(0,7))).reduce((t,p)=>t+Number(p.amount),0);
  const unpaid = safeArr(students).filter(s => courseStatus(s) === "active" && totalPaid(s) < monthlyTotal(s));
  return<div style={{padding:16}}>
    <SectionTitle action={<Btn sm variant="ghost" onClick={()=>exportCSV("Odemeler", ["Ogrenci", "Tutar"], all.map(p => [p.studentName, p.amount]))}>⬇️ Excel</Btn>}>Ödemeler</SectionTitle>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}><StatCard label="Toplam" value={`${total} ₺`} col="#10B981" span2/><StatCard label="Bu Ay" value={`${thisMonth} ₺`}/><StatCard label="Eksik" value={unpaid.length} col="#EF4444"/></div>
    <Card>{all.map(p=><Row key={p.id} label={p.studentName} val={`+${p.amount} ₺`} col="#10B981"/>)}</Card>
  </div>
}

function ExpensesPage({expenses}){
  const [show,setShow]=useState(false); const [f,setF]=useState(EMPTY_EXPENSE); const u=(k,v)=>setF(p=>({...p,[k]:v}));
  const valid=safeArr(expenses);
  return<div style={{padding:16}}><SectionTitle action={<Btn sm onClick={()=>setShow(true)}>+ Gider Ekle</Btn>}>Kurum Giderleri</SectionTitle>
    {valid.map(e=><Card key={e.id}><Row label={e.title} val={`-${e.amount} ₺`} col="#EF4444"/></Card>)}
    <Modal show={show} onClose={()=>setShow(false)} title="Gider Ekle"><Inp label="Açıklama" value={f.title} onChange={v=>u("title",v)}/><Inp label="Tutar" value={f.amount} onChange={v=>u("amount",v)} type="number"/><Btn full onClick={()=>{DB.set("expenses",[...valid,{...f,id:Date.now()}]);setShow(false);}}>Kaydet</Btn></Modal>
  </div>
}

function InventoryPage({items}){
  const validItems = safeArr(items); const [show,setShow]=useState(false); const [f,setF]=useState(EMPTY_ITEM); const u=(k,v)=>setF(p=>({...p,[k]:v}));
  function save(){ if(!f.name.trim()) return; const n = f.id ? validItems.map(i=>i.id===f.id?{...f}:i) : [...validItems,{...f,id:Date.now()}]; DB.set("stock",n); setShow(false); setF(EMPTY_ITEM); }
  return<div style={{padding:16}}>
    <SectionTitle action={<Btn sm onClick={()=>{setF(EMPTY_ITEM);setShow(true);}}>+ Ürün Ekle</Btn>}>Stok ve Envanter</SectionTitle>
    {validItems.length===0 ? <div style={{textAlign:"center",padding:"40px 0",color:"#64748B"}}>Envanterde ürün bulunmuyor.</div> :
      validItems.map(item=>(item && item.id) && <Card key={item.id}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontWeight:800,fontSize:16,color:"var(--text-main)"}}>{item.name}</div><div style={{fontSize:12,color:"#64748B",marginTop:2}}>{item.category || "Genel"} • Stok: <strong>{item.stock || 0} Adet</strong></div></div>
          <div style={{fontWeight:800,color:"#10B981"}}>{Number(item.price||0).toLocaleString("tr-TR")} ₺</div>
        </div>
        <div style={{display:"flex",gap:6,marginTop:12}}><Btn sm variant="secondary" onClick={()=>{
          DB.set("stock",validItems.map(i=>i.id===item.id?{...i,stock:Math.max(0,Number(i.stock||0)+1)}:i));
        }}>+</Btn><Btn sm variant="secondary" onClick={()=>{
          DB.set("stock",validItems.map(i=>i.id===item.id?{...i,stock:Math.max(0,Number(i.stock||0)-1)}:i));
        }}>-</Btn><Btn sm variant="danger" onClick={()=>DB.set("stock", validItems.filter(i=>i.id!==item.id))}>Sil</Btn></div>
      </Card>)
    }
    <Modal show={show} onClose={()=>setShow(false)} title="Ürün İşlemi">
      <Inp label="Ürün Adı *" value={f.name} onChange={v=>u("name",v)}/>
      <Sel label="Kategori" value={f.category} onChange={v=>u("category",v)} options={STOCK_CATS.map(c=>({value:c,label:c}))}/>
      <div style={{display:"flex",gap:8}}><div style={{flex:1}}><Inp label="Fiyat (₺)" value={f.price} onChange={v=>u("price",v)} type="number"/></div><div style={{flex:1}}><Inp label="Stok" value={f.stock} onChange={v=>u("stock",v)} type="number"/></div></div>
      <Btn full onClick={save} style={{marginTop:10}}>Kaydet</Btn>
    </Modal>
  </div>
}

function StaffPage({staff}){
  const validStaff = safeArr(staff); const [tab, setTab] = useState(0); const [showAdd, setShowAdd] = useState(false); const [f, setF] = useState(EMPTY_STAFF);
  const [selectedMonth, setSelectedMonth] = useState(TODAY.slice(0,7)); const [activeStaffId, setActiveStaffId] = useState(null);
  const u=(k,v)=>setF(p=>({...p,[k]:v}));

  function save(){
    if(!f.name.trim()) return;
    const n = f.id ? validStaff.map(s=>s.id===f.id?{...s,...f}:s) : [...validStaff,{...f,id:Date.now(),attendance:{},dailyWage:Number(f.dailyWage||0)}];
    DB.set("staff",n); setShowAdd(false); setF(EMPTY_STAFF);
  }
  const daysInMonth = new Date(Number(selectedMonth.split("-")[0]), Number(selectedMonth.split("-")[1]), 0).getDate();
  const daysArray = Array.from({length: daysInMonth}, (_, i) => i + 1);

  return<div style={{padding:16}}>
    <TabBar tabs={["Personel Listesi","Yoklama & Hakediş"]} active={tab} onChange={setTab}/>
    {tab===0&&<div>
      <SectionTitle action={<Btn sm onClick={()=>{setF(EMPTY_STAFF);setShowAdd(true);}}>+ Personel Ekle</Btn>}>Çalışanlar</SectionTitle>
      {validStaff.map(s=><Card key={s.id}><Row label={s.name} val={`${s.dailyWage} ₺ / Gün`}/><div style={{marginTop:8, textAlign:"right"}}><Btn sm variant="danger" onClick={()=>DB.set("staff", validStaff.filter(x=>x.id!==s.id))}>Sil</Btn></div></Card>)}
    </div>}
    {tab===1&&<div>
      <Inp label="Takip Ayı Seçimi" type="month" value={selectedMonth} onChange={setSelectedMonth}/>
      {validStaff.map(s=>{
        const daysCount = Object.keys(s.attendance||{}).filter(k=>k.startsWith(selectedMonth)&&s.attendance[k]).length;
        const isExp = activeStaffId === s.id;
        return <Card key={s.id}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"} } onClick={()=>setActiveStaffId(isExp?null:s.id)}>
            <div><div style={{fontWeight:700,fontSize:15}}>{s.name}</div><div style={{fontSize:12,color:"#10B981",fontWeight:700}}>{daysCount} Gün • {(daysCount*Number(s.dailyWage||0)).toLocaleString("tr-TR")} ₺ Hakediş</div></div>
            <Btn sm variant="secondary">{isExp?"Kapat ▲":"Seç ▼"}</Btn>
          </div>
          {isExp && <div style={{marginTop:12, paddingTop:12, borderTop:`1px solid #E2E8F0`}}>
            <Inp label="Günlük Yevmiye (₺)" type="number" value={s.dailyWage} onChange={(v)=>DB.set("staff", validStaff.map(x=>x.id===s.id?{...x,dailyWage:Number(v)}:x))}/>
            <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(40px, 1fr))", gap:6, marginTop:10}}>
              {daysArray.map(d=>{
                const key = `${selectedMonth}-${String(d).padStart(2,'0')}`; const isP = !!s.attendance?.[key];
                return <button key={d} type="button" onClick={()=>{
                  const att={...(s.attendance||{})}; if(isP) delete att[key]; else att[key]=true;
                  DB.set("staff", validStaff.map(x=>x.id===s.id?{...x,attendance:att}:x));
                }} style={{padding:8, borderRadius:8, border:`1px solid ${isP?"#10B981":"#E2E8F0"}`, background:isP?"#10B98115":"var(--bg-color)", color:isP?"#10B981":"#64748B", fontWeight:700}}>{d}</button>
              })}
            </div>
          </div>}
        </Card>
      })}
    </div>}
    <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Personel Kartı">
      <Inp label="Ad Soyad *" value={f.name} onChange={v=>u("name",v)}/>
      <Inp label="Günlük Yevmiye (₺) *" value={f.dailyWage} onChange={v=>u("dailyWage",v)} type="number"/>
      <Btn full onClick={save} style={{marginTop:10}}>Kaydet</Btn>
    </Modal>
  </div>
}

function Dashboard({students,expenses}){
  const safeStudents = safeArr(students); const safeExpenses = safeArr(expenses); const active=safeStudents.filter(s=>courseStatus(s)==="active");
  const totalRev=safeStudents.reduce((t,s)=>t+totalPaid(s),0); const totalExp=safeExpenses.reduce((t,e)=>t+Number(e.amount||0),0); const netProfit = totalRev - totalExp;

  const recentRegistrations = [...safeStudents].sort((a,b) => b.id - a.id).slice(0, 5);
  const recentPay = safeStudents.flatMap(s=>safeArr(s.payments).map(p=>({...p,studentName:s.name}))).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  const endingSoon = active.filter(s=>{const d=daysLeft(s);return d>=0&&d<=14;}).sort((a,b)=>daysLeft(a)-daysLeft(b)).slice(0,5);

  return<div style={{padding:16}}>
    <Card style={{marginBottom:16, background:netProfit >= 0 ? "#10B98115" : "#EF444415", border:"none"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:13, color:netProfit >= 0 ? "#10B981" : "#EF4444", fontWeight:800}}>NET KASA DURUMU</div>
        <div style={{fontSize:26, fontWeight:800, color:netProfit >= 0 ? "#10B981" : "#EF4444"}}>{netProfit >= 0 ? "+" : ""}{netProfit.toLocaleString("tr-TR")} ₺</div>
      </div>
    </Card>

    <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(300px, 1fr))", gap:16, alignItems:"start"}}>
      <Card>
        <div style={{fontSize:13, fontWeight:800, marginBottom:12, color:"var(--text-main)"}}>Son Kayıt Olanlar</div>
        <div className="data-row data-header"><div>Ad Soyad</div><div>Kayıt Trh.</div><div className="data-col-right">Grup</div></div>
        {recentRegistrations.map(s => <div className="data-row" key={s.id}><div className="data-col">{s.name}</div><div className="data-col data-col-sub">{fmtDate(s.courseStart)}</div><div className="data-col data-col-right" style={{color:"#0EA5E9"}}>{s.groupName || "-"}</div></div>)}
      </Card>
      <Card>
        <div style={{fontSize:13, fontWeight:800, marginBottom:12, color:"var(--text-main)"}}>Son Ödemeler</div>
        <div className="data-row data-header"><div>Ad Soyad</div><div>Tarih</div><div className="data-col-right">Tutar</div></div>
        {recentPay.map((p, i) => <div className="data-row" key={i}><div className="data-col">{p.studentName}</div><div className="data-col data-col-sub">{fmtDate(p.date)}</div><div className="data-col data-col-right" style={{color:"#10B981"}}>+{p.amount} ₺</div></div>)}
      </Card>
      <Card style={{border:`1px solid #F59E0B40`}}>
        <div style={{fontSize:13, fontWeight:800, marginBottom:12, color:"var(--text-main)"}}>Kayıt Bitişi Yaklaşanlar</div>
        <div className="data-row data-header"><div>Ad Soyad</div><div>Bitiş Trh.</div><div className="data-col-right">Kalan</div></div>
        {endingSoon.map(s => <div className="data-row" key={s.id}><div className="data-col">{s.name}</div><div className="data-col data-col-sub">{fmtDate(s.courseEnd)}</div><div className="data-col data-col-right" style={{color:"#F59E0B"}}>{daysLeft(s)} Gün</div></div>)}
      </Card>
    </div>
  </div>
}

function SettingsPage({navItems, clubName, logoUrl, appUsers}){
  const [tab, setTab] = useState(0); const [nameVal, setNameVal] = useState(clubName); const [logoVal, setLogoVal] = useState(logoUrl);
  const [showUserModal, setShowUserModal] = useState(false); const [uForm, setUForm] = useState({ id:null, username:"", password:"", role:"staff", allowedTabs:[] });
  function toggleMenuAccess(menuId) { const tabs = uForm.allowedTabs || []; if(tabs.includes(menuId)) setUForm({...uForm, allowedTabs: tabs.filter(t=>t!==menuId)}); else setUForm({...uForm, allowedTabs: [...tabs, menuId]}); }
  function saveUser() { if(!uForm.username||!uForm.password)return; let n = safeArr(appUsers); if(uForm.id) n = n.map(u => u.id === uForm.id ? {...uForm} : u); else n = [...n, {...uForm, id:Date.now()}]; DB.set("appUsers", n); setShowUserModal(false); }

  return<div style={{padding:16}}>
    <TabBar tabs={["Genel Kurum", "Çalışan Yetkileri"]} active={tab} onChange={setTab}/>
    {tab === 0 && (
      <div><Card><Inp label="Kulüp Adı" value={nameVal} onChange={setNameVal}/><Inp label="Logo URL" value={logoVal} onChange={setLogoVal}/></Card><Btn full onClick={()=>{DB.set("clubName",nameVal); DB.set("logoUrl",logoVal); alert("Kaydedildi");}}>Kaydet</Btn></div>
    )}
    {tab===1&&<div>
      <SectionTitle action={<Btn sm onClick={()=>{setUForm({id:null,username:"",password:"",role:"staff",allowedTabs:["dashboard","students","attendance"]});setShowUserModal(true);}}>+ Hesap Ekle</Btn>}>Giriş İzinleri</SectionTitle>
      {safeArr(appUsers).map(u=><Card key={u.id}><Row label={u.username} val={u.role==='admin'?'Tam Yetki (Admin)':'Çalışan'}/></Card>)}
      <Modal show={showUserModal} onClose={()=>setShowUserModal(false)} title="Hesap Tanımla">
        <Inp label="Kullanıcı Adı" value={uForm.username} onChange={v=>setUForm({...uForm,username:v})}/>
        <Inp label="Giriş Şifresi" value={uForm.password} onChange={v=>setUForm({...uForm,password:v})}/>
        {uForm.id !== "admin" && (
          <div style={{marginTop: 10}}>
            <div style={{fontSize:12, fontWeight:700, marginBottom:8}}>Görebileceği Menüler</div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8}}>
              {navItems.map(nav => nav.id !== "settings" && (
                <label key={nav.id} style={{display:"flex", alignItems:"center", gap:6, padding:"8px", background:"var(--bg-color)", borderRadius:8, cursor:"pointer", border:`1px solid ${(uForm.allowedTabs||[]).includes(nav.id)?"#0EA5E9":"#E2E8F0"}`}}>
                  <input type="checkbox" checked={(uForm.allowedTabs||[]).includes(nav.id)} onChange={() => toggleMenuAccess(nav.id)} />
                  <span style={{fontSize:12}}>{nav.label}</span>
                </label>
              ))}
            </div>
          </div>
        )}
        <Btn full onClick={saveUser} style={{marginTop:16}}>Kaydet</Btn>
      </Modal>
    </div>}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════════════════ */
function App(){
  const [currentUser, setCurrentUser] = useState(() => { try { return JSON.parse(sessionStorage.getItem("aqua_user")); } catch { return null; } });
  const [isDbLoaded, setIsDbLoaded] = useState(false);
  const [students,setStudents]=useState([]); const [staff,setStaff]=useState([]); const [stockItems,setStockItems]=useState([]); const [movements,setMovements]=useState([]); const [expenses,setExpenses]=useState([]);
  const [clubName,setClubName]=useState("AquaClub"); const [appUsers, setAppUsers]=useState([]); const [oldPinCode, setOldPinCode]=useState("0309"); const [waLinks,setWaLinks]=useState([]);
  const [logoUrl,setLogoUrl]=useState(""); const [activeTab,setActiveTab]=useState("dashboard"); const [sidebarOpen,setSidebarOpen]=useState(false);

  useEffect(() => {
    const unsub = db.collection("appData").doc("main").onSnapshot((doc) => {
      if (doc.exists) {
        const d = doc.data();
        if (d.students) setStudents(safeArr(d.students));
        if (d.staff) setStaff(safeArr(d.staff));
        if (d.stock) setStockItems(safeArr(d.stock));
        if (d.movements) setMovements(safeArr(d.movements));
        if (d.expenses) setExpenses(safeArr(d.expenses));
        if (d.waLinks) setWaLinks(safeArr(d.waLinks));
        if (d.clubName) setClubName(d.clubName);
        if (d.pinCode) setOldPinCode(d.pinCode); 
        let loadedUsers = safeArr(d.appUsers);
        if (loadedUsers.length === 0) { loadedUsers = [{ id:"admin", username:"admin", password: d.pinCode || "0309", role:"admin", allowedTabs: NAV_ITEMS.map(n=>n.id) }]; }
        setAppUsers(loadedUsers);
        if (d.logoUrl) setLogoUrl(d.logoUrl);
      }
      setIsDbLoaded(true);
    });
    return () => unsub();
  }, []);

  if (!isDbLoaded) return <div style={{display:"flex",flexDirection:"column",height:"100vh",alignItems:"center",justifyContent:"center",background:"var(--bg-color)"}}><div className="spinner"></div><div style={{color:"var(--text-main)",fontWeight:700,marginTop:10}}>Sistem Yükleniyor...</div></div>;
  if (!currentUser) return <LoginScreen onSuccess={(user) => { sessionStorage.setItem("aqua_user", JSON.stringify(user)); setCurrentUser(user); }} appUsers={appUsers} adminPin={oldPinCode} />;

  const visibleNav = NAV_ITEMS.filter(n => currentUser.role === "admin" || (currentUser.allowedTabs || []).includes(n.id));

  return<div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg-color)"}}>
    <div className="sidebar-desktop" style={{width:240, background:"var(--sidebar-bg)", borderRight:"1px solid #E2E8F0", display:"flex", flexDirection:"column", boxShadow:"2px 0 10px rgba(0,0,0,0.02)", zIndex:100}}>
      <div style={{padding:"24px 20px 20px", borderBottom:"1px solid #E2E8F0", display:"flex", alignItems:"center", gap:12}}>
        <div style={{width:38,height:38,borderRadius:10,background:`linear-gradient(135deg,#0EA5E9,#0284C7)`,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
          {logoUrl ? <img src={logoUrl} alt="Logo" style={{width:"100%",height:"100%",objectFit:"cover"}}/> : <span style={{color:"white", fontWeight:800}}>AC</span>}
        </div>
        <div><div style={{fontSize:15,fontWeight:800,color:"var(--text-main)"}}>{clubName}</div><div style={{fontSize:11,color:"#64748B",fontWeight:600}}>{currentUser.username}</div></div>
      </div>
      <div style={{flex:1, overflowY:"auto", padding:"16px 12px"}}>
        {visibleNav.map(item=><button key={item.id} onClick={()=>setActiveTab(item.id)} style={{display:"flex",alignItems:"center",gap:12,width:"100%", padding:"12px 14px", marginBottom:6, background:activeTab===item.id?"#0EA5E915":"transparent", border:"none", borderRadius:12, color:activeTab===item.id?"#0284C7":"#475569", cursor:"pointer", textAlign:"left", fontSize:14, fontWeight:activeTab===item.id?700:500}}><Icon d={item.icon} size={18}/> {item.label}</button>)}
      </div>
      <div style={{padding:"16px"}}><button onClick={()=>{sessionStorage.removeItem("aqua_user"); window.location.reload();}} style={{width:"100%", padding:"12px", background:"#EF444415", borderRadius:12, border:"none", color:"#EF4444", fontWeight:700, cursor:"pointer"}}>Çıkış Yap</button></div>
    </div>
    
    <div style={{flex:1, display:"flex", flexDirection:"column", overflow:"hidden"}}>
      <div style={{padding:"16px 20px", background:"var(--sidebar-bg)", borderBottom:"1px solid #E2E8F0", fontWeight:800, fontSize:16, display:"flex", alignItems:"center", gap:16, color:"var(--text-main)"}}>
        <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="menu-btn" style={{background:"transparent", border:`1px solid #E2E8F0`, color:"var(--text-main)", width:36, height:36, borderRadius:10}}>☰</button>
        {(visibleNav.find(n=>n.id===activeTab)||{}).label}
      </div>
      <div style={{flex:1, overflowY:"auto"}}>
        {activeTab==="dashboard"&&<Dashboard students={students} expenses={expenses}/>}
        {activeTab==="students"&&<StudentsPage students={students} stockItems={stockItems}/>}
        {activeTab==="attendance"&&<AttendancePage students={students}/>}
        {activeTab==="payments"&&<PaymentsPage students={students}/>}
        {activeTab==="expenses"&&<ExpensesPage expenses={expenses}/>}
        {activeTab==="whatsapp"&&<WhatsAppPage students={students} waLinks={waLinks} />}
        {activeTab==="staff"&&<StaffPage staff={staff}/>}
        {activeTab==="inventory"&&<InventoryPage items={stockItems}/>}
        {activeTab==="settings"&&currentUser.role==='admin'&&<SettingsPage navItems={NAV_ITEMS} clubName={clubName} logoUrl={logoUrl} appUsers={appUsers}/>}
      </div>
    </div>
    <style>{`@media(max-width:768px){.sidebar-desktop{display:none!important}} @media(min-width:769px){.menu-btn{display:none!important}}`}</style>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
