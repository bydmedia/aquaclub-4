/* ═══════════════════════════════════════════════════════════════
   UTILS (Yardımcı Fonksiyonlar)
═══════════════════════════════════════════════════════════════ */
function fmtDate(d){if(!d)return"—";const[y,m,day]=d.split("-");return`${day}.${m}.${y}`}
function totalPaid(s){return (s.payments||[]).reduce((t,p)=>t+Number(p.amount||0),0);}
function equipmentTotal(s){return (s.equipment||[]).reduce((t,e)=>t+Number(e.price||0),0);}
function monthlyTotal(s){return Number(s.monthlyFee||0)-Number(s.discount||0)+equipmentTotal(s)+(s.hasTransport?Number(s.transportFee||0):0);}
function courseStatus(s){
  if(!s.courseStart||!s.courseEnd)return"unknown";
  const now=new Date(TODAY),st=new Date(s.courseStart),en=new Date(s.courseEnd);
  if(now<st)return"upcoming";if(now>en)return"ended";return"active";
}
function daysLeft(s){return Math.ceil((new Date(s.courseEnd)-new Date(TODAY))/86400000)}
function attendanceCount(s){return Object.values(s.attendance||{}).filter(Boolean).length}
function age(dob){if(!dob)return"—";return Math.floor((Date.now()-new Date(dob))/31557600000)+" yaş"}
function calcEndDate(start,total,days){
  if(!start||!total||!days||days.length===0)return"";
  let d=new Date(start),cnt=0,iter=0;
  while(cnt<total&&iter<total*30){if(days.includes(d.getDay()))cnt++;if(cnt<total)d.setDate(d.getDate()+1);iter++;}
  return d.toISOString().split("T")[0];
}
function swimLevelLabel(v){return{beginner:"Başlangıç",intermediate:"Orta",advanced:"İleri",competitive:"Yarışmacı"}[v]||v||"—"}
function roleLabel(r){return{trainer:"Antrenör",admin:"İdari Personel",driver:"Şoför",other:"Diğer"}[r]||r||"—"}

function openWA(phone, text) {
  if (!phone) { alert("Sisteme kayıtlı veli telefonu bulunamadı."); return; }
  let p = phone.replace(/\D/g, "");
  if (p.startsWith("0")) p = "90" + p.slice(1);
  else if (p.length === 10) p = "90" + p;
  window.open(`https://wa.me/${p}?text=${encodeURIComponent(text)}`, "_blank");
}

function exportCSV(filename, headers, rows) {
  const bom = "\uFEFF"; 
  const csv = [headers.join(","), ...rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(","))].join("\n");
  const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename + ".csv";
  link.click();
}

/* ═══════════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════════ */
function PinScreen({ onSuccess, correctPin }) {
  const [pin, setPin] = useState("");
  const [err, setErr] = useState(false);

  const handleChange = (val) => {
    const numericVal = val.replace(/\D/g, "").slice(0, 4);
    setPin(numericVal);
    if (numericVal.length === 4) {
      if (numericVal === correctPin) {
        onSuccess();
      } else {
        setErr(true);
        setTimeout(() => {
          setPin("");
          setErr(false);
        }, 800);
      }
    }
  };

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,padding:20}}>
      <div style={{
        fontSize:54,
        fontWeight:800,
        background:`linear-gradient(135deg, ${C.accent}, #38BDF8, ${C.purple})`,
        WebkitBackgroundClip:"text",
        WebkitTextFillColor:"transparent",
        marginBottom:40,
        letterSpacing:-2,
        filter:"drop-shadow(0 4px 12px rgba(14,165,233,0.3))"
      }}>AquaClub</div>
      
      <div style={{background:C.card,padding:32,borderRadius:20,border:`1px solid ${C.borderLight}`,textAlign:"center",boxShadow:"0 12px 40px rgba(0,0,0,0.4)",width:"100%",maxWidth:340}}>
        <div style={{fontSize:15,fontWeight:600,marginBottom:24,color:C.textSub}}>Yönetim Paneli Girişi</div>
        <input type="password" value={pin} onChange={(e)=>handleChange(e.target.value)} autoFocus placeholder="••••"
          style={{width:"100%",textAlign:"center",fontSize:32,letterSpacing:16,padding:"16px 0",borderRadius:12,border:`2px solid ${err?C.danger:C.border}`,background:C.bg,color:C.text,outline:"none",transition:"border .2s"}} />
        <div style={{height: 20, marginTop: 12}}>{err && <div style={{color:C.danger,fontSize:13,fontWeight:500}}>Hatalı PIN Kodu</div>}</div>
      </div>
    </div>
  );
}

function StudentForm({initial,onSave,onCancel,stockItems}){
  const [tab,setTab]=useState(0);
  const [f,setF]=useState({...EMPTY_S,...initial});
  const u=(k,v)=>setF(p=>({...p,[k]:v}));

  useEffect(()=>{
    if(f.courseStart && f.totalSessions && f.weekDays && f.weekDays.length>0){
      u("courseEnd",calcEndDate(f.courseStart,Number(f.totalSessions),f.weekDays));
    }
  },[f.courseStart,f.totalSessions,JSON.stringify(f.weekDays)]);

  function addEq(item){setF(p=>({...p,equipment:[...(p.equipment||[]),{id:Date.now(),...item,addedDate:TODAY}]}))}
  function rmEq(id){setF(p=>({...p,equipment:(p.equipment||[]).filter(e=>e.id!==id)}))}

  const netMonthly=Number(f.monthlyFee||0)-Number(f.discount||0);

  return<div>
    <TabBar tabs={["Kişisel Bilgiler","Eğitim & Kurs","Servis Bilgileri","Ekipman"]} active={tab} onChange={setTab}/>

    {tab===0&&<div>
      <Inp label="Ad Soyad *" value={f.name} onChange={v=>u("name",v)} placeholder="Öğrenci adı soyadı"/>
      <Inp label="Doğum Tarihi" value={f.dob} onChange={v=>u("dob",v)} type="date"/>
      <div style={{height:1,background:C.border,margin:"12px 0"}}/>
      <Inp label="Veli Adı Soyadı" value={f.guardianName} onChange={v=>u("guardianName",v)} placeholder="Veli adı soyadı"/>
      <div style={{display:"flex",gap:8}}>
        <Inp label="Veli Telefonu 1" value={f.guardianPhone1} onChange={v=>u("guardianPhone1",v)} placeholder="0500 000 0000" type="tel" half/>
        <Inp label="Veli Telefonu 2" value={f.guardianPhone2} onChange={v=>u("guardianPhone2",v)} placeholder="0500 000 0000" type="tel" half/>
      </div>
      <div style={{height:1,background:C.border,margin:"12px 0"}}/>
      <Inp label="Özel Not" value={f.notes} onChange={v=>u("notes",v)} rows={3} placeholder="Öğrenciye ait notlar..."/>
    </div>}

    {tab===1&&<div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><Sel label="Yüzme Seviyesi" value={f.swimLevel} onChange={v=>u("swimLevel",v)} options={[{value:"beginner",label:"Başlangıç"},{value:"intermediate",label:"Orta"},{value:"advanced",label:"İleri"},{value:"competitive",label:"Yarışmacı"}]}/></div>
        <div style={{flex:1}}><Inp label="Havuz Kulvarı" value={f.poolLane} onChange={v=>u("poolLane",v)} placeholder="örn. 3"/></div>
      </div>
      <Inp label="Grup / Sınıf Adı" value={f.groupName} onChange={v=>u("groupName",v)} placeholder="örn. Pazartesi-Çarşamba Grubu A"/>
      <div style={{height:1,background:C.border,margin:"12px 0"}}/>
      <div style={{fontSize:11,color:C.textSub,marginBottom:6,fontWeight:500,letterSpacing:0.3}}>Haftalık Antrenman Günleri *</div>
      <DayPicker value={f.weekDays} onChange={v=>u("weekDays",v)}/>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><Inp label="Eğitim Başlangıcı *" value={f.courseStart} onChange={v=>u("courseStart",v)} type="date"/></div>
        <div style={{flex:1}}><Inp label="Toplam Seans *" value={f.totalSessions} onChange={v=>u("totalSessions",v)} type="number" placeholder="48"/></div>
      </div>
      <Card style={{marginBottom:12}} accent={C.accent}>
        <div style={{fontSize:11,color:C.textSub,marginBottom:4,fontWeight:500}}>Hesaplanan Bitiş Tarihi</div>
        <div style={{fontSize:18,fontWeight:700,color:C.accent}}>{fmtDate(f.courseEnd)||"—"}</div>
        {(f.weekDays||[]).length>0&&<div style={{fontSize:11,color:C.textMuted,marginTop:4}}>{(f.weekDays||[]).map(d=>DAYS_FULL[d]).join(", ")} günleri</div>}
      </Card>
      <div style={{height:1,background:C.border,margin:"12px 0"}}/>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><Inp label="Aylık Kurs Ücreti (₺)" value={f.monthlyFee} onChange={v=>u("monthlyFee",v)} type="number" placeholder="1500"/></div>
        <div style={{flex:1}}><Inp label="İndirim (₺)" value={f.discount} onChange={v=>u("discount",v)} type="number" placeholder="0"/></div>
      </div>
      <Inp label="Ödeme Notu" value={f.paymentNote} onChange={v=>u("paymentNote",v)} placeholder="örn. Her ayın 1'inde ödeme"/>
      <Card style={{marginBottom:4}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
          <span style={{color:C.textSub}}>Aylık Net Kurs Ücreti</span>
          <span style={{fontWeight:700,color:C.success}}>{netMonthly.toLocaleString("tr-TR")} ₺</span>
        </div>
      </Card>
    </div>}

    {tab===2&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:`1px solid ${C.border}`,marginBottom:14}}>
        <div>
          <div style={{fontWeight:600,fontSize:14}}>Servis Kullanıyor mu?</div>
          <div style={{fontSize:12,color:C.textSub,marginTop:2}}>Öğrencinin servise ihtiyacı var mı?</div>
        </div>
        <Toggle checked={f.hasTransport} onChange={v=>u("hasTransport",v)}/>
      </div>
      {f.hasTransport?<div>
        <Inp label="Öğrenci Adresi" value={f.address} onChange={v=>u("address",v)} placeholder="Tam adres..." rows={2}/>
        <Inp label="Servis Ücreti (₺/ay)" value={f.transportFee} onChange={v=>u("transportFee",v)} type="number" placeholder="500"/>
        <div style={{height:1,background:C.border,margin:"12px 0"}}/>
        <div style={{display:"flex",gap:8}}>
          <div style={{flex:1}}><Inp label="Şoför Adı Soyadı" value={f.driverName} onChange={v=>u("driverName",v)} placeholder="Şoför adı"/></div>
          <div style={{flex:1}}><Inp label="Şoför Telefonu" value={f.driverPhone} onChange={v=>u("driverPhone",v)} placeholder="0500 000 0000" type="tel"/></div>
        </div>
      </div>:<div style={{textAlign:"center",padding:"30px 0",color:C.textMuted,fontSize:13}}>
        <div style={{fontSize:32,marginBottom:8,opacity:0.4}}>—</div>
        <div>Servis kullanmıyor olarak işaretli</div>
      </div>}
    </div>}

    {tab===3&&<div>
      <div style={{fontSize:12,color:C.textSub,marginBottom:12}}>Öğrencinin satın aldığı ekipmanlar aylık ücrete yansıtılır.</div>
      <EqPicker stockItems={stockItems} current={f.equipment||[]} onAdd={addEq} onRemove={rmEq}/>
      {(f.equipment||[]).length>0&&<Card accent={C.warning} style={{marginTop:8}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}>
          <span style={{color:C.textSub}}>Ekipman Toplamı</span>
          <span style={{color:C.warning,fontWeight:700}}>+{equipmentTotal(f).toLocaleString("tr-TR")} ₺</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:14}}>
          <span style={{color:C.textSub,fontWeight:600}}>Aylık Toplam</span>
          <span style={{color:C.success,fontWeight:800}}>{monthlyTotal(f).toLocaleString("tr-TR")} ₺</span>
        </div>
      </Card>}
    </div>}

    <div style={{display:"flex",gap:8,marginTop:16}}>
      <Btn variant="secondary" onClick={onCancel} style={{flex:1}}>İptal</Btn>
      <Btn onClick={()=>onSave(f)} style={{flex:1}}>Kaydet</Btn>
    </div>
  </div>
}

function EqPicker({stockItems,current,onAdd,onRemove}){
  const [sel,setSel]=useState("");
  const safeStock = (stockItems||[]).filter(i => i && i.id);
  return<div>
    <div style={{display:"flex",gap:8,marginBottom:10}}>
      <select style={{flex:1,padding:"9px 11px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,color:sel?C.text:C.textMuted,fontSize:13,outline:"none",fontFamily:"inherit"}} value={sel} onChange={e=>setSel(e.target.value)}>
        <option value="">Ekipman seç...</option>
        {safeStock.filter(s=>Number(s.stock)>0).map(s=><option key={s.id} value={s.id}>{s.name} — {Number(s.price).toLocaleString("tr-TR")} ₺</option>)}
      </select>
      <Btn sm onClick={()=>{if(!sel)return;const item=safeStock.find(s=>String(s.id)===String(sel));if(item)onAdd({name:item.name,price:item.price,stockId:item.id});setSel("");}}>Ekle</Btn>
    </div>
    {(current||[]).map(e=>e && <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
      <div>
        <div style={{fontSize:13,fontWeight:600}}>{e.name}</div>
        <div style={{fontSize:11,color:C.textSub}}>{fmtDate(e.addedDate)}</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{color:C.warning,fontWeight:700,fontSize:13}}>{Number(e.price).toLocaleString("tr-TR")} ₺</span>
        <button onClick={()=>onRemove(e.id)} style={{background:"none",border:"none",color:C.danger,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
      </div>
    </div>)}
  </div>
}

function StudentDetail({student,onBack,students,stockItems}){
  const [tab,setTab]=useState(0);
  const [editing,setEditing]=useState(false);
  const [payForm,setPayForm]=useState({amount:"",date:TODAY,note:""});
  const [showPay,setShowPay]=useState(false);

  function save(f){const n=(students||[]).map(s=>s.id===student.id?{...s,...f,id:s.id}:s);DB.set("students",n);setEditing(false);}
  function addPay(){
    if(!payForm.amount)return;
    const n=(students||[]).map(s=>s.id===student.id?{...s,payments:[...(s.payments||[]),{id:Date.now(),...payForm,amount:Number(payForm.amount)}]}:s);
    DB.set("students",n);
    setPayForm({amount:"",date:TODAY,note:""});setShowPay(false);
  }
  function delPay(pid){const n=(students||[]).map(s=>s.id===student.id?{...s,payments:(s.payments||[]).filter(p=>p.id!==pid)}:s);DB.set("students",n);}

  if(editing)return<div style={{padding:14}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
      <button onClick={()=>setEditing(false)} style={{background:"none",border:`1px solid ${C.border}`,color:C.textSub,width:30,height:30,borderRadius:6,cursor:"pointer",fontSize:16}}>←</button>
      <span style={{fontWeight:700,fontSize:15}}>Düzenle: {student.name}</span>
    </div>
    <StudentForm initial={student} onSave={save} onCancel={()=>setEditing(false)} stockItems={stockItems}/>
  </div>;

  const paid=totalPaid(student),monthly=monthlyTotal(student),balance=paid-monthly;
  const st=courseStatus(student);

  return<div style={{padding:14}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
      <button onClick={onBack} style={{background:"none",border:`1px solid ${C.border}`,color:C.textSub,width:30,height:30,borderRadius:6,cursor:"pointer",fontSize:16}}>←</button>
      <div style={{flex:1}}>
        <div style={{fontWeight:700,fontSize:16}}>{student.name}</div>
        <div style={{fontSize:11,color:C.textSub,marginTop:1}}>{age(student.dob)} · {student.groupName||"Grup belirtilmemiş"}</div>
      </div>
      <Badge label={st}/>
    </div>

    <TabBar tabs={["Genel","Kurs","Servis","Ekipman","Ödemeler"]} active={tab} onChange={setTab}/>

    {tab===0&&<div>
      <Card>
        <Row label="Ad Soyad" val={student.name}/>
        <Row label="Doğum Tarihi" val={`${fmtDate(student.dob)} (${age(student.dob)})`}/>
        <Row label="Veli" val={student.guardianName||"—"}/>
        <Row label="Veli Tel 1" val={student.guardianPhone1||"—"} href={student.guardianPhone1?`tel:${student.guardianPhone1}`:undefined}/>
        <Row label="Veli Tel 2" val={student.guardianPhone2||"—"} href={student.guardianPhone2?`tel:${student.guardianPhone2}`:undefined}/>
        {student.notes&&<div style={{marginTop:10,padding:10,background:C.bg,borderRadius:8,fontSize:12,color:C.textSub,lineHeight:1.6}}>{student.notes}</div>}
      </Card>
      
      {student.guardianPhone1 && (
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10}}>
          <Btn sm style={{background:"#25D366", color:"#fff", border:"none"}} onClick={()=>openWA(student.guardianPhone1, `Sayın velimiz, ${student.name} isimli öğrencimizin ödemesi hakkında hatırlatma yapmak isteriz. İyi günler dileriz.`)}>💬 Ödeme Hatırlat</Btn>
          <Btn sm style={{background:"#25D366", color:"#fff", border:"none"}} onClick={()=>openWA(student.guardianPhone1, `Sayın velimiz, ${student.name} isimli öğrencimiz bugünkü antrenmana katılmamıştır. Bilginize sunarız.`)}>💬 Devamsızlık Bildir</Btn>
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        <StatCard label="Katılım (gün)" value={attendanceCount(student)}/>
        <StatCard label="Bakiye (Aylık)" value={`${balance>=0?"+":""}${balance.toLocaleString("tr-TR")} ₺`} col={balance>=0?C.success:C.danger}/>
      </div>
      <Btn variant="secondary" full onClick={()=>setEditing(true)}>Bilgileri Düzenle</Btn>
    </div>}

    {tab===1&&<div>
      <Card>
        <Row label="Seviye" val={swimLevelLabel(student.swimLevel)}/>
        <Row label="Grup" val={student.groupName||"—"}/>
        <Row label="Kulvar" val={student.poolLane||"—"}/>
        <Row label="Günler" val={(student.weekDays||[]).map(d=>DAYS_TR[d]).join(", ")||"—"}/>
        <Row label="Başlangıç" val={fmtDate(student.courseStart)}/>
        <Row label="Bitiş" val={fmtDate(student.courseEnd)}/>
        <Row label="Toplam Seans" val={student.totalSessions||"—"}/>
        {st==="active"&&<Row label="Kalan Gün" val={daysLeft(student)+" gün"} col={daysLeft(student)<=14?C.warning:C.success}/>}
      </Card>
      <Card>
        <Row label="Aylık Ücret" val={`${Number(student.monthlyFee||0).toLocaleString("tr-TR")} ₺`}/>
        {Number(student.discount)>0&&<Row label="İndirim" val={`-${Number(student.discount).toLocaleString("tr-TR")} ₺`} col={C.success}/>}
        {student.hasTransport&&<Row label="Servis Ücreti" val={`${Number(student.transportFee||0).toLocaleString("tr-TR")} ₺`}/>}
        <Row label="Ödeme Notu" val={student.paymentNote||"—"}/>
        <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,fontWeight:700}}>
          <span style={{color:C.textSub,fontSize:13}}>Aylık Toplam</span>
          <span style={{color:C.success,fontSize:15}}>{monthly.toLocaleString("tr-TR")} ₺</span>
        </div>
      </Card>
    </div>}

    {tab===2&&<div>
      {student.hasTransport?<Card>
        <Row label="Servis" val="Kullanıyor" col={C.success}/>
        <Row label="Adres" val={student.address||"—"}/>
        <Row label="Servis Ücreti" val={`${Number(student.transportFee||0).toLocaleString("tr-TR")} ₺/ay`}/>
        <Row label="Şoför" val={student.driverName||"—"}/>
        <Row label="Şoför Tel" val={student.driverPhone||"—"} href={student.driverPhone?`tel:${student.driverPhone}`:undefined}/>
      </Card>:<div style={{textAlign:"center",padding:"40px 0",color:C.textMuted,fontSize:13}}>Servis kullanmıyor</div>}
    </div>}

    {tab===3&&<div>
      {(student.equipment||[]).length===0?<div style={{textAlign:"center",padding:"40px 0",color:C.textMuted,fontSize:13}}>Kayıtlı ekipman yok</div>:
      <Card>
        {(student.equipment||[]).map(e=>e && <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
          <div><div style={{fontSize:13,fontWeight:600}}>{e.name}</div><div style={{fontSize:11,color:C.textSub}}>{fmtDate(e.addedDate)}</div></div>
          <span style={{color:C.warning,fontWeight:700}}>{Number(e.price).toLocaleString("tr-TR")} ₺</span>
        </div>)}
        <div style={{display:"flex",justifyContent:"space-between",paddingTop:10}}>
          <span style={{color:C.textSub,fontSize:12}}>Ekipman Toplamı</span>
          <span style={{fontWeight:700,color:C.success}}>{equipmentTotal(student).toLocaleString("tr-TR")} ₺</span>
        </div>
      </Card>}
    </div>}

    {tab===4&&<div>
      <SectionTitle action={<Btn sm onClick={()=>setShowPay(true)}>+ Ödeme Ekle</Btn>}>Ödeme Geçmişi</SectionTitle>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        <StatCard label="Toplam Ödenen" value={`${paid.toLocaleString("tr-TR")} ₺`} col={C.success}/>
        <StatCard label="Aylık Ücret (Beklenen)" value={`${monthly.toLocaleString("tr-TR")} ₺`}/>
      </div>
      {(student.payments||[]).length===0?<div style={{textAlign:"center",padding:"30px 0",color:C.textMuted,fontSize:13}}>Ödeme kaydı yok</div>:
      <Card>
        {[...(student.payments||[])].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(p=>p && <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
          <div>
            <div style={{fontSize:13,fontWeight:600}}>{Number(p.amount).toLocaleString("tr-TR")} ₺</div>
            <div style={{fontSize:11,color:C.textSub}}>{fmtDate(p.date)}{p.note?` · ${p.note}`:""}</div>
          </div>
          <button onClick={()=>delPay(p.id)} style={{background:"none",border:"none",color:C.danger,cursor:"pointer",fontSize:18}}>×</button>
        </div>)}
      </Card>}
      <Modal show={showPay} onClose={()=>setShowPay(false)} title="Ödeme Ekle">
        <Inp label="Tutar (₺) *" value={payForm.amount} onChange={v=>setPayForm(p=>({...p,amount:v}))} type="number"/>
        <Inp label="Tarih" value={payForm.date} onChange={v=>setPayForm(p=>({...p,date:v}))} type="date"/>
        <Inp label="Not" value={payForm.note} onChange={v=>setPayForm(p=>({...p,note:v}))} placeholder="örn. Temmuz ödemesi"/>
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <Btn variant="secondary" onClick={()=>setShowPay(false)} style={{flex:1}}>İptal</Btn>
          <Btn onClick={addPay} style={{flex:1}}>Kaydet</Btn>
        </div>
      </Modal>
    </div>}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   PAGES
═══════════════════════════════════════════════════════════════ */
function StudentsPage({students,stockItems}){
  const [search,setSearch]=useState("");
  const [showAdd,setShowAdd]=useState(false);
  const [detailId,setDetailId]=useState(null);
  const [statusFilter,setStatusFilter]=useState("all");
  const [groupFilter,setGroupFilter]=useState("all");

  const validStudents = (students||[]).filter(s=>s && s.id);
  const student = detailId ? validStudents.find(s=>s.id===detailId) : null;

  function save(f){
    let n;
    if(f.id){n=validStudents.map(s=>s.id===f.id?{...f}:s);}
    else{n=[...validStudents,{...f,id:Date.now(),payments:[],attendance:{},equipment:(f.equipment||[])}];}
    DB.set("students",n);setShowAdd(false);
  }
  function del(id){const n=validStudents.filter(s=>s.id!==id);DB.set("students",n);setDetailId(null);}

  function downloadExcel() {
    const headers = ["Ad Soyad", "Grup", "Veli", "Veli Tel", "Bitis Tarihi", "Aylik Ucret (TL)", "Odenen (TL)", "Kalan Borc (TL)"];
    const rows = filtered.map(s => {
      const exp = monthlyTotal(s); const paid = totalPaid(s);
      return [s.name, s.groupName||"-", s.guardianName||"-", s.guardianPhone1||"-", fmtDate(s.courseEnd), exp, paid, exp-paid];
    });
    exportCSV("Ogrenciler_Listesi", headers, rows);
  }

  const groups=["all",...new Set(validStudents.map(s=>s.groupName).filter(Boolean))];

  const filtered=validStudents.filter(s=>{
    if(!s.name.toLowerCase().includes(search.toLowerCase()))return false;
    if(statusFilter==="active"&&courseStatus(s)!=="active")return false;
    if(statusFilter==="ended"&&courseStatus(s)!=="ended")return false;
    if(statusFilter==="upcoming"&&courseStatus(s)!=="upcoming")return false;
    if(statusFilter==="unpaid"&&totalPaid(s)>=monthlyTotal(s))return false; 
    if(groupFilter!=="all"&&s.groupName!==groupFilter)return false;
    return true;
  });

  if(student)return<StudentDetail student={student} onBack={()=>setDetailId(null)} students={validStudents} stockItems={stockItems}/>;

  return<div style={{padding:14}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,color:C.accent,textTransform:"uppercase",letterSpacing:1}}>Öğrenciler ({filtered.length})</div>
      <div style={{display:"flex", gap:6}}>
        <Btn sm variant="secondary" onClick={downloadExcel}>⬇️ Excel</Btn>
        <Btn sm onClick={()=>setShowAdd(true)}>+ Yeni</Btn>
      </div>
    </div>

    <div style={{position:"relative",marginBottom:10}}>
      <Icon d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0" size={15} color={C.textMuted} style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}/>
      <input style={{width:"100%",padding:"9px 12px 9px 32px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:9,color:C.text,fontSize:13,outline:"none",fontFamily:"inherit"}} placeholder="Öğrenci ara..." value={search} onChange={e=>setSearch(e.target.value)}/>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
      <Sel label="Durum Filtresi" value={statusFilter} onChange={setStatusFilter} options={[
        {value:"all",label:"Tümü"},{value:"active",label:"Aktif"},{value:"upcoming",label:"Başlamadı"},{value:"ended",label:"Bitti"},{value:"unpaid",label:"Eksik Ödeme"}
      ]}/>
      <Sel label="Grup Filtresi" value={groupFilter} onChange={setGroupFilter} options={[
        {value:"all",label:"Tüm Gruplar"},...groups.filter(g=>g!=="all").map(g=>({value:g,label:g}))
      ]}/>
    </div>

    {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:C.textMuted,fontSize:13}}>Öğrenci bulunamadı</div>}

    {filtered.map(s=><Card key={s.id}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div>
          <div style={{fontWeight:700,fontSize:15}}>{s.name}</div>
          <div style={{fontSize:11,color:C.textSub,marginTop:2}}>{age(s.dob)} · {s.groupName||"Grup belirtilmemiş"}</div>
        </div>
        <Badge label={courseStatus(s)}/>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
        <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:C.accentGlow,color:C.accent,fontWeight:600}}>Bitiş: {fmtDate(s.courseEnd)}</span>
        <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:C.successBg,color:C.success,fontWeight:600}}>{totalPaid(s).toLocaleString("tr-TR")} ₺ ödendi</span>
        {s.hasTransport&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:C.purpleBg,color:C.purple,fontWeight:600}}>Servis</span>}
        {attendanceCount(s)>0&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:C.bg,color:C.textSub,fontWeight:600,border:`1px solid ${C.border}`}}>{attendanceCount(s)} gün katılım</span>}
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn variant="secondary" sm onClick={()=>setDetailId(s.id)} style={{flex:1}}>Detay</Btn>
        <Btn variant="danger" sm onClick={()=>{if(confirm(`${s.name} silinsin mi?`))del(s.id);}}>Sil</Btn>
      </div>
    </Card>)}

    <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Yeni Öğrenci Kaydı">
      <StudentForm initial={{}} onSave={save} onCancel={()=>setShowAdd(false)} stockItems={stockItems}/>
    </Modal>
  </div>
}

function AttendancePage({students}){
  const validStudents = (students||[]).filter(s=>s && s.id);
  const [date,setDate]=useState(TODAY);
  const [y, m, d] = date.split('-');
  const selectedDayIndex = new Date(y, m - 1, d).getDay();
  const active=validStudents.filter(s=>courseStatus(s)==="active" && (s.weekDays||[]).includes(selectedDayIndex));
  const present=active.filter(s=>(s.attendance||{})[date]).length;

  function toggle(id,val){
    const n=validStudents.map(s=>{if(s.id!==id)return s;const att={...s.attendance};if(val)att[date]=true;else delete att[date];return{...s,attendance:att}});
    DB.set("students",n);
  }

  function downloadExcel() {
    const headers = ["Ad Soyad", "Grup", "Yoklama Durumu"];
    const rows = active.map(s => [s.name, s.groupName||"-", (s.attendance||{})[date] ? "Katildi" : "Katilmadi"]);
    exportCSV(`Yoklama_${date}`, headers, rows);
  }

  return<div style={{padding:14}}>
    <SectionTitle action={<Btn sm variant="secondary" onClick={downloadExcel}>⬇️ Excel</Btn>}>Yoklama</SectionTitle>
    <Inp label="Tarih" value={date} onChange={setDate} type="date"/>
    <div style={{display:"flex",gap:8,marginBottom:12}}>
      <StatCard label="Programa Uygun Öğrenci" value={active.length}/>
      <StatCard label="Bugün Mevcut" value={`${present} / ${active.length}`} col={C.success}/>
    </div>
    {active.length===0?<div style={{textAlign:"center",padding:"40px 0",color:C.textMuted}}>Bu tarih/gün için planlanmış öğrenci bulunamadı</div>:
    <Card>

function PaymentsPage({students}){
  const validStudents = (students||[]).filter(s=>s && s.id);
  const all=validStudents.flatMap(s=>(s.payments||[]).map(p=>({...p,studentName:s.name}))).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const total=all.reduce((t,p)=>t+Number(p.amount),0);
  const thisMonth=all.filter(p=>p.date&&p.date.startsWith(TODAY.slice(0,7))).reduce((t,p)=>t+Number(p.amount),0);
  
  const unpaid = validStudents
    .filter(s => courseStatus(s) === "active" && totalPaid(s) < monthlyTotal(s))
    .sort((a, b) => new Date(a.courseStart) - new Date(b.courseStart));

  function downloadExcel() {
    const headers = ["Ogrenci Ad Soyad", "Tutar (TL)", "Islem Tarihi", "Not"];
    const rows = all.map(p => [p.studentName, p.amount, fmtDate(p.date), p.note||"-"]);
    exportCSV("Odemeler_Gecmisi", headers, rows);
  }

  return<div style={{padding:14}}>
    <SectionTitle action={<Btn sm variant="secondary" onClick={downloadExcel}>⬇️ Excel</Btn>}>Ödemeler</SectionTitle>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
      <StatCard label="Toplam Tahsilat" value={`${total.toLocaleString("tr-TR")} ₺`} col={C.success} span2/>
      <StatCard label="Bu Ay" value={`${thisMonth.toLocaleString("tr-TR")} ₺`} col={C.accent}/>
      <StatCard label="Eksik Ödeme" value={unpaid.length} col={unpaid.length>0?C.danger:C.success}/>
    </div>
    {unpaid.length>0&&<>
      <SectionTitle>Eksik Ödeme Bekleyenler</SectionTitle>
      {unpaid.map(s=>{
        const expected = monthlyTotal(s);
        const paid = totalPaid(s);
        const debt = expected - paid;
        return (
          <Card key={s.id} accent={C.danger}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:600,fontSize:14}}>{s.name}</div>
                <div style={{fontSize:11,color:C.textSub,marginTop:2}}>Başlangıç: {fmtDate(s.courseStart)}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <span style={{color:C.danger,fontWeight:700,fontSize:15}}>{debt.toLocaleString("tr-TR")} ₺</span>
                <div style={{fontSize:10,color:C.textSub}}>kalan borç</div>
              </div>
            </div>
            {paid > 0 && <div style={{fontSize:11,color:C.textMuted,marginTop:8}}>
              <span style={{color:C.success}}>{paid.toLocaleString("tr-TR")} ₺ ödendi</span> / Toplam: {expected.toLocaleString("tr-TR")} ₺
            </div>}
          </Card>
        )
      })}
    </>}
    <SectionTitle>Tüm İşlemler</SectionTitle>
    {all.length===0?<div style={{textAlign:"center",padding:"40px 0",color:C.textMuted}}>Ödeme kaydı bulunmuyor</div>:
    <Card>
      {all.map((p,i)=><div key={p.id+p.studentName+i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:i===all.length-1?"none":`1px solid ${C.border}`}}>
        <div>
          <div style={{fontSize:13,fontWeight:600}}>{p.studentName}</div>
          <div style={{fontSize:11,color:C.textSub}}>{fmtDate(p.date)}{p.note?` · ${p.note}`:""}</div>
        </div>
        <span style={{color:C.success,fontWeight:700}}>+{Number(p.amount).toLocaleString("tr-TR")} ₺</span>
      </div>)}
    </Card>}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   SIFIRDAN YAZILMIŞ ÇÖKMEYEN ENVANTER MODÜLÜ
═══════════════════════════════════════════════════════════════ */
const EMPTY_ITEM={id:null,name:"",category:"",price:"",stock:"",minStock:"",supplier:"",notes:""};
const STOCK_CATS=["Gözlük","Bone","Palet","Şamandıra","Aksesuar","Kıyafet","Temizlik","Diğer"];

function InventoryPage({items,movements}){
  // SIFIRDAN FİLTRELEME: Asla boş (null) eleman kabul etmez.
  const validItems = (items || []).filter(i => i && i.id);
  const validMovements = (movements || []).filter(m => m && m.id);

  const [show,setShow]=useState(false);
  const [f,setF]=useState(EMPTY_ITEM);
  const [editing,setEditing]=useState(null);
  const [catFilter,setCatFilter]=useState("all");
  const [tab,setTab]=useState(0);
  const [movForm,setMovForm]=useState({itemId:"",type:"in",qty:1,note:"",date:TODAY});
  const [showMov,setShowMov]=useState(false);
  
  const u=(k,v)=>setF(p=>({...p,[k]:v}));

  function save(){
    if(!f.name.trim()) return;
    const n = f.id ? validItems.map(i=>i.id===f.id?{...f}:i) : [...validItems,{...f,id:Date.now()}];
    DB.set("stock",n);
    setShow(false);
    setEditing(null);
    setF(EMPTY_ITEM);
  }
  
  function del(id){
    const n = validItems.filter(i=>i.id!==id);
    DB.set("stock",n);
  }

  function edit(item){
    setF({...item});
    setEditing(item.id);
    setShow(true);
  }

  function adj(id,delta){
    const n = validItems.map(i=>i.id===id ? {...i, stock: Math.max(0, Number(i.stock||0)+delta)} : i);
    DB.set("stock",n);
  }

  function addMovement(){
    if(!movForm.itemId || !movForm.qty) return;
    const item = validItems.find(i=>String(i.id)===String(movForm.itemId));
    if(!item) return;
    const delta = movForm.type==="in" ? Number(movForm.qty) : -Number(movForm.qty);
    adj(item.id, delta);
    const mov = {id:Date.now(), ...movForm, itemName:item.name, qty:Number(movForm.qty)};
    DB.set("movements", [mov, ...validMovements]);
    setMovForm({itemId:"", type:"in", qty:1, note:"", date:TODAY});
    setShowMov(false);
  }

  function downloadExcel() {
    const headers = ["Urun Adi", "Kategori", "Birim Fiyat (TL)", "Stok Miktari", "Min Stok Uyari", "Tedarikci"];
    const rows = validItems.map(i => [i.name, i.category||"-", i.price||"0", i.stock||"0", i.minStock||"-", i.supplier||"-"]);
    exportCSV("Envanter_Stok", headers, rows);
  }

  const cats=["all",...new Set(validItems.map(i=>i.category).filter(Boolean))];
  const filtered=catFilter==="all"?validItems:validItems.filter(i=>i.category===catFilter);
  const lowStock=validItems.filter(i=>Number(i.stock)<=Number(i.minStock||0)&&Number(i.stock)>0);
  const outStock=validItems.filter(i=>Number(i.stock)===0);
  const totalVal=validItems.reduce((t,i)=>t+Number(i.price||0)*Number(i.stock||0),0);

  return<div style={{padding:14}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,color:C.accent,textTransform:"uppercase",letterSpacing:1}}>Envanter & Stok</div>
      <div style={{display:"flex",gap:6}}>
        <Btn sm variant="secondary" onClick={downloadExcel}>⬇️ Excel</Btn>
        <Btn sm onClick={()=>setShowMov(true)}>Hareket Ekle</Btn>
        <Btn sm onClick={()=>{setF(EMPTY_ITEM);setEditing(null);setShow(true);}}>+ Ürün</Btn>
      </div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
      <StatCard label="Toplam Ürün Çeşidi" value={validItems.length}/>
      <StatCard label="Stok Değeri" value={`${totalVal.toLocaleString("tr-TR")} ₺`} col={C.success}/>
    </div>

    {outStock.length>0&&<Card accent={C.danger} style={{marginBottom:8}}>
      <div style={{fontSize:12,fontWeight:600,color:C.danger,marginBottom:4}}>Stok Bitti</div>
      <div style={{fontSize:12,color:C.textSub}}>{outStock.map(i=>i.name).join(", ")}</div>
    </Card>}
    {lowStock.length>0&&<Card accent={C.warning} style={{marginBottom:10}}>
      <div style={{fontSize:12,fontWeight:600,color:C.warning,marginBottom:4}}>Kritik Stok Seviyesi</div>
      <div style={{fontSize:12,color:C.textSub}}>{lowStock.map(i=>`${i.name} (${i.stock})`).join(", ")}</div>
    </Card>}

    <TabBar tabs={["Ürün Listesi","Stok Hareketleri"]} active={tab} onChange={setTab}/>

    {tab===0&&<div>
      {cats.length>1&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
        {cats.map(c=><button key={c} onClick={()=>setCatFilter(c)} style={{padding:"4px 12px",borderRadius:20,border:`1px solid ${catFilter===c?C.accent:C.border}`,background:catFilter===c?C.accentGlow:"transparent",color:catFilter===c?C.accent:C.textSub,cursor:"pointer",fontSize:11,fontWeight:catFilter===c?600:400,fontFamily:"inherit"}}>{c==="all"?"Tümü":c}</button>)}
      </div>}
      {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:C.textMuted}}>Ürün bulunamadı</div>}
      {filtered.map(item=>(
        <Card key={item.id} accent={Number(item.stock)===0?C.danger:(Number(item.stock)<=Number(item.minStock||0)?C.warning:undefined)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div>
              <div style={{fontWeight:700,fontSize:15}}>{item.name}</div>
              {item.category&&<div style={{fontSize:11,color:C.textSub,marginTop:1}}>{item.category}</div>}
              {item.supplier&&<div style={{fontSize:11,color:C.textMuted,marginTop:1}}>Tedarikçi: {item.supplier}</div>}
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontWeight:700,color:C.success,fontSize:14}}>{Number(item.price||0).toLocaleString("tr-TR")} ₺</div>
              <div style={{fontSize:10,color:C.textMuted}}>birim fiyat</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <button onClick={()=>adj(item.id,-1)} style={{width:28,height:28,borderRadius:6,border:`1px solid ${C.border}`,background:"transparent",color:C.danger,cursor:"pointer",fontSize:16,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:800,color:Number(item.stock)===0?C.danger:(Number(item.stock)<=Number(item.minStock||0)?C.warning:C.text)}}>{item.stock}</div>
                <div style={{fontSize:10,color:C.textMuted}}>adet</div>
              </div>
              <button onClick={()=>adj(item.id,1)} style={{width:28,height:28,borderRadius:6,border:`1px solid ${C.border}`,background:"transparent",color:C.success,cursor:"pointer",fontSize:16,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:13,fontWeight:700,color:C.accent}}>{(Number(item.price||0)*Number(item.stock||0)).toLocaleString("tr-TR")} ₺</div>
              <div style={{fontSize:10,color:C.textMuted}}>toplam değer</div>
            </div>
          </div>
          {item.minStock&&<div style={{fontSize:11,color:C.textMuted,marginBottom:8}}>Min. stok uyarı: {item.minStock} adet</div>}
          <div style={{display:"flex",gap:8}}>
            <Btn variant="secondary" sm onClick={()=>edit(item)} style={{flex:1}}>Düzenle</Btn>
            <Btn variant="danger" sm onClick={()=>{if(confirm(`${item.name} silinsin mi?`))del(item.id);}}>Sil</Btn>
          </div>
        </Card>
      ))}
    </div>}

    {tab===1&&<div>
      {validMovements.length===0?<div style={{textAlign:"center",padding:"40px 0",color:C.textMuted}}>Stok hareketi bulunmuyor</div>:
      <Card>
        {validMovements.slice(0,50).map((m,i)=><div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i===Math.min(validMovements.length,50)-1?"none":`1px solid ${C.border}`}}>
          <div>
            <div style={{fontSize:13,fontWeight:600}}>{m.itemName}</div>
            <div style={{fontSize:11,color:C.textSub}}>{fmtDate(m.date)}{m.note?` · ${m.note}`:""}</div>
          </div>
          <span style={{fontWeight:700,fontSize:14,color:m.type==="in"?C.success:C.danger}}>{m.type==="in"?"+":"-"}{m.qty}</span>
        </div>)}
      </Card>}
    </div>}

    <Modal show={show} onClose={()=>{setShow(false);setF(EMPTY_ITEM);}} title={editing?"Ürün Düzenle":"Yeni Ürün Ekle"}>
      <Inp label="Ürün Adı *" value={f.name} onChange={v=>u("name",v)} placeholder="örn. Yüzücü Gözlüğü"/>
      <Sel label="Kategori" value={f.category} onChange={v=>u("category",v)} options={STOCK_CATS.map(c=>({value:c,label:c}))}/>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><Inp label="Birim Fiyat (₺)" value={f.price} onChange={v=>u("price",v)} type="number"/></div>
        <div style={{flex:1}}><Inp label="Mevcut Stok" value={f.stock} onChange={v=>u("stock",v)} type="number"/></div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><Inp label="Min. Stok Uyarısı" value={f.minStock} onChange={v=>u("minStock",v)} type="number"/></div>
        <div style={{flex:1}}><Inp label="Tedarikçi" value={f.supplier} onChange={v=>u("supplier",v)}/></div>
      </div>
      <Inp label="Notlar" value={f.notes} onChange={v=>u("notes",v)} rows={2}/>
      <div style={{display:"flex",gap:8,marginTop:8}}>
        <Btn variant="secondary" onClick={()=>{setShow(false);setF(EMPTY_ITEM);}} style={{flex:1}}>İptal</Btn>
        <Btn onClick={save} style={{flex:1}}>Kaydet</Btn>
      </div>
    </Modal>

    <Modal show={showMov} onClose={()=>setShowMov(false)} title="Stok Hareketi Ekle">
      <Sel label="Ürün *" value={movForm.itemId} onChange={v=>setMovForm(p=>({...p,itemId:v}))} options={validItems.map(i=>({value:String(i.id),label:i.name}))}/>
      <Sel label="İşlem Türü" value={movForm.type} onChange={v=>setMovForm(p=>({...p,type:v}))} options={[{value:"in",label:"Stok Girişi"},{value:"out",label:"Stok Çıkışı"}]}/>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><Inp label="Miktar" value={movForm.qty} onChange={v=>setMovForm(p=>({...p,qty:v}))} type="number"/></div>
        <div style={{flex:1}}><Inp label="Tarih" value={movForm.date} onChange={v=>setMovForm(p=>({...p,date:v}))} type="date"/></div>
      </div>
      <Inp label="Not" value={movForm.note} onChange={v=>setMovForm(p=>({...p,note:v}))} placeholder="Açıklama..."/>
      <div style={{display:"flex",gap:8,marginTop:8}}>
        <Btn variant="secondary" onClick={()=>setShowMov(false)} style={{flex:1}}>İptal</Btn>
        <Btn onClick={addMovement} style={{flex:1}}>Kaydet</Btn>
      </div>
    </Modal>
  </div>
}

function Dashboard({students,stockItems,expenses}){
  const safeStudents = (students||[]).filter(s=>s && s.id);
  const safeExpenses = (expenses||[]).filter(e=>e && e.id);
  const validStock = (stockItems||[]).filter(i=>i && i.id);

  const active=safeStudents.filter(s=>courseStatus(s)==="active");
  const presentToday=safeStudents.filter(s=>(s.attendance||{})[TODAY]).length;
  
  const totalRev=safeStudents.reduce((t,s)=>t+totalPaid(s),0);
  const totalExp=safeExpenses.reduce((t,e)=>t+Number(e.amount||0),0);
  const netProfit = totalRev - totalExp;

  const unpaid=active.filter(s=>totalPaid(s)<monthlyTotal(s)).length;
  const endingSoon=active.filter(s=>{const d=daysLeft(s);return d>=0&&d<=14;}).sort((a,b)=>daysLeft(a)-daysLeft(b));
  const outStock=validStock.filter(i=>Number(i.stock)===0);
  
  const foodWarnings = safeExpenses.filter(e => {
    if(!e.isFood || !e.expiryDate) return false;
    const days = Math.ceil((new Date(e.expiryDate) - new Date(TODAY))/86400000);
    return days <= 7;
  }).sort((a,b)=>new Date(a.expiryDate)-new Date(b.expiryDate));

  return<div style={{padding:14}}>
    <SectionTitle>Genel Bakış</SectionTitle>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
      <StatCard label="Toplam Öğrenci" value={safeStudents.length}/>
      <StatCard label="Aktif Kurs" value={active.length}/>
      <StatCard label="Bugün Mevcut" value={`${presentToday} / ${active.length}`} col={C.success}/>
      <StatCard label="Toplam Tahsilat" value={`${totalRev.toLocaleString("tr-TR")} ₺`} col={C.accent}/>
    </div>

    <Card accent={netProfit >= 0 ? C.success : C.danger} style={{marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:13, color:C.textSub, fontWeight:600}}>Net Kâr / Kasa Durumu</div>
        <div style={{fontSize:22, fontWeight:800, color:netProfit >= 0 ? C.success : C.danger}}>
          {netProfit >= 0 ? "+" : ""}{netProfit.toLocaleString("tr-TR")} ₺
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.textMuted}}>
        <span>Tahsilat: {totalRev.toLocaleString("tr-TR")} ₺</span>
        <span>Giderler: {totalExp.toLocaleString("tr-TR")} ₺</span>
      </div>
      <div style={{height:6, background:C.borderLight, borderRadius:3, marginTop:8, overflow:"hidden"}}>
         <div style={{height:"100%", width:`${totalRev===0?0:Math.min(100,(totalRev/(totalRev+totalExp))*100)}%`, background:C.success, float:"left"}}></div>
         <div style={{height:"100%", width:`${totalExp===0?0:Math.min(100,(totalExp/(totalRev+totalExp))*100)}%`, background:C.danger, float:"right"}}></div>
      </div>
    </Card>

    {(unpaid>0||outStock.length>0||foodWarnings.length>0)&&<div style={{marginBottom:12}}>
      {foodWarnings.map(f=>{
         const d = Math.ceil((new Date(f.expiryDate)-new Date(TODAY))/86400000);
         return <Card key={f.id} accent={d<0?C.danger:C.warning} style={{marginBottom:8}}>
           <div style={{fontSize:13,fontWeight:600,color:d<0?C.danger:C.warning}}>
             SKT Uyarısı: {f.title} ({d<0 ? "Tarihi Geçti!" : `${d} Gün Kaldı`})
           </div>
         </Card>
      })}
      {unpaid>0&&<Card accent={C.danger} style={{marginBottom:8}}>
        <div style={{fontSize:13,fontWeight:600,color:C.danger}}>{unpaid} aktif öğrencinin eksik ödemesi bulunuyor</div>
      </Card>}
      {outStock.length>0&&<Card accent={C.warning}>
        <div style={{fontSize:13,fontWeight:600,color:C.warning}}>Stok bitti: {outStock.map(i=>i.name).join(", ")}</div>
      </Card>}
    </div>}

    {endingSoon.length>0&&<>
      <SectionTitle>Kursu Bitenler (14 gün)</SectionTitle>
      {endingSoon.map(s=><Card key={s.id} accent={C.warning}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:600,fontSize:14}}>{s.name}</div>
            <div style={{fontSize:11,color:C.textSub,marginTop:2}}>Bitiş: {fmtDate(s.courseEnd)}</div>
          </div>
          <span style={{color:C.warning,fontWeight:700,fontSize:13}}>{daysLeft(s)} gün</span>
        </div>
      </Card>)}
    </>}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   SETTINGS
═══════════════════════════════════════════════════════════════ */
function SettingsPage({navItems, clubName, logoUrl, themeColor, sidebarColor, cardColor, pinCode}){
  const [tab, setTab] = useState(0);

  const [nameVal, setNameVal] = useState(clubName);
  const [logoVal, setLogoVal] = useState(logoUrl);
  const [colorVal, setColorVal] = useState(themeColor);
  const [sidebarColorVal, setSidebarColorVal] = useState(sidebarColor);
  const [cardColorVal, setCardColorVal] = useState(cardColor);
  const [saveMsg, setSaveMsg] = useState("");

  const [oldPin, setOldPin] = useState("");
  const [newPin, setNewPin] = useState("");
  const [confirmPin, setConfirmPin] = useState("");
  const [secAnswer, setSecAnswer] = useState("");
  const [secMsg, setSecMsg] = useState(null);

  useEffect(() => {
    setNameVal(clubName);
    setLogoVal(logoUrl);
    setColorVal(themeColor);
    setSidebarColorVal(sidebarColor);
    setCardColorVal(cardColor);
  }, [clubName, logoUrl, themeColor, sidebarColor, cardColor]);

  function saveGeneral(){
    DB.set("clubName", nameVal);
    DB.set("logoUrl", logoVal);
    DB.set("themeColor", colorVal);
    DB.set("sidebarColor", sidebarColorVal);
    DB.set("cardColor", cardColorVal);
    setSaveMsg("Ayarlar başarıyla kaydedildi.");
    setTimeout(()=>setSaveMsg(""), 3000);
  }

  function changePin(){
    if(oldPin !== pinCode) { setSecMsg({type:"error", text:"Mevcut PIN hatalı!"}); return; }
    if(newPin.length !== 4) { setSecMsg({type:"error", text:"Yeni PIN 4 haneli olmalı!"}); return; }
    if(newPin !== confirmPin) { setSecMsg({type:"error", text:"Yeni PIN'ler eşleşmiyor!"}); return; }
    if(oldPin === newPin) { setSecMsg({type:"error", text:"Yeni PIN eskisiyle aynı olamaz!"}); return; }
    
    if(secAnswer.trim().toLowerCase() !== clubName.trim().toLowerCase()) { 
      setSecMsg({type:"error", text:"Güvenlik doğrulaması başarısız! Kulüp adını hatalı girdiniz."}); 
      return; 
    }

    DB.set("pinCode", newPin);
    setSecMsg({type:"success", text:"PIN başarıyla güncellendi!"});
    setOldPin(""); setNewPin(""); setConfirmPin(""); setSecAnswer("");
    setTimeout(()=>setSecMsg(null), 3000);
  }

  function moveUp(i){if(i===0)return;const n=[...navItems];[n[i-1],n[i]]=[n[i],n[i-1]];DB.set("navItems",n);}
  function moveDown(i){if(i===navItems.length-1)return;const n=[...navItems];[n[i],n[i+1]]=[n[i+1],n[i]];DB.set("navItems",n);}
  function toggleVis(id){const n=navItems.map(t=>t.id===id?{...t,visible:!t.visible}:t);DB.set("navItems",n);}
  function editLabel(id,label){const n=navItems.map(t=>t.id===id?{...t,label}:t);DB.set("navItems",n);}
  function resetAll(){if(!confirm("Menü ayarları sıfırlansın mı?"))return;DB.set("navItems",NAV_ITEMS);}
  
  function resetColors(){
    setColorVal("#070D1A");
    setSidebarColorVal("#090F1E");
    setCardColorVal("#101E35");
  }

  return<div style={{padding:14}}>
    <TabBar tabs={["Genel & Görünüm", "Menü Düzenleme", "Güvenlik"]} active={tab} onChange={setTab}/>

    {tab === 0 && (
      <div>
        <SectionTitle>Genel Ayarlar</SectionTitle>
        <Card>
          <Inp label="Kulüp Adı" value={nameVal} onChange={setNameVal} placeholder="Örn: AquaClub Pro"/>
          <Inp label="Logo URL (İsteğe Bağlı)" value={logoVal} onChange={setLogoVal} placeholder="Örn: https://site.com/logo.png"/>
        </Card>

        <SectionTitle action={<Btn sm variant="ghost" onClick={resetColors}>Varsayılana Dön</Btn>}>Renk Teması</SectionTitle>
        <Card>
          <div style={{display:"grid", gridTemplateColumns:"1fr", gap:12}}>
            
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
              <div>
                <div style={{fontSize:13, fontWeight:600}}>Ana Arkaplan</div>
                <div style={{fontSize:11, color:C.textMuted}}>Orta sayfa alanı</div>
              </div>
              <input type="color" value={colorVal} onChange={e=>setColorVal(e.target.value)} 
                style={{width:44, height:44, padding:0, border:`2px solid ${C.borderLight}`, borderRadius:8, cursor:"pointer", background:"none"}}/>
            </div>
            
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
              <div>
                <div style={{fontSize:13, fontWeight:600}}>Yan Menü (Sidebar)</div>
                <div style={{fontSize:11, color:C.textMuted}}>Sol menü alanı</div>
              </div>
              <input type="color" value={sidebarColorVal} onChange={e=>setSidebarColorVal(e.target.value)} 
                style={{width:44, height:44, padding:0, border:`2px solid ${C.borderLight}`, borderRadius:8, cursor:"pointer", background:"none"}}/>
            </div>

            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
              <div>
                <div style={{fontSize:13, fontWeight:600}}>Kart / Kutu Rengi</div>
                <div style={{fontSize:11, color:C.textMuted}}>Veri kutucukları ve Modallar</div>
              </div>
              <input type="color" value={cardColorVal} onChange={e=>setCardColorVal(e.target.value)} 
                style={{width:44, height:44, padding:0, border:`2px solid ${C.borderLight}`, borderRadius:8, cursor:"pointer", background:"none"}}/>
            </div>

          </div>
        </Card>

        <Btn full onClick={saveGeneral} style={{marginTop:8}}>Değişiklikleri Kaydet</Btn>
        {saveMsg && <div style={{marginTop:12, fontSize:13, color:C.success, textAlign:"center", fontWeight:600}}>{saveMsg}</div>}
      </div>
    )}

    {tab === 1 && (
      <div>
        <SectionTitle>Menü Özelleştirme</SectionTitle>
        <div style={{fontSize:12,color:C.textSub,marginBottom:12,lineHeight:1.6}}>Menü öğelerini yeniden adlandırabilir, sıralayabilir ve gizleyebilirsiniz.</div>
        {navItems.map((t,i)=><Card key={t.id} style={{opacity:t.visible?1:0.5,marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{display:"flex",flexDirection:"column",gap:3}}>
              <button onClick={()=>moveUp(i)} style={{background:"none",border:`1px solid ${C.border}`,color:C.textSub,borderRadius:4,cursor:"pointer",fontSize:10,padding:"1px 7px",fontFamily:"inherit"}}>▲</button>
              <button onClick={()=>moveDown(i)} style={{background:"none",border:`1px solid ${C.border}`,color:C.textSub,borderRadius:4,cursor:"pointer",fontSize:10,padding:"1px 7px",fontFamily:"inherit"}}>▼</button>
            </div>
            <input style={{flex:1,padding:"7px 10px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:7,color:C.text,fontSize:13,outline:"none",fontFamily:"inherit"}} value={t.label} onChange={e=>editLabel(t.id,e.target.value)}/>
            <Toggle checked={t.visible} onChange={()=>toggleVis(t.id)}/>
          </div>
        </Card>)}
        <Btn variant="danger" full onClick={resetAll} style={{marginTop:4}}>Menü Ayarlarını Sıfırla</Btn>
      </div>
    )}

    {tab === 2 && (
      <div>
        <SectionTitle>Güvenlik Ayarları (PIN Değiştirme)</SectionTitle>
        <Card>
          <div style={{fontSize:12,color:C.textSub,marginBottom:14,lineHeight:1.6}}>Panele giriş için kullandığınız 4 haneli PIN kodunu değiştirin.</div>
          
          <Inp label="Mevcut PIN" value={oldPin} onChange={setOldPin} type="password" placeholder="••••" style={{letterSpacing:8, fontSize:16}}/>
          
          <div style={{display:"flex", gap:8}}>
            <Inp label="Yeni PIN" value={newPin} onChange={setNewPin} type="password" placeholder="••••" half style={{letterSpacing:8, fontSize:16}}/>
            <Inp label="Yeni PIN (Tekrar)" value={confirmPin} onChange={setConfirmPin} type="password" placeholder="••••" half style={{letterSpacing:8, fontSize:16}}/>
          </div>
          
          <div style={{height:1,background:C.border,margin:"12px 0 16px"}}/>
          
          <div style={{background:C.warningBg, border:`1px solid ${C.warning}40`, padding:12, borderRadius:8, marginBottom:12}}>
            <div style={{fontSize:11, color:C.warning, fontWeight:700, marginBottom:4}}>GÜVENLİK DOĞRULAMASI</div>
            <div style={{fontSize:12, color:C.textSub, marginBottom:8}}>Yetkisiz işlemi önlemek için onay sorusunu yanıtlayın. Lütfen kulübünüzün şu anki adını (<strong style={{color:C.text}}>{clubName}</strong>) kutucuğa yazın.</div>
            <Inp value={secAnswer} onChange={setSecAnswer} placeholder="Kulüp adını yazın..." />
          </div>

          <Btn full onClick={changePin}>PIN Kodunu Güncelle</Btn>
          {secMsg && <div style={{marginTop:12, fontSize:13, color:secMsg.type==="error"?C.danger:C.success, textAlign:"center", fontWeight:600}}>{secMsg.text}</div>}
        </Card>
      </div>
    )}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════════════════ */
function App(){
  const [isAuthenticated, setIsAuthenticated] = useState(() => sessionStorage.getItem("aqua_auth") === "1");
  const [isDbLoaded, setIsDbLoaded] = useState(false);

  // Başlangıçta boş state
  const [students,setStudents]=useState([]);
  const [staff,setStaff]=useState([]);
  const [stockItems,setStockItems]=useState([]);
  const [movements,setMovements]=useState([]);
  const [expenses,setExpenses]=useState([]);
  
  const [clubName,setClubName]=useState("AquaClub");
  const [navItems,setNavItems]=useState(NAV_ITEMS);
  const [pinCode,setPinCode]=useState("0309");
  
  const [themeColor,setThemeColor]=useState("#070D1A");
  const [sidebarColor,setSidebarColor]=useState("#090F1E");
  const [cardColor,setCardColor]=useState("#101E35");
  const [logoUrl,setLogoUrl]=useState("");
  
  const [activeTab,setActiveTab]=useState("dashboard");
  const [sidebarOpen,setSidebarOpen]=useState(false);

  useEffect(() => {
    document.documentElement.style.setProperty('--bg-color', themeColor);
    document.documentElement.style.setProperty('--sidebar-bg', sidebarColor);
    document.documentElement.style.setProperty('--card-bg', cardColor);
    const metaTheme = document.querySelector('meta[name="theme-color"]');
    if(metaTheme) metaTheme.setAttribute("content", themeColor);
  }, [themeColor, sidebarColor, cardColor]);

  useEffect(() => {
    const unsub = db.collection("appData").doc("main").onSnapshot((doc) => {
      if (doc.exists) {
        const d = doc.data();
        
        // Zırhlı atamalar tamamen kaldırıldı, doğrudan sade atama yapıldı.
        if (d.students) setStudents(d.students);
        if (d.staff) setStaff(d.staff);
        if (d.stock) setStockItems(d.stock);
        if (d.movements) setMovements(d.movements);
        if (d.expenses) setExpenses(d.expenses);
        
        if (d.clubName) setClubName(d.clubName);
        if (d.pinCode) setPinCode(d.pinCode);
        if (d.themeColor) setThemeColor(d.themeColor);
        if (d.sidebarColor) setSidebarColor(d.sidebarColor);
        if (d.cardColor) setCardColor(d.cardColor);
        if (d.logoUrl) setLogoUrl(d.logoUrl);
        if (d.navItems) setNavItems(d.navItems);
      }
      setIsDbLoaded(true);
    }, (error) => {
       console.error("Firebase veri çekme hatası:", error);
       alert("Veritabanına bağlanılamadı. Ayarları kontrol edin.");
    });
    return () => unsub();
  }, []);

  if (!isDbLoaded) {
    return (
      <div style={{display:"flex",flexDirection:"column",height:"100vh",alignItems:"center",justifyContent:"center",background:"var(--bg-color)",color:C.accent,fontSize:15,fontWeight:600}}>
        <div className="spinner"></div>
        Sistem Yükleniyor...
      </div>
    );
  }

  if (!isAuthenticated) {
    return <PinScreen onSuccess={() => { setIsAuthenticated(true); sessionStorage.setItem("aqua_auth", "1"); }} correctPin={pinCode} />;
  }

  const visibleNav=(navItems||[]).filter(n=>n && n.visible);

  function NavItem({item}){
    const active=activeTab===item.id;
    return<button onClick={()=>{setActiveTab(item.id);setSidebarOpen(false);}}
      style={{display:"flex",alignItems:"center",gap:11,padding:"10px 16px",background:active?`${C.accent}18`:"transparent",border:"none",borderLeft:`3px solid ${active?C.accent:"transparent"}`,color:active?C.accent:C.textSub,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:active?600:400,width:"100%",textAlign:"left",transition:"all .15s",letterSpacing:0.2}}>
      <svg width={17} height={17} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
        {item.icon.split("M").filter(Boolean).map((seg,i)=><path key={i} d={"M"+seg}/>)}
      </svg>
      {item.label}
    </button>
  }

  const sidebar=<div style={{width:C.sidebarW,background:"var(--sidebar-bg)",borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",height:"100vh",position:"sticky",top:0,flexShrink:0}}>
    <div style={{padding:"20px 16px 16px",borderBottom:`1px solid ${C.border}`}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        
        <div style={{width:34,height:34,borderRadius:9,background:`linear-gradient(135deg,${C.accent},#38BDF8)`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,overflow:"hidden"}}>
          {logoUrl ? <img src={logoUrl} alt="Logo" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={(e)=>{e.target.style.display='none'}}/> :
          <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M2 12c2-4 4-4 6 0s4 4 6 0 4-4 6 0"/>
            <path d="M2 18c2-4 4-4 6 0s4 4 6 0 4-4 6 0"/>
          </svg>}
        </div>

        <div>
          <div style={{fontSize:14,fontWeight:800,letterSpacing:-0.3}}>{clubName}</div>
          <div style={{fontSize:10,color:C.textMuted,fontWeight:500}}>Yönetim Paneli</div>
        </div>
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",paddingTop:8}}>
      {visibleNav.map(item=><NavItem key={item.id} item={item}/>)}
    </div>
    <div style={{padding:"12px 16px",borderTop:`1px solid ${C.border}`}}>
      <div style={{fontSize:11,color:C.textMuted,fontWeight:500}}>AquaClub Pro v2.5</div>
    </div>
  </div>;

  return<div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg-color)"}}>
    <div className="sidebar-desktop" style={{display:"flex"}}>
      {sidebar}
    </div>
    {sidebarOpen&&<div style={{position:"fixed",inset:0,zIndex:400,display:"flex"}}>
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.6)"}} onClick={()=>setSidebarOpen(false)}/>
      <div style={{position:"relative",zIndex:1}}>{sidebar}</div>
    </div>}
    <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,height:"100vh"}}>
      <div style={{padding:"12px 14px",borderBottom:`1px solid ${C.border}`,background:"var(--bg-color)",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:50}}>
        <button onClick={()=>setSidebarOpen(true)} style={{background:"none",border:`1px solid ${C.border}`,color:C.textSub,width:32,height:32,borderRadius:7,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}} className="menu-btn">
          <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:700}}>{(visibleNav.find(n=>n.id===activeTab)||{}).label||"Genel Bakış"}</div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto"}}>
        {activeTab==="dashboard"&&<Dashboard students={students} stockItems={stockItems} expenses={expenses}/>}
        {activeTab==="students"&&<StudentsPage students={students} stockItems={stockItems}/>}
        {activeTab==="attendance"&&<AttendancePage students={students}/>}
        {activeTab==="payments"&&<PaymentsPage students={students}/>}
        {activeTab==="expenses"&&<ExpensesPage expenses={expenses}/>}
        {activeTab==="staff"&&<StaffPage staff={staff}/>}
        {activeTab==="inventory"&&<InventoryPage items={stockItems} movements={movements}/>}
        
        {activeTab==="settings"&&
          <SettingsPage 
            navItems={navItems} clubName={clubName} logoUrl={logoUrl} 
            themeColor={themeColor} sidebarColor={sidebarColor} cardColor={cardColor} pinCode={pinCode}
          />}
      </div>
    </div>
    <style>{`
      @media(min-width:640px){.sidebar-desktop{display:flex!important}.menu-btn{display:none!important}}
      @media(max-width:639px){.sidebar-desktop{display:none!important}.menu-btn{display:flex!important}}
    `}</style>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));}
</script>
</body>
</html>
