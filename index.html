.modern-btn-secondary { background: #F1F5F9; color: #475569; }

function safeArr(val) { 
  if (!val) return [];
  return (Array.isArray(val) ? val : Object.values(val)).filter(item => item !== null && item !== undefined);
}

const DB={
  set:(k,v)=>{

  }
};

function fmtDate(d){
  if(!d) return "—";
  try {
    const parts = d.split("-");
    if(parts.length !== 3) return d;
    return `${parts[2]}.${parts[1]}.${parts[0]}`;
  } catch(e) { return d; }
}

function totalPaid(s){return safeArr(s?.payments).reduce((t,p)=>t+Number(p.amount||0),0);}
function equipmentTotal(s){return safeArr(s?.equipment).reduce((t,e)=>t+Number(e.price||0),0);}
function monthlyTotal(s){return Number(s?.monthlyFee||0)-Number(s?.discount||0)+equipmentTotal(s)+(s?.hasTransport?Number(s?.transportFee||0):0);}
function courseStatus(s){
  if(!s?.courseStart||!s?.courseEnd)return"unknown";
  const now=new Date(TODAY),st=new Date(s.courseStart),en=new Date(s.courseEnd);
  if(now<st)return"upcoming";if(now>en)return"ended";return"active";
}
function daysLeft(s){
  try { return Math.ceil((new Date(s?.courseEnd)-new Date(TODAY))/86400000); } catch(e){ return 0; }
}
function attendanceCount(s){return Object.values(s?.attendance||{}).filter(Boolean).length}
function age(dob){
  if(!dob)return"—";
  try { return Math.floor((Date.now()-new Date(dob))/31557600000)+" Yaş"; } catch(e){ return "—"; }
}

function calcEndDate(start,total,days){
  try {
    if(!start||!total||!days||days.length===0)return"";
    let d=new Date(start);
    if(isNaN(d.getTime())) return ""; 
    let cnt=0,iter=0;
    const safeDays = safeArr(days).map(Number);
    while(cnt<total && iter<total*30){
      if(safeDays.includes(d.getDay())) cnt++;
      if(cnt<total) d.setDate(d.getDate()+1);
      iter++;
    }
    return d.toISOString().split("T")[0];
  } catch(e) { return ""; }
}

function calcRemainingSessions(s) {
  try {
    if (!s || !s.courseStart || !s.totalSessions || !s.weekDays || s.weekDays.length === 0) return 0;
    const total = Number(s.totalSessions || 0);
    const start = new Date(s.courseStart);
    if(isNaN(start.getTime())) return 0; 
    
    const end = s.courseEnd ? new Date(s.courseEnd) : new Date(TODAY);
    const current = new Date(TODAY);
    let targetEnd = current < end ? current : end;
    if (targetEnd < start) return total;
    
    let passedSessions = 0;
    let iter = new Date(start);
    const safeDays = safeArr(s.weekDays).map(Number);
    
    while (iter <= targetEnd && passedSessions < total) {
      if (safeDays.includes(iter.getDay())) passedSessions++;
      iter.setDate(iter.getDate() + 1);
    }
    return Math.max(0, total - passedSessions);
  } catch(e) { return 0; }
}

  if (!phone) { alert("Sisteme kayıtlı telefon bulunamadı."); return; }
  let p = phone.replace(/\D/g, "");
  if (p.startsWith("0")) p = "90" + p.slice(1);
  else if (p.length === 10) p = "90" + p;
  window.open(`https://wa.me/${p}?text=${encodeURIComponent(text)}`, "_blank");
}

function exportCSV(filename, headers, rows) {
  const bom = "\uFEFF"; 
  const csv = [headers.join(","), ...rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(","))].join("\n");
  const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename + ".csv";
  link.click();
}

function LoginScreen({ onSuccess, appUsers, adminPin }) {
  const [user, setUser] = useState("");
  const [pass, setPass] = useState("");
  const [err, setErr] = useState(false);

  const handleLogin = (e) => {
    e.preventDefault();
    if (user.toLowerCase() === "admin" && (pass === "0309" || pass === adminPin)) {
      onSuccess({ id: 'admin', username: 'admin', role: 'admin', allowedTabs: NAV_ITEMS.map(n=>n.id) });
      return;
    }
    const foundUser = safeArr(appUsers).find(u => u.username.toLowerCase() === user.toLowerCase() && u.password === pass);
    if (foundUser) { onSuccess(foundUser); return; }
    setErr(true); setTimeout(() => setErr(false), 2000);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"var(--bg-color)",padding:20}}>
      <div style={{fontSize:42, fontWeight:900, color:"var(--accent)", marginBottom:30, letterSpacing:-1.5}}>AquaClub Pro</div>
      <form onSubmit={handleLogin} style={{background:"#fff",padding:"40px 30px",borderRadius:16,border:`1px solid ${err?"#DC2626":"#E2E8F0"}`,textAlign:"center",boxShadow:"0 12px 32px rgba(0,0,0,0.04)",width:"100%",maxWidth:340, transition:"all 0.3s"}}>
        <div style={{fontSize:16,fontWeight:800,marginBottom:24,color:"var(--text-main)"}}>Sisteme Giriş Yapın</div>
        <Inp value={user} onChange={setUser} placeholder="Kullanıcı Adı" autoFocus style={{textAlign:"center", fontSize:14}}/>
        <Inp value={pass} onChange={setPass} type="password" placeholder="Şifre" style={{textAlign:"center", fontSize:14, letterSpacing:4}}/>
        <Btn full type="submit" onClick={handleLogin} style={{marginTop:12}}>Giriş Yap</Btn>
        <div style={{height: 20, marginTop: 16}}>{err && <div style={{color:"#DC2626",fontSize:13,fontWeight:700}}>Hatalı Bilgi Girdiniz!</div>}</div>
      </form>
    </div>
  );
}

function EqPicker({stockItems,current,onAdd,onRemove}){
  const [sel,setSel]=useState(""); const safeStock = safeArr(stockItems);
  return<div>
    <div style={{display:"flex",gap:10,marginBottom:12}}>
      <select className="modern-inp" style={{flex:1}} value={sel} onChange={e=>setSel(e.target.value)}>
        <option value="">Ekipman seçin...</option>
        {safeStock.filter(s=>Number(s.stock)>0).map(s=><option key={s.id} value={s.id}>{s.name} — {Number(s.price).toLocaleString("tr-TR")} ₺</option>)}
      </select>
      <Btn onClick={()=>{if(!sel)return;const item=safeStock.find(s=>String(s.id)===String(sel));if(item)onAdd({name:item.name,price:item.price,stockId:item.id});setSel("");}}>Ekle</Btn>
    </div>
    {safeArr(current).map(e=><div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",background:"#F8FAFC",borderRadius:12,marginBottom:8}}>
      <div><div style={{fontSize:14,fontWeight:800,color:"var(--text-main)"}}>{e.name}</div><div style={{fontSize:11,color:"var(--text-sub)",fontWeight:600}}>{fmtDate(e.addedDate)}</div></div>
      <div style={{display:"flex",alignItems:"center",gap:16}}><span style={{color:"#D97706",fontWeight:900,fontSize:15}}>{Number(e.price).toLocaleString("tr-TR")} ₺</span><button type="button" onClick={()=>onRemove(e.id)} style={{background:"#FEE2E2",border:"none",color:"#DC2626",cursor:"pointer",fontSize:14,width:30,height:30,borderRadius:8,fontWeight:800}}>X</button></div>
    </div>)}
  </div>
}

function StudentForm({initial,onSave,onCancel,stockItems,students}){
  const [tab,setTab]=useState(0);
  const [f,setF]=useState({...EMPTY_S,...initial});
  const [isNewGroup, setIsNewGroup]=useState(false); 

  const existingGroups = Array.from(new Set(safeArr(students).map(s=>s.groupName).filter(Boolean)));

  const u=(k,v)=>{
    if(typeof v === "string" && !["dob","courseStart","courseEnd","guardianPhone1","guardianPhone2"].includes(k)){
      v = v.toLocaleUpperCase("tr-TR");
    }
    setF(p=>({...p,[k]:v}));
  };

  const currentEq = safeArr(f.equipment);
  const safeWeekDays = safeArr(f.weekDays);

  useEffect(()=>{
    try {
      if(f.courseStart && f.totalSessions && safeWeekDays.length > 0){
        const endDate = calcEndDate(f.courseStart, Number(f.totalSessions), safeWeekDays);
        if(endDate && endDate !== f.courseEnd) u("courseEnd", endDate);
      }
    } catch(err) {}
  },[f.courseStart,f.totalSessions,JSON.stringify(safeWeekDays)]);

  return<div>
    <TabBar tabs={["Kişisel","Kurs Bilgisi","Servis","Ekipman"]} active={tab} onChange={setTab}/>
    
    {tab===0&&<div>
      <Inp label="Ad Soyad *" value={f.name} onChange={v=>u("name",v)} autoFocus/>
      <Inp label="Doğum Tarihi" value={f.dob} onChange={v=>u("dob",v)} type="date"/>
      <div style={{height:1,background:"#F1F5F9",margin:"16px 0"}}/>
      <Inp label="Veli Adı Soyadı" value={f.guardianName} onChange={v=>u("guardianName",v)}/>
      <div style={{display:"flex",gap:12}}>
        <Inp label="Veli Tel 1" value={f.guardianPhone1} onChange={v=>u("guardianPhone1",v)} type="tel" half/>
        <Inp label="Veli Tel 2" value={f.guardianPhone2} onChange={v=>u("guardianPhone2",v)} type="tel" half/>
      </div>
      <Inp label="Özel Notlar" value={f.notes} onChange={v=>u("notes",v)} rows={2}/>
    </div>}

    {tab===1&&<div>
      <div style={{display:"flex",gap:12}}>
        <div style={{flex:1}}><Sel label="Yüzme Seviyesi" value={f.swimLevel} onChange={v=>u("swimLevel",v)} options={[{value:"BAŞLANGIÇ",label:"Başlangıç"},{value:"ORTA",label:"Orta"},{value:"İLERİ",label:"İleri"},{value:"YARIŞMACI",label:"Yarışmacı"}]}/></div>
        <div style={{flex:1}}><Inp label="Havuz Kulvarı" value={f.poolLane} onChange={v=>u("poolLane",v)}/></div>
      </div>
      
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,color:"var(--text-sub)",marginBottom:6,fontWeight:800,textTransform:"uppercase",letterSpacing:0.5}}>Grup / Sınıf Adı</div>
        {!isNewGroup ? (
          <select className="modern-inp" value={f.groupName} onChange={e => {
            if(e.target.value === "___NEW___") { setIsNewGroup(true); u("groupName", ""); }
            else { u("groupName", e.target.value); }
          }}>
            <option value="">Grup Seçiniz...</option>
            {existingGroups.map(g=><option key={g} value={g}>{g}</option>)}
            <option value="___NEW___" style={{fontWeight:800, color:"var(--accent)"}}>+ YENİ GRUP EKLE...</option>
          </select>
        ) : (
          <div style={{display:"flex", gap:10}}>
            <input className="modern-inp" style={{flex:1}} placeholder="Yeni grubun adını yazın..." value={f.groupName} onChange={e=>u("groupName", e.target.value.toLocaleUpperCase("tr-TR"))} autoFocus/>
            <Btn variant="secondary" onClick={()=>{setIsNewGroup(false); u("groupName","");}}>İptal</Btn>
          </div>
        )}
      </div>

      <div style={{height:1,background:"#F1F5F9",margin:"16px 0"}}/>
      <div style={{fontSize:11,color:"var(--text-sub)",marginBottom:8,fontWeight:800,textTransform:"uppercase"}}>Haftalık Antrenman Günleri *</div>
      <DayPicker value={safeWeekDays} onChange={v=>u("weekDays",v)}/>
      
      <div style={{display:"flex",gap:12}}>
        <div style={{flex:1}}><Inp label="Kayıt Başlangıç *" value={f.courseStart} onChange={v=>u("courseStart",v)} type="date"/></div>
        <div style={{flex:1}}><Inp label="Toplam Seans *" value={f.totalSessions} onChange={v=>u("totalSessions",v)} type="number"/></div>
      </div>
      
      <div style={{background:"rgba(59, 130, 246, 0.05)", padding:"12px 16px", borderRadius:12, marginBottom:16, border:`1px solid rgba(59, 130, 246, 0.2)`}}>
        <div style={{fontSize:11,color:"var(--accent)",fontWeight:800,textTransform:"uppercase"}}>Sistemin Hesapladığı Bitiş Tarihi</div>
        <div style={{fontSize:18,fontWeight:900,color:"var(--text-main)",marginTop:4}}>{fmtDate(f.courseEnd)||"—"}</div>
      </div>
      
      <div style={{display:"flex",gap:12}}>
        <div style={{flex:1}}><Inp label="Aylık Ücret (₺)" value={f.monthlyFee} onChange={v=>u("monthlyFee",v)} type="number"/></div>
        <div style={{flex:1}}><Inp label="İndirim (₺)" value={f.discount} onChange={v=>u("discount",v)} type="number"/></div>
      </div>
      <Inp label="Ödeme Özel Notu" value={f.paymentNote} onChange={v=>u("paymentNote",v)}/>
    </div>}
    
    {tab===2&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 0",borderBottom:`1px solid #F1F5F9`,marginBottom:16}}>
        <div><div style={{fontWeight:800,fontSize:15,color:"var(--text-main)"}}>Servis Kullanıyor mu?</div></div>
        <Toggle checked={f.hasTransport} onChange={v=>u("hasTransport",v)}/>
      </div>
      {f.hasTransport?<div>
        <Inp label="Öğrenci Adresi" value={f.address} onChange={v=>u("address",v)} rows={2}/>
        <Inp label="Aylık Servis Ücreti (₺)" value={f.transportFee} onChange={v=>u("transportFee",v)} type="number"/>
        <div style={{height:1,background:"#F1F5F9",margin:"16px 0"}}/>
        <div style={{display:"flex",gap:12}}>
          <div style={{flex:1}}><Inp label="Şoför Adı" value={f.driverName} onChange={v=>u("driverName",v)}/></div>
          <div style={{flex:1}}><Inp label="Şoför Tel" value={f.driverPhone} onChange={v=>u("driverPhone",v)} type="tel"/></div>
        </div>
      </div>:<div style={{textAlign:"center",padding:"40px 0",color:"var(--text-sub)",fontWeight:600}}>Öğrenci servis kullanmıyor.</div>}
    </div>}
    
    {tab===3&&<div>
      <div style={{fontSize:13,color:"var(--text-sub)",marginBottom:16,fontWeight:600}}>Öğrencinin kurumdan satın aldığı ekstra ekipmanlar faturasına yansıtılır.</div>
      <EqPicker stockItems={stockItems} current={currentEq} onAdd={(item)=>u("equipment",[...currentEq,{id:Date.now(),...item,addedDate:TODAY}])} onRemove={(id)=>u("equipment",currentEq.filter(e=>e.id!==id))}/>
    </div>}
    
    <div style={{display:"flex",gap:12,marginTop:24}}>
      <Btn variant="secondary" onClick={onCancel} style={{flex:1}}>İptal Et</Btn>
      <Btn onClick={()=>{ if(!f.name){alert("Öğrenci adı girmeden kayıt yapılamaz.");return;} onSave(f); }} style={{flex:2}}>Kaydı Tamamla</Btn>
    </div>
  </div>
}

function StudentDetail({student,onBack,students,stockItems}){
  const [tab,setTab]=useState(0); const [editing,setEditing]=useState(false); const [payForm,setPayForm]=useState({amount:"",date:TODAY,note:""}); const [showPay,setShowPay]=useState(false);
  const safePays = safeArr(student.payments); const safeEqs = safeArr(student.equipment); const safeDays = safeArr(student.weekDays);
  
  function save(f){const n=safeArr(students).map(s=>s.id===student.id?{...s,...f,id:s.id}:s);DB.set("students",n);setEditing(false);}
  function addPay(){ if(!payForm.amount)return; const n=safeArr(students).map(s=>s.id===student.id?{...s,payments:[...safeArr(s.payments),{id:Date.now(),...payForm,amount:Number(payForm.amount)}]}:s); DB.set("students",n); setPayForm({amount:"",date:TODAY,note:""}); setShowPay(false); }
  function delPay(pid){const n=safeArr(students).map(s=>s.id===student.id?{...s,payments:safeArr(s.payments).filter(p=>p.id!==pid)}:s);DB.set("students",n);}

  if(editing)return<div style={{padding:20,maxWidth:600,margin:"0 auto"}}><div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}><button onClick={()=>setEditing(false)} style={{background:"var(--card-bg)",border:`1px solid #E2E8F0`,color:"var(--text-sub)",width:40,height:40,borderRadius:12,cursor:"pointer",fontWeight:900,fontSize:16}}>←</button><span style={{fontWeight:900,fontSize:20,color:"var(--text-main)",letterSpacing:-0.5}}>Düzenle: {student.name}</span></div><Card><StudentForm initial={student} onSave={save} onCancel={()=>setEditing(false)} stockItems={stockItems} students={students}/></Card></div>;
  
  const paid=totalPaid(student),monthly=monthlyTotal(student),balance=paid-monthly; const st=courseStatus(student);

  return<div style={{padding:20, maxWidth:800, margin:"0 auto"}}>
    <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:24}}>
      <button onClick={onBack} style={{background:"var(--card-bg)",border:`1px solid #E2E8F0`,color:"var(--text-main)",width:44,height:44,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontWeight:900,fontSize:18,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>←</button>
      <div style={{flex:1}}><div style={{fontWeight:900,fontSize:22,color:"var(--text-main)",letterSpacing:-0.5}}>{student.name}</div><div style={{fontSize:13,color:"var(--text-sub)",fontWeight:600,marginTop:4}}>{age(student.dob)} · Grup: <strong style={{color:"var(--text-main)"}}>{student.groupName||"Yok"}</strong></div></div>
      <Badge label={st}/>
    </div>
    <TabBar tabs={["Genel Bakış","Kurs Eğitimi","Servis Durumu","Ekipmanlar","Ödeme Geçmişi"]} active={tab} onChange={setTab}/>
    
    {tab===0&&<div>
      <Card><Row label="Öğrenci Adı Soyadı" val={student.name}/><Row label="Doğum Tarihi" val={`${fmtDate(student.dob)} (${age(student.dob)})`}/><Row label="Veli Adı Soyadı" val={student.guardianName||"—"}/><Row label="Veli Telefonu" val={student.guardianPhone1||"—"} href={student.guardianPhone1?`tel:${student.guardianPhone1}`:undefined}/><Row label="Özel Notlar" val={student.notes||"—"}/></Card>
      {student.guardianPhone1 && (
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16}}>
          <Btn style={{background:"#16A34A", color:"#fff", border:"none"}} onClick={()=>{const phone=student.guardianPhone1.replace(/\D/g,""); window.open(`https://wa.me/${phone.startsWith('0')?'90'+phone.slice(1):'90'+phone}?text=${encodeURIComponent(`SAYIN VELİMİZ, ${student.name} İSİMLİ ÖĞRENCİMİZİN ÖDEMESİ HAKKINDA HATIRLATMA YAPMAK İSTERİZ. İYİ GÜNLER DİLERİZ.`)}`, "_blank")}}>💬 Ödeme Hatırlat</Btn>
          <Btn style={{background:"#16A34A", color:"#fff", border:"none"}} onClick={()=>{const phone=student.guardianPhone1.replace(/\D/g,""); window.open(`https://wa.me/${phone.startsWith('0')?'90'+phone.slice(1):'90'+phone}?text=${encodeURIComponent(`SAYIN VELİMİZ, ${student.name} İSİMLİ ÖĞRENCİMİZ BUGÜNKÜ ANTRENMANA KATILMAMIŞTIR. BİLGİNİZE SUNARIZ.`)}`, "_blank")}}>💬 Devamsızlık Bildir</Btn>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}><StatCard label="Mevcut Katılım" value={`${attendanceCount(student)} Gün`} col="#059669"/><StatCard label="Aylık Bakiye" value={`${balance>=0?"+":""}${balance.toLocaleString("tr-TR")} ₺`} col={balance>=0?"#059669":"#DC2626"}/></div>
      <Btn variant="secondary" full onClick={()=>setEditing(true)}>Tüm Bilgileri Düzenle</Btn>
    </div>}
    {tab===1&&<div><Card><Row label="Yüzme Seviyesi" val={swimLevelLabel(student.swimLevel)}/><Row label="Kayıtlı Olduğu Grup" val={student.groupName||"—"}/><Row label="Antrenman Günleri" val={safeDays.map(d=>DAYS_TR[d]).join(", ")||"—"}/><Row label="Kayıt Başlangıç Tarihi" val={fmtDate(student.courseStart)}/><Row label="Planlanan Bitiş Tarihi" val={fmtDate(student.courseEnd)}/><Row label="Tarih Bazlı Kalan Seans" val={`${calcRemainingSessions(student)} / ${student.totalSessions||0}`} col="var(--accent)"/></Card></div>}
    {tab===2&&<div>{student.hasTransport?<Card><Row label="Öğrenci Adresi" val={student.address||"—"}/><Row label="Aylık Servis Ücreti" val={`${student.transportFee} ₺`}/><Row label="Şoför Adı Soyadı" val={student.driverName}/><Row label="Şoför Telefonu" val={student.driverPhone}/></Card>:<div style={{textAlign:"center",padding:"40px 0",color:"var(--text-sub)",fontWeight:700,fontSize:16}}>Servis Kullanmıyor</div>}</div>}
    {tab===3&&<div>{safeEqs.length===0?<div style={{textAlign:"center",padding:"40px 0",color:"var(--text-sub)",fontWeight:700,fontSize:16}}>Ekipman Yok</div>:<Card>{safeEqs.map(e=><Row key={e.id} label={e.name} val={`${e.price} ₺`}/>)}</Card>}</div>}
    {tab===4&&<div><SectionTitle action={<Btn sm onClick={()=>setShowPay(true)}>+ Yeni Tahsilat Ekle</Btn>}>Ödeme Geçmişi</SectionTitle><Card>{safePays.length===0?<div style={{textAlign:"center",padding:"30px 0",color:"var(--text-sub)",fontWeight:600}}>Ödeme kaydı bulunmuyor.</div>:safePays.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(p=><div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 0",borderBottom:`1px solid #F1F5F9`}}><div><div style={{fontWeight:800,color:"var(--text-main)",fontSize:14}}>{fmtDate(p.date)}</div><div style={{fontSize:12,color:"var(--text-sub)",marginTop:4,fontWeight:600}}>{p.note||"Not yok"}</div></div><div style={{display:"flex",alignItems:"center",gap:16}}><span style={{color:"#059669",fontWeight:900,fontSize:16}}>+{Number(p.amount).toLocaleString("tr-TR")} ₺</span><button type="button" onClick={()=>delPay(p.id)} style={{background:"#FEE2E2",color:"#DC2626",border:"none",borderRadius:8,width:30,height:30,cursor:"pointer",fontWeight:900}}>X</button></div></div>)}</Card>
      <Modal show={showPay} onClose={()=>setShowPay(false)} title="Tahsilat Ekle"><Inp label="Alınan Tutar (₺) *" value={payForm.amount} onChange={v=>setPayForm(p=>({...p,amount:v}))} type="number"/><Inp label="İşlem Tarihi" value={payForm.date} onChange={v=>setPayForm(p=>({...p,date:v}))} type="date"/><Inp label="Açıklama / Not" value={payForm.note} onChange={v=>setPayForm(p=>({...p,note:v.toLocaleUpperCase("tr-TR")}))}/><div style={{display:"flex",gap:12,marginTop:24}}><Btn variant="secondary" onClick={()=>setShowPay(false)} style={{flex:1}}>İptal</Btn><Btn onClick={addPay} style={{flex:2}}>Ödemeyi Kaydet</Btn></div></Modal>
    </div>}
  </div>
}

function StudentsPage({students,stockItems}){
  const [search,setSearch]=useState(""); 
  const [groupFilter,setGroupFilter]=useState("ALL");
  const [showAdd,setShowAdd]=useState(false); 
  const [detailId,setDetailId]=useState(null);
  
  const safeStudents = safeArr(students); 
  const student=detailId?safeStudents.find(s=>s.id===detailId):null;
  const allGroups = Array.from(new Set(safeStudents.map(s=>s.groupName).filter(Boolean)));

  const filtered = safeStudents.filter(s => {
    const matchName = s && s.name && s.name.toLowerCase().includes(search.toLowerCase());
    const matchGroup = groupFilter === "ALL" || s.groupName === groupFilter;
    return matchName && matchGroup;
  });

  function save(f){
    let n; if(f.id){n=safeStudents.map(s=>s.id===f.id?{...f}:s);}
    else{n=[...safeStudents,{...f,id:Date.now(),payments:[],attendance:{},equipment:[]}];}
    DB.set("students",n);setShowAdd(false);
  }

  if(student)return<StudentDetail student={student} onBack={()=>setDetailId(null)} students={safeStudents} stockItems={stockItems}/>;

  return<div style={{padding:20, maxWidth:1200, margin:"0 auto"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
      <div style={{fontSize:20,fontWeight:900,color:"var(--text-main)",letterSpacing:-0.5}}>Öğrenci Rehberi ({filtered.length})</div>
      <Btn onClick={()=>setShowAdd(true)}>+ Yeni Kayıt Ekle</Btn>
    </div>
    
    <div style={{display:"flex", gap:12, marginBottom:20}}>
      <input className="modern-inp" style={{flex:2, boxShadow:"0 2px 8px rgba(0,0,0,0.02)"}} placeholder="Öğrenci adı ile arama yapın..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <select className="modern-inp" style={{flex:1, cursor:"pointer", boxShadow:"0 2px 8px rgba(0,0,0,0.02)"}} value={groupFilter} onChange={e=>setGroupFilter(e.target.value)}>
        <option value="ALL">Tüm Gruplar</option>
        {allGroups.map(g=><option key={g} value={g}>{g}</option>)}
      </select>
    </div>
    
    {filtered.length===0 && <div style={{textAlign:"center", padding:"40px 0", color:"var(--text-sub)", fontWeight:700, fontSize:15}}>Aradığınız kriterlere uygun öğrenci bulunamadı.</div>}

    <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(340px, 1fr))", gap:16}}>
      {filtered.map(s=>{
        const expected = monthlyTotal(s); const paid = totalPaid(s); const debt = expected - paid;
        return <div key={s.id} className="modern-card" style={{margin:0, display:"flex", flexDirection:"column", justifyContent:"space-between"}}>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:`1px solid #F1F5F9`, paddingBottom:12, marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:16,color:"var(--text-main)",letterSpacing:-0.3}}>{s.name}</div>
            <div style={{display:"flex",gap:6}}>
              <Btn variant="secondary" sm onClick={()=>setDetailId(s.id)}>Detay</Btn>
              <Btn variant="danger" sm onClick={()=>{if(confirm(`${s.name} kaydını silmek istediğinize emin misiniz?`))DB.set("students",safeStudents.filter(x=>x.id!==s.id));}}>Sil</Btn>
            </div>
          </div>
          <div style={{display:"flex", flexDirection:"column", gap:10}}>
            <div style={{display:"flex", alignItems:"center", gap:8, fontSize:13, color:"var(--text-sub)", fontWeight:600}}>
              <div style={{width:28,height:28,borderRadius:8,background:"#F1F5F9",display:"flex",alignItems:"center",justifyContent:"center"}}>👥</div>
              <span style={{color:"var(--text-main)"}}>{s.groupName||"Grup Atanmamış"}</span>
            </div>
            <div style={{display:"flex", alignItems:"center", gap:8, fontSize:13, color:"var(--text-sub)", fontWeight:600}}>
              <div style={{width:28,height:28,borderRadius:8,background:s.hasTransport?"#EDE9FE":"#F1F5F9",color:s.hasTransport?"#6D28D9":"inherit",display:"flex",alignItems:"center",justifyContent:"center"}}>🚌</div>
              {s.hasTransport ? <span style={{color:"#6D28D9", fontWeight:800}}>Servis Kullanıyor</span> : "Servis Yok"}
            </div>
            <div style={{display:"flex", alignItems:"center", gap:8, fontSize:13, color:"var(--text-sub)", fontWeight:600}}>
              <div style={{width:28,height:28,borderRadius:8,background:"rgba(59, 130, 246, 0.1)",color:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center"}}>🔄</div>

function AttendancePage({students}){

  return <div style={{padding:20, maxWidth:800, margin:"0 auto"}}>

         <div style={{display:"flex", gap:12, marginBottom:16}}><Inp label="Yoklama Tarihi" type="date" value={date} onChange={setDate} half/><div style={{flex:1}}><Sel label="Öğrenci Grubu Seçin" value={selectedGroup} onChange={setSelectedGroup} options={allGroups.map(g=>({value:g, label:g}))}/></div></div>
         {!selectedGroup ? <div style={{textAlign:"center", padding:"30px", color:"var(--text-sub)", fontWeight:700}}>Lütfen yoklama almak için bir grup seçiniz.</div> : 
           <div>

              {activeInGroup.length === 0 ? <div style={{textAlign:"center", padding:"20px", color:"var(--text-sub)", fontWeight:700}}>Bu grupta aktif öğrenci bulunmuyor.</div> : 
                activeInGroup.map(s => <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:`1px solid #F1F5F9`}}><div style={{fontWeight:800,fontSize:15,color:"var(--text-main)"}}>{s.name}</div><Toggle checked={!!(s.attendance||{})[date]} onChange={(v)=>{const n=safeStudents.map(st=>{if(st.id!==s.id)return st; const att={...(st.attendance||{})}; if(v)att[date]=true; else delete att[date]; return{...st,attendance:att};}); DB.set("students",n);}}/></div>)
              }
           </div>
         }
      </Card>
    </div>}
    {tab === 1 && <div>

          {presentOnLogDate.length === 0 ? <div style={{textAlign:"center", padding:"30px", color:"var(--text-sub)", fontWeight:700}}>Bu tarihte derse katılan öğrenci kaydı bulunamadı.</div> :

          }

      </Card>
    </div>}
  </div>

function StaffPage({staff}){

  const daysInMonth = new Date(Number(selectedMonth.split("-")[0]), Number(selectedMonth.split("-")[1]), 0).getDate(); const daysArray = Array.from({length: daysInMonth}, (_, i) => i + 1);

      {validStaff.length===0?<Card style={{textAlign:"center",padding:"40px 0",color:"var(--text-sub)",fontWeight:700,fontSize:15}}>Kayıtlı çalışan bulunmuyor.</Card>:
      <div style={{display:"grid", gap:12}}>{validStaff.map(s=><Card key={s.id} style={{margin:0, padding:"16px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:900,fontSize:16,color:"var(--text-main)"}}>{s.name}</div><div style={{fontSize:12,color:"var(--text-sub)",fontWeight:700,marginTop:4}}>{Number(s.dailyWage||0).toLocaleString("tr-TR")} ₺ Günlük Yevmiye</div></div><Btn sm variant="danger" onClick={()=>{if(confirm('Personel kaydı silinsin mi?')) DB.set("staff", validStaff.filter(x=>x.id!==s.id))}}>Sil</Btn></div></Card>)}</div>}
    </div>}

            return <button key={d} type="button" onClick={()=>{ const att={...(s.attendance||{})}; if(isP) delete att[key]; else att[key]=true; DB.set("staff", validStaff.map(x=>x.id===s.id?{...x,attendance:att}:x)); }} style={{padding:"12px 0", borderRadius:10, border:`2px solid ${isP?"#059669":"#E2E8F0"}`, background:isP?"#ECFDF5":"#fff", color:isP?"#059669":"var(--text-sub)", fontWeight:800, cursor:"pointer", transition:"all 0.2s"}}>{d}</button>
          })}</div></div>}</Card>})}</div>
    </div>}
    <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Personel Kaydı"><Inp label="Ad Soyad *" value={f.name} onChange={v=>u("name",v.toLocaleUpperCase("tr-TR"))} autoFocus/><Inp label="Sabit Günlük Yevmiyesi (₺) *" value={f.dailyWage} onChange={v=>u("dailyWage",v)} type="number"/><Btn full onClick={save} style={{marginTop:16}}>Çalışanı Kaydet</Btn></Modal>
  </div>
}

function Dashboard({students,expenses}){
  const safeStudents = safeArr(students); const safeExpenses = safeArr(expenses); const active=safeStudents.filter(s=>courseStatus(s)==="active");
  const totalRev=safeStudents.reduce((t,s)=>t+totalPaid(s),0); const totalExp=safeExpenses.reduce((t,e)=>t+Number(e.amount||0),0); const netProfit = totalRev - totalExp;
  const total=totalRev+totalExp; const revPct=total===0?50:(totalRev/total)*100; const expPct=total===0?50:(totalExp/total)*100;
  const recentRegistrations = [...safeStudents].sort((a,b) => b.id - a.id).slice(0, 5); const recentPay = safeStudents.flatMap(s=>safeArr(s.payments).map(p=>({...p,studentName:s.name}))).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5); const endingSoon = active.filter(s=>{const d=daysLeft(s);return d>=0&&d<=14;}).sort((a,b)=>daysLeft(a)-daysLeft(b)).slice(0,5);

  return<div style={{padding:20, maxWidth:1200, margin:"0 auto"}}>
    <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(240px, 1fr))", gap:16, marginBottom:20}}><StatCard label="Aktif Kayıtlı Öğrenci" value={active.length} col="var(--accent)" /><StatCard label="Kasadaki Net Kâr" value={`${netProfit.toLocaleString("tr-TR")} ₺`} col={netProfit>=0?"#059669":"#DC2626"} /><StatCard label="Tüm Zamanlar Ciro" value={`${totalRev.toLocaleString("tr-TR")} ₺`} col="#059669" /><StatCard label="Toplam Giderler" value={`${totalExp.toLocaleString("tr-TR")} ₺`} col="#DC2626" /></div>
    <Card style={{marginBottom:24, padding:"20px"}}><SectionTitle>Gelir / Gider Dağılımı</SectionTitle><div style={{display:"flex", height:28, borderRadius:14, overflow:"hidden", marginBottom:12, background:"#F1F5F9", border:`1px solid #E2E8F0`}}><div style={{width:`${revPct}%`, background:"#10B981", transition:"width 1s cubic-bezier(0.4, 0, 0.2, 1)"}}></div><div style={{width:`${expPct}%`, background:"#EF4444", transition:"width 1s cubic-bezier(0.4, 0, 0.2, 1)"}}></div></div><div style={{display:"flex", justifyContent:"space-between", fontSize:14, fontWeight:900}}><span style={{color:"#059669"}}>Toplam Gelir: %{Math.round(revPct)}</span><span style={{color:"#DC2626"}}>Toplam Gider: %{Math.round(expPct)}</span></div></Card>
    <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(320px, 1fr))", gap:20, alignItems:"start"}}>
      <Card style={{padding:"20px", margin:0}}><div style={{fontSize:14, fontWeight:900, marginBottom:16, color:"var(--text-main)", textTransform:"uppercase", letterSpacing:-0.3}}>Son Kayıt Olanlar</div><div className="data-row data-header"><div>Ad Soyad</div><div>Kayıt Trh.</div><div className="data-col-right">Grup</div></div>{recentRegistrations.length===0?<div style={{padding:"16px 0",fontSize:13,color:"var(--text-sub)",textAlign:"center",fontWeight:600}}>Kayıt yok.</div>:recentRegistrations.map(s => <div className="data-row" key={s.id}><div className="data-col">{s.name}</div><div className="data-col data-col-sub">{fmtDate(s.courseStart)}</div><div className="data-col data-col-right" style={{color:"var(--accent)"}}>{s.groupName || "-"}</div></div>)}</Card>
      <Card style={{padding:"20px", margin:0}}><div style={{fontSize:14, fontWeight:900, marginBottom:16, color:"var(--text-main)", textTransform:"uppercase", letterSpacing:-0.3}}>Son Ödemeler</div><div className="data-row data-header"><div>Ad Soyad</div><div>Tarih</div><div className="data-col-right">Tutar</div></div>{recentPay.length===0?<div style={{padding:"16px 0",fontSize:13,color:"var(--text-sub)",textAlign:"center",fontWeight:600}}>Tahsilat yok.</div>:recentPay.map((p, i) => <div className="data-row" key={i}><div className="data-col">{p.studentName}</div><div className="data-col data-col-sub">{fmtDate(p.date)}</div><div className="data-col data-col-right" style={{color:"#059669"}}>+{Number(p.amount).toLocaleString("tr-TR")} ₺</div></div>)}</Card>
      <Card style={{padding:"20px", margin:0, border:`1px solid #FCD34D`}}><div style={{fontSize:14, fontWeight:900, marginBottom:16, color:"#D97706", textTransform:"uppercase", letterSpacing:-0.3}}>Kayıt Bitişi Yaklaşanlar</div><div className="data-row data-header"><div>Ad Soyad</div><div>Bitiş Trh.</div><div className="data-col-right">Kalan</div></div>{endingSoon.length===0?<div style={{padding:"16px 0",fontSize:13,color:"var(--text-sub)",textAlign:"center",fontWeight:600}}>Yaklaşan kayıt yok.</div>:endingSoon.map(s => <div className="data-row" key={s.id}><div className="data-col">{s.name}</div><div className="data-col data-col-sub">{fmtDate(s.courseEnd)}</div><div className="data-col data-col-right" style={{color:"#D97706"}}>{daysLeft(s)} Gün</div></div>)}</Card>
    </div>
  </div>
}

function SettingsPage({navItems, clubName, logoUrl, appUsers}){
  const [tab, setTab] = useState(0); const [nameVal, setNameVal] = useState(clubName); const [logoVal, setLogoVal] = useState(logoUrl); const [showUserModal, setShowUserModal] = useState(false); const [uForm, setUForm] = useState({ id:null, username:"", password:"", role:"staff", allowedTabs:[] });
  function toggleMenuAccess(menuId) { const tabs = uForm.allowedTabs || []; if(tabs.includes(menuId)) setUForm({...uForm, allowedTabs: tabs.filter(t=>t!==menuId)}); else setUForm({...uForm, allowedTabs: [...tabs, menuId]}); }
  function saveUser() { if(!uForm.username||!uForm.password)return; let n = safeArr(appUsers); if(uForm.id) n = n.map(u => u.id === uForm.id ? {...uForm} : u); else n = [...n, {...uForm, id:Date.now()}]; DB.set("appUsers", n); setShowUserModal(false); }
  function deleteUser(id) { if(id === "admin") { alert("Ana yönetici (admin) hesabı silinemez."); return; } if(confirm("Bu çalışan hesabını tamamen silmek ve sisteme erişimini kesmek istediğinize emin misiniz?")) { DB.set("appUsers", safeArr(appUsers).filter(x=>x.id!==id)); } }

  return<div style={{padding:20, maxWidth:800, margin:"0 auto"}}>
    <TabBar tabs={["Genel Kurum Ayarları", "Personel Hesap Yetkileri"]} active={tab} onChange={setTab}/>
    {tab === 0 && (<div><Card style={{padding:"24px"}}><Inp label="Kulüp/Kurum Adı" value={nameVal} onChange={setNameVal}/><Inp label="Logo URL (İsteğe Bağlı)" value={logoVal} onChange={setLogoVal}/></Card><Btn full onClick={()=>{DB.set("clubName",nameVal); DB.set("logoUrl",logoVal); alert("Kurum bilgileri başarıyla kaydedildi.");}}>Sisteme Kaydet</Btn></div>)}
    {tab===1&&<div><SectionTitle action={<Btn sm onClick={()=>{setUForm({id:null,username:"",password:"",role:"staff",allowedTabs:["dashboard","students","attendance"]});setShowUserModal(true);}}>+ Yeni Personel Hesabı Aç</Btn>}>Sisteme Giriş İzinleri</SectionTitle>
      {safeArr(appUsers).map(u=><Card key={u.id} style={{padding:"16px 20px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:900,fontSize:16,color:"var(--text-main)"}}>{u.username}</div><div style={{fontSize:11,color:u.role==='admin'?"#059669":"var(--text-sub)",fontWeight:800,textTransform:"uppercase",marginTop:6}}>{u.role==='admin'?'Tam Yetkili Yönetici (Silinemez)':'Kısıtlı Çalışan'}</div></div><div style={{display:"flex",gap:8}}><Btn variant="secondary" sm onClick={()=>{setUForm(u);setShowUserModal(true);}}>Yetkileri Düzenle</Btn>{u.role !== 'admin' && <Btn variant="danger" sm onClick={()=>deleteUser(u.id)}>Hesabı Kaldır</Btn>}</div></div></Card>)}
      <Modal show={showUserModal} onClose={()=>setShowUserModal(false)} title="Personel Hesabı Tanımla"><Inp label="Sisteme Giriş Kullanıcı Adı" value={uForm.username} onChange={v=>setUForm({...uForm,username:v})} autoFocus/><Inp label="Giriş Şifresi" value={uForm.password} onChange={v=>setUForm({...uForm,password:v})}/>
        {uForm.id !== "admin" && (<div style={{marginTop: 20}}><div style={{fontSize:12, fontWeight:800, marginBottom:12, color:"var(--text-main)", textTransform:"uppercase"}}>Çalışanın Görebileceği Menüler</div><div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>{navItems.map(nav => nav.id !== "settings" && (<label key={nav.id} style={{display:"flex", alignItems:"center", gap:8, padding:"12px", background:"var(--bg-color)", borderRadius:12, cursor:"pointer", border:`2px solid ${(uForm.allowedTabs||[]).includes(nav.id)?"var(--accent)":"transparent"}`, transition:"all 0.2s"}}><input type="checkbox" checked={(uForm.allowedTabs||[]).includes(nav.id)} onChange={() => toggleMenuAccess(nav.id)} style={{width:16,height:16,accentColor:"var(--accent)"}}/><span style={{fontSize:13, fontWeight:700, color:"var(--text-main)"}}>{nav.label}</span></label>))}</div></div>)}
        <Btn full onClick={saveUser} style={{marginTop:24}}>Hesabı Kaydet</Btn></Modal>
    </div>}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════════════════ */
function App(){
  const [currentUser, setCurrentUser] = useState(() => { try { return JSON.parse(sessionStorage.getItem("aqua_user")); } catch { return null; } });
  const [isDbLoaded, setIsDbLoaded] = useState(false);
  const [students,setStudents]=useState([]); const [staff,setStaff]=useState([]); const [stockItems,setStockItems]=useState([]); const [movements,setMovements]=useState([]); const [expenses,setExpenses]=useState([]);
  const [clubName,setClubName]=useState("AquaClub Pro"); const [navItems,setNavItems]=useState(NAV_ITEMS); const [appUsers, setAppUsers]=useState([]); const [oldPinCode, setOldPinCode]=useState("0309"); const [waLinks,setWaLinks]=useState([]);
  const [logoUrl,setLogoUrl]=useState(""); const [activeTab,setActiveTab]=useState("dashboard"); const [sidebarOpen,setSidebarOpen]=useState(false);

  useEffect(() => {
    if(!db) { setIsDbLoaded(true); return; }
    const unsub = db.collection("appData").doc("main").onSnapshot((doc) => {
      if (doc.exists) {
        const d = doc.data();
        if (d.students) setStudents(safeArr(d.students));
        if (d.staff) setStaff(safeArr(d.staff));
        if (d.stock) setStockItems(safeArr(d.stock));
        if (d.movements) setMovements(safeArr(d.movements));
        if (d.expenses) setExpenses(safeArr(d.expenses));
        if (d.waLinks) setWaLinks(safeArr(d.waLinks));
        if (d.clubName) setClubName(d.clubName);
        if (d.pinCode) setOldPinCode(d.pinCode); 
        let loadedUsers = safeArr(d.appUsers);
        if (loadedUsers.length === 0) { loadedUsers = [{ id:"admin", username:"admin", password: d.pinCode || "0309", role:"admin", allowedTabs: NAV_ITEMS.map(n=>n.id) }]; }
        setAppUsers(loadedUsers);
        if (d.logoUrl) setLogoUrl(d.logoUrl);
      }
      setIsDbLoaded(true);
    });
    return () => unsub();
  }, []);

  if (!isDbLoaded) return <div style={{display:"flex",flexDirection:"column",height:"100vh",alignItems:"center",justifyContent:"center",background:"var(--bg-color)"}}><div className="spinner"></div><div style={{color:"var(--text-main)",fontWeight:800,marginTop:16,letterSpacing:0.5}}>Kurumsal Sistem Yükleniyor...</div></div>;
  if (!currentUser) return <LoginScreen onSuccess={(user) => { sessionStorage.setItem("aqua_user", JSON.stringify(user)); setCurrentUser(user); }} appUsers={appUsers} adminPin={oldPinCode} />;

  const visibleNav = NAV_ITEMS.filter(n => currentUser.role === "admin" || (currentUser.allowedTabs || []).includes(n.id));

  return<div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg-color)"}}>
    <div className="sidebar-desktop" style={{width:260, background:"var(--sidebar-bg)", borderRight:`1px solid #E2E8F0`, display:"flex", flexDirection:"column", boxShadow:"4px 0 24px rgba(0,0,0,0.02)", zIndex:100}}>
      <div style={{padding:"28px 20px 20px", borderBottom:`1px solid #F1F5F9`, display:"flex", alignItems:"center", gap:14}}>
        <div style={{width:44,height:44,borderRadius:12,background:`linear-gradient(135deg,var(--accent),var(--accent-hover))`,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",boxShadow:"0 4px 12px rgba(59, 130, 246, 0.2)"}}>
          {logoUrl ? <img src={logoUrl} alt="Logo" style={{width:"100%",height:"100%",objectFit:"cover"}}/> : <span style={{color:"white", fontWeight:900, fontSize:16}}>AC</span>}
        </div>
        <div><div style={{fontSize:16,fontWeight:900,color:"var(--text-main)",letterSpacing:-0.5}}>{clubName}</div><div style={{fontSize:11,color:"var(--text-sub)",fontWeight:800,textTransform:"uppercase",marginTop:4}}>{currentUser.username}</div></div>
      </div>
      <div style={{flex:1, overflowY:"auto", padding:"20px 14px"}}>
        {visibleNav.map(item=><button key={item.id} type="button" onClick={()=>setActiveTab(item.id)} style={{display:"flex",alignItems:"center",gap:14,width:"100%", padding:"14px 16px", marginBottom:8, background:activeTab===item.id?"rgba(59, 130, 246, 0.08)":"transparent", border:"none", borderRadius:12, color:activeTab===item.id?"var(--accent)":"var(--text-sub)", cursor:"pointer", textAlign:"left", fontSize:14, fontWeight:activeTab===item.id?800:600, transition:"all 0.2s"}}><Icon d={item.icon} size={18} style={{opacity:activeTab===item.id?1:0.7}}/> {item.label}</button>)}
      </div>
      <div style={{padding:"20px"}}><button type="button" onClick={()=>{sessionStorage.removeItem("aqua_user"); window.location.reload();}} style={{width:"100%", padding:"14px", background:"#FEF2F2", border:"none", borderRadius:12, color:"#DC2626", fontWeight:800, cursor:"pointer", transition:"all 0.2s"}}>Güvenli Çıkış Yap</button></div>
    </div>
    
    <div style={{flex:1, display:"flex", flexDirection:"column", overflow:"hidden", position:"relative"}}>
      <div style={{padding:"20px 24px", background:"var(--sidebar-bg)", borderBottom:`1px solid #E2E8F0`, fontWeight:900, fontSize:18, display:"flex", alignItems:"center", gap:16, color:"var(--text-main)", zIndex:50}}>
        <button type="button" onClick={()=>setSidebarOpen(!sidebarOpen)} className="menu-btn" style={{background:"#F8FAFC", border:`1px solid #E2E8F0`, color:"var(--text-main)", width:40, height:40, borderRadius:12, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center"}}>☰</button>
        {(visibleNav.find(n=>n.id===activeTab)||{}).label}
      </div>
      <div style={{flex:1, overflowY:"auto"}}>
        {activeTab==="dashboard"&&<Dashboard students={students} expenses={expenses}/>}
        {activeTab==="students"&&<StudentsPage students={students} stockItems={stockItems}/>}
        {activeTab==="attendance"&&<AttendancePage students={students}/>}
        {activeTab==="payments"&&<PaymentsPage students={students}/>}
        {activeTab==="expenses"&&<ExpensesPage expenses={expenses}/>}
        {activeTab==="whatsapp"&&<WhatsAppPage students={students} waLinks={waLinks} />}
        {activeTab==="staff"&&<StaffPage staff={staff}/>}
        {activeTab==="inventory"&&<InventoryPage items={stockItems}/>}
        {activeTab==="settings"&&currentUser.role==='admin'&&<SettingsPage navItems={NAV_ITEMS} clubName={clubName} logoUrl={logoUrl} appUsers={appUsers}/>}
      </div>
    </div>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
