<title>AquaClub Pro</title>
<style>
:root {

.data-col-sub { font-size: 11px; color: #64748B; font-weight: 500; }

const {useState,useEffect,useRef}=React;

/* ═══════════════════════════════════════════════════════════════
   1. GLOBAL SABİTLER & TANIMLAMALAR
═══════════════════════════════════════════════════════════════ */
const TODAY=new Date().toISOString().split("T")[0];
const DAYS_TR=["Paz","Pzt","Sal","Çar","Per","Cum","Cmt"];
const DAYS_FULL=["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
const STOCK_CATS=["Gözlük","Bone","Palet","Şamandıra","Aksesuar","Kıyafet","Temizlik","Diğer"];
const EXP_CATS=["Fatura", "Maaş", "Kira", "Gıda", "Ekipman/Malzeme", "Temizlik", "Ulaşım", "Diğer"];

const EMPTY_ITEM={id:null,name:"",category:"",price:"",stock:"",minStock:"",supplier:"",notes:""};
const EMPTY_EXPENSE={id:null, title:"", amount:"", date:TODAY, category:"", isFood:false, expiryDate:"", note:"", qty:""};
const EMPTY_STAFF={id:null,name:"",role:"trainer",age:"",phone:"",email:"",dailyWage:0,attendance:{}};

const EMPTY_S={
  id:null,name:"",dob:"",guardianName:"",guardianPhone1:"",guardianPhone2:"",notes:"",
  courseStart:TODAY,courseEnd:"",totalSessions:48,weekDays:[1,3,5],swimLevel:"",poolLane:"",groupName:"",
  monthlyFee:"",discount:"",paymentNote:"",hasTransport:false,address:"",transportFee:"",driverName:"",driverPhone:"",
  equipment:[],payments:[],attendance:{}

const NAV_ITEMS=[
  {id:"dashboard",label:"Genel Bakış",icon:"M3 12l9-9 9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"},
  {id:"students",label:"Öğrenciler",icon:"M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 7a4 4 0 100 8 4 4 0 000-8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"},
  {id:"attendance",label:"Yoklama",icon:"M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"},
  {id:"payments",label:"Ödemeler",icon:"M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"},
  {id:"expenses",label:"Giderler",icon:"M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"},
  {id:"staff",label:"Personel & Puantaj",icon:"M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197"},
  {id:"inventory",label:"Envanter",icon:"M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"},
  {id:"whatsapp",label:"WhatsApp Davet",icon:"M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.305-.885-.653-1.482-1.46-1.656-1.758-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z M12 22C6.477 22 2 17.523 2 12c0-1.76.452-3.414 1.25-4.832L2 2l5.344 1.156C8.683 2.43 10.297 2 12 2c5.523 0 10 4.477 10 10s-4.477 10-10 10z"},
];

/* ═══════════════════════════════════════════════════════════════
   2. YARDIMCI VE GÜVENLİK MOTORLARI (GÜN SEÇİMİ VE ENVANTER FİLTRESİ)
═══════════════════════════════════════════════════════════════ */
function safeArr(val) { 
  if (!val) return [];
  return Array.isArray(val) ? val.filter(i => i !== null && i !== undefined) : Object.values(val).filter(i => i !== null && i !== undefined);
}

function fmtDate(d){if(!d)return"—";const[y,m,day]=d.split("-");return`${day}.${m}.${y}`}
function totalPaid(s){return safeArr(s?.payments).reduce((t,p)=>t+Number(p.amount||0),0);}
function equipmentTotal(s){return safeArr(s?.equipment).reduce((t,e)=>t+Number(e.price||0),0);}
function monthlyTotal(s){return Number(s?.monthlyFee||0)-Number(s?.discount||0)+equipmentTotal(s)+(s?.hasTransport?Number(s?.transportFee||0):0);}
function courseStatus(s){
  if(!s?.courseStart||!s?.courseEnd)return"unknown";
  const now=new Date(TODAY),st=new Date(s.courseStart),en=new Date(s.courseEnd);
  if(now<st)return"upcoming";if(now>en)return"ended";return"active";
}
function daysLeft(s){return Math.ceil((new Date(s?.courseEnd)-new Date(TODAY))/86400000)}
function attendanceCount(s){return Object.values(s?.attendance||{}).filter(Boolean).length}
function age(dob){if(!dob)return"—";return Math.floor((Date.now()-new Date(dob))/31557600000)+" yaş"}

function calcEndDate(start,total,days){
  if(!start||!total||!days||days.length===0)return"";
  let d=new Date(start),cnt=0,iter=0;
  const safeDays = safeArr(days).map(Number);
  while(cnt<total&&iter<total*30){if(safeDays.includes(d.getDay()))cnt++;if(cnt<total)d.setDate(d.getDate()+1);iter++;}
  return d.toISOString().split("T")[0];
}

/* OTOMATİK TARİH BAZLI KALAN SEANS MOTORU */
function calcRemainingSessions(s) {
  if (!s || !s.courseStart || !s.totalSessions || !s.weekDays || s.weekDays.length === 0) return 0;
  const total = Number(s.totalSessions || 0);
  const start = new Date(s.courseStart);
  const end = s.courseEnd ? new Date(s.courseEnd) : new Date(TODAY);
  const current = new Date(TODAY);
  let targetEnd = current < end ? current : end;
  if (targetEnd < start) return total;
  
  let passedSessions = 0;
  let iter = new Date(start);
  const safeDays = safeArr(s.weekDays).map(Number);
  while (iter <= targetEnd) {
    if (safeDays.includes(iter.getDay())) passedSessions++;
    iter.setDate(iter.getDate() + 1);
  }
  return Math.max(0, total - passedSessions);
}

/* ═══════════════════════════════════════════════════════════════
   3. GİRİŞ EKRANI
═══════════════════════════════════════════════════════════════ */
function LoginScreen({ onSuccess, appUsers, adminPin }) {
  const [user, setUser] = useState("");
  const [pass, setPass] = useState("");
  const [err, setErr] = useState(false);

  const handleLogin = (e) => {
    e.preventDefault();
    if (user.toLowerCase() === "admin" && (pass === "0309" || pass === adminPin)) {
      onSuccess({ id: 'admin', username: 'admin', role: 'admin', allowedTabs: NAV_ITEMS.map(n=>n.id) });
      return;
    }
    const foundUser = safeArr(appUsers).find(u => u.username.toLowerCase() === user.toLowerCase() && u.password === pass);
    if (foundUser) { onSuccess(foundUser); return; }
    setErr(true); setTimeout(() => setErr(false), 2000);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"var(--bg-color)",padding:20}}>
      <div style={{fontSize:42, fontWeight:800, color:"#475569", marginBottom:30, letterSpacing:-1.5}}>AquaClub Pro</div>
      <form onSubmit={handleLogin} style={{background:"var(--sidebar-bg)",padding:"40px 30px",borderRadius:16,border:`1px solid ${err?"#DC2626":"#E2E8F0"}`,textAlign:"center",boxShadow:"0 12px 32px rgba(0,0,0,0.04)",width:"100%",maxWidth:340, transition:"all 0.3s"}}>
        <div style={{fontSize:16,fontWeight:800,marginBottom:24,color:"var(--text-main)"}}>Sisteme Giriş Yapın</div>
        <Inp value={user} onChange={setUser} placeholder="Kullanıcı Adı" autoFocus style={{textAlign:"center", fontSize:14}}/>
        <Inp value={pass} onChange={setPass} type="password" placeholder="Şifre" style={{textAlign:"center", fontSize:14, letterSpacing:4}}/>
        <Btn full type="submit" onClick={handleLogin} style={{marginTop:12}}>Giriş Yap</Btn>
        <div style={{height: 20, marginTop: 16}}>{err && <div style={{color:"#DC2626",fontSize:13,fontWeight:700}}>Hatalı Bilgi Girdiniz!</div>}</div>
      </form>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   4. ÖĞRENCİ EKLEME VE KAYIT FORMU (BÜYÜK HARF ZORUNLU)
═══════════════════════════════════════════════════════════════ */
function StudentForm({initial,onSave,onCancel,stockItems}){
  const [tab,setTab]=useState(0);
  const [f,setF]=useState({...EMPTY_S,...initial});

  const u=(k,v)=>{
    if(typeof v === "string" && !["dob","courseStart","courseEnd","guardianPhone1","guardianPhone2"].includes(k)){
      v = v.toLocaleUpperCase("tr-TR");
    }
    setF(p=>({...p,[k]:v}));
  };

  const currentEq = safeArr(f.equipment);
  const safeWeekDays = safeArr(f.weekDays);

  useEffect(()=>{
    if(f.courseStart&&f.totalSessions&&safeWeekDays.length>0){
      u("courseEnd",calcEndDate(f.courseStart,Number(f.totalSessions),safeWeekDays));
    }
  },[f.courseStart,f.totalSessions,JSON.stringify(safeWeekDays)]);

  return<div>
    <TabBar tabs={["Kişisel","Kurs","Servis","Ekipman"]} active={tab} onChange={setTab}/>
    {tab===0&&<div>
      <Inp label="Ad Soyad *" value={f.name} onChange={v=>u("name",v)}/>
      <Inp label="Doğum Tarihi" value={f.dob} onChange={v=>u("dob",v)} type="date"/>
      <div style={{height:1,background:"#E2E8F0",margin:"12px 0"}}/>
      <Inp label="Veli Adı Soyadı" value={f.guardianName} onChange={v=>u("guardianName",v)}/>
      <div style={{display:"flex",gap:10}}>
        <Inp label="Veli Tel 1" value={f.guardianPhone1} onChange={v=>u("guardianPhone1",v)} type="tel" half/>
        <Inp label="Veli Tel 2" value={f.guardianPhone2} onChange={v=>u("guardianPhone2",v)} type="tel" half/>
      </div>
      <Inp label="Özel Notlar" value={f.notes} onChange={v=>u("notes",v)} rows={2}/>
    </div>}
    {tab===1&&<div>
      <div style={{display:"flex",gap:10}}>
        <div style={{flex:1}}><Sel label="Seviye" value={f.swimLevel} onChange={v=>u("swimLevel",v)} options={[{value:"BAŞLANGIÇ",label:"Başlangıç"},{value:"ORTA",label:"Orta"},{value:"İLERİ",label:"İleri"},{value:"YARIŞMACI",label:"Yarışmacı"}]}/></div>
        <div style={{flex:1}}><Inp label="Kulvar" value={f.poolLane} onChange={v=>u("poolLane",v)}/></div>
      </div>
      <Inp label="Grup / Sınıf Adı" value={f.groupName} onChange={v=>u("groupName",v)}/>
      <div style={{height:1,background:"#E2E8F0",margin:"12px 0"}}/>
      <div style={{fontSize:11,color:"#475569",marginBottom:6,fontWeight:700,textTransform:"uppercase"}}>Haftalık Günler *</div>
      <DayPicker value={safeWeekDays} onChange={v=>u("weekDays",v)}/>
      <div style={{display:"flex",gap:10}}>
        <div style={{flex:1}}><Inp label="Başlangıç *" value={f.courseStart} onChange={v=>u("courseStart",v)} type="date"/></div>
        <div style={{flex:1}}><Inp label="Toplam Seans *" value={f.totalSessions} onChange={v=>u("totalSessions",v)} type="number"/></div>
      </div>
      <Card style={{marginBottom:12}} accent="#475569">
        <div style={{fontSize:11,color:"#475569",marginBottom:4,fontWeight:600}}>Hesaplanan Bitiş Tarihi</div>
        <div style={{fontSize:16,fontWeight:800,color:"#475569",marginTop:4}}>{fmtDate(f.courseEnd)||"—"}</div>
      </Card>
      <div style={{display:"flex",gap:10}}>
        <div style={{flex:1}}><Inp label="Aylık Kurs Ücreti (₺)" value={f.monthlyFee} onChange={v=>u("monthlyFee",v)} type="number"/></div>
        <div style={{flex:1}}><Inp label="İndirim (₺)" value={f.discount} onChange={v=>u("discount",v)} type="number"/></div>
      </div>
      <Inp label="Ödeme Notu" value={f.paymentNote} onChange={v=>u("paymentNote",v)}/>
    </div>}
    {tab===2&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:`1px solid #E2E8F0`,marginBottom:14}}>
        <div><div style={{fontWeight:700,fontSize:14,color:"var(--text-main)"}}>Servis Kullanıyor mu?</div></div>
        <Toggle checked={f.hasTransport} onChange={v=>u("hasTransport",v)}/>
      </div>
      {f.hasTransport?<div>
        <Inp label="Öğrenci Adresi" value={f.address} onChange={v=>u("address",v)} rows={2}/>
        <Inp label="Aylık Servis Ücreti (₺)" value={f.transportFee} onChange={v=>u("transportFee",v)} type="number"/>
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:1}}><Inp label="Şoför Adı" value={f.driverName} onChange={v=>u("driverName",v)}/></div>
          <div style={{flex:1}}><Inp label="Şoför Tel" value={f.driverPhone} onChange={v=>u("driverPhone",v)} type="tel"/></div>
        </div>
      </div>:<div style={{textAlign:"center",padding:"30px 0",color:"#64748B"}}>Servis kullanılmıyor.</div>}
    </div>}
    {tab===3&&<div>
      <div style={{fontSize:12,color:"#64748B",marginBottom:12}}>Öğrencinin satın aldığı ekipmanlar faturasına yansır.</div>
      <EqPicker stockItems={stockItems} current={currentEq} onAdd={(item)=>setF(p=>({...p,equipment:[...currentEq,{id:Date.now(),...item,addedDate:TODAY}]}))} onRemove={(id)=>setF(p=>({...p,equipment:currentEq.filter(e=>e.id!==id)}))}/>
    </div>}
    <div style={{display:"flex",gap:10,marginTop:20}}>
      <Btn variant="secondary" onClick={onCancel} style={{flex:1}}>İptal</Btn>
      <Btn onClick={()=>onSave(f)} style={{flex:2}}>Kaydet</Btn>
    </div>
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   ÖĞRENCİLER LİSTESİ (DARALTILMIŞ YATAY TASARIM)
═══════════════════════════════════════════════════════════════ */
function StudentsPage({students,stockItems}){
  const [search,setSearch]=useState(""); const [showAdd,setShowAdd]=useState(false); const [detailId,setDetailId]=useState(null);
  const safeStudents = safeArr(students); const student=detailId?safeStudents.find(s=>s.id===detailId):null;
  const filtered=safeStudents.filter(s=>s && s.name && s.name.toLowerCase().includes(search.toLowerCase()));

  function save(f){
    let n; if(f.id){n=safeStudents.map(s=>s.id===f.id?{...f}:s);}
    else{n=[...safeStudents,{...f,id:Date.now(),payments:[],attendance:{},equipment:[]}];}
    DB.set("students",n);setShowAdd(false);
  }

  if(student)return<StudentDetail student={student} onBack={()=>setDetailId(null)} students={safeStudents} stockItems={stockItems}/>;

  return<div style={{padding:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:14,fontWeight:800}}>Öğrenciler ({filtered.length})</div>
      <Btn sm onClick={()=>setShowAdd(true)}>+ Yeni Kayıt</Btn>
    </div>
    <div style={{position:"relative",marginBottom:12}}><input style={{width:"100%",padding:"12px 14px",background:"var(--sidebar-bg)",border:`1px solid #E2E8F0`,borderRadius:12,color:"var(--text-main)",outline:"none"}} placeholder="Öğrenci adı yazarak arayın..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
    
    {filtered.map(s=>{
      const expected = monthlyTotal(s); const paid = totalPaid(s); const debt = expected - paid;
      return <Card key={s.id} style={{marginBottom:6, padding:"12px 14px"}}>
        
        {/* ÜST SATIR: İsim ve Butonlar */}
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:"1px solid #E2E8F0", paddingBottom:8, marginBottom:8}}>
          <div style={{fontWeight:700,fontSize:15,color:"var(--text-main)"}}>{s.name}</div>
          <div style={{display:"flex",gap:6}}>
            <Btn variant="secondary" sm onClick={()=>setDetailId(s.id)}>Detay</Btn>
            <Btn variant="danger" sm onClick={()=>{if(confirm(`${s.name} kaydı silinsin mi?`))DB.set("students",safeStudents.filter(x=>x.id!==s.id));}}>Sil</Btn>
          </div>
        </div>
        
        {/* ALT SATIR: Yatay Düzenlenmiş Bilgiler */}
        <div style={{display:"flex", flexWrap:"wrap", gap:"12px", alignItems:"center", justifyContent:"space-between"}}>
          <div style={{display:"flex", flexWrap:"wrap", gap:"12px 24px", fontSize:12, color:"#64748B", fontWeight:600}}>
            <div>📌 Grup: <strong style={{color:"var(--text-main)"}}>{s.groupName||"Yok"}</strong></div>
            <div>🚌 Servis: {s.hasTransport ? <span style={{color:"#6D28D9", fontWeight:700}}>SERVİS AKTİF</span> : "Yok"}</div>
            <div>🔄 Kalan Seans: <span style={{color:"#475569", fontWeight:800}}>{calcRemainingSessions(s)} / {s.totalSessions || 0}</span></div>
          </div>
          
          <div style={{display:"flex", flexWrap:"wrap", gap:"12px", alignItems:"center"}}>
            {/* Yatay Tarih Dönem Kutusu */}
            <div style={{background:"#F1F5F9", border:`1px solid #E2E8F0`, borderRadius:6, padding:"4px 10px", display:"flex", alignItems:"center", gap:10, fontSize:11, color:"var(--text-main)", fontWeight:700}}>
              <div><span style={{color:"#64748B", marginRight:4}}>BŞL:</span>{fmtDate(s.courseStart)}</div>
              <div style={{width:1, height:12, background:"#CBD5E1"}}></div>
              <div><span style={{color:"#64748B", marginRight:4}}>BİT:</span>{fmtDate(s.courseEnd)}</div>
            </div>
            
            <div style={{fontSize:11}}>
              {debt > 0 ? <span style={{background:"#DC262615", color:"#DC2626", border:`1px solid #DC262640`, padding:"4px 10px", borderRadius:6, fontWeight:800}}>{debt.toLocaleString("tr-TR")} ₺ BORÇ</span>
                       : <span style={{background:"#05966915", color:"#059669", border:`1px solid #05966940`, padding:"4px 10px", borderRadius:6, fontWeight:800}}>✓ ÖDENDİ</span>}
            </div>
          </div>
        </div>

      </Card>
    })}
    <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Yeni Öğrenci Kaydı"><StudentForm initial={{}} onSave={save} onCancel={()=>setShowAdd(false)} stockItems={stockItems}/></Modal>
  </div>
}

function StudentDetail({student,onBack,students,stockItems}){
  const [tab,setTab]=useState(0); const [editing,setEditing]=useState(false); const [payForm,setPayForm]=useState({amount:"",date:TODAY,note:""}); const [showPay,setShowPay]=useState(false);
  const safePays = safeArr(student.payments); const safeEqs = safeArr(student.equipment); const safeDays = safeArr(student.weekDays);
  
  function save(f){const n=safeArr(students).map(s=>s.id===student.id?{...s,...f,id:s.id}:s);DB.set("students",n);setEditing(false);}
  function addPay(){ if(!payForm.amount)return; const n=safeArr(students).map(s=>s.id===student.id?{...s,payments:[...safeArr(s.payments),{id:Date.now(),...payForm,amount:Number(payForm.amount)}]}:s); DB.set("students",n); setPayForm({amount:"",date:TODAY,note:""}); setShowPay(false); }
  function delPay(pid){const n=safeArr(students).map(s=>s.id===student.id?{...s,payments:safeArr(s.payments).filter(p=>p.id!==pid)}:s);DB.set("students",n);}

  if(editing)return<div style={{padding:16}}><div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}><button onClick={()=>setEditing(false)} style={{background:"var(--sidebar-bg)",border:`1px solid #E2E8F0`,color:"#475569",width:36,height:36,borderRadius:10,cursor:"pointer",fontWeight:800}}>←</button><span style={{fontWeight:800,fontSize:18,color:"var(--text-main)"}}>Düzenle: {student.name}</span></div><StudentForm initial={student} onSave={save} onCancel={()=>setEditing(false)} stockItems={stockItems}/></div>;
  const paid=totalPaid(student),monthly=monthlyTotal(student),balance=paid-monthly; const st=courseStatus(student);

  return<div style={{padding:16}}>
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
      <button onClick={onBack} style={{background:"var(--sidebar-bg)",border:`1px solid #E2E8F0`,color:"#475569",width:36,height:36,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontWeight:800}}>←</button>
      <div style={{flex:1}}><div style={{fontWeight:800,fontSize:18,color:"var(--text-main)"}}>{student.name}</div><div style={{fontSize:12,color:"#64748B",marginTop:2}}>{age(student.dob)} · {student.groupName||"Grup yok"}</div></div>
      <Badge label={st}/>
    </div>
    <TabBar tabs={["Genel","Kurs","Servis","Ekipman","Ödemeler"]} active={tab} onChange={setTab}/>
    {tab===0&&<div>
      <Card><Row label="Ad Soyad" val={student.name}/><Row label="Doğum Tarihi" val={`${fmtDate(student.dob)} (${age(student.dob)})`}/><Row label="Veli" val={student.guardianName||"—"}/><Row label="Veli Tel 1" val={student.guardianPhone1||"—"} href={student.guardianPhone1?`tel:${student.guardianPhone1}`:undefined}/></Card>
      {student.guardianPhone1 && (
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12}}>
          <Btn sm style={{background:"#16A34A", color:"#fff", border:"none"}} onClick={()=>openWA(student.guardianPhone1, `Sayın velimiz, ${student.name} isimli öğrencimizin ödemesi hakkında hatırlatma yapmak isteriz.`)}>💬 Ödeme Hatırlat</Btn>
          <Btn sm style={{background:"#16A34A", color:"#fff", border:"none"}} onClick={()=>openWA(student.guardianPhone1, `Sayın velimiz, ${student.name} isimli öğrencimiz bugünkü antrenmana katılmamıştır.`)}>💬 Devamsızlık Bildir</Btn>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}><StatCard label="Mevcut Katılım" value={attendanceCount(student)} col="#059669"/><StatCard label="Aylık Bakiye" value={`${balance>=0?"+":""}${balance.toLocaleString("tr-TR")} ₺`} col={balance>=0?"#059669":"#DC2626"}/></div>
      <Btn variant="secondary" full onClick={()=>setEditing(true)}>Bilgileri Düzenle</Btn>
    </div>}
    {tab===1&&<div><Card><Row label="Seviye" val={swimLevelLabel(student.swimLevel)}/><Row label="Grup" val={student.groupName||"—"}/><Row label="Günler" val={safeDays.map(d=>DAYS_TR[d]).join(", ")||"—"}/><Row label="Başlangıç" val={fmtDate(student.courseStart)}/><Row label="Bitiş" val={fmtDate(student.courseEnd)}/><Row label="Tarih Bazlı Kalan Seans" val={`${calcRemainingSessions(student)} / ${student.totalSessions||0}`} col="#0EA5E9"/></Card></div>}
    {tab===2&&<div>{student.hasTransport?<Card><Row label="Adres" val={student.address||"—"}/><Row label="Servis Ücreti" val={`${student.transportFee} ₺`}/><Row label="Şoför" val={student.driverName}/></Card>:<div style={{textAlign:"center",padding:"40px 0",color:"#94A3B8"}}>Servis kullanmıyor</div>}</div>}
    {tab===3&&<div>{safeEqs.length===0?<div style={{textAlign:"center",padding:"40px 0",color:"#94A3B8"}}>Ekipman yok</div>:<Card>{safeEqs.map(e=><Row key={e.id} label={e.name} val={`${e.price} ₺`}/>)}</Card>}</div>}
    {tab===4&&<div><SectionTitle action={<Btn sm onClick={()=>setShowPay(true)}>+ Ödeme Ekle</Btn>}>Ödemeler</SectionTitle><Card>{safePays.map(p=><Row key={p.id} label={fmtDate(p.date)} val={`+${p.amount} ₺`} col={"#059669"}/>)}</Card></div>}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   WhatsApp SEKMESİ (ARAMA VE LİSTE KORUMASI TAMAM)
═══════════════════════════════════════════════════════════════ */
function WhatsAppPage({students, waLinks}) {
  const safeLinks = safeArr(waLinks);
  const [title, setTitle] = useState("");
  const [url, setUrl] = useState("");
  const [search, setSearch] = useState("");
  const [selectedStudent, setSelectedStudent] = useState(null);
  const [showInviteModal, setShowInviteModal] = useState(false);

  function addLink() {
    if(!title.trim() || !url.trim()) return;
    const n = [...safeLinks, { id:Date.now(), name: title.toLocaleUpperCase("tr-TR"), url: url }];
    DB.set("waLinks", n); setTitle(""); setUrl("");
  }

  function triggerInvite(student) {
    if(safeLinks.length === 0) { alert("Lütfen önce yukarıdaki kutudan en az bir adet isimli davet bağlantısı ekleyin."); return; }
    setSelectedStudent(student);
    setShowInviteModal(true);
  }

  function completeInvite(linkUrl) {
    const msg = `SAYIN VELİMİZ,\n${selectedStudent.name} İSİMLİ ÖĞRENCİMİZİN DUYURU VE ANTRENMAN TAKİBİ İÇİN KULÜBÜMÜZÜN RESMİ WHATSAPP GRUBUNA AŞAĞIDAKİ LİNKTEN KATILABİLİRSİNİZ:\n\n${linkUrl}`;
    openWA(selectedStudent.guardianPhone1, msg);
    setShowInviteModal(false);
  }

  const activeStudents = safeArr(students).filter(s => courseStatus(s) === "active" && s.guardianPhone1);
  const filteredStudents = activeStudents.filter(s => s.name && s.name.toLowerCase().includes(search.toLowerCase()));

  return <div style={{padding:16}}>
    <SectionTitle>WhatsApp Web Girişi</SectionTitle>
    <Card style={{marginBottom:16}}><Btn full style={{background:"#25D366", color:"#fff", border:"none", padding:"12px"}} onClick={()=>window.open("https://web.whatsapp.com", "_blank")}>WhatsApp Web Sekmesini Aç</Btn></Card>
    
    <SectionTitle>İsimli Grup Davet Bağlantıları</SectionTitle>
    <Card style={{marginBottom:16}}>
      <div style={{display:"flex", gap:8}}>
        <input style={{flex:1, padding:"10px 12px", background:"var(--bg-color)", border:`1px solid #E2E8F0`, borderRadius:8, color:"var(--text-main)", fontSize:13, outline:"none"}} value={title} onChange={e=>setTitle(e.target.value)} placeholder="Grup Adı (Örn: CUMARTESİ)" />
        <input style={{flex:2, padding:"10px 12px", background:"var(--bg-color)", border:`1px solid #E2E8F0`, borderRadius:8, color:"var(--text-main)", fontSize:13, outline:"none"}} value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://chat.whatsapp.com/..." />
        <Btn onClick={addLink}>Ekle</Btn>
      </div>
      <div style={{marginTop:12}}>
        {safeLinks.map(l=><div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #F1F5F9"}}><span style={{fontSize:13,fontWeight:700}}>📌 {l.name}</span><button type="button" onClick={()=>DB.set("waLinks", safeLinks.filter(x=>x.id!==l.id))} style={{background:"#DC262615",border:"none",color:"#DC2626",cursor:"pointer",fontWeight:700,padding:"4px 10px",borderRadius:6}}>Sil</button></div>)}
      </div>
    </Card>

    <SectionTitle>Öğrenci Davet Takip Paneli</SectionTitle>
    <div style={{marginBottom:12}}>
      <input style={{width:"100%",padding:"12px 14px",background:"var(--sidebar-bg)",border:`1px solid #E2E8F0`,borderRadius:12,color:"var(--text-main)",outline:"none",fontSize:13}} placeholder="Listeden veli arayın..." value={search} onChange={e=>setSearch(e.target.value)}/>
    </div>
    <Card>
      {filteredStudents.length === 0 ? <div style={{textAlign:"center",padding:"20px 0",color:"#64748B",fontSize:13}}>Öğrenci bulunamadı.</div> :
        filteredStudents.map(s=><div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #F1F5F9"}}>
          <div><div style={{fontWeight:700,fontSize:14,color:"var(--text-main)"}}>{s.name}</div><div style={{fontSize:12,color:"#64748B"}}>Grup: {s.groupName||"Belirtilmemiş"}</div></div>
          <Btn sm style={{background:"#25D36615",color:"#25D366",border:"none"}} onClick={()=>triggerInvite(s)}>Davet Gönder</Btn>
        </div>)
      }
    </Card>

    <Modal show={showInviteModal} onClose={()=>setShowInviteModal(false)} title="Davet Grubu Seçin">
      <div style={{fontSize:13,color:"#64748B",marginBottom:16}}><strong>{selectedStudent?.name}</strong> isimli öğrencinin velisine hangi grubu göndermek istersiniz?</div>
      <div style={{display:"flex", flexDirection:"column", gap:8}}>
        {safeLinks.map(l=><button key={l.id} type="button" onClick={()=>completeInvite(l.url)} style={{width:"100%",padding:14,borderRadius:12,background:"var(--bg-color)",border:"1px solid #E2E8F0",color:"var(--text-main)",fontWeight:700,textAlign:"left",cursor:"pointer"}}>{l.name}</button>)}
      </div>
    </Modal>
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   DİĞER MODÜLLER (GİDERLER DÜZENLEME VE HESAP SİLME DAHİL)
═══════════════════════════════════════════════════════════════ */
function AttendancePage({students}){
  const [date,setDate]=useState(TODAY); const [y, m, d] = date.split('-'); const selectedDayIndex = new Date(y, m - 1, d).getDay();
  const active=safeArr(students).filter(s=>courseStatus(s)==="active" && safeArr(s.weekDays).map(Number).includes(selectedDayIndex));
  const present=active.filter(s=>(s.attendance||{})[date]).length;
  return<div style={{padding:16}}><SectionTitle>Yoklama Defteri</SectionTitle><Inp value={date} onChange={setDate} type="date"/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}><StatCard label="Beklenen" value={active.length}/><StatCard label="Mevcut" value={present} col="#059669"/></div>
    <Card>{active.map(s=><div key={s.id} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid #F1F5F9`}}><div><div style={{fontSize:15,fontWeight:700}}>{s.name}</div></div><Toggle checked={!!(s.attendance||{})[date]} onChange={(v)=>{
      const n=safeArr(students).map(st=>{if(st.id!==s.id)return st; const att={...(st.attendance||{})}; if(v)att[date]=true; else delete att[date]; return{...st,attendance:att}}); DB.set("students",n);
    }}/></div>)}</Card>
  </div>
}

function PaymentsPage({students}){
  const all=safeArr(students).flatMap(s=>safeArr(s.payments).map(p=>({...p,studentName:s.name}))).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const total=all.reduce((t,p)=>t+Number(p.amount),0); const thisMonth=all.filter(p=>p.date&&p.date.startsWith(TODAY.slice(0,7))).reduce((t,p)=>t+Number(p.amount),0);
  const unpaid = safeArr(students).filter(s => courseStatus(s) === "active" && totalPaid(s) < monthlyTotal(s));
  return<div style={{padding:16}}>
    <SectionTitle action={<Btn sm variant="ghost" onClick={()=>exportCSV("Odemeler", ["Ogrenci", "Tutar"], all.map(p => [p.studentName, p.amount]))}>⬇️ Excel</Btn>}>Muhasebe & Ödemeler</SectionTitle>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}><StatCard label="Toplam Tahsilat" value={`${total} ₺`} col="#059669" span2/><StatCard label="Bu Ay" value={`${thisMonth} ₺`}/><StatCard label="Eksik" value={unpaid.length} col="#DC2626"/></div>
    <Card>{all.map(p=><Row key={p.id} label={p.studentName} val={`+${p.amount} ₺`} col="#059669"/>)}</Card>
  </div>
}

function ExpensesPage({expenses}){
  const [show,setShow]=useState(false); const [f,setF]=useState(EMPTY_EXPENSE); const u=(k,v)=>setF(p=>({...p,[k]:v}));
  const valid=safeArr(expenses).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const total=valid.reduce((t,e)=>t+Number(e.amount),0);
  function save(){ if(!f.title.trim()) return; const n = f.id ? valid.map(e=>e.id===f.id?{...f}:e) : [...valid,{...f,id:Date.now()}]; DB.set("expenses",n); setShow(false); setF(EMPTY_EXPENSE); }
  return<div style={{padding:16}}><SectionTitle action={<Btn sm onClick={()=>{setF(EMPTY_EXPENSE);setShow(true);}}>+ Gider Ekle</Btn>}>Kurum Giderleri ({total.toLocaleString("tr-TR")} ₺)</SectionTitle>
    {valid.map(e=><Card key={e.id} style={{padding:"14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontWeight:800,fontSize:15,color:C.text}}>{e.title}</div><div style={{fontSize:11,color:C.textSub,marginTop:4}}>{fmtDate(e.date)}</div></div>
        <div style={{fontWeight:800,color:C.danger,fontSize:16}}>-{Number(e.amount).toLocaleString("tr-TR")} ₺</div>
      </div>
      <div style={{display:"flex",gap:8,marginTop:12}}><Btn sm variant="secondary" onClick={()=>{setF(e);setShow(true);}}>Düzenle</Btn><Btn sm variant="danger" onClick={()=>{if(confirm('Gider kaydı tamamen silinsin mi?')) DB.set("expenses", valid.filter(x=>x.id!==e.id));}}>Sil</Btn></div>
    </Card>)}
    <Modal show={show} onClose={()=>setShow(false)} title={f.id?"Gider Düzenle":"Yeni Gider Ekle"}><Inp label="Açıklama" value={f.title} onChange={v=>u("title",v.toLocaleUpperCase("tr-TR"))}/><Inp label="Tarih" value={f.date} onChange={v=>u("date",v)} type="date"/><Inp label="Tutar (₺)" value={f.amount} onChange={v=>u("amount",v)} type="number"/><Btn full onClick={save} style={{marginTop:16}}>Gideri Kaydet</Btn></Modal>
  </div>
}

function InventoryPage({items}){
  const validItems = safeArr(items); const [show,setShow]=useState(false); const [f,setF]=useState(EMPTY_ITEM); const u=(k,v)=>setF(p=>({...p,[k]:v}));
  function save(){ if(!f.name.trim()) return; const n = f.id ? validItems.map(i=>i.id===f.id?{...f}:i) : [...validItems,{...f,id:Date.now()}]; DB.set("stock",n); setShow(false); setF(EMPTY_ITEM); }
  return<div style={{padding:16}}>
    <SectionTitle action={<Btn sm onClick={()=>{setF(EMPTY_ITEM);setShow(true);}}>+ Ürün Ekle</Btn>}>Depo & Envanter</SectionTitle>
    {validItems.map(item=>(item && item.id) && <Card key={item.id} style={{padding:"16px"}}><Row label={item.name} val={`${item.price} ₺`}/><div style={{marginTop:8, textAlign:"right"}}><Btn sm variant="danger" onClick={()=>DB.set("stock", validItems.filter(i=>i.id!==item.id))}>Kaldır</Btn></div></Card>)}
    <Modal show={show} onClose={()=>setShow(false)} title="Ürün Bilgileri"><Inp label="Adı" value={f.name} onChange={v=>u("name",v.toLocaleUpperCase("tr-TR"))}/><Inp label="Fiyat" value={f.price} onChange={v=>u("price",v)} type="number"/><Btn full onClick={save} style={{marginTop:16}}>Kaydet</Btn></Modal>
  </div>
}

function StaffPage({staff}){
  const validStaff = safeArr(staff); const [tab, setTab] = useState(0); const [showAdd, setShowAdd] = useState(false); const [f, setF] = useState(EMPTY_STAFF);
  const [selectedMonth, setSelectedMonth] = useState(TODAY.slice(0,7)); const [activeStaffId, setActiveStaffId] = useState(null);
  const u=(k,v)=>setF(p=>({...p,[k]:v}));

  function save(){
    if(!f.name.trim()) return;
    const n = f.id ? validStaff.map(s=>s.id===f.id?{...s,...f}:s) : [...validStaff,{...f,id:Date.now(),attendance:{},dailyWage:Number(f.dailyWage||0)}];
    DB.set("staff",n); setShowAdd(false); setF(EMPTY_STAFF);
  }
  const daysInMonth = new Date(Number(selectedMonth.split("-")[0]), Number(selectedMonth.split("-")[1]), 0).getDate();
  const daysArray = Array.from({length: daysInMonth}, (_, i) => i + 1);

  return<div style={{padding:16}}>
    <TabBar tabs={["Personel Listesi","Yoklama & Maaş Hakediş"]} active={tab} onChange={setTab}/>
    {tab===0&&<div>
      <SectionTitle action={<Btn sm onClick={()=>{setF(EMPTY_STAFF);setShowAdd(true);}}>+ Personel Ekle</Btn>}>Kurum Çalışanları</SectionTitle>
      {validStaff.map(s=><Card key={s.id}><Row label={s.name} val={`${s.dailyWage} ₺ / Gün`}/><div style={{marginTop:8, textAlign:"right"}}><Btn sm variant="danger" onClick={()=>DB.set("staff", validStaff.filter(x=>x.id!==s.id))}>Sil</Btn></div></Card>)}
    </div>}
    {tab===1&&<div>
      <Inp label="Takip Ayı Seçimi" type="month" value={selectedMonth} onChange={setSelectedMonth}/>
      {validStaff.map(s=>{
        const daysCount = Object.keys(s.attendance||{}).filter(k=>k.startsWith(selectedMonth)&&s.attendance[k]).length;
        const isExp = activeStaffId === s.id;
        return <Card key={s.id}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"} } onClick={()=>setActiveStaffId(isExp?null:s.id)}>
            <div><div style={{fontWeight:700,fontSize:15}}>{s.name}</div><div style={{fontSize:12,color:"#10B981",fontWeight:700,marginTop:4}}>{daysCount} Gün Mesai • Toplam Hakediş: {(daysCount*Number(s.dailyWage||0)).toLocaleString("tr-TR")} ₺</div></div>
            <Btn sm variant="secondary">{isExp?"Kapat ▲":"Seç ▼"}</Btn>
          </div>
          {isExp && <div style={{marginTop:16, paddingTop:16, borderTop:`1px solid #E2E8F0`}}>
            <Inp label="Günlük Yevmiye (₺)" type="number" value={s.dailyWage} onChange={(v)=>DB.set("staff", validStaff.map(x=>x.id===s.id?{...x,dailyWage:Number(v)}:x))}/>
            <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(42px, 1fr))", gap:8, marginTop:12}}>
              {daysArray.map(d=>{
                const key = `${selectedMonth}-${String(d).padStart(2,'0')}`; const isP = !!s.attendance?.[key];
                return <button key={d} type="button" onClick={()=>{
                  const att={...(s.attendance||{})}; if(isP) delete att[key]; else att[key]=true;
                  DB.set("staff", validStaff.map(x=>x.id===s.id?{...x,attendance:att}:x));
                }} style={{padding:"10px 0", borderRadius:8, border:`1px solid ${isP?"#10B981":"#E2E8F0"}`, background:isP?"#10B98115":"var(--bg-color)", color:isP?"#10B981":"#64748B", fontWeight:800}}>{d}</button>
              })}
            </div>
          </div>}
        </Card>
      })}
    </div>}
    <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Personel Kaydı"><Inp label="Ad Soyad *" value={f.name} onChange={v=>u("name",v.toLocaleUpperCase("tr-TR"))}/><Inp label="Yevmiye" value={f.dailyWage} onChange={v=>u("dailyWage",v)} type="number"/><Btn full onClick={save} style={{marginTop:16}}>Çalışanı Kaydet</Btn></Modal>
  </div>
}

function Dashboard({students,expenses}){
  const safeStudents = safeArr(students); const safeExpenses = safeArr(expenses); const active=safeStudents.filter(s=>courseStatus(s)==="active");
  const totalRev=safeStudents.reduce((t,s)=>t+totalPaid(s),0); const totalExp=safeExpenses.reduce((t,e)=>t+Number(e.amount||0),0); const netProfit = totalRev - totalExp;

  const recentRegistrations = [...safeStudents].sort((a,b) => b.id - a.id).slice(0, 5);
  const recentPay = safeStudents.flatMap(s=>safeArr(s.payments).map(p=>({...p,studentName:s.name}))).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  const endingSoon = active.filter(s=>{const d=daysLeft(s);return d>=0&&d<=14;}).sort((a,b)=>daysLeft(a)-daysLeft(b)).slice(0,5);

  return<div style={{padding:16}}>
    <Card style={{marginBottom:16, background:netProfit >= 0 ? "#10B98115" : "#EF444415", border:"none"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:13, color:netProfit >= 0 ? "#10B981" : "#EF4444", fontWeight:800}}>NET KASA DURUMU</div>
        <div style={{fontSize:26, fontWeight:800, color:netProfit >= 0 ? "#10B981" : "#EF4444"}}>{netProfit >= 0 ? "+" : ""}{netProfit.toLocaleString("tr-TR")} ₺</div>
      </div>
    </Card>

    <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(300px, 1fr))", gap:16, alignItems:"start"}}>
      <Card><div style={{fontSize:13, fontWeight:800, marginBottom:12, color:"var(--text-main)"}}>Son Kayıt Olanlar</div>{recentRegistrations.map(s => <Row key={s.id} label={s.name} val={fmtDate(s.courseStart)}/>)}</Card>
      <Card><div style={{fontSize:13, fontWeight:800, marginBottom:12, color:"var(--text-main)"}}>Son Ödemeler</div>{recentPay.map((p, i) => <Row key={i} label={p.studentName} val={`${p.amount} ₺`}/>)}</Card>
      <Card style={{border:`1px solid #F59E0B40`}}><div style={{fontSize:13, fontWeight:800, marginBottom:12, color:"var(--text-main)"}}>Kayıt Bitişi Yaklaşanlar</div>{endingSoon.map(s => <Row key={s.id} label={s.name} val={`${daysLeft(s)} Gün`}/>)}</Card>
    </div>
  </div>
}

function SettingsPage({navItems, clubName, logoUrl, appUsers}){
  const [tab, setTab] = useState(0); const [nameVal, setNameVal] = useState(clubName); const [logoVal, setLogoVal] = useState(logoUrl);
  const [showUserModal, setShowUserModal] = useState(false); const [uForm, setUForm] = useState({ id:null, username:"", password:"", role:"staff", allowedTabs:[] });
  
  function toggleMenuAccess(menuId) { const tabs = uForm.allowedTabs || []; if(tabs.includes(menuId)) setUForm({...uForm, allowedTabs: tabs.filter(t=>t!==menuId)}); else setUForm({...uForm, allowedTabs: [...tabs, menuId]}); }
  
  function saveUser() { 
    if(!uForm.username||!uForm.password)return; 
    let n = safeArr(appUsers); 
    if(uForm.id) n = n.map(u => u.id === uForm.id ? {...uForm} : u); 
    else n = [...n, {...uForm, id:Date.now(), allowedTabs:["dashboard","students","attendance"]}]; 
    DB.set("appUsers", n); setShowUserModal(false); 
  }

  return<div style={{padding:16}}>
    <TabBar tabs={["Genel Kurum", "Personel Hesap Yetkileri"]} active={tab} onChange={setTab}/>
    {tab === 0 && (
      <div><Card><Inp label="Kulüp Adı" value={nameVal} onChange={setNameVal}/><Inp label="Logo URL" value={logoVal} onChange={setLogoVal}/></Card><Btn full onClick={()=>{DB.set("clubName",nameVal); DB.set("logoUrl",logoVal); alert("Kaydedildi");}}>Kaydet</Btn></div>
    )}
    {tab===1&&<div>
      <SectionTitle action={<Btn sm onClick={()=>{setUForm({id:null,username:"",password:"",role:"staff",allowedTabs:["dashboard","students","attendance"]});setShowUserModal(true);}}>+ Hesap Ekle</Btn>}>Çalışan Giriş Yetkileri</SectionTitle>
      
      {safeArr(appUsers).map(u=><Card key={u.id} style={{padding:"12px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:800,fontSize:15,color:C.text}}>{u.username}</div>
            <div style={{fontSize:11,color:u.role==='admin'?C.success:C.textSub,fontWeight:700,marginTop:4}}>{u.role==='admin'?'Tam Yetki (Admin)':'Çalışan (Kısıtlı)'}</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn variant="secondary" sm onClick={()=>{setUForm(u);setShowUserModal(true);}}>Düzenle</Btn>
            {u.role !== 'admin' && <Btn variant="danger" sm onClick={()=>{if(confirm(`${u.username} hesabı silinsin mi?`)) DB.set("appUsers", safeArr(appUsers).filter(x=>x.id!==u.id));}}>Kaldır</Btn>}
          </div>
        </div>
      </Card>)}

      <Modal show={showUserModal} onClose={()=>setShowUserModal(false)} title="Personel Hesabı Tanımla">
        <Inp label="Kullanıcı Adı" value={uForm.username} onChange={v=>setUForm({...uForm,username:v})}/>
        <Inp label="Giriş Şifresi" value={uForm.password} onChange={v=>setUForm({...uForm,password:v})}/>
        {uForm.id !== "admin" && (
          <div style={{marginTop: 10}}>
            <div style={{fontSize:12, fontWeight:700, marginBottom:8, color:"var(--text-main)"}}>Görebileceği Menüler</div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8}}>
              {navItems.map(nav => nav.id !== "settings" && (
                <label key={nav.id} style={{display:"flex", alignItems:"center", gap:6, padding:"8px", background:C.bg, borderRadius:8, cursor:"pointer", border:`1px solid ${(uForm.allowedTabs||[]).includes(nav.id)?C.accent:C.border}`}}>
                  <input type="checkbox" checked={(uForm.allowedTabs||[]).includes(nav.id)} onChange={() => toggleMenuAccess(nav.id)} />
                  <span style={{fontSize:12}}>{nav.label}</span>
                </label>
              ))}
            </div>
          </div>
        )}
        <Btn full onClick={saveUser} style={{marginTop:16}}>Hesabı Kaydet</Btn>
      </Modal>
    </div>}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   5. APP ROOT
═══════════════════════════════════════════════════════════════ */
function App(){
  const [currentUser, setCurrentUser] = useState(() => { try { return JSON.parse(sessionStorage.getItem("aqua_user")); } catch { return null; } });
  const [isDbLoaded, setIsDbLoaded] = useState(false);
  const [students,setStudents]=useState([]); const [staff,setStaff]=useState([]); const [stockItems,setStockItems]=useState([]); const [movements,setMovements]=useState([]); const [expenses,setExpenses]=useState([]);
  const [clubName,setClubName]=useState("AquaClub"); const [navItems,setNavItems]=useState(NAV_ITEMS); const [appUsers, setAppUsers]=useState([]); const [oldPinCode, setOldPinCode]=useState("0309"); const [waLinks,setWaLinks]=useState([]);
  const [logoUrl,setLogoUrl]=useState(""); const [activeTab,setActiveTab]=useState("dashboard"); const [sidebarOpen,setSidebarOpen]=useState(false);
  const [themeColor,setThemeColor]=useState("#F0F4F8"); const [sidebarColor,setSidebarColor]=useState("#FFFFFF"); const [cardColor,setCardColor]=useState("#FFFFFF"); const [textColor,setTextColor]=useState("#1E293B");

  useEffect(() => { document.documentElement.style.setProperty('--bg-color', themeColor); document.documentElement.style.setProperty('--sidebar-bg', sidebarColor); document.documentElement.style.setProperty('--card-bg', cardColor); document.documentElement.style.setProperty('--text-main', textColor); }, [themeColor, sidebarColor, cardColor, textColor]);

  useEffect(() => {
    const unsub = db.collection("appData").doc("main").onSnapshot((doc) => {
      if (doc.exists) {
        const d = doc.data();
        if (d.students) setStudents(safeArr(d.students));
        if (d.staff) setStaff(safeArr(d.staff));
        if (d.stock) setStockItems(safeArr(d.stock));
        if (d.movements) setMovements(safeArr(d.movements));
        if (d.expenses) setExpenses(safeArr(d.expenses));
        if (d.waLinks) setWaLinks(safeArr(d.waLinks));
        if (d.clubName) setClubName(d.clubName);
        if (d.pinCode) setOldPinCode(d.pinCode); 
        let loadedUsers = safeArr(d.appUsers);
        if (loadedUsers.length === 0) { loadedUsers = [{ id:"admin", username:"admin", password: d.pinCode || "0309", role:"admin", allowedTabs: NAV_ITEMS.map(n=>n.id) }]; }
        setAppUsers(loadedUsers);
        if (d.logoUrl) setLogoUrl(d.logoUrl);
      }
      setIsDbLoaded(true);
    });
    return () => unsub();
  }, []);

  if (!isDbLoaded) return <div style={{display:"flex",flexDirection:"column",height:"100vh",alignItems:"center",justifyContent:"center",background:"var(--bg-color)"}}><div className="spinner"></div><div style={{color:"var(--text-main)",fontWeight:700,marginTop:10}}>Kurumsal Sistem Yükleniyor...</div></div>;
  if (!currentUser) return <LoginScreen onSuccess={(user) => { sessionStorage.setItem("aqua_user", JSON.stringify(user)); setCurrentUser(user); }} appUsers={appUsers} adminPin={oldPinCode} />;

  const visibleNav = NAV_ITEMS.filter(n => currentUser.role === "admin" || (currentUser.allowedTabs || []).includes(n.id));

  return<div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg-color)"}}>
    <div className="sidebar-desktop" style={{width:240, background:"var(--sidebar-bg)", borderRight:"1px solid #E2E8F0", display:"flex", flexDirection:"column", boxShadow:"2px 0 10 rgba(0,0,0,0.02)", zIndex:100}}>
      <div style={{padding:"24px 20px 20px", borderBottom:"1px solid #E2E8F0", display:"flex", alignItems:"center", gap:12}}>
        <div style={{width:38,height:38,borderRadius:10,background:`linear-gradient(135deg,#0EA5E9,#0284C7)`,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
          {logoUrl ? <img src={logoUrl} alt="Logo" style={{width:"100%",height:"100%",objectFit:"cover"}}/> : <span style={{color:"white", fontWeight:800}}>AC</span>}
        </div>
        <div><div style={{fontSize:15,fontWeight:800,color:"var(--text-main)"}}>{clubName}</div><div style={{fontSize:11,color:"#64748B",fontWeight:600}}>{currentUser.username}</div></div>
      </div>
      <div style={{flex:1, overflowY:"auto", padding:"16px 12px"}}>
        {visibleNav.map(item=><button key={item.id} type="button" onClick={()=>setActiveTab(item.id)} style={{display:"flex",alignItems:"center",gap:12,width:"100%", padding:"12px 14px", marginBottom:6, background:activeTab===item.id?"#0EA5E915":"transparent", border:"none", borderRadius:12, color:activeTab===item.id?"#0284C7":"#475569", cursor:"pointer", textAlign:"left", fontSize:14, fontWeight:activeTab===item.id?700:500}}><Icon d={item.icon} size={18}/> {item.label}</button>)}
      </div>
      <div style={{padding:"16px"}}><button type="button" onClick={()=>{sessionStorage.removeItem("aqua_user"); window.location.reload();}} style={{width:"100%", padding:"12px", background:"#EF444415", borderRadius:12, border:"none", color:"#EF4444", fontWeight:700, cursor:"pointer"}}>Çıkış Yap</button></div>
    </div>
    
    <div style={{flex:1, display:"flex", flexDirection:"column", overflow:"hidden"}}>
      <div style={{padding:"16px 20px", background:"var(--sidebar-bg)", borderBottom:"1px solid #E2E8F0", fontWeight:800, fontSize:16, display:"flex", alignItems:"center", gap:16, color:"var(--text-main)"}}>
        <button type="button" onClick={()=>setSidebarOpen(!sidebarOpen)} className="menu-btn" style={{background:"transparent", border:`1px solid #E2E8F0`, color:"var(--text-main)", width:36, height:36, borderRadius:10}}>☰</button>
        {(visibleNav.find(n=>n.id===activeTab)||{}).label}
      </div>
      <div style={{flex:1, overflowY:"auto"}}>
        {activeTab==="dashboard"&&<Dashboard students={students} expenses={expenses}/>}
        {activeTab==="students"&&<StudentsPage students={students} stockItems={stockItems}/>}
        {activeTab==="attendance"&&<AttendancePage students={students}/>}
        {activeTab==="payments"&&<PaymentsPage students={students}/>}
        {activeTab==="expenses"&&<ExpensesPage expenses={expenses}/>}
        {activeTab==="whatsapp"&&<WhatsAppPage students={students} waLinks={waLinks} />}
        {activeTab==="staff"&&<StaffPage staff={staff}/>}
        {activeTab==="inventory"&&<InventoryPage items={stockItems}/>}
        {activeTab==="settings"&&currentUser.role==='admin'&&<SettingsPage navItems={NAV_ITEMS} clubName={clubName} logoUrl={logoUrl} appUsers={appUsers}/>}
      </div>
    </div>
    <style>{`@media(max-width:768px){.sidebar-desktop{display:none!important}} @media(min-width:769px){.menu-btn{display:none!important}}`}</style>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
