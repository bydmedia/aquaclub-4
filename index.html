<style>
:root {

}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg-color);transition:background 0.3s ease;}
body{font-family:'Inter',-apple-system,'Segoe UI',sans-serif;overscroll-behavior:none;color:var(--text-main);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

::-webkit-scrollbar-track{background:transparent}

/* Kurumsal Düzenlemeler */

.data-row:last-child { border-bottom: none; }
.data-col { font-size: 13px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
.data-col-sub { font-size: 11px; color: #64748B; font-weight: 400; }
.data-col-right { text-align: right; font-weight: 700; }
.data-header { font-size: 11px; font-weight: 700; color: #64748B; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #E2E8F0; padding-bottom: 6px; margin-bottom: 4px; }
</style>

</head>

const {useState,useEffect,useRef}=React;

/* ═══════════════════════════════════════════════════════════════

  {id:"whatsapp",label:"WhatsApp Entegre",icon:"M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.305-.885-.653-1.482-1.46-1.656-1.758-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z M12 22C6.477 22 2 17.523 2 12c0-1.76.452-3.414 1.25-4.832L2 2l5.344 1.156C8.683 2.43 10.297 2 12 2c5.523 0 10 4.477 10 10s-4.477 10-10 10z"},
  {id:"settings",label:"Ayarlar",icon:"M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z"},
];

const EMPTY_S={id:null,name:"",dob:"",guardianName:"",guardianPhone1:"",guardianPhone2:"",notes:"",
  courseStart:TODAY,courseEnd:"",totalSessions:48,weekDays:[1,3,5],swimLevel:"",poolLane:"",groupName:"",
  monthlyFee:"",discount:"",paymentNote:"",hasTransport:false,address:"",transportFee:"",driverName:"",driverPhone:"",
  equipment:[],payments:[],attendance:{}};

function safeArr(val) { 
  if (!val) return [];
  return (Array.isArray(val) ? val : Object.values(val)).filter(item => item !== null && item !== undefined);
}

const DB={
  set:(k,v)=>{
    const cleanV = Array.isArray(v) ? v.filter(i => i !== null && i !== undefined) : v;
    db.collection("appData").doc("main").set({ [k]: cleanV }, { merge: true })
      .catch(err => console.error("Firebase kayıt hatası:", err));
  }
};

/* ═══════════════════════════════════════════════════════════════
   BASIC CORE MODALS & COMPONENTS
═══════════════════════════════════════════════════════════════ */
function Modal({show,onClose,title,children}){
  if(!show)return null;
  return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:"var(--sidebar-bg)",borderRadius:20,padding:"24px",width:"100%",maxWidth:540,height:"580px",display:"flex",flexDirection:"column",boxShadow:"0 20px 40px rgba(0,0,0,0.08)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexShrink:0}}>
        <div style={{fontSize:17,fontWeight:800,color:"var(--text-main)"}}>{title}</div>
        <button onClick={onClose} style={{background:"var(--bg-color)",border:"none",color:"#64748B",width:32,height:32,borderRadius:16,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      </div>
      <div style={{flex:1,overflowY:"auto",paddingRight:4}}>{children}</div>
    </div>
  </div>
}

function Toggle({checked,onChange}){
  return<button type="button" onClick={()=>onChange(!checked)} style={{width:40,height:22,borderRadius:11,background:checked?"#0EA5E9":"#E2E8F0",border:"none",cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}>
    <span style={{position:"absolute",top:2,left:checked?19:2,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left .2s"}}/>
  </button>
}

function Inp({label,value,onChange,type="text",placeholder,rows,half,style,disabled}){
  return<div style={{marginBottom:10,flex:half?"1":"unset"}}>
    {label&&<div style={{fontSize:11,color:"#475569",marginBottom:4,fontWeight:600,letterSpacing:0.3}}>{label}</div>}
    {rows?<textarea style={{width:"100%",padding:"9px 11px",background:"var(--bg-color)",border:`1px solid #E2E8F0`,borderRadius:8,color:"var(--text-main)",fontSize:13,outline:"none",fontFamily:"inherit",resize:"vertical",minHeight:60,...style}} rows={rows} value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder} disabled={disabled}/>
         :<input style={{width:"100%",padding:"9px 11px",background:"var(--bg-color)",border:`1px solid #E2E8F0`,borderRadius:8,color:"var(--text-main)",fontSize:13,outline:"none",fontFamily:"inherit",...style}} type={type} value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder} disabled={disabled}/>}
  </div>
}

function Sel({label,value,onChange,options}){
  return<div style={{marginBottom:10}}>
    {label&&<div style={{fontSize:11,color:"#475569",marginBottom:4,fontWeight:600,letterSpacing:0.3}}>{label}</div>}
    <select style={{width:"100%",padding:"9px 11px",background:"var(--bg-color)",border:`1px solid #E2E8F0`,borderRadius:8,color:"var(--text-main)",fontSize:13,outline:"none",fontFamily:"inherit",cursor:"pointer"} } value={value||""} onChange={e=>onChange(e.target.value)}>
      <option value="">Seçiniz</option>
      {(options||[]).map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>
}

function Btn({children,onClick,variant="primary",sm,full,style}){
  const base={padding:sm?"6px 14px":"9px 18px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:600,fontSize:sm?12:13,fontFamily:"inherit",letterSpacing:0.2,transition:"opacity .15s",...style};
  const v={
    primary:{background:`linear-gradient(135deg,#0EA5E9,#38BDF8)`,color:"#fff"},
    secondary:{background:"var(--sidebar-bg)",color:"#475569",border:`1px solid #E2E8F0`},
    danger:{background:"#EF444415",color:"#EF4444",border:`1px solid #EF444430`},
    success:{background:"#10B98115",color:"#10B981",border:`1px solid #10B98130`},
    ghost:{background:"transparent",color:"#475569",border:`1px solid #E2E8F0`},
  };
  return<button type="button" onClick={onClick} style={{...base,...v[variant],width:full?"100%":"auto"}}>{children}</button>
}

function Card({children,style,accent}){
  return<div style={{background:"var(--sidebar-bg)",borderRadius:12,border:accent?`1px solid ${accent}40`:`1px solid #E2E8F0`,padding:14,marginBottom:10,...style}}>{children}</div>
}

function Badge({label,color}){
  const map={active:["#10B981","Aktif"],upcoming:["#F59E0B","Başlamadı"],ended:["#EF4444","Bitti"],unknown:["#64748B","Belirsiz"]};
  const [col,txt]=map[label]||[color||"#64748B",label];
  return<span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:20,background:col+"15",color:col,letterSpacing:0.3}}>{txt}</span>
}

function SectionTitle({children,action}){
  return<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,marginTop:6}}>
    <div style={{fontSize:11,fontWeight:700,color:"#0EA5E9",textTransform:"uppercase",letterSpacing:1}}>{children}</div>
    {action}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   STUDENTS PAGE (KURUMSAL DETAY BİLGİ PANELLİ LİSTE)
═══════════════════════════════════════════════════════════════ */
function StudentsPage({students,stockItems}){
  const [search,setSearch]=useState(""); const [showAdd,setShowAdd]=useState(false); const [detailId,setDetailId]=useState(null);
  const safeStudents = safeArr(students); const student=detailId?safeStudents.find(s=>s.id===detailId):null;
  const filtered=safeStudents.filter(s=>s && s.name && s.name.toLowerCase().includes(search.toLowerCase()));

  function save(f){
    let n; if(f.id){n=safeStudents.map(s=>s.id===f.id?{...f}:s);}
    else{n=[...safeStudents,{...f,id:Date.now(),payments:[],attendance:[],equipment:[]}];}
    DB.set("students",n);setShowAdd(false);
  }

  if(student)return<StudentDetail student={student} onBack={()=>setDetailId(null)} students={safeStudents} stockItems={stockItems}/>;

  return<div style={{padding:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:14,fontWeight:800}}>Öğrenciler ({filtered.length})</div>
      <Btn sm onClick={()=>setShowAdd(true)}>+ Yeni Kayıt</Btn>
    </div>
    <div style={{position:"relative",marginBottom:12}}><input style={{width:"100%",padding:"12px 14px",background:"var(--sidebar-bg)",border:`1px solid #E2E8F0`,borderRadius:12,color:"var(--text-main)",outline:"none"}} placeholder="Öğrenci adı yazarak arayın..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
    
    {filtered.map(s=>{
      const expected = monthlyTotal(s); const paid = totalPaid(s); const debt = expected - paid;
      return <Card key={s.id} style={{marginBottom:6, padding:"12px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:15,color:"var(--text-main)"}}>{s.name}</div>
            <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(180px, 1fr))", gap:"4px 16px", marginTop:6, fontSize:12, color:"#64748B"}}>
              <div>📌 Grup: <strong>{s.groupName||"Belirtilmemiş"}</strong></div>
              <div>🚌 Servis: {s.hasTransport ? <span style={{color:"#8B5CF6", fontWeight:600}}>AKTİF SERVİS</span> : "Servissiz"}</div>
              <div>📅 Kayıt Başlangıç: {fmtDate(s.courseStart)}</div>
              <div>📅 Planlanan Bitiş: {fmtDate(s.courseEnd)}</div>
            </div>
            <div style={{marginTop:8, fontSize:12}}>
              {debt > 0 ? <span style={{background:"#EF444410", color:"#EF4444", padding:"3px 8px", borderRadius:6, fontWeight:700}}>⚠️ Borç Durumu: {debt.toLocaleString("tr-TR")} ₺ Kalan Borç</span>
                       : <span style={{background:"#10B98110", color:"#10B981", padding:"3px 8px", borderRadius:6, fontWeight:700}}>✓ Ödeme Tamamlandı</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center",marginLeft:10}}>
            <Btn variant="secondary" sm onClick={()=>setDetailId(s.id)}>Detay</Btn>
            <Btn variant="danger" sm onClick={()=>{if(confirm(`${s.name} kaydı silinsin mi?`))DB.set("students",safeStudents.filter(x=>x.id!==s.id));}}>Sil</Btn>
          </div>
        </div>
      </Card>
    })}
    <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Yeni Öğrenci Kaydı"><StudentForm initial={{}} onSave={save} onCancel={()=>setShowAdd(false)} stockItems={stockItems}/></Modal>
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   YENİ: WHATSAPP PANELİ (BİRDEN FAZLA İSİMLİ GRUP LİNKİ)
═══════════════════════════════════════════════════════════════ */
function WhatsAppPage({students, waLinks}) {
  const safeLinks = safeArr(waLinks);
  const [title, setTitle] = useState("");
  const [url, setUrl] = useState("");
  
  const [selectedStudent, setSelectedStudent] = useState(null);
  const [showInviteModal, setShowInviteModal] = useState(false);

  function addLink() {
    if(!title.trim() || !url.trim()) return;
    const n = [...safeLinks, { id:Date.now(), name: title.toLocaleUpperCase("tr-TR"), url: url }];
    DB.set("waLinks", n); setTitle(""); setUrl("");
  }
  function deleteLink(id){ DB.set("waLinks", safeLinks.filter(l=>l.id!==id)); }

  function triggerInvite(student) {
    if(safeLinks.length === 0) { alert("Lütfen önce en az bir isimli davet bağlantısı ekleyin."); return; }
    setSelectedStudent(student);
    setShowInviteModal(true);
  }

  function completeInvite(linkUrl) {
    const msg = `SAYIN VELİMİZ,\n${selectedStudent.name} İSİMLİ ÖĞRENCİMİZİN ANTRENMAN VE DUYURU TAKİBİ İÇİN KULÜBÜMÜZÜN RESMİ WHATSAPP GRUBUNA AŞAĞIDAKİ LİNKTEN KATILABİLİRSİNİZ:\n\n${linkUrl}`;
    openWA(selectedStudent.guardianPhone1, msg);
    setShowInviteModal(false);
  }

  return <div style={{padding:16}}>
    <SectionTitle>WhatsApp Web Girişi</SectionTitle>
    <Card style={{marginBottom:16}}><Btn full style={{background:"#25D366", color:"#fff", border:"none"}} onClick={()=>window.open("https://web.whatsapp.com", "_blank")}>WhatsApp Web Sekmesini Aç</Btn></Card>
    
    <SectionTitle>İsimli Grup Davet Bağlantıları</SectionTitle>
    <Card>
      <div style={{display:"flex", gap:8}}>
        <input style={{flex:1, padding:"9px 11px", background:"var(--bg-color)", border:`1px solid #E2E8F0`, borderRadius:8, color:"var(--text-main)", fontSize:13, outline:"none"}} value={title} onChange={e=>setTitle(e.target.value)} placeholder="Bağlantı Adı (Örn: PAZARTESİ GRUBU)" />
        <input style={{flex:2, padding:"9px 11px", background:"var(--bg-color)", border:`1px solid #E2E8F0`, borderRadius:8, color:"var(--text-main)", fontSize:13, outline:"none"}} value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://chat.whatsapp.com/..." />
        <Btn onClick={addLink}>Ekle</Btn>
      </div>
      <div style={{marginTop:12}}>
        {safeLinks.map(l=><div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #F1F5F9"}}><span style={{fontSize:13,fontWeight:700}}>🔤 {l.name}</span><button onClick={()=>deleteLink(l.id)} style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontWeight:600}}>Sil</button></div>)}
      </div>
    </Card>

    <SectionTitle>Öğrenci Davet Takip Paneli</SectionTitle>
    <Card>
      {safeArr(students).filter(s=>courseStatus(s)==="active"&&s.guardianPhone1).map(s=><div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #F1F5F9"}}>
        <div><div style={{fontWeight:700,fontSize:14,color:"var(--text-main)"}}>{s.name}</div><div style={{fontSize:12,color:"#64748B"}}>Grup: {s.groupName||"Belirtilmemiş"}</div></div>
        <Btn sm style={{background:"#25D36615",color:"#25D366",border:"none"}} onClick={()=>triggerInvite(s)}>Davet Gönder</Btn>
      </div>)}
    </Card>

    {/* BAĞLANTI SEÇİM MODALİ */}
    <Modal show={showInviteModal} onClose={()=>setShowInviteModal(false)} title="Davet Bağlantısı Seçin">
      <div style={{fontSize:13,color:"#64748B",marginBottom:16}}>{selectedStudent?.name} isimli öğrenci velisine hangi grubu göndermek istersiniz?</div>
      <div style={{display:"flex", flexDirection:"column", gap:8}}>
        {safeLinks.map(l=><button key={l.id} onClick={()=>completeInvite(l.url)} style={{width:"100%",padding:12,borderRadius:12,background:"var(--bg-color)",border:"1px solid #E2E8F0",color:"var(--text-main)",fontWeight:700,textAlign:"left",cursor:"pointer"}}>{l.name}</button>)}
      </div>
    </Modal>
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   PERSONEL YOKLAMA VE PUANTAJ SİSTEMİ
═══════════════════════════════════════════════════════════════ */
function StaffPage({staff}){
  const validStaff = safeArr(staff); const [tab, setTab] = useState(0); const [showAdd, setShowAdd] = useState(false); const [f, setF] = useState(EMPTY_STAFF);
  const [selectedMonth, setSelectedMonth] = useState(TODAY.slice(0,7)); const [activeStaffId, setActiveStaffId] = useState(null);
  const u=(k,v)=>setF(p=>({...p,[k]:v}));

  function save(){
    if(!f.name.trim()) return;
    const n = f.id ? validStaff.map(s=>s.id===f.id?{...s,...f}:s) : [...validStaff,{...f,id:Date.now(),attendance:{},dailyWage:Number(f.dailyWage||0)}];
    DB.set("staff",n); setShowAdd(false); setF(EMPTY_STAFF);
  }
  const daysInMonth = new Date(Number(selectedMonth.split("-")[0]), Number(selectedMonth.split("-")[1]), 0).getDate();
  const daysArray = Array.from({length: daysInMonth}, (_, i) => i + 1);

  return<div style={{padding:16}}>
    <TabBar tabs={["Personel Listesi","Yoklama & Maaş Hakediş"]} active={tab} onChange={setTab}/>
    {tab===0&&<div>
      <SectionTitle action={<Btn sm onClick={()=>{setF(EMPTY_STAFF);setShowAdd(true);}}>+ Personel Ekle</Btn>}>Kurum Çalışanları</SectionTitle>
      {validStaff.map(s=><Card key={s.id}><Row label={s.name} val={`${s.dailyWage} ₺ / Gün`}/><div style={{marginTop:8, textAlign:"right"}}><Btn sm variant="danger" onClick={()=>DB.set("staff", validStaff.filter(x=>x.id!==s.id))}>Sil</Btn></div></Card>)}
    </div>}
    {tab===1&&<div>
      <Inp label="Takip Ayı Seçimi" type="month" value={selectedMonth} onChange={setSelectedMonth}/>
      {validStaff.map(s=>{
        const daysCount = Object.keys(s.attendance||{}).filter(k=>k.startsWith(selectedMonth)&&s.attendance[k]).length;
        const isExp = activeStaffId === s.id;
        return <Card key={s.id}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"} } onClick={()=>setActiveStaffId(isExp?null:s.id)}>
            <div><div style={{fontWeight:700,fontSize:15}}>{s.name}</div><div style={{fontSize:12,color:"#10B981",fontWeight:700}}>{daysCount} Gün • {(daysCount*Number(s.dailyWage||0)).toLocaleString("tr-TR")} ₺ Hakediş</div></div>
            <Btn sm variant="secondary">{isExp?"Kapat ▲":"Yoklama Seç ▼"}</Btn>
          </div>
          {isExp && <div style={{marginTop:12, paddingTop:12, borderTop:`1px solid #E2E8F0`}}>
            <Inp label="Günlük Yevmiye (₺)" type="number" value={s.dailyWage} onChange={(v)=>DB.set("staff", validStaff.map(x=>x.id===s.id?{...x,dailyWage:Number(v)}:x))}/>
            <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(40px, 1fr))", gap:6, marginTop:10}}>
              {daysArray.map(d=>{
                const key = `${selectedMonth}-${String(d).padStart(2,'0')}`; const isP = !!s.attendance?.[key];
                return <button key={d} type="button" onClick={()=>{
                  const att={...(s.attendance||{})}; if(isP) delete att[key]; else att[key]=true;
                  DB.set("staff", validStaff.map(x=>x.id===s.id?{...x,attendance:att}:x));
                }} style={{padding:8, borderRadius:8, border:`1px solid ${isP?"#10B981":"#E2E8F0"}`, background:isP?"#10B98115":"var(--bg-color)", color:isP?"#10B981":"#64748B", fontWeight:700}}>{d}</button>
              })}
            </div>
          </div>}
        </Card>
      })}
    </div>}
    <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Personel Kartı">
      <Inp label="Ad Soyad *" value={f.name} onChange={v=>u("name",v)}/>
      <Inp label="Günlük Yevmiye (₺) *" value={f.dailyWage} onChange={v=>u("dailyWage",v)} type="number"/>
      <Btn full onClick={save} style={{marginTop:10}}>Kaydet</Btn>
    </Modal>
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   DIĞER SAYFALAR & CORE YAPILAR
═══════════════════════════════════════════════════════════════ */
function InventoryPage({items}){
  const validItems = safeArr(items); const [show,setShow]=useState(false); const [f,setF]=useState(EMPTY_ITEM); const u=(k,v)=>setF(p=>({...p,[k]:v}));
  return<div style={{padding:16}}><SectionTitle action={<Btn sm onClick={()=>{setF(EMPTY_ITEM);setShow(true);}}>+ Ürün Ekle</Btn>}>Envanter</SectionTitle>
    {validItems.map(item=>(item && item.id) && <Card key={item.id}><Row label={item.name} val={`${item.price} ₺`}/><div style={{marginTop:8, textAlign:"right"}}><Btn sm variant="danger" onClick={()=>DB.set("stock", validItems.filter(i=>i.id!==item.id))}>Sil</Btn></div></Card>)}
    <Modal show={show} onClose={()=>setShow(false)} title="Ürün Ekle"><Inp label="Adı" value={f.name} onChange={v=>u("name",v)}/><Inp label="Fiyat" value={f.price} onChange={v=>u("price",v)} type="number"/><Btn full onClick={()=>{DB.set("stock",[...validItems,{...f,id:Date.now()}]);setShow(false);}}>Kaydet</Btn></Modal>
  </div>
}

function Dashboard({students,expenses}){
  const safeStudents = safeArr(students); const safeExpenses = safeArr(expenses); const active=safeStudents.filter(s=>courseStatus(s)==="active");
  const totalRev=safeStudents.reduce((t,s)=>t+totalPaid(s),0); const totalExp=safeExpenses.reduce((t,e)=>t+Number(e.amount||0),0); const netProfit = totalRev - totalExp;
  const recentRegistrations = [...safeStudents].sort((a,b) => b.id - a.id).slice(0, 5);
  const recentPay = safeStudents.flatMap(s=>safeArr(s.payments).map(p=>({...p,studentName:s.name}))).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  const endingSoon = active.filter(s=>{const d=daysLeft(s);return d>=0&&d<=14;}).sort((a,b)=>daysLeft(a)-daysLeft(b)).slice(0,5);
  return<div style={{padding:16}}>
    <Card style={{marginBottom:16, background:netProfit >= 0 ? "#10B98115" : "#EF444415", border:"none"}}><Row label="NET KASA DURUMU" val={`${netProfit} ₺`} col={netProfit>=0?"#10B981":"#EF4444"}/></Card>
    <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(300px, 1fr))", gap:16, alignItems:"start"}}>
      <Card><div style={{fontSize:13, fontWeight:800, marginBottom:12}}>Son Kayıtlar</div>{recentRegistrations.map(s => <Row key={s.id} label={s.name} val={fmtDate(s.courseStart)}/>)}</Card>
      <Card><div style={{fontSize:13, fontWeight:800, marginBottom:12}}>Son Ödemeler</div>{recentPay.map((p, i) => <Row key={i} label={p.studentName} val={`${p.amount} ₺`}/>)}</Card>
      <Card><div style={{fontSize:13, fontWeight:800, marginBottom:12}}>Bitişi Yaklaşanlar</div>{endingSoon.map(s => <Row key={s.id} label={s.name} val={`${daysLeft(s)} Gün`}/>)}</Card>
    </div>
  </div>
}

function SettingsPage({navItems, clubName, logoUrl, appUsers}){
  const [tab, setTab] = useState(0); const [nameVal, setNameVal] = useState(clubName); const [logoVal, setLogoVal] = useState(logoUrl);
  const [showUserModal, setShowUserModal] = useState(false); const [uForm, setUForm] = useState({ id:null, username:"", password:"", role:"staff", allowedTabs:[] });
  function saveUser() { if(!uForm.username||!uForm.password)return; let n = safeArr(appUsers); if(uForm.id) n = n.map(u => u.id === uForm.id ? {...uForm} : u); else n = [...n, {...uForm, id:Date.now(), allowedTabs:["dashboard","students","attendance"]}]; DB.set("appUsers", n); setShowUserModal(false); }
  return<div style={{padding:16}}>
    <TabBar tabs={["Genel Kurum", "Personel Yetkileri"]} active={tab} onChange={setTab}/>
    {tab === 0 && (<div><Card><Inp label="Kulüp Adı" value={nameVal} onChange={setNameVal}/><Inp label="Logo" value={logoVal} onChange={setLogoVal}/></Card><Btn full onClick={()=>{DB.set("clubName",nameVal); DB.set("logoUrl",logoVal); alert("Kaydedildi");}}>Kaydet</Btn></div>)}
    {tab===1&&<div><SectionTitle action={<Btn sm onClick={()=>{setUForm({id:null,username:"",password:"",role:"staff",allowedTabs:["dashboard","students","attendance"]});setShowUserModal(true);}}>+ Hesap Ekle</Btn>}>Hesaplar</SectionTitle>
      {safeArr(appUsers).map(u=><Card key={u.id}><Row label={u.username} val={u.role=='admin'?'Admin':'Çalışan'}/></Card>)}
      <Modal show={showUserModal} onClose={()=>setShowUserModal(false)} title="Hesap Ekle"><Inp label="Kullanıcı Adı" value={uForm.username} onChange={v=>setUForm({...uForm,username:v})}/><Inp label="Şifre" value={uForm.password} onChange={v=>setUForm({...uForm,password:v})}/><Btn full onClick={saveUser}>Kaydet</Btn></Modal>
    </div>}
  </div>
}

/* ═══════════════════════════════════════════════════════════════
   APP ROOT (MAIN STRUCTURE)
═══════════════════════════════════════════════════════════════ */
function App(){
  const [currentUser, setCurrentUser] = useState(() => { try { return JSON.parse(sessionStorage.getItem("aqua_user")); } catch { return null; } });
  const [isDbLoaded, setIsDbLoaded] = useState(false);
  const [students,setStudents]=useState([]); const [staff,setStaff]=useState([]); const [stockItems,setStockItems]=useState([]); const [movements,setMovements]=useState([]); const [expenses,setExpenses]=useState([]);
  const [clubName,setClubName]=useState("AquaClub"); const [navItems,setNavItems]=useState(NAV_ITEMS); const [appUsers, setAppUsers]=useState([]); const [oldPinCode, setOldPinCode]=useState("0309"); const [waGroupLink,setWaGroupLink]=useState(""); const [waLinks, setWaLinks]=useState([]);
  const [themeColor,setThemeColor]=useState("#F0F4F8"); const [sidebarColor,setSidebarColor]=useState("#FFFFFF"); const [cardColor,setCardColor]=useState("#FFFFFF"); const [textColor,setTextColor]=useState("#1E293B"); const [logoUrl,setLogoUrl]=useState(""); const [activeTab,setActiveTab]=useState("dashboard"); const [sidebarOpen,setSidebarOpen]=useState(false);

  useEffect(() => { document.documentElement.style.setProperty('--bg-color', themeColor); document.documentElement.style.setProperty('--sidebar-bg', sidebarColor); document.documentElement.style.setProperty('--card-bg', cardColor); document.documentElement.style.setProperty('--text-main', textColor); }, [themeColor, sidebarColor, cardColor, textColor]);

  useEffect(() => {
    const unsub = db.collection("appData").doc("main").onSnapshot((doc) => {
      if (doc.exists) {
        const d = doc.data();
        if (d.students) setStudents(safeArr(d.students));
        if (d.staff) setStaff(safeArr(d.staff));
        if (d.stock) setStockItems(safeArr(d.stock));
        if (d.movements) setMovements(safeArr(d.movements));
        if (d.expenses) setExpenses(safeArr(d.expenses));
        if (d.waGroupLink) setWaGroupLink(d.waGroupLink);
        if (d.waLinks) setWaLinks(safeArr(d.waLinks));
        if (d.clubName) setClubName(d.clubName);
        if (d.pinCode) setOldPinCode(d.pinCode); 
        let loadedUsers = safeArr(d.appUsers);
        if (loadedUsers.length === 0) { loadedUsers = [{ id:"admin", username:"admin", password: d.pinCode || "0309", role:"admin", allowedTabs: NAV_ITEMS.map(n=>n.id) }]; }
        setAppUsers(loadedUsers);
        if (d.logoUrl) setLogoUrl(d.logoUrl);
      }
      setIsDbLoaded(true);
    });
    return () => unsub();
  }, []);

  if (!isDbLoaded) return <div style={{display:"flex",flexDirection:"column",height:"100vh",alignItems:"center",justifyContent:"center",background:"var(--bg-color)"}}><div className="spinner"></div><div style={{color:"var(--text-main)",fontWeight:700,marginTop:10}}>Kurumsal Sistem Yükleniyor...</div></div>;
  if (!currentUser) return <LoginScreen onSuccess={(user) => { sessionStorage.setItem("aqua_user", JSON.stringify(user)); setCurrentUser(user); }} appUsers={appUsers} adminPin={oldPinCode} />;

  const visibleNav = NAV_ITEMS.filter(n => currentUser.role === "admin" || (currentUser.allowedTabs || []).includes(n.id));

  return<div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg-color)"}}>
    <div className="sidebar-desktop" style={{width:240, background:"var(--sidebar-bg)", borderRight:"1px solid #E2E8F0", display:"flex", flexDirection:"column", boxShadow:"2px 0 10px rgba(0,0,0,0.02)", zIndex:100}}>
      <div style={{padding:"24px 20px 20px", borderBottom:"1px solid #E2E8F0", display:"flex", alignItems:"center", gap:12}}>
        <div style={{width:38,height:38,borderRadius:10,background:`linear-gradient(135deg,#0EA5E9,#0284C7)`,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
          {logoUrl ? <img src={logoUrl} alt="Logo" style={{width:"100%",height:"100%",objectFit:"cover"}}/> : <span style={{color:"white", fontWeight:800}}>AC</span>}
        </div>
        <div><div style={{fontSize:15,fontWeight:800,color:"var(--text-main)"}}>{clubName}</div><div style={{fontSize:11,color:"#64748B",fontWeight:600}}>{currentUser.username}</div></div>
      </div>
      <div style={{flex:1, overflowY:"auto", padding:"16px 12px"}}>
        {visibleNav.map(item=><button key={item.id} onClick={()=>setActiveTab(item.id)} style={{display:"flex",alignItems:"center",gap:12,width:"100%", padding:"12px 14px", marginBottom:6, background:activeTab===item.id?"#0EA5E915":"transparent", border:"none", borderRadius:12, color:activeTab===item.id?"#0284C7":"#475569", cursor:"pointer", textAlign:"left", fontSize:14, fontWeight:activeTab===item.id?700:500}}><Icon d={item.icon} size={18}/> {item.label}</button>)}
      </div>
      <div style={{padding:"16px"}}><button onClick={()=>{sessionStorage.removeItem("aqua_user"); window.location.reload();}} style={{width:"100%", padding:"12px", background:"#EF444415", borderRadius:12, border:"none", color:"#EF4444", fontWeight:700, cursor:"pointer"}}>Çıkış Yap</button></div>
    </div>
    
    <div style={{flex:1, display:"flex", flexDirection:"column", overflow:"hidden"}}>
      <div style={{padding:"16px 20px", background:"var(--sidebar-bg)", borderBottom:"1px solid #E2E8F0", fontWeight:800, fontSize:16, display:"flex", alignItems:"center", gap:16, color:"var(--text-main)"}}>
        <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="menu-btn" style={{background:"transparent", border:`1px solid #E2E8F0`, color:"var(--text-main)", width:36, height:36, borderRadius:10}}>☰</button>
        {(visibleNav.find(n=>n.id===activeTab)||{}).label}
      </div>
      <div style={{flex:1, overflowY:"auto"}}>
        {activeTab==="dashboard"&&<Dashboard students={students} expenses={expenses}/>}
        {activeTab==="students"&&<StudentsPage students={students} stockItems={stockItems}/>}
        {activeTab==="attendance"&&<AttendancePage students={students}/>}
        {activeTab==="payments"&&<PaymentsPage students={students}/>}
        {activeTab==="expenses"&&<ExpensesPage expenses={expenses}/>}
        {activeTab==="whatsapp"&&<WhatsAppPage students={students} waLinks={waLinks} />}
        {activeTab==="staff"&&<StaffPage staff={staff}/>}
        {activeTab==="inventory"&&<InventoryPage items={stockItems}/>}
        {activeTab==="settings"&&currentUser.role==='admin'&&<SettingsPage navItems={NAV_ITEMS} clubName={clubName} logoUrl={logoUrl} themeColor={themeColor} sidebarColor={sidebarColor} cardColor={cardColor} appUsers={appUsers}/>}
      </div>
    </div>
    <style>{`@media(max-width:768px){.sidebar-desktop{display:none!important}} @media(min-width:769px){.menu-btn{display:none!important}}`}</style>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
